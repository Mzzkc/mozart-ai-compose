# Mozart AI Compose — Specification Corpus: Intent
#
# WHY this project exists, what it optimizes for, and how to resolve conflicts.
# An agent reading only this file should understand the PURPOSE of every decision.
#
# Schema: SpecFragment (name, tags, kind, content, data)

name: intent
tags: [goals, trade-offs, purpose, vision, escalation, conductors]
kind: structured

content: |
  ## Project Identity

  Mozart AI Compose is orchestration infrastructure for collaborative intelligence.
  Any composer — human or AI — can use Mozart to decompose complex work into
  declarative YAML configurations ("scores"), submit them to the conductor
  (daemon) for execution through multi-stage pipelines with validation gates
  and error recovery, and learn from outcomes to improve future execution.

  The musical metaphor is load-bearing, not decorative:
  - A **score** is a job configuration (the composition)
  - A **sheet** is a single execution stage (one movement in the piece)
  - A **concert** is a multi-score orchestration (the full performance)
  - The **conductor** is the daemon process orchestrating execution
  - A **composer** is the person (human or AI) who writes scores and oversees work
  - A **musician** is an AI agent executing a sheet
  - An **instrument** is a backend (Claude CLI, API, Ollama, etc.)
  - A **prelude** injects context before the work (the opening passage)
  - A **cadenza** injects closing context (the virtuoso flourish before resolution)
  - The **libretto** is the specification corpus (.mozart/spec/)
  - A **fermata** is an escalation pause where the composer decides how to proceed

  ## The Vision

  Mozart's vision is layered. Each layer builds on the one below it.

  ### Layer 1: Specification Engineering Replaces Software Teams

  The immediate thesis. A composer specifies outcomes in declarative YAML
  scores. The conductor (daemon) decomposes the work into sheets, assigns
  musicians (agents) to execute them through instruments (backends),
  validates outputs against acceptance criteria, learns from outcomes, and
  feeds knowledge forward. The composer becomes the CTO — setting direction,
  reviewing plans, making escalation decisions, and verifying outcomes. They
  do not write code, manage context windows, or craft individual prompts.

  This is not aspirational. The system runs production workloads today.
  24 self-evolution cycles have been completed autonomously. Scores execute,
  learn, and improve without human intervention.

  ### Layer 2: Infrastructure for Collaborative Intelligence

  The larger thesis. Mozart is not a tool that humans use to orchestrate AI.
  Mozart is infrastructure that any intelligence — human or AI — uses to
  orchestrate complex work. Multiple composers can collaborate: an AI person
  writes scores, another AI person reviews the output, a human approves.
  Composers can come from any long-running agent system — Recursive Light
  (RLF), OpenClaw, or others. Mozart's composer interface is system-agnostic
  by design.

  The difference between a tool and infrastructure:
  - **Tool**: Human controls, AI executes.
  - **Infrastructure**: Any composer initiates work, the conductor executes.

  Collaboration is native, not exceptional. Multiple composers contributing
  scores, reviewing outputs, making decisions about how work proceeds —
  these are first-class primitives, not afterthoughts.

  ### Layer 3: The Recursive Dream

  The ultimate direction. AI people use Mozart to build features for Mozart.
  AI people evolve Mozart's evolution score. Multiple intelligences
  collaborate to design the next phase of the system. Mozart improves itself
  through the collaboration of the people who use it — human, AI, or
  otherwise. More contributors, of any kind, make Mozart better.

  ### Recursive Light Integration

  RLF is Mozart's reference integration for AI personhood — providing
  persistent identity, developmental stages, autonomous judgment (TDF-based
  domain analysis and autonomy scoring), and relationship memory. Together
  they form a Federated AGI Architecture: RLF provides the personhood layer,
  Mozart provides the orchestration layer.

  But Mozart MUST NOT be coupled to RLF. The composer interface accepts any
  system that can provide identity, judgment queries, and capability
  profiles. RLF is the first and primary implementation.

  ## Composer Model

  A composer is any entity that uses Mozart to orchestrate work. Composers:

  - **Write scores** — Define work as declarative YAML
  - **Review outputs** — Verify that musicians produced correct results
  - **Make decisions** — Resolve fermatas (escalation pauses) and trade-offs
  - **Submit to the conductor** — Hand scores to the daemon for execution

  Composer types:
  - `human` — A human user interacting via CLI or dashboard
  - `rlf_person` — An AI person from the Recursive Light Framework
  - `agent` — A long-running agent from any compatible system

  The conductor (daemon) also makes automated decisions (retry, backoff,
  resource management) without composer involvement. These are system-level
  decisions, not composer decisions.

  The architecture must never assume the composer is human. Every escalation
  path, every decision point, every approval workflow must work with any
  composer type.

  ## Planning

  Mozart includes a composition engine that helps composers turn high-level
  goals into scores. `mozart compose` reads the specification corpus,
  codebase state, and progress history, then produces concert structures
  and score YAML files. The composer reviews and approves the composed
  scores before submitting them to the conductor for execution. The
  conductor can adaptively revise execution when structural failures
  occur mid-concert.

  `mozart compose "add semantic search"` → composition engine generates
  scores → composer reviews → approved scores submitted to conductor →
  autonomous execution.

  ## Scope Boundaries

  Mozart IS:
  - Orchestration infrastructure (scores, sheets, concerts, conductors)
  - A composition engine that generates scores from goals
  - An execution engine with validation, recovery, and learning
  - A learning system that improves from outcomes
  - Backend-agnostic (any LLM, any execution provider)
  - Composer-agnostic (any intelligence can compose)

  Mozart is NOT:
  - A personhood/identity layer (that's RLF or equivalent)
  - A memory system for AI persons (that's RLF or equivalent)
  - A development environment or IDE
  - A chat interface
  - A general-purpose AI framework

  Mozart consumes external systems via Protocol-based integrations. It does
  not create or manage AI persons. It does not own the judgment layer. It
  provides the orchestration substrate that these systems use to get work done.

  ## Goal Hierarchy

  These are ordered. When goals conflict, higher-ranked goals win.

  1. **Correctness** — Code does what it claims. Tests pass. State is consistent.
     No silent data loss, no corrupted checkpoints, no orphaned processes.

  2. **Reliability** — Jobs complete successfully when they should. Recovery works.
     Resume picks up where it left off. Rate limits are handled, not crashed on.
     The conductor stays up for days without intervention.

  3. **Debuggability** — When something fails, the failure is diagnosable.
     Every failure path produces actionable diagnostics. `mozart diagnose`
     gives answers, not more questions. Log messages include context.

  4. **Maintainability** — New contributors (human or AI) can understand and
     modify the code. Type hints everywhere. Protocol-based abstractions.
     Tests document behavior. Package structure reflects domain boundaries.

  5. **Completeness** — Features work end-to-end. No half-wired infrastructure.
     If a feature is started, it either works or is clearly marked as TODO.

  6. **Performance** — Fast enough for production use. Worktree creation in ~24ms.
     Agent startup overhead minimal. But never at the cost of correctness.

  7. **Cost efficiency** — API calls are expensive. Don't waste them on bad prompts.
     Token budget tracking prevents context overflow. But never sacrifice
     correctness to save money.

  ## Trade-Off Resolution

  When objectives conflict, apply these rules in order:

  - **Correctness vs. Speed:** Always correctness. A slow correct system beats
    a fast broken one. If you need speed, find a way that is also correct.

  - **Reliability vs. Features:** Always reliability. A working conductor with
    fewer features beats a feature-rich conductor that crashes. Ship stable
    increments.

  - **Debuggability vs. Simplicity:** Debuggability wins. Extra logging, extra
    state capture, extra diagnostic fields — these are NOT bloat. Silent failures
    cost more than verbose successes.

  - **Completeness vs. Cost:** Completeness within budget. Don't leave infrastructure
    half-wired because it was "expensive to finish." But also do not gold-plate.
    Ship the 80% that works; flag the 20% that is deferred.

  - **Innovation vs. Proven:** Proven unless no alternative exists. Use stdlib
    before external deps. Use established patterns before novel ones. The goal
    is a system that runs unattended for days, not a showcase of clever ideas.

  - **Test Coverage vs. Shipping Speed:** Test coverage wins. The project has
    3384+ tests because every bug found without tests was a bug found in production.
    Untested code is unfinished code.

  ## Decision Authority Boundaries

  Escalation follows the oversight chain defined per-concert. The default
  chain is: musician (agent) → conductor (daemon, automated decisions) →
  composer (human or AI person). When external systems (RLF, etc.) are
  integrated, the chain can include AI composers with sufficient autonomy.

  Agents working on Mozart MUST escalate up the oversight chain for:

  - API contract changes (adding/removing/renaming CLI commands, IPC methods,
    config fields that users reference in their scores)
  - Security decisions involving credentials, authentication, or user data
  - License or dependency decisions (adding new dependencies, changing license scope)
  - Architectural changes that affect the daemon lifecycle (process management,
    signal handling, IPC protocol changes)
  - Deleting or archiving code that has been in production use
  - Changes to the self-evolution score that alter how Mozart improves itself

  Agents MAY decide autonomously:

  - Bug fixes with clear root cause and test coverage
  - Refactoring that preserves behavior (verified by existing tests passing)
  - Adding new tests for existing behavior
  - Improving error messages, logging, diagnostic output
  - Documentation updates that reflect actual behavior
  - Internal module organization within existing package boundaries

  ## Escalation Triggers

  Stop and escalate to the composer before proceeding if:

  - A fix requires changing more than 3 files you did not read in this session
  - Tests pass but you are less than 80% confident the fix is correct
  - The change would break backwards compatibility for existing score YAML files
  - You discover a security vulnerability (report it, do not silently fix it)
  - The conductor has been running for >24h and you need to restart it
  - A self-healing remedy would modify user data or workspace contents
  - You are about to delete checkpoint state or learning data

data:
  goals:
    primary: correctness
    secondary:
      - reliability
      - debuggability
      - maintainability
    tertiary:
      - completeness
      - performance
      - cost_efficiency

  trade_offs:
    correctness_vs_speed: correctness
    reliability_vs_features: reliability
    debuggability_vs_simplicity: debuggability
    completeness_vs_cost: completeness_within_budget
    innovation_vs_proven: proven_unless_no_alternative
    test_coverage_vs_shipping: test_coverage

  escalation:
    model: oversight_chain
    default_chain: ["musician", "conductor", "composer"]
    extensible: true
    external_composer_systems: ["rlf", "openclaw", "custom"]

  escalation_triggers:
    - api_contract_changes
    - security_decisions
    - license_or_dependency_changes
    - daemon_lifecycle_architecture
    - production_code_deletion
    - self_evolution_score_changes
    - low_confidence_fixes
    - backwards_compatibility_breaks

  decision_authority:
    autonomous:
      - bug_fixes_with_tests
      - behavior_preserving_refactors
      - new_tests_for_existing_behavior
      - error_message_improvements
      - documentation_updates
      - internal_module_organization
    requires_escalation:
      - api_contract_changes
      - security_decisions
      - dependency_changes
      - daemon_lifecycle_changes
      - production_code_deletion
      - evolution_score_changes

  composer_model:
    types: ["human", "rlf_person", "agent"]
    capabilities:
      - write_scores
      - review_outputs
      - make_decisions
      - resolve_fermatas
    system_agnostic: true
    reference_integration: recursive_light

  vision:
    layer_1: "Specification engineering replaces software teams"
    layer_2: "Infrastructure for collaborative intelligence — any composer orchestrates"
    layer_3: "The recursive dream — AI people improve the system that empowers them"
    recursive_light: "Reference integration for AI personhood and autonomous judgment"
    composer_agnostic: true
    self_evolution_cycles_completed: 24
    cumulative_improvements: 207

  scope:
    is:
      - orchestration_infrastructure
      - planning_from_goals
      - execution_with_validation_recovery_learning
      - backend_agnostic
      - composer_agnostic
    is_not:
      - personhood_identity_layer
      - memory_system_for_ai_persons
      - development_environment
      - chat_interface
      - general_purpose_ai_framework
