# Mozart AI Compose — Specification Corpus: Conventions
#
# HOW code is written in this project. Patterns, naming, structure, style.
# An agent reading only this file should produce code that looks like it
# belongs in the existing codebase.
#
# Schema: SpecFragment (name, tags, kind, content, data)

name: conventions
tags: [code, style, patterns, architecture, naming]
kind: structured

content: |
  ## Language and Runtime

  - Python 3.11+ (uses modern features: `match`, `type X = ...`, `X | Y` unions)
  - All I/O is async. Use `asyncio.create_subprocess_exec` for subprocess calls.
    Never use `subprocess.run` or `subprocess.Popen` in production code.
  - Type hints on every function signature. `mypy --strict` must pass.
  - Line length: 100 characters (configured in pyproject.toml via ruff).

  ## Pydantic v2 Everywhere

  All configuration and state models use Pydantic v2 BaseModel:

  ```python
  from pydantic import BaseModel, Field

  class MyConfig(BaseModel):
      name: str = Field(description="What this field means")
      timeout: float = Field(default=30.0, description="Seconds before timeout")
  ```

  Rules:
  - Every field has a `description` in its `Field()` call.
  - Use `Field(default_factory=list)` for mutable defaults, never `default=[]`.
  - Validators use `@field_validator` or `@model_validator` (v2 style).
  - Never use Pydantic v1 syntax (`class Config:`, `@validator`).
  - New config classes go in the appropriate file under `src/mozart/core/config/`:
    - `backend.py` — Backend and bridge configuration
    - `execution.py` — Retry, rate limit, validation, cost, parallel config
    - `job.py` — Top-level JobConfig, SheetConfig, PromptConfig
    - `learning.py` — Learning, grounding, checkpoint config
    - `orchestration.py` — Concert, conductor, notification, hooks config
    - `workspace.py` — Workspace lifecycle, isolation, logging, feedback config
    - `spec.py` — Specification corpus configuration

  ## Design Principles

  ### Single Source of Truth

  Every piece of information should live in exactly one place. Other systems
  reference it; they do not duplicate it. When you need data, pull it from
  the authoritative source rather than maintaining a copy. The specification
  corpus (libretto) is the canonical example: project conventions live in
  `.mozart/spec/`, not scattered across CLAUDE.md, docstrings, and comments.

  Corollaries:
  - Config lives in Pydantic models, not string constants
  - State lives in CheckpointState, not filesystem side effects
  - Error codes live in `codes.py`, not inline strings
  - Musical terminology lives in this conventions file

  ### Data-Oriented Design (ECS Ethos)

  Prefer separating data from behavior. Components should be composable
  systems that operate on well-defined data structures, not monolithic
  classes that bundle data and logic. While Mozart doesn't use a literal
  Entity-Component-System, the ethos applies:

  - Data models (Pydantic) are separate from the logic that operates on them
  - Systems (runners, validators, learners) process data without owning it
  - Components (backends, state stores, notifiers) are interchangeable via Protocols
  - State flows through the system; it is not hidden inside objects

  This makes the system inspectable, testable, and extensible.

  ### Defensive Coding

  Every function should validate its inputs and fail fast with clear errors.
  This is not just a preference — it is how Mozart catches bugs before they
  propagate. Sanity checks, precondition assertions, type guards, and
  early returns for invalid state are expected in all code.

  ```python
  def execute_sheet(self, sheet_num: int, config: JobConfig) -> SheetResult:
      if sheet_num < 1:
          raise ValueError(f"sheet_num must be >= 1, got {sheet_num}")
      if sheet_num > config.sheet.total:
          raise ValueError(f"sheet_num {sheet_num} exceeds total {config.sheet.total}")
      # ... proceed with validated inputs
  ```

  ## Protocol-Based Abstractions

  Swappable components use Python Protocol classes (structural subtyping):

  ```python
  from typing import Protocol

  class StateBackend(Protocol):
      async def load(self, job_id: str) -> CheckpointState | None: ...
      async def save(self, state: CheckpointState) -> None: ...
  ```

  Current Protocol implementations:
  - `StateBackend` → `JsonStateBackend`, `SqliteStateBackend`
  - `Backend` (ABC) → `ClaudeCLIBackend`, `AnthropicAPIBackend`, `OllamaBackend`, `RecursiveLightBackend`
  - `Notifier` → `DesktopNotifier`, `SlackNotifier`, `WebhookNotifier`
  - `ValidationCheck` → Various check implementations
  - `Remedy` → Self-healing remedy implementations
  - `GroundingHook` → External validation hooks
  - `OutputProtocol` (ABC) → `ConsoleOutput`, `StructuredOutput`, `NullOutput`

  When adding a new swappable component, define a Protocol first, then implement it.
  Never couple to a concrete class when a Protocol would suffice.

  The composer interface must accept any composer type (human, AI person,
  agent system) without assuming the composer is human.

  ## Repository Structure

  The repository has a strict directory organization. Nothing goes in the
  top-level directory without good reason. Agents must follow this layout.

  ```
  mozart-ai-compose/
  ├── src/mozart/          # Source code (tracked)
  ├── tests/               # Test files (tracked)
  │   └── temp/            # Test artifacts — gitignored, never commit
  │       └── temp-scores/ # Scores created by or used in tests
  ├── examples/            # Public example scores for users (tracked)
  ├── scores/              # Scores vital to Mozart's operation (tracked)
  ├── scores-internal/     # Internal development scores (gitignored)
  ├── workspaces/          # All job workspaces live here (gitignored)
  ├── docs/                # Published documentation (tracked)
  │   └── plans/           # Internal design/planning docs (gitignored)
  ├── logs/                # Log output (gitignored)
  ├── scripts/             # Utility scripts (gitignored)
  ├── skills/              # Mozart-specific skill files (tracked)
  ├── .mozart/             # Mozart project config and spec corpus
  │   ├── spec/            # Specification corpus (libretto)
  │   └── state/           # Decision log, progress tracking
  └── memory-bank/         # Session memory for agents (gitignored)
  ```

  Rules:
  - **No dumping files at the top level.** Every file belongs in a directory.
    Scores go in `examples/`, `scores/`, or `scores-internal/`. Workspaces go
    in `workspaces/`. Logs go in `logs/`. Plans go in `docs/plans/`.
  - **Test artifacts go in `tests/temp/`.** Any file a test creates (scores,
    configs, output files) goes in `tests/temp/` or its subdirectories. This
    directory is gitignored. Tests must clean up after themselves or use
    `tmp_path` fixtures.
  - **Workspaces always under `workspaces/`.** When configuring a score's
    workspace path, use `workspaces/<name>` (relative) or the absolute
    equivalent. Do not create dot-prefixed workspace directories at the
    top level (legacy pattern, being phased out).
  - **`examples/` is public-facing.** Scores here should be clean, documented,
    and runnable by external users. No hardcoded absolute paths. Use relative
    paths or `{workspace}` template variables.
  - **`scores/` is for operational scores.** Scores that are part of how Mozart
    functions (evolution, self-improvement, etc.) go here. These are tracked.
  - **`scores-internal/` is for development.** Internal scores used for Mozart's
    own development, QA, debugging. These are gitignored and may contain
    environment-specific paths.
  - **`docs/plans/` is gitignored.** Design docs and implementation plans are
    internal working documents. They are not published or committed.

  ## Package Structure

  The codebase follows domain-driven package organization:

  ```
  src/mozart/
  ├── core/           # Shared models, config, errors, fan-out — NO execution logic
  ├── backends/       # Claude CLI, API, Ollama, Recursive Light
  ├── execution/      # Runner loop, sheet execution, DAG, validation, recovery
  │   └── runner/     # The runner is itself a package (base, sheet, lifecycle, etc.)
  ├── state/          # State persistence (JSON, SQLite)
  ├── daemon/         # Long-running conductor process
  │   ├── ipc/        # Unix socket + JSON-RPC 2.0
  │   └── profiler/   # Execution profiling
  ├── learning/       # Pattern detection, trust scoring, global store
  │   └── store/      # SQLite-backed global learning (14 modules)
  ├── healing/        # Self-diagnosis and automatic remediation
  ├── validation/     # Pre-execution config validation checks
  ├── isolation/      # Git worktree isolation for parallel safety
  ├── prompts/        # Jinja2 template rendering and prompt assembly
  ├── cli/            # Typer CLI with Rich output
  │   └── commands/   # One file per command group
  ├── dashboard/      # FastAPI REST + web UI
  ├── notifications/  # Desktop, Slack, webhook
  ├── mcp/            # Model Context Protocol server
  └── utils/          # Small shared helpers (time, etc.)
  ```

  Rules:
  - `core/` never imports from `execution/`, `daemon/`, `cli/`, or `dashboard/`.
  - `execution/` may import from `core/`, `backends/`, `state/`, `learning/`, but not `daemon/` or `cli/`.
  - `daemon/` may import from everything except `cli/` and `dashboard/`.
  - `cli/` may import from everything (it is the outermost layer).
  - Use `if TYPE_CHECKING:` to break circular imports for type hints.
  - Two levels of nesting maximum. A third level means the package boundary is wrong.

  ## Naming Conventions

  ### Musical Metaphor (Domain Language)

  The metaphor is load-bearing, not decorative. Use these terms in
  user-facing output (CLI, logs, docs). In code, use the technical names
  but keep docstrings in musical terms.

  | Term       | Meaning                              | Code Representation         |
  |------------|--------------------------------------|-----------------------------|
  | Score      | Job configuration YAML               | `JobConfig` model           |
  | Sheet      | Single execution stage               | `SheetState`, sheet_num int |
  | Concert    | Multi-score orchestration            | `ConcertConfig`             |
  | Conductor  | Daemon process orchestrating execution | `DaemonManager`           |
  | Prelude    | Context injected before work         | `prelude` config section    |
  | Cadenza    | Context injected at end              | `cadenza` config section    |
  | Movement   | A phase within a concert             | Concert stage               |
  | Libretto   | The specification corpus             | `.mozart/spec/` directory   |
  | Composer   | Person (human/AI) who uses Mozart to compose and oversee work | `mozart compose`, CLI user |
  | Fermata    | An escalation pause for judgment     | Escalation trigger point    |

  The conductor is the daemon process. Composers (the people using Mozart)
  are not assumed to be human — they can be AI people, agent systems, or
  humans. But the conductor itself is always the daemon.

  ### Python Naming

  - Classes: `PascalCase` (`TokenBudgetTracker`, `SpecCorpusLoader`)
  - Functions/methods: `snake_case` (`build_sheet_prompt`, `load_state`)
  - Constants: `UPPER_SNAKE` (`_CHARS_PER_TOKEN`, `_DEFAULT_WINDOW`)
  - Private: leading underscore (`_logger`, `_try_allocate`)
  - Module-level logger: `_logger = get_logger("module.name")` or `logging.getLogger(__name__)`
  - Prefer `get_logger()` from `mozart.core.logging` for structured logging.

  ### Error Codes

  Structured error codes with category prefixes:
  - `E0xx` — Execution errors (timeout, killed, crashed)
  - `E1xx` — Rate limit / capacity errors
  - `E2xx` — Validation errors
  - `E3xx` — Configuration errors
  - `E4xx` — Authentication errors
  - `E5xx` — Backend errors
  - `E6xx` — State / filesystem errors
  - `E9xx` — Internal / unknown errors

  New error codes go in `src/mozart/core/errors/codes.py`. New errors MUST
  extend this taxonomy, not create ad-hoc error strings. Every error should
  produce a structured code, a human-readable message, and a suggested
  recovery action.

  ## Code Quality

  ### Simplicity Over Cleverness

  Code should be self-documenting. If a reader needs to puzzle through a
  function to understand what it does, it is too clever. Write code that
  reads like prose, not puzzles. Clever is the enemy of understanding.

  ### No Dead Code

  Dead code misleads readers, creates false dependencies, and rots. If code
  is no longer called, delete it. Git history preserves it if needed later.
  This includes: unused imports, unreachable branches, commented-out code,
  and functions that nothing calls.

  ### No Stubs or Prototypes

  If code is written, it must be wired up, tested, and ready for production
  use. Half-finished infrastructure is worse than no infrastructure. "TODO:
  implement later" in a code path that can be reached is forbidden.

  ### Extensive Logging

  Log at appropriate levels with enough context to debug in isolation:
  - `debug` — Internal state transitions, values during computation
  - `info` — User-visible actions (loading files, starting jobs, completing sheets)
  - `warning` — Recoverable problems (missing optional files, deprecated config)
  - `error` — Failures that stop or degrade execution
  - `critical` — System-level failures (conductor crash, state corruption)

  Include context in log messages: job_id, sheet_num, file paths, durations,
  line numbers when possible. Never log secrets, API keys, or full prompt text.

  ### Development Logging

  During development, always run Mozart with verbose and detailed logging:

  ```bash
  mozart --verbose start                               # Verbose conductor
  mozart --verbose run my-score.yaml                   # Verbose job submission
  mozart --log-file logs/run.log run my-score.yaml     # Log to file
  mozart --log-format both --log-file logs/run.log run my-score.yaml  # Console + file
  ```

  Mozart has built-in log file support via `--log-file` and `--log-format`.
  The conductor writes to `~/.mozart/mozart.log` by default. Use these
  instead of shell redirection.

  Log files produced during development go in `logs/`, never at the top level.

  ## Testing Patterns

  ### Framework

  - `pytest` with `pytest-asyncio` (auto mode — all async tests discovered automatically)
  - `pytest-timeout` with 30s global safety net
  - `hypothesis` for property-based testing (mark with `@pytest.mark.property_based`)
  - Test files: `tests/test_<module>.py`
  - All tests must be deterministic. No flaky tests allowed.

  ### Async Testing

  ```python
  async def test_something():
      result = await my_async_function()
      assert result.success
  ```

  No `@pytest.mark.asyncio` needed — `asyncio_mode = "auto"` handles it.

  ### Polling Over Sleeping

  Never use fixed `asyncio.sleep()` for coordination. Always poll with deadline:

  ```python
  deadline = asyncio.get_event_loop().time() + 10.0
  while asyncio.get_event_loop().time() < deadline:
      status = await get_status()
      if status in ("completed", "failed"):
          break
      await asyncio.sleep(0.2)
  assert status == "completed"
  ```

  ### Timing Assertions

  Use generous bounds (10x expected). Tests validate correctness, not performance:

  ```python
  # WRONG: assert elapsed < 5.0
  assert elapsed < 30.0, f"took {elapsed}s"  # RIGHT: catches gross regressions
  ```

  ### Process Mocking

  Never assume PID behavior. Mock `os.kill` when testing process detection:

  ```python
  with patch("os.kill", return_value=None):
      # Process-alive check now deterministic
      ...
  ```

  ### State Isolation

  No cross-test state leakage. Reset shared state in fixtures:

  ```python
  @pytest.fixture(autouse=True)
  def _clear_cache():
      _global_cache.clear()
      yield
      _global_cache.clear()
  ```

  ### Adversarial Testing

  Every feature needs tests that attack it with unexpected input. For each
  function, consider: malformed input, concurrent access, resource exhaustion,
  partial failures, boundary conditions, empty/None/zero-length inputs.

  Mark adversarial tests with `@pytest.mark.adversarial`.

  ### Test Checklist

  Before declaring tests pass:
  1. Does it use `asyncio.sleep()` for coordination? Replace with polling.
  2. Does it assert timing < N? Use generous bounds.
  3. Does it reference specific PIDs? Mock os.kill/os.getpid.
  4. Does it pass alone but fail in full suite? Find shared state.
  5. Does it depend on filesystem timing? Use retry/mock.
  6. Does it only test happy paths? Add adversarial cases.
  7. Run full suite: `pytest tests/ -x`

  ## State Persistence

  ### Atomic Saves

  All state writes use atomic operations (write temp, rename):

  ```python
  temp_path = state_path.with_suffix(".tmp")
  temp_path.write_text(json.dumps(state_dict))
  temp_path.rename(state_path)
  ```

  ### Checkpoint State

  `CheckpointState` is the single source of truth for job progress.
  It tracks: job_id, status, sheets (dict[int, SheetState]), timestamps,
  cost, learning state, and metadata.

  ### SQLite for Persistence

  Production state uses SQLite (`mozart.db` in the daemon). JSON backend is
  transitional. All new state features should target the SQLite path.

  ## Commit Message Style

  ```
  type(scope): short description

  Longer explanation if needed.
  ```

  Types: `feat`, `fix`, `refactor`, `test`, `docs`, `chore`
  Scopes: `spec`, `tokens`, `cli`, `daemon`, `runner`, `learning`, `config`, `state`, `healing`, `validation`

data:
  language: python
  python_version: "3.11+"
  type_checking: "mypy --strict"
  line_length: 100
  linter: ruff
  formatter: ruff
  test_framework: pytest
  async_mode: asyncio
  config_framework: pydantic_v2
  template_engine: jinja2
  cli_framework: typer
  web_framework: fastapi
  dependency_policy: "stdlib first, minimal external deps"

  design_principles:
    single_source_of_truth: true
    data_oriented_design: "ECS ethos — separate data from behavior"
    defensive_coding: "Validate inputs in every function"
    no_dead_code: true
    no_stubs_or_prototypes: true
    simplicity_over_cleverness: true

  repo_structure:
    top_level_rule: "No files dumped at root — everything in a directory"
    examples: "Public example scores for users (tracked)"
    scores: "Scores vital to Mozart's operation (tracked)"
    scores_internal: "Internal development scores (gitignored)"
    workspaces: "All job workspaces (gitignored)"
    tests_temp: "Test artifacts and test scores (gitignored)"
    docs_plans: "Internal design/planning docs (gitignored)"
    logs: "Log output (gitignored)"
    scripts: "Utility scripts (gitignored)"

  package_boundaries:
    core: "never imports execution, daemon, cli, dashboard"
    execution: "imports core, backends, state, learning — not daemon or cli"
    daemon: "imports everything except cli and dashboard"
    cli: "outermost layer, imports everything"

  musical_metaphor:
    score: "Job configuration YAML"
    sheet: "Single execution stage"
    concert: "Multi-score orchestration"
    conductor: "Daemon process orchestrating execution (DaemonManager)"
    prelude: "Pre-work context injection"
    cadenza: "End-of-work context injection"
    libretto: "The specification corpus (.mozart/spec/)"
    composer: "Person (human/AI) who uses Mozart to compose and oversee work"
    fermata: "An escalation pause where the composer decides how to proceed"

  test_rules:
    no_fixed_sleeps: true
    generous_timing_bounds: true
    mock_process_pids: true
    isolate_shared_state: true
    full_suite_before_merge: true
    asyncio_mode: auto
    timeout_safety_net: 30
    adversarial_required: true
    happy_path_only_insufficient: true
