# Mozart AI Compose — Specification Corpus: Quality
#
# What "good" means for Mozart. Quality gates, metrics, mindset.
# An agent reading only this file should know exactly what bar to clear
# and how to verify their work meets it.
#
# Schema: SpecFragment (name, tags, kind, content, data)

name: quality
tags: [quality, testing, validation, metrics, review]
kind: structured

content: |
  ## The Mindset

  Always assume the application code is broken. When a test fails, the default
  hypothesis is that the code under test has a bug — not that the test is wrong.
  Investigate the code path first. Only after confirming the code is correct
  should you consider whether the test expectations are invalid.

  Be skeptical of everything. Do not trust that a function works because it
  "looks right." Trace the execution path. Check edge cases. Verify state
  transitions. The codebase has had subtle bugs in state tracking, silent
  error swallowing, and race conditions — all of which looked correct on
  cursory review.

  ## Test Quality Over Test Count

  Test count is a side effect of good testing, not a goal. A meaningful test
  suite has these properties:

  ### Functional Testing

  Tests should exercise real use cases, not implementation details. Ask:
  "If I were a composer, what would I do with this?" Then test that.
  Mock external I/O, but test the actual behavior the system promises.

  ### Adversarial Testing

  Every feature should be attacked in unexpected ways. Happy-path-only testing
  gives false confidence. For every function, ask:
  - What happens with malformed input?
  - What happens under concurrent access?
  - What happens when resources are exhausted?
  - What happens with partial failures?
  - What happens at boundary conditions (empty, max, overflow)?

  Mark adversarial tests with `@pytest.mark.adversarial`.

  ### Edge Case Coverage

  The bugs that matter live in edge cases, not happy paths:
  - Empty inputs, None values, zero-length collections
  - Boundary conditions (off-by-one, max int, empty string)
  - State transitions at boundaries (first sheet, last sheet, only sheet)
  - Concurrent operations on shared state
  - Recovery after partial failure

  ### Critical Path Coverage

  Critical paths still require 100% branch coverage:
  - Checkpoint state save/load cycle
  - Sheet execution lifecycle (start → execute → validate → complete/fail)
  - Error classification and retry decision
  - Daemon IPC message handling
  - Rate limit detection and backoff

  ### Test Categories

  Tests are marked with pytest markers:
  - `@pytest.mark.smoke` — Critical path tests, run first
  - `@pytest.mark.adversarial` — Garbage/malicious input tests
  - `@pytest.mark.overnight` — Long-running tests for cron
  - `@pytest.mark.property_based` — Hypothesis-generated tests

  ### Regression Test Policy

  When a bug is fixed, a regression test MUST be added that:
  1. Would have caught the bug before the fix
  2. Verifies the fix works
  3. Documents the bug scenario in the test name/docstring

  This is non-optional. Bugs without regression tests will recur.

  ## Type Safety

  ### mypy --strict

  The project runs mypy in strict mode. This means:
  - All function signatures have type hints
  - No implicit `Any` types
  - `warn_return_any = true` — functions returning Any are flagged
  - `warn_unused_ignores = true` — stale type:ignore comments are flagged

  ### Rules for type:ignore

  - Every `# type: ignore` MUST have a bracketed error code: `# type: ignore[assignment]`
  - Every `# type: ignore` MUST have an adjacent comment explaining why
  - Periodically audit existing ignores — if the underlying issue is fixed, remove the ignore

  ### No Any in Public APIs

  Public functions must not accept or return `Any` unless they are genuinely
  generic (like serialization utilities). If you find yourself reaching for
  `Any`, the type model needs refinement.

  ## Lint Quality

  ### Ruff Configuration

  The project uses ruff with these rule sets enabled:
  - `E` — pycodestyle errors
  - `F` — pyflakes
  - `I` — isort (import ordering)
  - `N` — pep8-naming
  - `W` — pycodestyle warnings
  - `UP` — pyupgrade (Python version-specific modernizations)
  - `B` — bugbear (common gotchas)
  - `C4` — flake8-comprehensions
  - `SIM` — flake8-simplify

  Intentional exceptions are documented in pyproject.toml with rationale
  for each ignored rule.

  ### Zero Lint Warnings

  The codebase is lint-clean. New code must not introduce warnings. If a
  rule seems wrong for a specific case, add a `# noqa: XXXX` with a comment
  explaining why, not a blanket suppression.

  ## Code Review Checklist

  Before declaring work complete, verify:

  1. **Does it actually work?** Not "do tests pass" — does the feature do
     what it claims when exercised in a real scenario? Trace the execution
     path end-to-end.

  2. **Is it wired up?** No stubs, no prototypes, no half-finished
     infrastructure. If code is written, it must be connected to the system
     and exercisable. Unwired code is worse than no code.

  3. **Are tests adversarial?** Happy-path tests are necessary but
     insufficient. Every feature needs tests that attack it with unexpected
     input, concurrent access, resource exhaustion, and partial failures.

  4. **Is input validated defensively?** Sanity checks in every function.
     Precondition assertions. Type guards. Defense in depth. A function
     should fail fast and clearly on unexpected input.

  5. **Is error handling clean and classified?** New errors use the E0xx-E9xx
     taxonomy. Every error path produces a structured code, human-readable
     message, and suggested recovery action.

  6. **Is logging sufficient for debugging?** Key operations log at INFO,
     failures at ERROR with full context: job_id, sheet_num, file paths,
     durations, line numbers where possible.

  7. **Is the code simple and self-documenting?** No cleverness. No puzzles.
     A reader should understand what a function does without tracing through
     helper chains. Clever is the enemy of understanding.

  8. **Is dead code removed?** No unused imports, no unreachable branches,
     no commented-out code, no functions that nothing calls. Git preserves
     history; the working tree should be clean.

  9. **Is it loosely coupled and extensible?** New components use Protocol
     abstractions. Dependencies flow downward. New features plug in rather
     than requiring rewiring of existing systems.

  10. **Does it fit the existing system?** Existing scores and configs still
      work. Package boundaries are respected. The musical metaphor is
      consistent. State transitions are safe. Backwards compatibility holds.

  ## Diagnostic Quality

  ### Every Failure Must Be Diagnosable

  When `mozart status` shows a failure, the user must be able to understand:
  1. WHAT failed (which sheet, which validation, which error code)
  2. WHY it failed (root cause, not just "exit code 1")
  3. WHAT to do about it (retry, fix config, fix code, escalate)

  ### mozart diagnose

  The `mozart diagnose` command must produce a complete diagnostic report:
  - Job configuration summary
  - Sheet-by-sheet status with failure details
  - Error history with classification
  - Suggested recovery actions
  - Resource usage at time of failure

  ### Log Messages

  Log messages must include enough context to be useful in isolation:
  ```
  GOOD: "Sheet 5 validation failed: file_exists check for /workspace/output.md — file not found"
  BAD:  "Validation failed"
  BAD:  "Error in sheet"
  ```

  ## Evolution Quality

  ### Self-Improvement Tracking

  The project has completed 24 self-evolution cycles with 207 cumulative
  improvements. What matters is not the score metrics but whether
  improvements actually work in production:

  1. Does the improvement solve the problem it claims to solve?
  2. Does it introduce new problems?
  3. Is it testable and tested?
  4. Does it fit the existing architecture?
  5. Would it survive adversarial review?

  ### Score Versioning

  The evolution score is versioned (v1 through v25). Each version adds
  principles, updates thresholds, and refines the evaluation criteria.
  Changes to the score are themselves tracked and justified.

  ## Output Quality

  ### CLI Output

  All CLI output uses Rich for formatting:
  - Tables for structured data
  - Color-coded status indicators (green=success, red=failure, yellow=warning)
  - Progress bars for long operations
  - Consistent formatting across all commands

  ### Error Messages

  Error messages must:
  - State what happened (the error)
  - State what was expected (the correct behavior)
  - Suggest what to do (recovery action)
  - Include relevant context (job_id, sheet_num, file path)

  ```
  GOOD: "Sheet 5 timed out after 300s (limit: 300s). Increase 'timeout' in your
        score config, or check if the prompt is too complex for a single sheet."
  BAD:  "Timeout error"
  ```

data:
  test_quality:
    philosophy: "Quality over count — meaningful tests, not many tests"
    functional_testing: true
    adversarial_testing: true
    edge_case_coverage: true
    critical_path_coverage: 1.0
    regression_test_required: true
    deterministic_required: true
    happy_path_only_insufficient: true

  type_safety:
    mypy_mode: strict
    warn_return_any: true
    warn_unused_ignores: true
    no_any_in_public_apis: true
    type_ignore_requires_code: true
    type_ignore_requires_comment: true

  lint:
    tool: ruff
    rule_sets: ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
    zero_warnings: true
    noqa_requires_justification: true

  code_review:
    checklist:
      - does_it_actually_work
      - is_it_wired_up
      - are_tests_adversarial
      - is_input_validated_defensively
      - is_error_handling_clean_and_classified
      - is_logging_sufficient
      - is_code_simple_and_self_documenting
      - is_dead_code_removed
      - is_it_loosely_coupled_and_extensible
      - does_it_fit_the_existing_system

  evolution:
    cycles_completed: 24
    cumulative_improvements: 207
    focus: "Does the improvement actually work in production?"
    verification:
      - solves_claimed_problem
      - no_new_problems_introduced
      - testable_and_tested
      - fits_existing_architecture
      - survives_adversarial_review

  diagnostic_requirements:
    every_failure_diagnosable: true
    required_failure_info:
      - what_failed
      - why_it_failed
      - what_to_do
    log_messages_include_context: true
    mozart_diagnose_completeness:
      - config_summary
      - sheet_status_with_details
      - error_history_with_classification
      - suggested_recovery_actions
      - resource_usage
