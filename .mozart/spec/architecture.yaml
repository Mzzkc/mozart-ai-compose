name: architecture
tags: [architecture, design, system, daemon, execution, state]
kind: structured

content: |
  ## System Overview

  Mozart is an orchestration system structured around the musical metaphor.
  This is not a layer diagram — it is a performance:

  **Composers** (humans or AI people) have ideas they want realized. They use
  `mozart compose` to turn goals into **Scores** (declarative YAML configurations)
  that describe multi-stage work. They submit these scores to the **Conductor**
  (the daemon process), which assigns **Musicians** (AI agents) to play their
  respective **Sheets** (execution stages) using their **Instruments** (backends
  like Claude CLI, Anthropic API, Ollama, etc.). Everything references the
  **Libretto** (specification corpus) for project context and conventions.

  ```
  ┌─────────────────────────────────────────────────────────────┐
  │  COMPOSERS (humans, AI people, agent systems)                │
  │                                                              │
  │  Use `mozart compose` to turn goals into scores.             │
  │  Review plans. Make decisions. Verify outcomes.              │
  │  The composer is not assumed to be human.                    │
  └──────────────────────┬───────────────────────────────────────┘
                         │ submit scores via CLI / IPC / API
                         ▼
  ┌─────────────────────────────────────────────────────────────┐
  │  CONDUCTOR (the daemon — src/mozart/daemon/)                 │
  │                                                              │
  │  The persistent process that orchestrates everything.        │
  │  Deterministic by design, adaptive to runtime reality.       │
  │  Reacts to events. Manages resources. Spawns agents.         │
  │                                                              │
  │  ┌──────────┐ ┌──────────┐ ┌────────────────┐               │
  │  │ Manager  │ │ EventBus │ │ Rate Coord.    │               │
  │  │ (jobs)   │ │ (pub/sub)│ │ (cross-job)    │               │
  │  └────┬─────┘ └────┬─────┘ └────────────────┘               │
  │       │            │                                         │
  │  ┌────▼────────────▼─────────────────────────────────────┐   │
  │  │  JobService (per-job execution wrapper + events)      │   │
  │  └────┬──────────────────────────────────────────────────┘   │
  └───────┼──────────────────────────────────────────────────────┘
          │
  ┌───────▼──────────────────────────────────────────────────────┐
  │  MUSICIANS (AI agents — src/mozart/execution/)                │
  │                                                               │
  │  Stateless, replaceable. A musician executes a sheet and      │
  │  produces output. If a musician fails, another takes over.    │
  │                                                               │
  │  ┌──────────────────────────────────────────┐                 │
  │  │  Runner Package (runner/)                │                 │
  │  │  base.py → lifecycle.py → sheet.py       │                 │
  │  │  recovery.py, cost.py, isolation.py      │                 │
  │  │  patterns.py, models.py, context.py      │                 │
  │  └──────────────────────────────────────────┘                 │
  └───────┬───────────────────────────────────────────────────────┘
          │
  ┌───────▼──────────────────────────────────────────────────────┐
  │  INSTRUMENTS (backends — src/mozart/backends/)                │
  │                                                               │
  │  Interchangeable via Backend ABC. Any instrument can play     │
  │  any sheet.                                                   │
  │                                                               │
  │  ClaudeCLI │ AnthropicAPI │ Ollama │ RecursiveLight           │
  └───────┬───────────────────────────────────────────────────────┘
          │
  ┌───────▼──────────────────────────────────────────────────────┐
  │  STATE (src/mozart/state/)                                    │
  │                                                               │
  │  CheckpointState is the sole truth for job progress.          │
  │  JSON (transitional) and SQLite (production).                 │
  └──────────────────────────────────────────────────────────────┘

  ┌──────────────────────────────────────────────────────────────┐
  │  LIBRETTO (specification corpus — .mozart/spec/)              │
  │                                                               │
  │  Project knowledge referenced by all components. Mozart       │
  │  provides the framework for loading and injecting context     │
  │  (spec files, RAG, external docs). The project determines    │
  │  what knowledge exists and where it lives.                    │
  └──────────────────────────────────────────────────────────────┘
  ```

  ## The Conductor Architecture

  The conductor is a long-running daemon process (`mozart start`). It is
  the central authority for all job execution and an adaptive execution
  system — deterministic by design but responsive to runtime reality.

  ### Why a Daemon?

  1. **Rate limit coordination.** Multiple concurrent jobs share API quotas.
     Without centralized coordination, jobs compete for rate limits.
  2. **Resource management.** Memory, CPU, process count — the daemon
     monitors resources and applies backpressure.
  3. **Job lifecycle control.** Pause, resume, cancel — all require a
     persistent process that outlives individual CLI invocations.
  4. **Event routing.** Sheet completions, failures, cost updates — events
     flow through the EventBus to dashboard, learning, and notifications.
  5. **Learning centralization.** Cross-job pattern learning requires a
     single process that sees all execution outcomes.
  6. **Adaptive response.** The conductor reacts to runtime events (failures,
     resource pressure, learning insights) with programmatic logic and can
     spawn its own agents for complex decision-making.

  ### Daemon Components

  | Component | File | Responsibility |
  |-----------|------|----------------|
  | DaemonManager | manager.py | Job lifecycle, submission, cancellation |
  | JobService | job_service.py | Per-job runner wrapper with event routing |
  | EventBus | event_bus.py | Async pub/sub with bounded queues |
  | IPC Server | ipc/server.py | Unix socket listener, JSON-RPC dispatch |
  | IPC Handler | ipc/handler.py | Method → action routing |
  | IPC Protocol | ipc/protocol.py | JSON-RPC 2.0 message parsing |
  | Rate Coordinator | rate_coordinator.py | Cross-job rate limit sharing |
  | Backpressure | backpressure.py | Memory-based submission gating |
  | Resource Monitor | monitor.py | CPU/memory/process tracking |
  | Scheduler | scheduler.py | Cross-job sheet scheduling (built, not yet wired) |
  | Learning Hub | learning_hub.py | Centralized pattern learning |
  | Semantic Analyzer | semantic_analyzer.py | LLM-based sheet analysis |
  | Process Groups | pgroup.py | Process group management for cleanup |
  | Health | health.py | Conductor health checks |
  | Registry | registry.py | Job tracking and status |

  ### IPC Protocol

  Communication between CLI and daemon uses Unix domain sockets with
  JSON-RPC 2.0. The socket path defaults to `~/.mozart/mozart.sock`.

  Request/response is synchronous from the CLI's perspective (send request,
  await response). The daemon processes requests asynchronously internally.

  Methods: `submit_job`, `cancel_job`, `pause_job`, `resume_job`,
  `get_job_status`, `list_jobs`, `get_conductor_status`, etc.

  ## The Musician Architecture (Runner)

  Musicians are the agents that execute sheets. They are stateless and
  replaceable — if a musician fails, another can be assigned the same sheet.
  The runner package manages musician execution:

  | Module | Responsibility |
  |--------|----------------|
  | base.py | JobRunnerBase: initialization, config, state loading |
  | lifecycle.py | Job lifecycle: start → execute sheets → finish |
  | sheet.py | Single sheet execution: prompt build → backend call → validate |
  | recovery.py | Retry logic, completion mode, error recovery |
  | cost.py | Token/cost tracking and budget enforcement |
  | isolation.py | Worktree creation and cleanup |
  | patterns.py | Pattern injection and learning integration |
  | models.py | Internal data models for the runner |
  | context.py | Cross-sheet context assembly |

  ### Sheet Execution Flow

  ```
  1. Build prompt (template + patterns + specs + validations)
  2. Execute via instrument/backend (Claude CLI, API, etc.)
  3. Capture result (stdout, stderr, exit code, duration)
  4. Run validations (file_exists, content_match, command, etc.)
  5. If all pass → mark complete, save checkpoint
  6. If any fail → retry or mark failed based on policy
  7. Fire events (sheet.completed, sheet.failed, etc.)
  ```

  ### Prompt Assembly Order

  Prompts are assembled by PromptBuilder in this order:
  1. Base template (rendered from Jinja2 with sheet context variables)
  2. Skills/Tools (prelude/cadenza injections with category=skill/tool)
  3. Injected Context (prelude/cadenza with category=context)
  4. Lessons From Previous Sheets (failure history)
  5. Learned Patterns (from learning store)
  6. Project Specifications (from libretto / .mozart/spec/ corpus)
  7. Success Requirements (validation rules as agent-readable checklist)

  This order is deliberate: the musician reads its task first (template),
  then its tools (prelude/cadenza), then historical context (failures,
  patterns, specs), then its success criteria (validations).

  ## State Architecture

  ### Checkpoint State

  `CheckpointState` (src/mozart/core/checkpoint.py) is the single source
  of truth for job progress. It is a Pydantic model containing:

  - `job_id` — Unique job identifier
  - `status` — Overall job status (not_started, in_progress, completed, failed, etc.)
  - `sheets` — Dict[int, SheetState] mapping sheet number to sheet state
  - `last_completed_sheet` — Highest completed sheet number
  - `timestamps` — Created, updated, started, completed
  - `cost` — Accumulated cost tracking
  - `spec_corpus_hash` — Hash of spec corpus at job start (for drift detection)
  - Plus metadata for learning, iteration tracking, etc.

  ### SheetState

  Each sheet tracks:
  - `status` — not_started, in_progress, completed, failed, skipped
  - `attempts` — Number of execution attempts
  - `exit_code` — Last execution exit code
  - `stdout_tail` / `stderr_tail` — Last 10KB of output (for diagnostics)
  - `validation_details` — Per-validation pass/fail results
  - `duration_seconds` — Execution time
  - `cost_usd` — Sheet-level cost
  - `error_code` — Structured error code (E001-E999)

  ### Persistence Backends

  1. **JsonStateBackend** — Writes checkpoint as JSON files.
     Simple, human-readable, but transitional. Each save is atomic
     (write temp + rename).

  2. **SqliteStateBackend** — Production backend used by the daemon.
     Stores state in `mozart.db`. Supports rich queries for dashboard.

  Current state: The daemon uses SQLite. Standalone CLI fallback uses JSON.
  A unified schema management system is being designed to ensure the SQLite
  schema stays synchronized with the Pydantic models.

  ## Configuration Architecture

  All configuration flows through Pydantic models in `src/mozart/core/config/`:

  ```
  JobConfig (job.py)
  ├── name: str
  ├── backend: BackendConfig (backend.py)
  ├── sheet: SheetConfig (job.py)
  ├── prompt: PromptConfig (job.py)
  ├── retry: RetryConfig (execution.py)
  ├── rate_limit: RateLimitConfig (execution.py)
  ├── validation: list[ValidationRule] (execution.py)
  ├── cost_limit: CostLimitConfig (execution.py)
  ├── parallel: ParallelConfig (execution.py)
  ├── learning: LearningConfig (learning.py)
  ├── grounding: GroundingConfig (learning.py)
  ├── conductor: ConductorConfig (orchestration.py)
  ├── concert: ConcertConfig (orchestration.py)
  ├── notification: NotificationConfig (orchestration.py)
  ├── on_success: PostSuccessHookConfig (orchestration.py)
  ├── workspace: WorkspaceLifecycleConfig (workspace.py)
  ├── isolation: IsolationConfig (workspace.py)
  ├── log: LogConfig (workspace.py)
  ├── feedback: FeedbackConfig (workspace.py)
  ├── spec: SpecCorpusConfig (spec.py)
  └── (various other optional sections)
  ```

  Config is loaded from YAML, validated by Pydantic, and immutable during
  execution (except for hot-reload via SIGHUP in the daemon).

  ## Error Handling Architecture

  ### Classification

  All errors are classified into structured error codes (E001-E999) by
  `ErrorClassifier` (src/mozart/core/errors/classifier.py). Classification
  determines retry behavior:

  - **Retriable errors** (rate limits, timeouts, transient failures):
    Retry with appropriate backoff
  - **Non-retriable errors** (config errors, auth failures, OOM):
    Fail immediately, surface to user

  ### Recovery Stack

  ```
  1. Automatic retry (configurable count and backoff)
  2. Completion mode (re-execute with "finish your work" prompt)
  3. Self-healing (diagnose + auto-remedy if --self-healing enabled)
  4. Fermata — escalate to the composer for a decision
  ```

  ### Circuit Breaker

  After repeated failures of the same type, the circuit breaker trips
  and prevents further attempts. Configurable via `CircuitBreakerConfig`.

  ## Validation Architecture

  ### Sheet Output Validation

  Five validation types, all defined in score YAML:

  | Type | What It Checks |
  |------|---------------|
  | `file_exists` | Required output file exists |
  | `content_match` | File content matches regex |
  | `file_count` | Directory has expected number of files |
  | `command` | Shell command exits 0 |
  | `composite` | Multiple validations with AND/OR logic |

  All validations support template variables: `{workspace}`, `{sheet_num}`,
  `{total_sheets}`, `{job_name}`.

  ### Pre-Execution Validation

  `mozart validate` runs comprehensive checks BEFORE execution:
  - Jinja syntax errors in templates (V001)
  - Missing workspace parent directories (V002)
  - Missing template files (V003)
  - Invalid regex patterns (V007)
  - Undefined template variables (V101)
  - Missing prelude/cadenza files (V108)

  ## Learning Architecture

  ### Pattern Detection

  The learning system detects patterns in execution outcomes:
  - `PatternDetector` finds recurring success/failure patterns
  - `PatternMatcher` matches patterns to current context
  - `PatternApplicator` injects relevant patterns into prompts

  ### Global Learning Store

  `~/.mozart/global-learning.db` — SQLite database storing cross-job knowledge:
  - Patterns with trust scores
  - Execution history
  - Entropy analysis
  - Drift detection
  - Quarantined patterns
  - Exploration budget

  The store is self-maintaining: patterns are added, consolidated, and pruned.
  Low-value patterns are rolled into higher-level insights. Stale or
  contradicted patterns are retired. The store becomes more useful over time,
  not just larger.

  ### Semantic Analysis

  The daemon's `SemanticAnalyzer` subscribes to EventBus events and sends
  sheet completions to an LLM for deeper analysis. Results are stored as
  `SEMANTIC_INSIGHT` patterns in the learning store.

  ## Concurrency Model

  ### Within a Job

  Sheets execute sequentially by default. With `parallel: { enabled: true }`,
  sheets without dependencies can execute concurrently. Fan-out (`fan_out: N`)
  creates N parallel instances of a stage.

  ### Across Jobs

  The daemon's backpressure system limits concurrent jobs based on available
  memory. The rate coordinator shares rate limit state across jobs to prevent
  stampeding.

  ### Event Processing

  The EventBus is fully async. Publishers fire-and-forget. Subscribers have
  bounded queues with drop-oldest backpressure. Slow consumers lose old
  events rather than blocking the system.

  ## Git Worktree Isolation

  For parallel jobs that modify code, Mozart creates isolated git worktrees:
  - Detached HEAD mode
  - ~24ms creation time
  - Automatic cleanup on completion
  - Shared git objects (storage efficient)

  This prevents concurrent musicians from conflicting on the same files.

  ## Key Architectural Invariants

  These properties must be maintained across all changes:

  1. **The conductor is the sole execution authority.**
     CLI commands are thin wrappers around IPC calls to the daemon.
     No execution happens outside the conductor.

  2. **CheckpointState is the sole state authority.**
     No execution decision is made by reading files or logs.
     Fallback inference exists only for crash recovery.

  3. **Instruments (backends) are interchangeable.**
     Any backend implementing the Backend ABC can execute any score.

  4. **State saves are atomic.**
     No code path can produce a partial or corrupt state file.

  5. **The EventBus never blocks publishers.**
     Slow consumers lose events. The execution pipeline never waits
     on event delivery.

  6. **The learning store is self-maintaining.**
     Patterns are added, consolidated, and pruned. Low-value patterns
     are rolled into higher-level insights. Stale or contradicted
     patterns are retired. The store becomes more useful over time,
     not just larger.

  7. **Config is immutable during execution.**
     Mid-job config changes go through the daemon's SIGHUP reload path,
     not direct mutation.

  8. **Musical metaphor is consistent.**
     User-facing output uses score/sheet/concert/conductor/musician
     terminology. Do not mix in "job/task/step/worker" in user-visible
     contexts.

  9. **The conductor never assumes its composer is human.**
     Every API, escalation path, and decision point must work with any
     composer type — human, AI person, or agent system.

  10. **The libretto is the project's specification corpus.**
      Mozart provides the framework for loading and injecting project
      knowledge (spec files, RAG, external docs, context sources). The
      project using Mozart determines what knowledge exists and where
      it lives. Mozart does not dictate knowledge structure.

  11. **Musicians are stateless and replaceable.**
      A musician executes a sheet and produces output. If a musician
      fails, another can be assigned the same sheet. No agent-specific
      state leaks into the system.

  12. **The conductor is an adaptive execution system.**
      It follows the score deterministically but reacts to runtime
      events (failures, resource constraints, learning insights) with
      programmatic logic and AI-assisted decision-making, including
      spawning its own agents for complex work. It runs concerts
      end-to-end, handling the unexpected.

data:
  architecture_model: "musical performance, not layered stack"

  roles:
    composer:
      description: "Person (human or AI) who composes scores and oversees work"
      assumed_human: false
    conductor:
      description: "Daemon process — adaptive execution system that orchestrates musicians"
      implementation: "src/mozart/daemon/"
      adaptive: true
      spawns_agents: true
    musician:
      description: "AI agent executing a sheet — stateless and replaceable"
      implementation: "src/mozart/execution/"
    instrument:
      description: "Backend (Claude CLI, API, Ollama, etc.) — interchangeable via Protocol"
      implementation: "src/mozart/backends/"

  ipc_protocol:
    transport: "Unix domain socket"
    format: "JSON-RPC 2.0"
    default_socket: "~/.mozart/mozart.sock"

  state_backends:
    json:
      status: transitional
      use_case: "Standalone CLI fallback"
    sqlite:
      status: production
      use_case: "Daemon primary state store"

  validation_types:
    - file_exists
    - content_match
    - file_count
    - command
    - composite

  concurrency_model:
    within_job: "Sequential by default, parallel with config"
    across_jobs: "Backpressure-gated concurrent execution"
    event_processing: "Async pub/sub with drop-oldest backpressure"

  invariants:
    - "Conductor is sole execution authority"
    - "CheckpointState is sole state authority"
    - "Instruments (backends) are interchangeable"
    - "State saves are atomic"
    - "EventBus never blocks publishers"
    - "Learning store is self-maintaining (prune, consolidate, retire)"
    - "Config is immutable during execution"
    - "Musical metaphor is consistent in user-facing output"
    - "Conductor never assumes its composer is human"
    - "Libretto is the project's specification corpus (not dictated by Mozart)"
    - "Musicians are stateless and replaceable"
    - "Conductor is adaptive — deterministic design, responsive to reality"
