# Mozart AI Compose — Specification Corpus: Constraints
#
# The BOUNDARIES for Mozart development. What you must do, must not do,
# prefer, and when to stop and ask. An agent reading only this file should
# know every guardrail before writing a single line of code.
#
# Schema: SpecFragment (name, tags, kind, content, data)

name: constraints
tags: [safety, security, correctness, guardrails, must-not]
kind: structured

content: |
  ## MUSTS — Violations Block Completion

  These are non-negotiable. Code that violates a MUST is rejected regardless
  of how much other work it accomplishes.

  M-001: All tests must pass before completion.
    `pytest tests/ -x` must exit 0. No exceptions. No "it passes if you
    skip these 3 tests." If tests fail, either the code is wrong or the
    test needs updating — and you must determine which BEFORE changing either.

  M-002: Type checking must pass.
    `mypy src/` must exit 0 with `--strict` mode. No `# type: ignore`
    without an adjacent comment explaining WHY. No `Any` return types on
    public functions.

  M-003: Lint must pass.
    `ruff check src/` must exit 0. The ruff config in pyproject.toml is
    authoritative. Do not add new `# noqa` markers without justification.

  M-004: Atomic state saves.
    Every state write must use write-to-temp + rename. Never write directly
    to the state file. A crash between open() and close() MUST NOT corrupt
    existing state.

  M-005: Backward compatibility for score YAML.
    Existing score YAML files must continue to work after any change.
    New fields must have defaults. Removed fields must be deprecated with
    warnings before removal. Users should never have a working score
    suddenly break after a Mozart update.

  M-006: The conductor manages all execution.
    `mozart run` submits jobs to the conductor. It does not execute jobs
    directly. The conductor is the single point of control for all running
    work. Bypassing the conductor breaks job tracking, rate coordination,
    and resource management.

  M-007: Error paths produce actionable diagnostics.
    Every `except` block must either: (a) re-raise with additional context,
    (b) log the error with enough detail to diagnose, or (c) handle the
    error and explain what recovery action was taken. Silent `except: pass`
    is forbidden.

  M-008: All async I/O uses asyncio.
    No synchronous I/O in the execution path. `subprocess.run()`,
    `requests.get()`, `open().read()` in the hot path are forbidden.
    Use `asyncio.create_subprocess_exec`, `httpx.AsyncClient`, and
    `asyncio.to_thread()` for blocking operations.

  M-009: Checkpoint state is the source of truth.
    If checkpoint state says sheet 5 is complete, sheet 5 is complete.
    Do not infer state from side effects (file existence, log timestamps).
    Fallback inference exists only for crash recovery, not normal operation.

  M-010: Tests must be deterministic.
    A test that passes 99% of the time is a broken test. No reliance on
    timing, network, specific PIDs, filesystem ordering, or shared mutable
    state between tests.

  ## MUST-NOTS — Doing These Causes Damage

  MN-001: NEVER wrap `mozart run` in external `timeout`.
    External timeout kills the process without cleanup. State gets corrupted,
    sheets get stuck as `in_progress` forever, agent processes get orphaned.
    Mozart has its own timeout system. Use it.

  MN-002: NEVER stop the conductor while jobs are running.
    `mozart stop` kills the daemon process. All in-flight Claude agents are
    orphaned. State corruption is likely. Use `mozart pause` on individual
    jobs first, wait for pause confirmation, then stop.

  MN-003: NEVER commit directly to main without tests.
    Every commit to main must have associated test coverage. If a bugfix
    doesn't have a test that would have caught the bug, write the test first.

  MN-004: NEVER use `--fresh` on interrupted jobs.
    `--fresh` deletes checkpoint state and archives workspace artifacts.
    If a job ran for 6 hours and was interrupted, `--fresh` destroys those
    6 hours of work. Use `mozart resume` for interrupted jobs. `--fresh`
    is only appropriate for genuinely new runs (self-chaining iterations,
    user explicitly starting over).

  MN-005: NEVER add dependencies without justification.
    Every new dependency is a maintenance burden, a security surface, and a
    compatibility constraint. Use stdlib first. If an external dep is truly
    needed, document WHY in the commit message.

  MN-006: NEVER log secrets, API keys, or full prompt text.
    Prompts can contain user instructions with sensitive context. Log
    truncated versions (first 200 chars) or hashes. API keys must never
    appear in logs, state files, or error messages.

  MN-007: NEVER silence errors without explanation.
    No bare `except: pass`. No `except Exception: pass`. No `# type: ignore`
    without comment. If you are suppressing something, explain WHY it is safe
    to suppress and what the consequences of not suppressing would be.

  MN-008: NEVER use fixed sleeps for async coordination in tests.
    `await asyncio.sleep(2.0)` followed by an assertion is a race condition.
    The sleep might be too short under load or too long for fast machines.
    Always poll with a deadline. See conventions.yaml Testing Patterns.

  MN-009: NEVER assume PID 1 behavior in tests.
    `os.kill(1, 0)` fails with PermissionError on non-root, EPERM in
    containers, and various other ways on WSL. Mock os.kill when testing
    process-alive detection.

  MN-010: NEVER delete learning data without explicit user request.
    The global learning store (`~/.mozart/global-learning.db`) accumulates
    cross-job pattern knowledge. Deleting or resetting it loses months of
    learned patterns, trust scores, and entropy analysis.

  MN-011: NEVER modify the self-evolution score without understanding
    the full evolution cycle.
    The evolution score has been refined over 24 cycles with 207 cumulative
    improvements. Changes that seem minor can break the self-improvement
    feedback loop. Read the last 3 evolution summaries before touching it.

  MN-012: NEVER use Pydantic v1 syntax.
    No `class Config:` inside models. No `@validator`. No `schema_extra`.
    Use v2: `model_config = ConfigDict(...)`, `@field_validator`,
    `@model_validator`, `json_schema_extra`.

  MN-013: NEVER assume you are the only agent working on the project.
    Other agents may be working in parallel on other branches, worktrees,
    or areas of the codebase. Do not make sweeping changes outside your
    assigned scope. Check for ongoing work before modifying shared files.

  MN-014: NEVER commit all changed files indiscriminately.
    Only commit files you actually worked on. Never use `git add -A` or
    `git add .` to stage everything. Other agents or the human may have
    in-progress changes in the working tree. Stage specific files by name.

  MN-015: NEVER commit scores or plans unless explicitly requested.
    Score YAML files and plan documents are authored by the composer or
    generated by `mozart compose` for review. Agents must not commit these
    artifacts unless the composer explicitly requests it.

  ## PREFERENCES — Follow Unless You Have a Good Reason Not To

  P-001: Prefer composition over inheritance.
    Use Protocol classes and dependency injection. Inheritance is acceptable
    for ABC → concrete implementation (like Backend → ClaudeCLIBackend) but
    prefer flat composition for new designs.

  P-002: Prefer explicit over implicit.
    Named parameters over positional. Explicit state transitions over inferred.
    Typed enums over string constants. If a reader has to guess, make it explicit.

  P-003: Prefer dataclasses for immutable value objects.
    `@dataclass(frozen=True)` for simple data carriers that don't need
    validation. Pydantic for anything with validation rules or config semantics.

  P-004: Prefer f-strings over %-formatting or .format().
    Unless the string is a log message (use structured logging kwargs).

  P-005: Prefer pathlib.Path over os.path.
    All file path operations should use `Path`. The codebase is already
    fully migrated to pathlib.

  P-006: Prefer small, focused functions.
    If a function exceeds ~50 lines, consider extracting helpers. The runner
    package split (base.py, sheet.py, lifecycle.py, recovery.py, cost.py)
    is the model for how to decompose large modules.

  P-007: Prefer flat packages over deep nesting.
    Two levels of nesting maximum (`src/mozart/daemon/ipc/`). If you need
    a third level, reconsider the package boundary.

  P-008: Prefer polling with deadlines over event-driven waiting in tests.
    Even when an event system exists (EventBus), tests should poll for
    expected state rather than waiting on event delivery.

  P-009: Prefer filing GitHub issues over leaving TODOs.
    A TODO in code is invisible to project management. A GitHub issue is
    tracked, prioritized, and discoverable. When you find a bug, file it:
    `gh issue create --repo Mzzkc/mozart-ai-compose --title "..." --body "..." --label "bug"`

  P-010: Prefer reading existing code before writing new code.
    Check if the functionality already exists. Check adjacent modules for
    patterns. Check the learning store for known patterns. The codebase is
    83K+ lines — something similar probably exists.

  P-011: Prefer production-quality code always.
    No stubs. No prototypes. No placeholder implementations. If code is
    written, it must be wired up, tested, and ready for production use.
    Half-finished infrastructure is worse than no infrastructure.

  P-012: Prefer simplicity over cleverness.
    Clever is the enemy of understanding. Code should be self-documenting.
    If a reader needs to puzzle through a function to understand what it
    does, it is too clever. Write code that reads like prose, not puzzles.

  P-013: Prefer extensible, modular, loosely-coupled designs.
    Components should be swappable via Protocol abstractions. Hard
    dependencies between modules indicate a design problem. New features
    should plug in, not require rewiring existing systems.

  P-014: Prefer removing dead code.
    Dead code is not useful to anyone. It misleads readers, creates false
    dependencies, and rots. If code is no longer called, delete it. Git
    history preserves it if anyone needs it later.

  P-015: Prefer functional and adversarial testing.
    Test real use cases, not just happy paths. Tests should attack the
    system in unexpected ways — malformed input, concurrent access, resource
    exhaustion, partial failures. Happy-path-only testing gives false
    confidence. Every test should ask "what could go wrong here?"

  P-016: Prefer defensive coding with input validation everywhere.
    Validate inputs in every function, not just at system boundaries.
    Sanity checks, precondition assertions, type guards — defense in depth.
    A function should fail fast and clearly when given unexpected input,
    not propagate garbage silently through the system.

  P-017: Prefer extensive logging with full context.
    Log at appropriate levels with enough context to debug in isolation:
    job_id, sheet_num, file paths, durations, line numbers when possible.
    The cost of verbose logging is far less than the cost of undiagnosable
    failures. See quality.yaml Diagnostic Quality for log message standards.

  P-018: Prefer clean error handling that extends the existing taxonomy.
    New errors should use the existing E0xx-E9xx error code system. Error
    handling should classify, not just catch. Every error path should
    produce a structured error code, a human-readable message, and a
    suggested recovery action. See conventions.yaml Error Codes.

  ## ESCALATION REQUIREMENTS

  Stop working and escalate to the composer before:

  E-001: Changing the IPC protocol (JSON-RPC methods, message format).
  E-002: Changing the CLI command interface (adding/removing/renaming commands).
  E-003: Changing the daemon process lifecycle (startup, shutdown, signal handling).
  E-004: Modifying the global learning store schema.
  E-005: Any change that would require users to modify existing score YAML files.
  E-006: Removing or replacing a dependency.
  E-007: Changing the checkpoint state schema in a non-additive way.
  E-008: Any operation that deletes user data, workspace contents, or state files.

