{# Process table component for the monitoring page.
   Expects Alpine scope with `processes` array where each entry has:
   pid, command, cpu_percent, rss_mb, job_id (optional), sheet (optional)
#}
<div class="bg-white dark:bg-gray-800 rounded-lg shadow overflow-hidden">
    <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
        <h3 class="text-sm font-semibold text-gray-900 dark:text-white">Processes</h3>
        <span class="text-xs text-gray-500 dark:text-gray-400"
              x-text="(processes || []).length + ' active'"></span>
    </div>
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
            <thead class="bg-gray-50 dark:bg-gray-750">
                <tr>
                    <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">PID</th>
                    <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Command</th>
                    <th class="px-3 py-2 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">CPU%</th>
                    <th class="px-3 py-2 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">RSS (MB)</th>
                    <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Job</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                <template x-for="proc in (processes || []).slice().sort((a,b) => (b.cpu_percent || 0) - (a.cpu_percent || 0))" :key="proc.pid">
                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors">
                        <td class="px-3 py-2 whitespace-nowrap text-xs font-mono text-gray-700 dark:text-gray-300"
                            x-text="proc.pid"></td>
                        <td class="px-3 py-2 text-xs text-gray-700 dark:text-gray-300 max-w-xs truncate"
                            x-text="proc.command || proc.name || '-'"
                            :title="proc.command || proc.name || ''"></td>
                        <td class="px-3 py-2 whitespace-nowrap text-xs text-right font-mono"
                            :class="(proc.cpu_percent || 0) > 80 ? 'text-red-600 dark:text-red-400 font-bold' : 'text-gray-700 dark:text-gray-300'"
                            x-text="(proc.cpu_percent != null ? proc.cpu_percent.toFixed(1) : '-') + '%'"></td>
                        <td class="px-3 py-2 whitespace-nowrap text-xs text-right font-mono text-gray-700 dark:text-gray-300"
                            x-text="proc.rss_mb != null ? proc.rss_mb.toFixed(0) : '-'"></td>
                        <td class="px-3 py-2 whitespace-nowrap text-xs">
                            <a x-show="proc.job_id"
                               :href="'/jobs/' + proc.job_id + '/details'"
                               class="text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 font-medium"
                               x-text="proc.job_id ? (proc.sheet ? 'Sheet ' + proc.sheet : 'View') : ''"></a>
                            <span x-show="!proc.job_id" class="text-gray-400 dark:text-gray-500">-</span>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
    <!-- Empty state -->
    <div x-show="!processes || processes.length === 0"
         class="px-4 py-6 text-center text-sm text-gray-500 dark:text-gray-400">
        No process data available
    </div>
</div>
