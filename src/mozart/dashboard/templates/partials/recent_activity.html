{% if recent_jobs %}
<div class="divide-y divide-gray-200 dark:divide-gray-700">
    {% for job in recent_jobs %}
    <a href="/jobs/{{ job.job_id }}/details" class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
        <div class="min-w-0 flex-1">
            <div class="text-sm font-medium text-gray-900 dark:text-gray-100 truncate">{{ job.job_name }}</div>
            <div class="text-xs text-gray-500 dark:text-gray-400">{{ job.updated_at.strftime('%Y-%m-%d %H:%M') }}</div>
        </div>
        <div class="flex items-center gap-2 ml-4 shrink-0">
            <span class="px-2 py-0.5 text-xs font-medium rounded-full
                {% if job.status.value == 'completed' %}bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300
                {% elif job.status.value == 'running' %}bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300
                {% elif job.status.value == 'failed' %}bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300
                {% elif job.status.value == 'paused' %}bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300
                {% else %}bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300
                {% endif %}">
                {{ job.status.value }}
            </span>
            <span class="text-xs text-gray-500 dark:text-gray-400 w-10 text-right">{{ "%.0f"|format(job.progress_percent) }}%</span>
        </div>
    </a>
    {% endfor %}
</div>
{% else %}
<div class="p-4 text-sm text-gray-500 dark:text-gray-400">No recent activity.</div>
{% endif %}
