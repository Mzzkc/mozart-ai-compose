{% if snapshot %}
<div class="p-4 space-y-3">
    <div>
        <div class="flex items-center justify-between text-xs mb-1">
            <span class="text-gray-500 dark:text-gray-400">Memory</span>
            <span class="text-gray-700 dark:text-gray-300">{{ snapshot.mem_used_mb }} / {{ snapshot.mem_total_mb }} MB</span>
        </div>
        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5">
            <div class="h-1.5 rounded-full
                {% if snapshot.mem_pct > 90 %}bg-red-500
                {% elif snapshot.mem_pct > 70 %}bg-yellow-500
                {% else %}bg-green-500
                {% endif %}" style="width: {{ snapshot.mem_pct }}%"></div>
        </div>
    </div>
    <div class="flex items-center justify-between text-xs">
        <span class="text-gray-500 dark:text-gray-400">Load (1m)</span>
        <span class="text-gray-700 dark:text-gray-300">{{ snapshot.load_1m }}</span>
    </div>
    <div class="flex items-center justify-between text-xs">
        <span class="text-gray-500 dark:text-gray-400">Processes</span>
        <span class="text-gray-700 dark:text-gray-300">{{ snapshot.process_count }}</span>
    </div>
    <div class="flex items-center justify-between text-xs">
        <span class="text-gray-500 dark:text-gray-400">Pressure</span>
        <span class="px-1.5 py-0.5 rounded text-xs font-medium
            {% if snapshot.pressure == 'high' %}bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300
            {% elif snapshot.pressure == 'medium' %}bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300
            {% else %}bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300
            {% endif %}">{{ snapshot.pressure }}</span>
    </div>
</div>
{% else %}
<div class="p-4 text-sm text-gray-500 dark:text-gray-400">
    No monitoring data available. Start the conductor to collect metrics.
</div>
{% endif %}
