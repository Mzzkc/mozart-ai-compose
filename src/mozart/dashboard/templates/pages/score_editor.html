{% extends "base.html" %}
{% block title %}Score Editor — Mozart{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/codemirror/codemirror.min.css">
<style>
    .CodeMirror {
        height: 100%;
        font-size: 13px;
        border-radius: 0 0 0.5rem 0.5rem;
    }
    .dark .CodeMirror {
        background: #1f2937;
        color: #e5e7eb;
    }
    .dark .CodeMirror-gutters {
        background: #1f2937;
        border-right-color: #374151;
    }
    .dark .CodeMirror-linenumber {
        color: #6b7280;
    }
    .dark .CodeMirror-cursor {
        border-left-color: #e5e7eb;
    }
    .dark .CodeMirror-selected {
        background: #374151;
    }
</style>
{% endblock %}

{% block content %}
<div x-data="scoreEditor()" x-init="init()" class="space-y-4">
    <!-- Page header -->
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Score Editor</h1>
        <div class="flex items-center gap-2">
            <!-- Template picker -->
            <button @click="showTemplatePicker = true; fetchTemplates()"
                    class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/>
                </svg>
                Load Template
            </button>
            <!-- New score -->
            <button @click="newScore()"
                    class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                New Score
            </button>
        </div>
    </div>

    <!-- Main editor layout -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <!-- Editor panel (2/3 width) -->
        <div class="lg:col-span-2">
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 flex flex-col" style="min-height: 500px;">
                <!-- Editor toolbar -->
                <div class="px-4 py-2.5 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="text-sm font-semibold text-gray-700 dark:text-gray-300">YAML Editor</span>
                        <span class="text-xs text-gray-400 dark:text-gray-500" x-text="dirty ? '(unsaved changes)' : ''"></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button @click="validateScore()"
                                :disabled="validating"
                                class="inline-flex items-center gap-1.5 px-2.5 py-1 text-xs font-medium rounded-md bg-mozart-500 text-white hover:bg-mozart-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                            <svg x-show="!validating" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <svg x-show="validating" class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                            <span x-text="validating ? 'Validating...' : 'Validate'"></span>
                        </button>
                        <button @click="submitScore()"
                                :disabled="submitting || !lastValidation || !lastValidation.valid"
                                class="inline-flex items-center gap-1.5 px-2.5 py-1 text-xs font-medium rounded-md bg-green-600 text-white hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                            <svg x-show="!submitting" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <svg x-show="submitting" class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                            <span x-text="submitting ? 'Submitting...' : 'Submit to Conductor'"></span>
                        </button>
                    </div>
                </div>
                <!-- CodeMirror container -->
                <div class="flex-1" id="editor-container"></div>
            </div>
        </div>

        <!-- Results panel (1/3 width) -->
        <div class="space-y-4">
            <!-- Validation results -->
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700">
                    <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        Validation Results
                    </h2>
                </div>

                <!-- No validation yet -->
                <template x-if="!lastValidation && !validating">
                    <div class="p-6 text-center">
                        <svg class="w-10 h-10 mx-auto text-gray-300 dark:text-gray-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <p class="text-xs text-gray-500 dark:text-gray-400">Click "Validate" to check your score</p>
                    </div>
                </template>

                <!-- Validating -->
                <template x-if="validating">
                    <div class="p-6 text-center">
                        <svg class="w-8 h-8 mx-auto text-mozart-500 animate-spin mb-2" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        <p class="text-xs text-gray-500 dark:text-gray-400">Running validation checks...</p>
                    </div>
                </template>

                <!-- Validation results -->
                <template x-if="lastValidation && !validating">
                    <div class="p-4 space-y-3">
                        <!-- Status badge -->
                        <div class="flex items-center gap-2">
                            <template x-if="lastValidation.valid">
                                <span class="inline-flex items-center gap-1 px-2 py-1 rounded-md text-xs font-semibold bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                    </svg>
                                    Valid
                                </span>
                            </template>
                            <template x-if="!lastValidation.valid">
                                <span class="inline-flex items-center gap-1 px-2 py-1 rounded-md text-xs font-semibold bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                    </svg>
                                    Invalid
                                </span>
                            </template>
                        </div>

                        <!-- Issue counts -->
                        <div class="flex items-center gap-3 text-xs">
                            <template x-if="lastValidation.counts.ERROR > 0">
                                <span class="text-red-600 dark:text-red-400 font-medium" x-text="lastValidation.counts.ERROR + ' error(s)'"></span>
                            </template>
                            <template x-if="lastValidation.counts.WARNING > 0">
                                <span class="text-yellow-600 dark:text-yellow-400 font-medium" x-text="lastValidation.counts.WARNING + ' warning(s)'"></span>
                            </template>
                            <template x-if="lastValidation.counts.INFO > 0">
                                <span class="text-blue-600 dark:text-blue-400 font-medium" x-text="lastValidation.counts.INFO + ' info'"></span>
                            </template>
                            <template x-if="lastValidation.counts.ERROR === 0 && lastValidation.counts.WARNING === 0 && lastValidation.counts.INFO === 0">
                                <span class="text-green-600 dark:text-green-400 font-medium">No issues found</span>
                            </template>
                        </div>

                        <!-- Phase indicators -->
                        <div class="flex items-center gap-2 text-xs">
                            <span class="flex items-center gap-1" :class="lastValidation.yaml_syntax_valid ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" :d="lastValidation.yaml_syntax_valid ? 'M5 13l4 4L19 7' : 'M6 18L18 6M6 6l12 12'"/>
                                </svg>
                                YAML
                            </span>
                            <span class="flex items-center gap-1" :class="lastValidation.schema_valid ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" :d="lastValidation.schema_valid ? 'M5 13l4 4L19 7' : 'M6 18L18 6M6 6l12 12'"/>
                                </svg>
                                Schema
                            </span>
                        </div>

                        <!-- Error message (if fatal) -->
                        <template x-if="lastValidation.error_message">
                            <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-md p-3">
                                <p class="text-xs text-red-800 dark:text-red-200 font-mono break-all" x-text="lastValidation.error_message"></p>
                            </div>
                        </template>

                        <!-- Issues list -->
                        <template x-if="lastValidation.issues.length > 0">
                            <div class="space-y-2 max-h-64 overflow-y-auto">
                                <template x-for="(issue, idx) in lastValidation.issues" :key="idx">
                                    <div class="rounded-md p-2.5 text-xs border"
                                         :class="{
                                             'bg-red-50 dark:bg-red-900/10 border-red-200 dark:border-red-800': issue.severity === 'ERROR',
                                             'bg-yellow-50 dark:bg-yellow-900/10 border-yellow-200 dark:border-yellow-800': issue.severity === 'WARNING',
                                             'bg-blue-50 dark:bg-blue-900/10 border-blue-200 dark:border-blue-800': issue.severity === 'INFO'
                                         }">
                                        <div class="flex items-center gap-1.5 mb-1">
                                            <span class="font-mono font-semibold"
                                                  :class="{
                                                      'text-red-700 dark:text-red-300': issue.severity === 'ERROR',
                                                      'text-yellow-700 dark:text-yellow-300': issue.severity === 'WARNING',
                                                      'text-blue-700 dark:text-blue-300': issue.severity === 'INFO'
                                                  }"
                                                  x-text="issue.check_id"></span>
                                            <template x-if="issue.line">
                                                <span class="text-gray-500 dark:text-gray-400">line <span x-text="issue.line"></span></span>
                                            </template>
                                        </div>
                                        <p class="text-gray-700 dark:text-gray-300" x-text="issue.message"></p>
                                        <template x-if="issue.suggestion">
                                            <p class="mt-1 text-gray-500 dark:text-gray-400 italic" x-text="issue.suggestion"></p>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Config summary (when valid) -->
                        <template x-if="lastValidation.config_summary">
                            <div class="border-t border-gray-200 dark:border-gray-700 pt-3 mt-3">
                                <h4 class="text-xs font-semibold text-gray-600 dark:text-gray-400 mb-2">Config Summary</h4>
                                <div class="space-y-1 text-xs">
                                    <div class="flex justify-between">
                                        <span class="text-gray-500 dark:text-gray-400">Name</span>
                                        <span class="text-gray-700 dark:text-gray-300 font-medium" x-text="lastValidation.config_summary.name"></span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-gray-500 dark:text-gray-400">Sheets</span>
                                        <span class="text-gray-700 dark:text-gray-300 font-medium" x-text="lastValidation.config_summary.total_sheets"></span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-gray-500 dark:text-gray-400">Backend</span>
                                        <span class="text-gray-700 dark:text-gray-300 font-medium" x-text="lastValidation.config_summary.backend_type"></span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-gray-500 dark:text-gray-400">Validations</span>
                                        <span class="text-gray-700 dark:text-gray-300 font-medium" x-text="lastValidation.config_summary.validation_count"></span>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <!-- Submission result -->
            <template x-if="submitResult">
                <div class="rounded-lg border p-4"
                     :class="submitResult.success
                         ? 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800'
                         : 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800'">
                    <div class="flex items-center gap-2 mb-1">
                        <template x-if="submitResult.success">
                            <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                        </template>
                        <template x-if="!submitResult.success">
                            <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </template>
                        <span class="text-sm font-medium"
                              :class="submitResult.success ? 'text-green-800 dark:text-green-200' : 'text-red-800 dark:text-red-200'"
                              x-text="submitResult.message"></span>
                    </div>
                    <template x-if="submitResult.success && submitResult.job_id">
                        <a :href="'/jobs/' + submitResult.job_id + '/details'"
                           class="text-xs text-mozart-600 dark:text-mozart-400 hover:underline">
                            View job details
                        </a>
                    </template>
                </div>
            </template>
        </div>
    </div>

    <!-- Template picker modal -->
    <template x-if="showTemplatePicker">
        <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="showTemplatePicker = false">
            <div class="fixed inset-0 bg-black/50" @click="showTemplatePicker = false"></div>
            <div class="relative bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 shadow-xl w-full max-w-2xl max-h-[80vh] flex flex-col mx-4">
                <!-- Modal header -->
                <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                    <h3 class="text-sm font-semibold text-gray-900 dark:text-white">Load Template</h3>
                    <button @click="showTemplatePicker = false" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <!-- Template list -->
                <div class="flex-1 overflow-y-auto p-4">
                    <template x-if="loadingTemplates">
                        <div class="text-center py-8">
                            <div class="text-sm text-gray-500 dark:text-gray-400 animate-pulse">Loading templates...</div>
                        </div>
                    </template>
                    <template x-if="!loadingTemplates && availableTemplates.length === 0">
                        <div class="text-center py-8">
                            <p class="text-sm text-gray-500 dark:text-gray-400">No templates available.</p>
                        </div>
                    </template>
                    <template x-if="!loadingTemplates && availableTemplates.length > 0">
                        <div class="space-y-2">
                            <template x-for="tmpl in availableTemplates" :key="tmpl.name">
                                <button @click="loadTemplate(tmpl)"
                                        class="w-full text-left p-3 rounded-lg border border-gray-200 dark:border-gray-700 hover:border-mozart-300 dark:hover:border-mozart-600 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                                    <div class="flex items-center justify-between mb-1">
                                        <span class="text-sm font-medium text-gray-900 dark:text-white" x-text="tmpl.title"></span>
                                        <span class="px-1.5 py-0.5 text-xs font-medium rounded"
                                              :class="{
                                                  'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300': tmpl.complexity === 'simple',
                                                  'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300': tmpl.complexity === 'medium',
                                                  'bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-300': tmpl.complexity === 'complex'
                                              }"
                                              x-text="tmpl.complexity"></span>
                                    </div>
                                    <p class="text-xs text-gray-500 dark:text-gray-400" x-text="tmpl.description"></p>
                                    <div class="flex items-center gap-3 mt-1.5 text-xs text-gray-400 dark:text-gray-500">
                                        <span x-text="tmpl.sheets + ' sheet(s)'"></span>
                                        <span x-text="tmpl.estimated_duration || ''"></span>
                                    </div>
                                </button>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/codemirror/codemirror.min.js"></script>
<script>
function scoreEditor() {
    return {
        editor: null,
        dirty: false,
        validating: false,
        submitting: false,
        lastValidation: null,
        submitResult: null,
        showTemplatePicker: false,
        loadingTemplates: false,
        availableTemplates: [],

        defaultContent: [
            '# Mozart Score Configuration',
            'name: my-job',
            'workspace: ./workspace',
            '',
            'backend:',
            '  type: claude_cli',
            '',
            'sheet:',
            '  total_sheets: 1',
            '  prompt: |',
            '    Your prompt here.',
            '',
            'validations: []',
            ''
        ].join('\n'),

        init() {
            this.$nextTick(() => {
                const container = document.getElementById('editor-container');
                if (!container || typeof CodeMirror === 'undefined') return;

                this.editor = CodeMirror(container, {
                    value: this.defaultContent,
                    mode: 'yaml',
                    lineNumbers: true,
                    tabSize: 2,
                    indentWithTabs: false,
                    lineWrapping: true,
                    autoCloseBrackets: true,
                });

                this.editor.on('change', () => {
                    this.dirty = true;
                    this.lastValidation = null;
                    this.submitResult = null;
                });

                // Check if template param in URL
                const params = new URLSearchParams(window.location.search);
                const templateName = params.get('template');
                if (templateName) {
                    this.loadTemplateByName(templateName);
                }
            });
        },

        getContent() {
            return this.editor ? this.editor.getValue() : '';
        },

        setContent(content) {
            if (this.editor) {
                this.editor.setValue(content);
                this.dirty = false;
                this.lastValidation = null;
                this.submitResult = null;
            }
        },

        newScore() {
            this.setContent(this.defaultContent);
        },

        async validateScore() {
            const content = this.getContent().trim();
            if (!content) return;

            this.validating = true;
            this.submitResult = null;

            try {
                const res = await fetch('/api/scores/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });

                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.detail || 'Validation request failed');
                }

                this.lastValidation = await res.json();
            } catch (e) {
                this.lastValidation = {
                    valid: false,
                    yaml_syntax_valid: false,
                    schema_valid: false,
                    issues: [],
                    counts: { ERROR: 0, WARNING: 0, INFO: 0 },
                    error_message: 'Request failed: ' + e.message
                };
            } finally {
                this.validating = false;
            }
        },

        async submitScore() {
            const content = this.getContent().trim();
            if (!content || !this.lastValidation || !this.lastValidation.valid) return;

            this.submitting = true;
            this.submitResult = null;

            try {
                const res = await fetch('/api/scores/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'Submission failed');
                }

                this.submitResult = data;
            } catch (e) {
                this.submitResult = {
                    success: false,
                    message: e.message
                };
            } finally {
                this.submitting = false;
            }
        },

        async loadTemplateByName(name) {
            try {
                const res = await fetch('/api/scores/templates/' + encodeURIComponent(name));
                if (!res.ok) return;
                const tmpl = await res.json();
                this.setContent(tmpl.content || '');
            } catch (e) {
                // Silently fail — user can load manually
            }
        },

        async loadTemplate(tmpl) {
            this.setContent(tmpl.content || '');
            this.showTemplatePicker = false;
        },

        async fetchTemplates() {
            if (this.availableTemplates.length > 0) return;
            this.loadingTemplates = true;
            try {
                const res = await fetch('/api/scores/templates/list');
                if (!res.ok) return;
                const data = await res.json();
                this.availableTemplates = data.templates || [];
            } catch (e) {
                // Silently fail
            } finally {
                this.loadingTemplates = false;
            }
        },

    };
}
</script>
{% endblock %}
