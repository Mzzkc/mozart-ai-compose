{% extends "base.html" %}
{% block title %}Dashboard — Mozart{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Page header -->
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Dashboard</h1>
        <a href="/editor"
           class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md bg-mozart-500 text-white hover:bg-mozart-600 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            New Score
        </a>
    </div>

    <!-- Stats cards (htmx-loaded, auto-refresh every 10s) -->
    <div id="stats-container"
         hx-get="/api/dashboard/stats/partial"
         hx-trigger="load, every 10s"
         hx-swap="innerHTML">
        <!-- Loading skeleton -->
        <div class="grid grid-cols-2 lg:grid-cols-5 gap-4">
            {% for _ in range(5) %}
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4 animate-pulse">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-4 h-4 bg-gray-200 dark:bg-gray-700 rounded"></div>
                    <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-16"></div>
                </div>
                <div class="h-8 bg-gray-200 dark:bg-gray-700 rounded w-12"></div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Active jobs panel (auto-refresh every 5s) -->
    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
        <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
            <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2">
                <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
                Active Jobs
            </h2>
            <a href="/jobs" class="text-xs text-mozart-600 dark:text-mozart-400 hover:underline">View all</a>
        </div>
        <div id="active-jobs-container"
             hx-get="/jobs/list?status=running"
             hx-trigger="load, every 5s"
             hx-swap="innerHTML">
            <div class="p-4 text-sm text-gray-500 dark:text-gray-400 animate-pulse">Loading active jobs...</div>
        </div>
    </div>

    <!-- Bottom row: Recent activity + System resources -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Recent activity (2/3 width) -->
        <div class="lg:col-span-2">
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                    <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        Recent Activity
                    </h2>
                    <a href="/jobs" class="text-xs text-mozart-600 dark:text-mozart-400 hover:underline">View all</a>
                </div>
                <div id="recent-container"
                     hx-get="/api/dashboard/recent/partial"
                     hx-trigger="load, every 15s"
                     hx-swap="innerHTML">
                    <div class="p-4 text-sm text-gray-500 dark:text-gray-400 animate-pulse">Loading...</div>
                </div>
            </div>
        </div>

        <!-- System resources (1/3 width) -->
        <div>
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700">
                    <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
                        </svg>
                        System Resources
                    </h2>
                </div>
                <div id="system-container"
                     hx-get="/api/dashboard/system/partial"
                     hx-trigger="load, every 30s"
                     hx-swap="innerHTML">
                    <div class="p-4 text-sm text-gray-500 dark:text-gray-400 animate-pulse">Loading...</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
