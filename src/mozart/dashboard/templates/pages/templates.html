{% extends "base.html" %}
{% block title %}Templates — Mozart{% endblock %}

{% block content %}
<div x-data="{ category: '', complexity: '', search: '' }" class="space-y-6">
    <!-- Page header -->
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Score Templates</h1>
        <a href="/editor"
           class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md bg-mozart-500 text-white hover:bg-mozart-600 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            New Score
        </a>
    </div>

    <!-- Filter bar -->
    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-3">
        <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
            <!-- Search -->
            <div class="flex-1">
                <input type="text"
                       x-model="search"
                       placeholder="Search templates..."
                       @input.debounce.300ms="htmx.ajax('GET', '/api/templates/list?search=' + encodeURIComponent(search) + (category ? '&category=' + category : '') + (complexity ? '&complexity=' + complexity : ''), {target: '#templates-container', swap: 'innerHTML'})"
                       class="block w-full text-sm rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:ring-mozart-500 focus:border-mozart-500 py-1.5 px-2.5">
            </div>

            <!-- Category filter -->
            <div class="flex items-center gap-2">
                <label for="cat-filter" class="text-xs font-medium text-gray-500 dark:text-gray-400 whitespace-nowrap">Category:</label>
                <select id="cat-filter"
                        x-model="category"
                        @change="htmx.ajax('GET', '/api/templates/list?' + (search ? 'search=' + encodeURIComponent(search) + '&' : '') + (category ? 'category=' + category + '&' : '') + (complexity ? 'complexity=' + complexity : ''), {target: '#templates-container', swap: 'innerHTML'})"
                        class="block w-full sm:w-auto text-sm rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-mozart-500 focus:border-mozart-500 py-1.5 px-2">
                    <option value="">All categories</option>
                    <option value="workflow">Workflow</option>
                    <option value="data">Data</option>
                    <option value="testing">Testing</option>
                    <option value="deployment">Deployment</option>
                    <option value="general">General</option>
                </select>
            </div>

            <!-- Complexity filter -->
            <div class="flex items-center gap-2">
                <label for="cplx-filter" class="text-xs font-medium text-gray-500 dark:text-gray-400 whitespace-nowrap">Complexity:</label>
                <select id="cplx-filter"
                        x-model="complexity"
                        @change="htmx.ajax('GET', '/api/templates/list?' + (search ? 'search=' + encodeURIComponent(search) + '&' : '') + (category ? 'category=' + category + '&' : '') + (complexity ? 'complexity=' + complexity : ''), {target: '#templates-container', swap: 'innerHTML'})"
                        class="block w-full sm:w-auto text-sm rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-mozart-500 focus:border-mozart-500 py-1.5 px-2">
                    <option value="">All levels</option>
                    <option value="simple">Simple</option>
                    <option value="medium">Medium</option>
                    <option value="complex">Complex</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Templates grid (htmx-loaded) -->
    <div id="templates-container"
         hx-get="/api/templates/list"
         hx-trigger="load"
         hx-swap="innerHTML">
        <!-- Loading skeleton -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {% for _ in range(6) %}
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4 animate-pulse">
                <div class="flex items-start justify-between mb-3">
                    <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-24"></div>
                    <div class="h-5 bg-gray-200 dark:bg-gray-700 rounded w-14"></div>
                </div>
                <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-16 mb-2"></div>
                <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-full mb-1"></div>
                <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-3/4"></div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
