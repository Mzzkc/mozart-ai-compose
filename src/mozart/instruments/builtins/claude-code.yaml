# Claude Code — Anthropic's official CLI agent
#
# The reference instrument for Mozart. Full tool use, file editing,
# shell access, vision, and MCP support. Uses the -p flag for
# non-interactive prompt execution with JSON output.
#
# Auth: Requires valid Claude Code login (claude login).

name: claude-code
display_name: "Claude Code"
description: "Anthropic's Claude Code CLI — full-featured coding agent"
kind: cli

capabilities:
  - tool_use
  - file_editing
  - shell_access
  - vision
  - mcp
  - structured_output
  - streaming
  - thinking

default_model: null  # Uses Claude Code's default model
default_timeout_seconds: 1800

models:
  - name: claude-sonnet-4-20250514
    context_window: 200000
    cost_per_1k_input: 0.003
    cost_per_1k_output: 0.015
    max_output_tokens: 64000
  - name: claude-opus-4-20250514
    context_window: 200000
    cost_per_1k_input: 0.015
    cost_per_1k_output: 0.075
    max_output_tokens: 32000
  - name: claude-haiku-4-5-20251001
    context_window: 200000
    cost_per_1k_input: 0.0008
    cost_per_1k_output: 0.004
    max_output_tokens: 64000

cli:
  command:
    executable: claude
    prompt_flag: "-p"
    model_flag: "--model"
    auto_approve_flag: "--dangerously-skip-permissions"
    output_format_flag: "--output-format"
    output_format_value: "json"
    system_prompt_flag: "--system-prompt"
    allowed_tools_flag: "--allowedTools"
    mcp_config_flag: "--mcp-config"
  output:
    format: json
    result_path: "result"
    error_path: "error.message"
    input_tokens_path: "usage.input_tokens"
    output_tokens_path: "usage.output_tokens"
  errors:
    rate_limit_patterns:
      - "rate.?limit"
      - "overloaded"
      - "429"
      - "529"
    auth_error_patterns:
      - "not authenticated"
      - "login required"
      - "unauthorized"
