# Goose — Block's autonomous agent
#
# Open source. Supports extensions (MCP-like), session management,
# and multiple LLM providers. Uses 'goose run' for non-interactive
# execution with JSON output.
#
# Auth: Provider-specific API keys.

name: goose
display_name: "Goose"
description: "Block's Goose agent with extension support"
kind: cli

capabilities:
  - tool_use
  - file_editing
  - shell_access
  - mcp
  - structured_output
  - session_resume
  - streaming

default_timeout_seconds: 1800

cli:
  command:
    executable: goose
    subcommand: "run"
    prompt_flag: "-t"
    model_flag: "--model"
    output_format_flag: "--output-format"
    output_format_value: "json"
    extra_flags:
      - "--no-session"
      - "--quiet"
  output:
    format: json
    result_path: "response"
  errors:
    rate_limit_patterns:
      - "rate.?limit"
      - "(?:error|status|code)[^\\w]*429"
    auth_error_patterns:
      - "authenticat"
      - "unauthorized"
