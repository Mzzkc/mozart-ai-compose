cli:
  command:
    executable: opencode
    subcommand: "run"
    # Bypass interactive permission prompts — required for headless/daemon
    # execution. Without this, opencode's default sandbox blocks file-write
    # tool calls at an interactive prompt that has no TTY, producing silent
    # 0-exit "success" with no deliverable (sheet validations then fail at
    # pass_rate=0.0 — the outcome-level catch, but a full retry budget wasted).
    auto_approve_flag: "--dangerously-skip-permissions"
    # GH#188: Stdin delivery for large prompt safety. Previously used
    # positional args which crashed on 100KB+ prompts during fallback.
    prompt_via_stdin: true
    model_flag: "--model"
    output_format_flag: "--format"
    output_format_value: "json"
    # Auth handled by opencode's credential store (opencode providers login).
    # Run `opencode providers login` to configure providers.
    # Keys stored in ~/.local/share/opencode/auth.json
  output:
    # OpenCode outputs NDJSON (one JSON event per line), not a single JSON object.
    # Events: step_start, tool_use, text (result), step_finish (tokens).
    format: jsonl
    completion_event_type: "text"
    result_path: "part.text"
    error_path: "part.text"
    input_tokens_path: "part.tokens.input"
    output_tokens_path: "part.tokens.output"
    aggregate_tokens: false
  errors:
    success_exit_codes: [0]
    rate_limit_patterns:
      - "rate.?limit"
      - "(?:error|status|code)[^\\w]*429"
      - "too many requests"
    auth_error_patterns:
      - "unauthorized"
      - "invalid.*api.*key"
      - "authentication.*failed"
    capacity_patterns:
      - "overloaded"
      - "503"
      - "capacity"
    timeout_patterns:
      - "timed?.?out"
      - "timeout"
