# OpenCode — Headless AI coding agent with OpenRouter support
#
# OpenCode (opencode.ai) is a CLI coding agent supporting 75+ LLM providers
# including OpenRouter natively. Uses -p flag for non-interactive prompt
# execution. Supports MCP servers via mcpServers config.
#
# Note: The OpenCode repo has been archived; development continues as "Crush"
# by Charm team. The deep fallback chain ensures continuity if OpenCode
# becomes unavailable.
#
# Auth: Configured via `opencode providers login`. Supports OpenRouter,
#       Z.AI, and other providers. Free-tier models available without credits.
#
# Default provider: OpenRouter (free-tier models)
# Headless mode: -p flag for non-interactive, -f json for structured output

name: opencode
display_name: "OpenCode"
description: "Headless AI coding agent with OpenRouter and MCP support"
kind: cli

capabilities:
  - tool_use
  - file_editing
  - shell_access
  - mcp
  - structured_output

# Free-tier OpenRouter models — all $0 input/output
default_model: "qwen/qwen3-coder:free"
default_timeout_seconds: 1800

