# Aider — AI pair programming CLI
#
# Open source (Apache 2.0). BYOK via litellm. Focused on code editing
# rather than general agent tasks. Text output only (no JSON mode).
#
# Auth: Provider-specific API keys (OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.)

name: aider
display_name: "Aider"
description: "AI pair programming CLI (code editing focus)"
kind: cli

capabilities:
  - file_editing
  - shell_access

default_timeout_seconds: 1800

cli:
  command:
    executable: aider
    prompt_flag: "--message"
    model_flag: "--model"
    auto_approve_flag: "--yes"
    extra_flags:
      - "--no-stream"
  output:
    format: text  # aider has no JSON output mode
  errors:
    rate_limit_patterns:
      - "rate.?limit"
      - "429"
      - "too.?many"
    auth_error_patterns:
      - "authenticat"
      - "api.*key"
      - "unauthorized"
