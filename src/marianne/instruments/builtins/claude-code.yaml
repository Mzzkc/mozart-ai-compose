# Claude Code — Anthropic's official CLI agent
#
# The reference instrument for Mozart. Full tool use, file editing,
# shell access, vision, and MCP support. Uses the -p flag for
# non-interactive prompt execution with JSON output.
#
# Auth: Requires valid Claude Code login (claude login).
#
# Verified: 2026-03-31 against Claude Code (production use across 3 orchestra runs)
#   - JSON output: {"result": "...", "usage": {...}} on stdout when -o json
#   - Text output: raw response on stdout when -o text (used by v3 score)
#   - Error format: non-JSON on stdout for rate limits ("API Error: Rate limit
#     reached", "You've hit your limit · resets <time>")
#   - Exit code: 0 on success, 1 on error (but rate limits sometimes exit 0)
#   - Rate limit messages appear on STDOUT not stderr — classifier must check both
#   - Single model per execution (no multi-model routing)
#   - Token paths are direct (no wildcard needed)

name: claude-code
display_name: "Claude Code"
description: "Anthropic's Claude Code CLI — full-featured coding agent"
kind: cli

capabilities:
  - tool_use
  - file_editing
  - shell_access
  - vision
  - mcp
  - structured_output
  - streaming
  - thinking

default_model: null  # Uses Claude Code's default model
default_timeout_seconds: 1800

models:
  - name: claude-sonnet-4-20250514
    context_window: 200000
    cost_per_1k_input: 0.003
    cost_per_1k_output: 0.015
    max_output_tokens: 64000
  - name: claude-opus-4-20250514
    context_window: 200000
    cost_per_1k_input: 0.015
    cost_per_1k_output: 0.075
    max_output_tokens: 32000
  - name: claude-haiku-4-5-20251001
    context_window: 200000
    cost_per_1k_input: 0.0008
    cost_per_1k_output: 0.004
    max_output_tokens: 64000

cli:
  command:
    executable: claude
    prompt_flag: "-p"
    # Deliver prompt via stdin (-p - sentinel) to avoid ARG_MAX limits
    # on large prompts. This matches the native ClaudeCliBackend behavior
    # and is required for production-length agent prompts (F-105).
    prompt_via_stdin: true
    stdin_sentinel: "-"
    # Start subprocess in its own process group so MCP/LSP child processes
    # can be cleanly killed as a group on timeout (F-105, Claude Code #1935).
    start_new_session: true
    # Credential filtering: only pass Anthropic auth env vars to Claude subprocess.
    # Prevents OPENAI_API_KEY, GOOGLE_API_KEY, etc. from leaking to Anthropic's CLI.
    required_env:
      - ANTHROPIC_API_KEY
      - CLAUDE_CODE_USE_BEDROCK
      - CLAUDE_CODE_USE_VERTEX
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_REGION
      - AWS_DEFAULT_REGION
      - GOOGLE_APPLICATION_CREDENTIALS
      - GOOGLE_CLOUD_PROJECT
      - CLOUD_ML_REGION
    model_flag: "--model"
    auto_approve_flag: "--dangerously-skip-permissions"
    output_format_flag: "--output-format"
    output_format_value: "json"
    system_prompt_flag: "--system-prompt"
    allowed_tools_flag: "--allowedTools"
    mcp_config_flag: "--mcp-config"
    # Disable MCP servers by default to prevent child process explosion (F-271).
    # --strict-mcp-config means "only use servers from --mcp-config";
    # passing empty config disables all MCP servers.
    mcp_disable_args:
      - "--strict-mcp-config"
      - "--mcp-config"
      - '{"mcpServers":{}}'
  output:
    format: json
    result_path: "result"
    error_path: "error.message"
    input_tokens_path: "usage.input_tokens"
    output_tokens_path: "usage.output_tokens"
    aggregate_tokens: false  # Single model, no aggregation needed
  errors:
    # Exit codes
    success_exit_codes: [0]
    # Rate limit patterns (CRITICAL: check stdout too — Claude CLI puts rate
    # limit messages on stdout, not stderr. See F-098.)
    rate_limit_patterns:
      - "rate.?limit"
      - "overloaded"
      - "429"
      - "529"
      - "You've hit your limit"
      - "API Error: Rate limit"
      - "resets.*\\(\\w+/\\w+\\)"
    # Auth/permission errors
    auth_error_patterns:
      - "not authenticated"
      - "login required"
      - "unauthorized"
      - "invalid.*api.*key"
    # Capacity/overload errors (retriable)
    capacity_patterns:
      - "overloaded"
      - "503"
      - "capacity"
    # Timeout patterns
    timeout_patterns:
      - "timed?.?out"
      - "timeout"
