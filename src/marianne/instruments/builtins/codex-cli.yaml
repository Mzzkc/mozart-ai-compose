# Codex CLI — OpenAI's coding agent
#
# Uses 'codex exec' subcommand for non-interactive execution.
# JSONL output format with event-based completion detection.
# Prompt is a positional argument (no flag).
#
# Auth: Requires OPENAI_API_KEY or CODEX_API_KEY.

name: codex-cli
display_name: "Codex CLI"
description: "OpenAI's Codex CLI agent"
kind: cli

capabilities:
  - tool_use
  - file_editing
  - shell_access
  - mcp
  - structured_output
  - session_resume
  - streaming

default_timeout_seconds: 1800

models:
  - name: o3
    context_window: 200000
    cost_per_1k_input: 0.01
    cost_per_1k_output: 0.04
    max_output_tokens: 100000
  - name: o4-mini
    context_window: 200000
    cost_per_1k_input: 0.0011
    cost_per_1k_output: 0.0044
    max_output_tokens: 100000

cli:
  command:
    executable: codex
    subcommand: "exec"
    prompt_flag: null  # positional argument
    # Credential filtering: only pass OpenAI auth env vars to Codex subprocess.
    required_env:
      - OPENAI_API_KEY
      - CODEX_API_KEY
    model_flag: "--model"
    auto_approve_flag: "--full-auto"
    output_format_flag: "--json"
    output_format_value: null  # boolean flag, no value
    extra_flags:
      - "--skip-git-repo-check"
  output:
    format: jsonl
    completion_event_type: "item.completed"
    completion_event_filter:
      type: "agent_message"
    input_tokens_path: "usage.input_tokens"
    output_tokens_path: "usage.output_tokens"
  errors:
    rate_limit_patterns:
      - "rate.?limit"
      - "429"
    auth_error_patterns:
      - "authenticat"
      - "invalid.*api.*key"
