{% extends "base.html" %}
{% block title %}Monitor — Mozart{% endblock %}

{% block content %}
<div x-data="monitorPage()" x-init="startPolling()" class="space-y-6">
    <!-- Page header -->
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">System Monitor</h1>
        <div class="flex items-center gap-3">
            <!-- Polling indicator -->
            <div class="flex items-center gap-1.5 text-xs text-gray-500 dark:text-gray-400">
                <span x-show="polling" class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span x-show="!polling && !error" class="w-2 h-2 rounded-full bg-gray-400"></span>
                <span x-show="error" class="w-2 h-2 rounded-full bg-red-500"></span>
                <span x-text="polling ? 'Live' : (error ? 'Error' : 'Paused')"></span>
            </div>
            <!-- Pause/resume button -->
            <button @click="togglePolling()"
                    class="inline-flex items-center gap-1.5 px-2.5 py-1 text-xs font-medium rounded-md border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                <template x-if="polling">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </template>
                <template x-if="!polling">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </template>
                <span x-text="polling ? 'Pause' : 'Resume'"></span>
            </button>
        </div>
    </div>

    <!-- Empty state: conductor not running -->
    <template x-if="!loading && !snapshot && !error">
        <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-12 text-center">
            <svg class="w-12 h-12 mx-auto text-gray-400 dark:text-gray-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-1">Conductor is not running</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Start it with:</p>
            <code class="px-3 py-1.5 bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded text-sm font-mono">mozart start</code>
        </div>
    </template>

    <!-- Error state -->
    <template x-if="error && !snapshot">
        <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-4">
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                </svg>
                <span class="text-sm font-medium text-red-800 dark:text-red-200" x-text="error"></span>
            </div>
        </div>
    </template>

    <!-- Loading state -->
    <template x-if="loading && !snapshot">
        <div class="space-y-4">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <template x-for="i in 4" :key="i">
                    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4 animate-pulse">
                        <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-20 mb-2"></div>
                        <div class="h-6 bg-gray-200 dark:bg-gray-700 rounded w-16"></div>
                    </div>
                </template>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-8 animate-pulse">
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-32 mb-4"></div>
                <div class="space-y-3">
                    <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-full"></div>
                    <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-3/4"></div>
                </div>
            </div>
        </div>
    </template>

    <!-- Monitor content (visible when we have data) -->
    <template x-if="snapshot">
        <div class="space-y-6">
            <!-- Header stats bar -->
            <div class="grid grid-cols-2 lg:grid-cols-5 gap-4">
                <!-- Conductor status -->
                <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"></span>
                        <span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide">Conductor</span>
                    </div>
                    <div class="text-lg font-bold text-green-600 dark:text-green-400">UP</div>
                    <div class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">PID <span x-text="snapshot.daemon_pid || '—'"></span></div>
                </div>

                <!-- Memory usage -->
                <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4">
                    <div class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Memory</div>
                    <div class="text-lg font-bold text-gray-900 dark:text-white">
                        <span x-text="formatMB(snapshot.system_memory_used_mb)"></span>
                        <span class="text-xs font-normal text-gray-400">/ <span x-text="formatMB(snapshot.system_memory_total_mb)"></span></span>
                    </div>
                    <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5 mt-1.5">
                        <div class="h-1.5 rounded-full transition-all duration-500"
                             :class="memoryBarColor()"
                             :style="'width:' + memoryPercent() + '%'"></div>
                    </div>
                </div>

                <!-- CPU / Load -->
                <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4">
                    <div class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Load Average</div>
                    <div class="text-lg font-bold text-gray-900 dark:text-white" x-text="(snapshot.load_avg_1 || 0).toFixed(2)"></div>
                    <div class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">
                        <span x-text="(snapshot.load_avg_5 || 0).toFixed(2)"></span> /
                        <span x-text="(snapshot.load_avg_15 || 0).toFixed(2)"></span>
                        <span class="text-gray-400 dark:text-gray-500">(5m / 15m)</span>
                    </div>
                </div>

                <!-- Active work -->
                <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4">
                    <div class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Active Work</div>
                    <div class="text-lg font-bold text-gray-900 dark:text-white">
                        <span x-text="snapshot.running_jobs || 0"></span>
                        <span class="text-xs font-normal text-gray-400">jobs</span>
                    </div>
                    <div class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">
                        <span x-text="snapshot.active_sheets || 0"></span> active sheets
                    </div>
                </div>

                <!-- Pressure level -->
                <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4">
                    <div class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Pressure</div>
                    <div class="mt-1">
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-sm font-semibold"
                              :class="pressureClass()">
                            <span x-text="(snapshot.pressure_level || 'none').toUpperCase()"></span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Main content: Process tree + System metrics -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Process tree (2/3 width) -->
                <div class="lg:col-span-2">
                    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                        <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                            <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2">
                                <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                                </svg>
                                Process Tree
                            </h2>
                            <span class="text-xs text-gray-400 dark:text-gray-500" x-text="(snapshot.processes || []).length + ' processes'"></span>
                        </div>

                        <!-- Process list -->
                        <template x-if="(snapshot.processes || []).length === 0">
                            <div class="p-6 text-center text-sm text-gray-500 dark:text-gray-400">
                                No active processes
                            </div>
                        </template>

                        <template x-if="(snapshot.processes || []).length > 0">
                            <div class="divide-y divide-gray-100 dark:divide-gray-700/50">
                                <!-- Group by job_id -->
                                <template x-for="group in groupedProcesses()" :key="group.key">
                                    <div x-data="{ open: true }">
                                        <!-- Group header -->
                                        <button @click="open = !open"
                                                class="w-full px-4 py-2.5 flex items-center gap-2 text-left hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                                            <svg class="w-3.5 h-3.5 text-gray-400 transition-transform duration-200"
                                                 :class="open ? 'rotate-90' : ''"
                                                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                                            </svg>
                                            <span class="text-sm font-medium text-gray-900 dark:text-white" x-text="group.label"></span>
                                            <span class="text-xs text-gray-400 dark:text-gray-500" x-text="group.processes.length + ' proc'"></span>
                                        </button>

                                        <!-- Process rows -->
                                        <div x-show="open" x-collapse>
                                            <table class="w-full text-xs">
                                                <thead>
                                                    <tr class="text-gray-500 dark:text-gray-400 border-b border-gray-100 dark:border-gray-700/50">
                                                        <th class="px-4 py-1.5 text-left font-medium">PID</th>
                                                        <th class="px-2 py-1.5 text-left font-medium">Command</th>
                                                        <th class="px-2 py-1.5 text-center font-medium">State</th>
                                                        <th class="px-2 py-1.5 text-right font-medium">CPU%</th>
                                                        <th class="px-2 py-1.5 text-right font-medium">RSS</th>
                                                        <th class="px-2 py-1.5 text-right font-medium pr-4">Age</th>
                                                    </tr>
                                                </thead>
                                                <tbody class="divide-y divide-gray-50 dark:divide-gray-700/30">
                                                    <template x-for="proc in group.processes" :key="proc.pid">
                                                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/30">
                                                            <td class="px-4 py-1.5 font-mono text-gray-700 dark:text-gray-300" x-text="proc.pid"></td>
                                                            <td class="px-2 py-1.5 text-gray-600 dark:text-gray-400 max-w-[200px] truncate" x-text="truncateCmd(proc.command)" :title="proc.command"></td>
                                                            <td class="px-2 py-1.5 text-center">
                                                                <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium"
                                                                      :class="stateClass(proc.state)">
                                                                    <span x-text="proc.state"></span>
                                                                </span>
                                                            </td>
                                                            <td class="px-2 py-1.5 text-right font-mono"
                                                                :class="proc.cpu_percent > 80 ? 'text-red-600 dark:text-red-400 font-semibold' : 'text-gray-700 dark:text-gray-300'"
                                                                x-text="proc.cpu_percent.toFixed(1)"></td>
                                                            <td class="px-2 py-1.5 text-right font-mono text-gray-700 dark:text-gray-300" x-text="formatMB(proc.rss_mb)"></td>
                                                            <td class="px-2 py-1.5 text-right font-mono text-gray-500 dark:text-gray-400 pr-4" x-text="formatAge(proc.age_seconds)"></td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- System metrics sidebar (1/3 width) -->
                <div class="space-y-4">
                    <!-- Memory detail -->
                    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                        <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700">
                            <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300">Memory</h3>
                        </div>
                        <div class="p-4 space-y-3">
                            <div>
                                <div class="flex items-center justify-between text-xs mb-1">
                                    <span class="text-gray-500 dark:text-gray-400">Total</span>
                                    <span class="text-gray-700 dark:text-gray-300 font-mono" x-text="formatMB(snapshot.system_memory_total_mb)"></span>
                                </div>
                            </div>
                            <div>
                                <div class="flex items-center justify-between text-xs mb-1">
                                    <span class="text-gray-500 dark:text-gray-400">Used</span>
                                    <span class="text-gray-700 dark:text-gray-300 font-mono" x-text="formatMB(snapshot.system_memory_used_mb)"></span>
                                </div>
                                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5">
                                    <div class="h-1.5 rounded-full transition-all duration-500"
                                         :class="memoryBarColor()"
                                         :style="'width:' + memoryPercent() + '%'"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex items-center justify-between text-xs">
                                    <span class="text-gray-500 dark:text-gray-400">Available</span>
                                    <span class="text-gray-700 dark:text-gray-300 font-mono" x-text="formatMB(snapshot.system_memory_available_mb)"></span>
                                </div>
                            </div>
                            <div>
                                <div class="flex items-center justify-between text-xs">
                                    <span class="text-gray-500 dark:text-gray-400">Daemon RSS</span>
                                    <span class="text-gray-700 dark:text-gray-300 font-mono" x-text="formatMB(snapshot.daemon_rss_mb)"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Load averages -->
                    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                        <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700">
                            <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300">Load Averages</h3>
                        </div>
                        <div class="p-4 space-y-2">
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-500 dark:text-gray-400">1 minute</span>
                                <span class="text-gray-700 dark:text-gray-300 font-mono font-semibold" x-text="(snapshot.load_avg_1 || 0).toFixed(2)"></span>
                            </div>
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-500 dark:text-gray-400">5 minutes</span>
                                <span class="text-gray-700 dark:text-gray-300 font-mono" x-text="(snapshot.load_avg_5 || 0).toFixed(2)"></span>
                            </div>
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-500 dark:text-gray-400">15 minutes</span>
                                <span class="text-gray-700 dark:text-gray-300 font-mono" x-text="(snapshot.load_avg_15 || 0).toFixed(2)"></span>
                            </div>
                        </div>
                    </div>

                    <!-- GPU status (if available) -->
                    <template x-if="(snapshot.gpus || []).length > 0">
                        <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                            <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700">
                                <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300">GPU</h3>
                            </div>
                            <div class="p-4 space-y-4">
                                <template x-for="gpu in snapshot.gpus" :key="gpu.index">
                                    <div class="space-y-2">
                                        <div class="text-xs font-medium text-gray-600 dark:text-gray-400" x-text="'GPU ' + gpu.index"></div>
                                        <div class="flex items-center justify-between text-xs">
                                            <span class="text-gray-500 dark:text-gray-400">Utilization</span>
                                            <span class="text-gray-700 dark:text-gray-300 font-mono" x-text="gpu.utilization_pct.toFixed(0) + '%'"></span>
                                        </div>
                                        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5">
                                            <div class="h-1.5 rounded-full bg-purple-500 transition-all duration-500"
                                                 :style="'width:' + gpu.utilization_pct + '%'"></div>
                                        </div>
                                        <div class="flex items-center justify-between text-xs">
                                            <span class="text-gray-500 dark:text-gray-400">VRAM</span>
                                            <span class="text-gray-700 dark:text-gray-300 font-mono" x-text="formatMB(gpu.memory_used_mb) + ' / ' + formatMB(gpu.memory_total_mb)"></span>
                                        </div>
                                        <div class="flex items-center justify-between text-xs">
                                            <span class="text-gray-500 dark:text-gray-400">Temp</span>
                                            <span class="text-gray-700 dark:text-gray-300 font-mono" x-text="gpu.temperature_c.toFixed(0) + ' °C'"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Zombie processes warning -->
                    <template x-if="snapshot.zombie_count > 0">
                        <div class="bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 rounded-lg p-4">
                            <div class="flex items-center gap-2 mb-1">
                                <svg class="w-4 h-4 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                                </svg>
                                <span class="text-sm font-medium text-yellow-800 dark:text-yellow-200">Zombie Processes</span>
                            </div>
                            <p class="text-xs text-yellow-700 dark:text-yellow-300">
                                <span x-text="snapshot.zombie_count"></span> zombie process(es) detected.
                                PIDs: <span class="font-mono" x-text="(snapshot.zombie_pids || []).join(', ') || '—'"></span>
                            </p>
                        </div>
                    </template>

                    <!-- Last updated -->
                    <div class="text-xs text-gray-400 dark:text-gray-500 text-center">
                        Last updated: <span x-text="formatTimestamp(snapshot.timestamp)"></span>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block scripts %}
<script>
function monitorPage() {
    return {
        snapshot: null,
        loading: true,
        error: null,
        polling: true,
        _interval: null,

        async fetchSnapshot() {
            try {
                const res = await fetch('/api/monitor/snapshot');
                if (res.status === 503 || res.status === 404) {
                    // Conductor not running or no data
                    this.snapshot = null;
                    this.error = null;
                    this.loading = false;
                    return;
                }
                if (!res.ok) {
                    throw new Error('HTTP ' + res.status);
                }
                this.snapshot = await res.json();
                this.error = null;
            } catch (e) {
                if (!this.snapshot) {
                    // Only show error if we never got data
                    this.error = e.message === 'Failed to fetch'
                        ? 'Cannot connect to dashboard server'
                        : 'Failed to fetch monitor data: ' + e.message;
                }
            } finally {
                this.loading = false;
            }
        },

        startPolling() {
            this.fetchSnapshot();
            this._interval = setInterval(() => {
                if (this.polling) this.fetchSnapshot();
            }, 3000);
        },

        togglePolling() {
            this.polling = !this.polling;
        },

        memoryPercent() {
            if (!this.snapshot || !this.snapshot.system_memory_total_mb) return 0;
            return Math.min((this.snapshot.system_memory_used_mb / this.snapshot.system_memory_total_mb) * 100, 100).toFixed(1);
        },

        memoryBarColor() {
            const pct = this.memoryPercent();
            if (pct > 90) return 'bg-red-500';
            if (pct > 70) return 'bg-yellow-500';
            return 'bg-green-500';
        },

        pressureClass() {
            const level = (this.snapshot?.pressure_level || 'none').toLowerCase();
            switch (level) {
                case 'critical': return 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300';
                case 'high': return 'bg-orange-100 text-orange-800 dark:bg-orange-900/30 dark:text-orange-300';
                case 'medium': return 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300';
                case 'low': return 'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300';
                default: return 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300';
            }
        },

        stateClass(state) {
            switch (state) {
                case 'R': return 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300';
                case 'S': return 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300';
                case 'D': return 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300';
                case 'Z': return 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300';
                case 'T': return 'bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-300';
                default: return 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300';
            }
        },

        groupedProcesses() {
            const procs = this.snapshot?.processes || [];
            const groups = {};

            for (const proc of procs) {
                const key = proc.job_id || '_system';
                if (!groups[key]) {
                    groups[key] = {
                        key: key,
                        label: proc.job_id
                            ? 'Job: ' + proc.job_id + (proc.sheet_num != null ? ' (sheet ' + proc.sheet_num + ')' : '')
                            : 'System / Daemon',
                        processes: []
                    };
                }
                groups[key].processes.push(proc);
            }

            // Sort: system group last, job groups alphabetically
            return Object.values(groups).sort((a, b) => {
                if (a.key === '_system') return 1;
                if (b.key === '_system') return -1;
                return a.key.localeCompare(b.key);
            });
        },

        formatMB(mb) {
            if (mb == null) return '—';
            if (mb >= 1024) return (mb / 1024).toFixed(1) + ' GB';
            return Math.round(mb) + ' MB';
        },

        formatAge(seconds) {
            if (seconds == null) return '—';
            if (seconds < 60) return Math.floor(seconds) + 's';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + Math.floor(seconds % 60) + 's';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return h + 'h ' + m + 'm';
        },

        truncateCmd(cmd) {
            if (!cmd) return '—';
            if (cmd.length > 60) return cmd.substring(0, 57) + '...';
            return cmd;
        },

        formatTimestamp(ts) {
            if (!ts) return '—';
            return new Date(ts * 1000).toLocaleTimeString();
        },

        destroy() {
            if (this._interval) {
                clearInterval(this._interval);
                this._interval = null;
            }
        }
    };
}
</script>
