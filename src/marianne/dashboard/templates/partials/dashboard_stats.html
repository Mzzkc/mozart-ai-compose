<div class="grid grid-cols-2 lg:grid-cols-5 gap-4">
    <!-- Total Jobs -->
    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4">
        <div class="flex items-center gap-2 mb-1">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
            </svg>
            <span class="text-xs text-gray-500 dark:text-gray-400">Total Jobs</span>
        </div>
        <div class="text-2xl font-bold text-gray-900 dark:text-white">{{ stats.total_jobs }}</div>
    </div>

    <!-- Running -->
    <div class="bg-white dark:bg-gray-800 rounded-lg border border-blue-200 dark:border-blue-900/50 p-4">
        <div class="flex items-center gap-2 mb-1">
            <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            <span class="text-xs text-gray-500 dark:text-gray-400">Running</span>
        </div>
        <div class="text-2xl font-bold text-blue-600 dark:text-blue-400">{{ stats.running_jobs }}</div>
    </div>

    <!-- Completed -->
    <div class="bg-white dark:bg-gray-800 rounded-lg border border-green-200 dark:border-green-900/50 p-4">
        <div class="flex items-center gap-2 mb-1">
            <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="text-xs text-gray-500 dark:text-gray-400">Completed</span>
        </div>
        <div class="text-2xl font-bold text-green-600 dark:text-green-400">{{ stats.completed_jobs }}</div>
    </div>

    <!-- Failed -->
    <div class="bg-white dark:bg-gray-800 rounded-lg border border-red-200 dark:border-red-900/50 p-4">
        <div class="flex items-center gap-2 mb-1">
            <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="text-xs text-gray-500 dark:text-gray-400">Failed</span>
        </div>
        <div class="text-2xl font-bold text-red-600 dark:text-red-400">{{ stats.failed_jobs }}</div>
    </div>

    <!-- Success Rate -->
    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4">
        <div class="flex items-center gap-2 mb-1">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            <span class="text-xs text-gray-500 dark:text-gray-400">Success Rate</span>
        </div>
        <div class="text-2xl font-bold {% if stats.success_rate >= 80 %}text-green-600 dark:text-green-400{% elif stats.success_rate >= 50 %}text-yellow-600 dark:text-yellow-400{% elif stats.total_jobs == 0 %}text-gray-400 dark:text-gray-500{% else %}text-red-600 dark:text-red-400{% endif %}">
            {{ "%.1f"|format(stats.success_rate) }}%
        </div>
    </div>
</div>
