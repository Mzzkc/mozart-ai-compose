<!DOCTYPE html>
<html lang="en" :class="{ 'dark': darkMode }" x-data="mozartApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mozart Dashboard{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        mozart: {
                            50: '#f0f5ff',
                            100: '#e0ebff',
                            200: '#b8d4ff',
                            300: '#85b5ff',
                            400: '#4d8fff',
                            500: '#1a6bff',
                            600: '#0050e6',
                            700: '#003db3',
                            800: '#002d80',
                            900: '#001d52',
                        }
                    }
                }
            }
        }
    </script>

    <!-- htmx -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.3.0/sse.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/main.css">

    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

    {% include "components/header.html" %}

    <!-- Notifications -->
    <div class="fixed top-4 right-4 z-50 space-y-2" id="notifications">
        <template x-for="n in notifications" :key="n.id">
            <div
                x-show="true"
                x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-x-4"
                x-transition:enter-end="opacity-100 translate-x-0"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0"
                :class="{
                    'bg-green-50 dark:bg-green-900/30 border-green-400 text-green-800 dark:text-green-200': n.type === 'success',
                    'bg-red-50 dark:bg-red-900/30 border-red-400 text-red-800 dark:text-red-200': n.type === 'error',
                    'bg-yellow-50 dark:bg-yellow-900/30 border-yellow-400 text-yellow-800 dark:text-yellow-200': n.type === 'warning',
                    'bg-blue-50 dark:bg-blue-900/30 border-blue-400 text-blue-800 dark:text-blue-200': n.type === 'info'
                }"
                class="px-4 py-3 rounded-lg border shadow-lg max-w-sm"
            >
                <div class="flex items-center justify-between gap-2">
                    <span x-text="n.message" class="text-sm font-medium"></span>
                    <button @click="removeNotification(n.id)" class="text-current opacity-60 hover:opacity-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </template>
    </div>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}{% endblock %}
    </main>

    {% include "components/footer.html" %}

    <!-- Alpine.js plugins (must load before core) -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.14.8/dist/cdn.min.js"></script>
    <!-- Alpine.js (deferred) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>

    <!-- App JS -->
    <script src="/static/js/app.js"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
