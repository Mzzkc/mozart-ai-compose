    condition: "stage >= 5"
    description: "Full test suite passes"
    timeout_seconds: 900
    stage: 1

  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && git log --oneline -1 | grep -qi "quality\|conftest\|hypothesis\|infrastructure\|qa\|foundation\|test"'
    condition: "stage >= 5"
    description: "Infrastructure changes committed"
    stage: 2
