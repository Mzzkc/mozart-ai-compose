# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║       MOZART TOP QUALITY PASS                                              ║
# ║                                                                            ║
# ║  Fix mozart top TUI: broken layout, no scrolling, missing data,           ║
# ║  wrong IPC methods, and zero integration tests.                            ║
# ║                                                                            ║
# ║  Stage 1: Bug inventory + interface contract (what IPC exists)             ║
# ║  Stage 2 x3: Parallel fixes (layout, data, CLI wiring)                    ║
# ║  Stage 3: Integration — make the pieces actually work together             ║
# ║  Stage 4: Real testing — run the TUI, capture output, verify              ║
# ║  Stage 5: Final verification                                              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "mozart-top-quality"
description: "Quality pass on mozart top — fix TUI display, scrolling, data flow, and add real tests"

workspace: "./top-quality-workspace"

workspace_lifecycle:
  archive_on_fresh: true
  max_archives: 3

backend:
  type: claude_cli
  skip_permissions: true
  working_directory: /home/emzi/Projects/mozart-ai-compose
  timeout_seconds: 3600
  output_format: json

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 4000
  lookback_sheets: 5

sheet:
  size: 1
  total_items: 5

  fan_out:
    2: 3

  dependencies:
    2: [1]
    3: [2]
    4: [3]
    5: [4]

  prelude:
    - file: /home/emzi/Projects/mozart-ai-compose/docs/plans/2026-02-23-mozart-monitor-htop-design.md
      as: context

parallel:
  enabled: true
  max_concurrent: 3

retry:
  max_retries: 2
  max_completion_attempts: 2
  completion_threshold_percent: 50

stale_detection:
  enabled: true
  idle_timeout_seconds: 1800

cost_limits:
  enabled: false

prompt:
  variables:
    preamble: |
      ╔══════════════════════════════════════════════════════════════════════════════╗
      ║  MOZART TOP QUALITY PASS                                                   ║
      ║  Fix the TUI monitor so it actually works                                  ║
      ╚══════════════════════════════════════════════════════════════════════════════╝

      **Project:** /home/emzi/Projects/mozart-ai-compose
      **Branch:** main (push directly)
      **Focus:** `src/mozart/tui/` and `src/mozart/cli/commands/top.py`

      **Design doc** (injected as context below): defines the target TUI layout,
      keyboard shortcuts, data model, and all CLI modes. The current code was built
      from this plan but has major bugs. Your job is to fix it to match the spec.

      CRITICAL RULES:
      1. Read the actual code before modifying it. Every file you touch, read first.
      2. Follow existing code patterns — async, Pydantic v2, Protocol classes.
      3. All new code must have type hints.
      4. Never use `git add .` — stage files explicitly.
      5. Run tests after changes.

      ## IPC Interface Contract

      The daemon registers these methods (in `src/mozart/daemon/process.py`):
      - `daemon.top` → returns latest `SystemSnapshot` dict (processes, memory, CPU, etc.)
      - `daemon.top.stream` → returns `{"jsonl_path": "..."}` for streaming
      - `daemon.events` → returns `{"events": [...]}` for process lifecycle events

      Use ONLY these method names. Do NOT invent new ones.

    fix_focus:
      1:
        name: "Layout & Scrolling"
        directive: |
          Fix the TUI layout so it's usable:

          1. **Panels can't scroll.** All panels (`JobsPanel`, `TimelinePanel`,
             `DetailPanel`) extend `Static` which has no scroll support. Convert
             them to use scrollable containers. The Textual way: wrap content in
             `VerticalScroll` or use `ScrollableContainer`, or switch the panel
             base class. Read the Textual docs/source if unsure.

          2. **Layout is rigid.** The compose() method uses fixed widget order
             with no height allocation. Jobs panel should get most space. Timeline
             and detail can be smaller. Use Textual CSS or height parameters.

          3. **Jobs must be expandable/collapsible.** Currently the job tree is
             flat Rich markup text dumped into a Static widget. Use Textual's
             `Tree` widget or `Collapsible` so users can expand a job to see its
             processes and collapse it to save space. Job headers should be
             collapsed by default when there are many jobs; each job expands on
             click or Enter to show its process tree.

          4. **Verify the layout works** by running:
             ```bash
             timeout 5 .venv/bin/python -c "
             from mozart.tui.app import MonitorApp
             from mozart.tui.reader import MonitorReader
             app = MonitorApp(reader=MonitorReader())
             # Just verify compose() doesn't crash
             print('Layout OK')
             "
             ```

          Files to modify: `src/mozart/tui/app.py`, `src/mozart/tui/panels/*.py`
      2:
        name: "Data Flow & Display"
        directive: |
          Fix data rendering bugs. Here's what `mozart top` actually looks like
          right now (real screenshot from a running conductor with 2 jobs):

          - Header says "Jobs: 4" but only 1 job visible (other jobs missing)
          - "Sheet 0/1 ░░░░░░ 0%" — progress bar is nonsensical
          - 37 processes listed FLAT under one job, all labeled "S12"
          - No parent-child hierarchy — Claude agent, pyright, rust-analyzer,
            typescript-language-server all shown as sibling "S12" entries
          - "No events yet" despite processes running for 7+ minutes

          Fix these specific issues:

          1. **Flat process list.** The snapshot has PPID data. Group child
             processes under their parent. The Claude agent (PID X) spawns
             pyright, rust-analyzer, etc. as children. Show:
             ```
             ▶ mozart-monitor-concert  2 active sheets
               ├ S12 [RUNNING] PID 160055 (claude) CPU 0% MEM 360M 7m56s
               │  ├ PID 160178 pyright-langserver    74M
               │  ├ PID 160179 typescript-language..  46M
               │  └ PID 160198 rust-analyzer          40M
               └ S12 [RUNNING] PID 170052 (claude) CPU 0% MEM 355M 2m52s
                  └ ...
             ```
             Use PPID to build the tree. Top-level = processes whose PPID is
             the daemon PID. Everything else nests under its parent.

          2. **Progress bar semantics.** Counting processes in state "T" is
             not sheet completion. The snapshot has `running_jobs` and
             `active_sheets` metadata. Show active sheet count, not a fake
             completion percentage.

          3. **Missing jobs.** Header says "Jobs: 4" but only 1 rendered.
             Check if `by_job` grouping drops jobs with no processes, or if
             the snapshot only contains processes for some jobs.

          4. **Events not fetched via IPC.** The reader's `get_events()` only
             returns data from SQLite. For IPC mode, call `daemon.events` via
             the client and parse the result.

          5. **Uptime always shows 0.** Track uptime from first snapshot or
             use `time.monotonic()` delta from mount.

          6. **Exception swallowing** in `app.py` `refresh_data()` — bare
             `except Exception: pass` hides all errors. At minimum log them.

          Files to modify: `src/mozart/tui/app.py`, `src/mozart/tui/panels/*.py`,
          `src/mozart/tui/reader.py`
      3:
        name: "CLI Wiring & Trace"
        directive: |
          Fix the CLI command wiring:

          1. **`_history_tui()` dead params.** `duration_seconds` and `filter_job`
             are accepted but never used after the recent fix. Either wire them
             through or remove them from the signature.

          2. **Trace mode calls wrong IPC method.** `_trace_mode()` calls
             `daemon.profiler.trace` which doesn't exist. The daemon has no
             trace IPC method. Either:
             - Remove trace mode entirely (it's non-functional scaffolding)
             - Or implement a real `daemon.trace` handler in process.py

             Prefer removal unless you can implement it end-to-end in this stage.

          3. **JSON mode filter_job.** Verify `_filter_snapshot()` actually works
             with the real `daemon.top` response shape. The `processes` field
             contains `ProcessMetric` dicts with `job_id` — confirm the filter
             key matches.

          4. **Test all CLI modes don't crash:**
             ```bash
             # JSON mode (should stream data if conductor running)
             timeout 3 mozart top --json --interval 1 2>&1 | head -2

             # Help
             mozart top --help

             # History (may error if no DB, that's OK — should not crash)
             mozart top --history 1m --json 2>&1 | head -5
             ```

          Files to modify: `src/mozart/cli/commands/top.py`

  template: |
    {{ preamble }}

    *Stage {{ stage }}/{{ total_stages }} ({{ ((stage / total_stages) * 100) | round }}%)*
    {% if fan_count > 1 %}*Instance {{ instance }}/{{ fan_count }}*{% endif %}

    {% if stage == 1 %}
    # Bug Inventory & Interface Contract

    Read every file in `src/mozart/tui/` and `src/mozart/cli/commands/top.py`.
    Also read the IPC handler registration in `src/mozart/daemon/process.py`
    (search for `handle_top`, `handle_top_stream`, `handle_events`).

    Document:
    1. Every bug you find (file, line, what's wrong, severity)
    2. The exact IPC interface: method names, parameters, return shapes
    3. The SystemSnapshot model fields (from `src/mozart/daemon/profiler/models.py`)
    4. What Textual widgets are used and why they can't scroll

    This is the interface contract for stage 2's parallel work.

    **Output to:** {{ workspace }}/01-inventory.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.


    {% elif stage == 2 %}
    {% set focus = fix_focus[instance] %}

    # Fix: {{ focus.name }}

    Read {{ workspace }}/01-inventory.md for the bug inventory and interface
    contract. Use the EXACT IPC method names documented there.

    {{ focus.directive }}

    **PARALLEL STAGE:** You are one of {{ fan_count }} parallel fixers.
    Only modify files in YOUR scope. If you need to change a file another
    instance owns, note it in your output and don't touch it.

    After your work:
    ```bash
    python -c "from mozart.tui.app import MonitorApp; print('import OK')"
    pytest tests/test_profiler.py -x -q --tb=short --timeout=60 2>&1 | tail -5
    ```

    **Output to:** {{ workspace }}/02-{{ focus.name | lower | replace(" ", "-") | replace("&", "and") }}.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.


    {% elif stage == 3 %}
    # Integration

    Read all fix reports:
    - {{ workspace }}/02-layout-and-scrolling.md
    - {{ workspace }}/02-data-flow-and-display.md
    - {{ workspace }}/02-cli-wiring-and-trace.md

    Three parallel fixers just modified the TUI independently. Now make it
    all work together:

    1. **Resolve conflicts.** If two instances modified the same file, merge
       their changes. Read the actual files on disk — don't rely only on reports.

    2. **Test the full flow:**
       ```bash
       # Does it import?
       python -c "from mozart.tui.app import MonitorApp; from mozart.tui.reader import MonitorReader; print('OK')"

       # Does JSON mode work against the running conductor?
       timeout 3 mozart top --json --interval 1 2>&1 | head -2

       # Do existing tests pass?
       pytest tests/test_profiler.py -x -q --tb=short --timeout=60 2>&1 | tail -5
       ```

    3. **Fix anything broken.** If the integration reveals new bugs, fix them.

    **Output to:** {{ workspace }}/03-integration.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.


    {% elif stage == 4 %}
    # Real Testing

    Write actual tests for mozart top. Not import canaries — real behavioral tests.

    Create `tests/test_tui.py` with:

    1. **MonitorReader tests:**
       - Reader with no sources returns None
       - Reader with IPC client calls `daemon.top`
       - Reader source detection priority (IPC > SQLite > JSONL)

    2. **Panel rendering tests:**
       - HeaderPanel renders conductor status from a mock snapshot
       - JobsPanel renders process tree from a mock snapshot
       - TimelinePanel renders events
       - Panels handle empty data without crashing

    3. **MonitorApp tests (Textual async test support):**
       - App mounts without crashing
       - App calls reader on refresh
       - Use `from textual.pilot import Pilot` if available, or just test
         the data methods directly

    4. **CLI top command tests:**
       - JSON mode outputs valid NDJSON when given mock data
       - `_parse_duration()` handles all formats
       - `_filter_snapshot()` filters by job_id correctly

    Use pytest fixtures. Mock the IPC client — don't require a running conductor.

    Run ALL tests:
    ```bash
    pytest tests/test_tui.py -v --tb=short --timeout=60
    pytest tests/test_profiler.py -x -q --tb=short --timeout=60 2>&1 | tail -5
    ```

    **Output to:** {{ workspace }}/04-tests.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.


    {% elif stage == 5 %}
    # Final Verification

    Run the full verification suite:

    ```bash
    # 1. All TUI tests
    pytest tests/test_tui.py -v --tb=short --timeout=60

    # 2. All profiler tests
    pytest tests/test_profiler.py -v --tb=short --timeout=60

    # 3. Full test suite (should not regress)
    pytest tests/ -x --timeout=120 -q --tb=short 2>&1 | tail -10

    # 4. Type checking
    mypy src/mozart/tui/ --ignore-missing-imports 2>&1 | tail -5

    # 5. Lint
    ruff check src/mozart/tui/ src/mozart/cli/commands/top.py 2>&1 | tail -10

    # 6. Import canary
    python -c "
    from mozart.tui.app import MonitorApp
    from mozart.tui.reader import MonitorReader
    from mozart.tui.panels.header import HeaderPanel
    from mozart.tui.panels.jobs import JobsPanel
    from mozart.tui.panels.timeline import TimelinePanel
    from mozart.tui.panels.detail import DetailPanel
    import mozart.cli.commands.top
    print('ALL IMPORTS OK')
    "

    # 7. CLI modes don't crash
    mozart top --help
    timeout 3 mozart top --json --interval 1 2>&1 | head -1
    ```

    Fix any failures. Report results.

    **Output to:** {{ workspace }}/05-verification.md
    Include `IMPLEMENTATION_COMPLETE: yes` at the top.

    {% endif %}

validations:
  # Stage 1: Inventory
  - type: file_exists
    path: "{workspace}/01-inventory.md"
    condition: "stage >= 1"
    description: "Bug inventory exists"

  # Stage 2: Fix reports
  - type: content_contains
    path: "{workspace}/01-inventory.md"
    pattern: "IMPLEMENTATION_COMPLETE: yes"
    condition: "stage >= 1"
    description: "Inventory marked complete"

  # Stage 3: Integration
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/python -c "from mozart.tui.app import MonitorApp; from mozart.tui.reader import MonitorReader; print(\"OK\")"'
    condition: "stage >= 3"
    description: "TUI imports successfully"

  # Stage 4: Tests exist and pass
  - type: file_exists
    path: "/home/emzi/Projects/mozart-ai-compose/tests/test_tui.py"
    condition: "stage >= 4"
    description: "TUI test file exists"

  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/pytest tests/test_tui.py -x -q --tb=no --no-header --timeout=60 2>&1 | tail -1 | grep -qE "[0-9]+ passed"'
    condition: "stage >= 4"
    description: "TUI tests pass"
    stage: 2

  # Stage 5: Full verification
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/mozart-ai-compose && .venv/bin/pytest tests/ -x --timeout=120 -q --tb=no --no-header 2>&1 | tail -1 | grep -qE "[0-9]+ passed"'
    condition: "stage >= 5"
    description: "Full test suite passes"
    stage: 2

  - type: file_exists
    path: "{workspace}/05-verification.md"
    condition: "stage >= 5"
    description: "Verification report exists"
