# observer-integration.yaml
#
# Implements the Observer Integration feature (#102) using TDD across
# 10 sequential stages. Each stage is one task from the implementation
# plan, with all expert review fixes incorporated.
#
# Expert review source: /home/emzi/Projects/claude-compositions/plan-review-workspace/
# Plan doc: docs/plans/2026-02-24-observer-integration-plan.md
# Design doc: docs/plans/2026-02-24-observer-integration-design.md
#
# Execution flow: 10 sequential stages, each follows TDD cycle
#   (write test → verify fail → implement → verify pass → commit)
#
# Usage:
#   mozart validate scores/observer-integration.yaml
#   mozart run scores/observer-integration.yaml

name: "observer-integration"
description: "Implement ObserverRecorder with expert review fixes (#102)"

workspace: "/home/emzi/Projects/mozart-ai-compose/workspace-observer"

backend:
  type: claude_cli
  skip_permissions: true
  timeout_seconds: 3600
  disable_mcp: true
  timeout_overrides:
    4: 5400   # Coalescing + size cap — heaviest task, 5 critical review fixes
    6: 5400   # Manager wiring — touches many integration points, full test suite
    9: 5400   # TUI integration — 4 files, vaguest task per expert review
    10: 5400  # Integration test — full suite + mypy + ruff

sheet:
  size: 1
  total_items: 10
  dependencies:
    2: [1]
    3: [2]
    4: [3]
    5: [4]
    6: [5]
    7: [6]
    8: [7]
    9: [8]
    10: [9]

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 3000
  lookback_sheets: 2

retry:
  max_retries: 2
  max_completion_attempts: 3
  completion_threshold_percent: 60

stale_detection:
  enabled: true
  idle_timeout_seconds: 1800

pause_between_sheets_seconds: 5

prompt:
  variables:
    project: "/home/emzi/Projects/mozart-ai-compose"
    plan_doc: "docs/plans/2026-02-24-observer-integration-plan.md"
    design_doc: "docs/plans/2026-02-24-observer-integration-design.md"
    review_dir: "/home/emzi/Projects/claude-compositions/plan-review-workspace"

  template: |
    {% macro project_context() %}
    ## Project Context — Mozart AI Compose

    You are implementing the Observer Integration feature (#102) for Mozart,
    an AI orchestration framework with a long-running conductor daemon.

    **Project root:** `{{ project }}`
    **Venv activation:** `source {{ project }}/.venv/bin/activate`

    **Key patterns:**
    - EventBus pub/sub for decoupled component communication
    - Per-job lifecycle managed by JobManager (register/start/stop/unregister)
    - Pydantic v2 models for all config; async throughout (asyncio)
    - SemanticAnalyzer is the reference pattern for EventBus subscribers

    **Documents to reference:**
    - Implementation plan: `{{ project }}/{{ plan_doc }}`
    - Design doc: `{{ project }}/{{ design_doc }}`
    - Expert reviews: `{{ review_dir }}/03-synthesis.md` (start here for fixes)

    Read the plan document's section for YOUR task to understand the full context.
    {% endmacro %}

    {% macro tdd_workflow() %}
    ## TDD Workflow

    1. Write test code FIRST
    2. Run tests — verify they FAIL for the right reason
    3. Write minimal implementation to make tests pass
    4. Run tests — verify they PASS
    5. Run ruff on modified source files
    6. Git commit with conventional commit message

    ```bash
    cd {{ project }}
    source .venv/bin/activate
    pytest tests/test_observer_recorder.py -x -v --tb=short
    ruff check src/mozart/daemon/observer_recorder.py
    ```

    After committing, print a summary of what you did and what files changed.
    {% endmacro %}

    {% macro review_fix(description) %}
    > **REVIEW FIX:** {{ description }}
    {% endmacro %}

    {# ════════════════════════════════════════════════════════════════ #}

    {% if stage == 1 %}
    # Task 1: ObserverConfig — Add Persistence Fields

    {{ project_context() }}

    Read the plan, section "Task 1" for full details.

    ## What to Build

    Add 4 new fields to `ObserverConfig` in `src/mozart/daemon/config.py`
    (after the existing `max_queue_size` field at line 105):

    - `persist_events: bool = True` — controls JSONL file writing
    - `exclude_patterns: list[str]` — defaults: `[".git/", "__pycache__/", "node_modules/", ".venv/", "*.pyc"]`
    - `coalesce_window_seconds: float = 2.0` with `ge=0.0`
    - `max_timeline_bytes: int = 10_485_760` with `ge=4096`

    Create `tests/test_observer_recorder.py` with `TestObserverConfigPersistence`.

    ## Expert Review Fixes

    {{ review_fix("Use `ge=4096` for max_timeline_bytes, NOT `ge=1_048_576`. The original plan's 1MB minimum prevents testing with small caps. Lowering to 4KB was flagged by ALL FOUR non-ASYNC experts. This is the most universally agreed-upon fix.") }}

    {{ tdd_workflow() }}

    Commit: `feat(observer): add persistence config fields to ObserverConfig (#102)`

    {# ════════════════════════════════════════════════════════════════ #}

    {% elif stage == 2 %}
    # Task 2: ObserverRecorder — Path Exclusion + Core Structure

    {{ project_context() }}

    Read the plan, section "Task 2".

    ## What to Build

    Create `src/mozart/daemon/observer_recorder.py` with:
    - `ObserverRecorder` class with `__init__`, `_should_exclude()`
    - `_JobRecorderState` dataclass with slots for job_id, workspace, file_handle, recent_events (deque maxlen=200), coalesce_buffer
    - Module-level frozensets: `_FILE_EVENTS`, `_PROCESS_EVENTS`, `_ALL_OBSERVER_EVENTS`
    - Path exclusion using `fnmatch` against relative paths — match full path, `*/pattern`, and per-component

    Add `TestPathExclusion` class to `tests/test_observer_recorder.py`.

    ## Notes

    No review fixes for this task. Follow the plan as-is.

    {{ tdd_workflow() }}

    Commit: `feat(observer): add ObserverRecorder with path exclusion (#102)`

    {# ════════════════════════════════════════════════════════════════ #}

    {% elif stage == 3 %}
    # Task 3: JSONL Persistence + Register/Unregister

    {{ project_context() }}

    Read the plan, section "Task 3".

    ## What to Build

    Add to `ObserverRecorder`:
    - `register_job(job_id, workspace)` — creates `_JobRecorderState`, opens JSONL file if `persist_events` is True
    - `unregister_job(job_id)` — flush + close, pop from `_jobs`
    - `flush(job_id)` — flush coalesce buffer + file handle
    - `_write_event(job_id, event)` — check path exclusion, add to ring buffer, write JSONL line
    - `_flush_state(state)` — drain coalesce buffer, flush file
    - `_close_state(state)` — close file handle

    Add `TestJSONLPersistence` to tests.

    ## Expert Review Fixes

    {{ review_fix("Ring buffer MUST receive events even when file I/O fails. In `_write_event`, add to `state.recent_events` BEFORE attempting file write, not inside the file write block. This ensures fail-open behavior: TUI gets events regardless of disk errors. (TEST expert, section 5.3)") }}

    {{ review_fix("Add debug logging for events targeting unregistered jobs. When `_jobs.get(job_id)` returns None, log at debug level with job_id and event type. Aids debugging event-after-unregister scenarios. (ASYNC expert, section 5.4)") }}

    {{ review_fix("Add edge case tests beyond the plan: (1) `register_job` twice with same job_id is idempotent, (2) `flush` after `unregister_job` is a no-op, (3) event with `data: None` doesn't crash, (4) event for unregistered job is silently ignored, (5) file write failure still populates ring buffer. See TEST expert section 5.3 for concrete test code.") }}

    {{ tdd_workflow() }}

    Commit: `feat(observer): JSONL persistence with register/unregister lifecycle (#102)`

    {# ════════════════════════════════════════════════════════════════ #}

    {% elif stage == 4 %}
    # Task 4: Coalescing + Size Cap (HEAVY FIXES)

    {{ project_context() }}

    Read the plan, section "Task 4". Then read `{{ review_dir }}/02-data-integrity.md`
    section 5.1 for the truncation fix and `{{ review_dir }}/02-async-safety.md`
    section 5.1 for the async truncation fix.

    ## What to Build

    Add to `ObserverRecorder`:
    - `_handle_event(event)` — the EventBus callback. Routes file_modified through coalesce buffer, everything else to `_write_event` directly
    - Coalescing logic for same-file modifications within the window
    - Size cap enforcement with truncation when JSONL exceeds `max_timeline_bytes`

    Add `TestCoalescing` and `TestSizeCap` to tests.

    ## Expert Review Fixes (5 CRITICAL changes)

    {{ review_fix("1. LINE-BOUNDARY TRUNCATION: The plan's 'truncate oldest half' seeks to the byte midpoint and splits a JSON line, producing corrupt JSONL. After seeking to midpoint, call `readline()` to consume the partial line, THEN read the surviving tail. See DATA expert section 5.1 for the exact algorithm.") }}

    {{ review_fix("2. ASYNC TRUNCATION: Truncation of a multi-MB file blocks the EventBus drain loop, stalling ALL subscribers. Use `asyncio.create_task()` to defer truncation. Check file size via `file_handle.tell()` after writes; if over cap, schedule truncation as a background task. See ASYNC expert section 5.1.") }}

    {{ review_fix("3. RING BUFFER DURING COALESCING: When a file_modified event is coalesced (buffered), it MUST still be appended to `state.recent_events` immediately. Without this, the TUI shows quiet files but hides active ones — exactly inverted from what users want. See DATA expert section 5.2.") }}

    {{ review_fix("4. EVENT TIMESTAMPS FOR COALESCING: Compare `event['timestamp']` against the buffered event's timestamp for coalesce window checks, NOT `time.time()` or `time.monotonic()`. This makes tests deterministic (fabricated timestamps work) and avoids clock-jump issues on WSL. If you later add periodic flush for stale buffers, use `time.monotonic()` there.") }}

    {{ review_fix("5. FIX TestSizeCap: Use `max_timeline_bytes=4096` (not 2048). The Pydantic validator enforces `ge=4096`. Also add a test that PARSES every surviving JSONL line after truncation — don't just check file size. Verify no corrupt partial lines.") }}

    {{ tdd_workflow() }}

    Commit: `feat(observer): coalescing + async JSONL size cap (#102)`

    {# ════════════════════════════════════════════════════════════════ #}

    {% elif stage == 5 %}
    # Task 5: EventBus Lifecycle + get_recent_events + Coalesce Timer

    {{ project_context() }}

    Read the plan, section "Task 5". Then read `{{ review_dir }}/02-architecture.md`
    section 5.1 for the lifecycle API fix and `{{ review_dir }}/02-async-safety.md`
    section 5.3 for the coalesce timer.

    ## What to Build

    Add to `ObserverRecorder`:
    - `start(event_bus)` — subscribe to observer.* events, start coalesce flush timer
    - `stop(event_bus)` — unsubscribe, cancel flush timer, flush all, close all file handles
    - `get_recent_events(job_id, limit)` — return from ring buffer (newest first)

    Add `TestLifecycle` and `TestGetRecentEvents` to tests.

    ## Expert Review Fixes (5 changes)

    {{ review_fix("1. UNIFY LIFECYCLE API: SemanticAnalyzer passes `event_bus` as parameter to `start(event_bus)` and `stop(event_bus)`. The plan stored it in `__init__`. Use the SemanticAnalyzer pattern instead — accept `event_bus` in start/stop, store it as `self._event_bus` in start(). This gives one calling convention in manager.py. See ARCH expert section 5.1.") }}

    {{ review_fix("2. COALESCE FLUSH TIMER: The plan describes window-based flushing but implements NONE. Add `_periodic_flush()` as an asyncio.Task started in `start()`. It runs every `coalesce_window_seconds`, iterates all jobs, flushes buffer entries older than the window. Cancel the task in `stop()`. See ASYNC expert section 5.3.") }}

    {{ review_fix("3. DOCUMENT SINGLE-THREADED INVARIANT: Add a prominent docstring: 'Thread-safety: NOT thread-safe. All methods must be called from the same asyncio event loop. Do NOT add await inside _write_event() or _flush_state() without re-evaluating concurrency.' See ASYNC expert section 5.2.") }}

    {{ review_fix("4. ADD UNSUBSCRIBE ASSERTION: The plan's stop test checks `_sub_id is None` but never verifies `unsubscribe()` was actually called. Add a test that captures unsubscribe calls and asserts the correct sub_id was passed. See TEST expert section 5.2.") }}

    {{ review_fix("5. RING BUFFER ORDERING: `get_recent_events(limit=N)` MUST return the N most recent events (newest). The deque drops oldest when full. Slice from the tail. Add a test that verifies ordering — write 20 events, request 3, verify they're the last 3. See TEST expert section 5.4.") }}

    {{ review_fix("6. STOP CLOSES ALL FILE HANDLES: If `stop()` is called before all jobs are unregistered (daemon shutdown), iterate `list(self._jobs.keys())` and call `unregister_job()` for each. Prevents file handle leaks. See ASYNC expert section 5.5.") }}

    {{ tdd_workflow() }}

    Commit: `feat(observer): EventBus lifecycle + get_recent_events + coalesce timer (#102)`

    {# ════════════════════════════════════════════════════════════════ #}

    {% elif stage == 6 %}
    # Task 6: Wire ObserverRecorder into JobManager

    {{ project_context() }}

    Read the plan, section "Task 6". Then read `{{ review_dir }}/02-architecture.md`
    sections 5.2 and 5.5 for the guard fix and logging.

    ## What to Build

    Modify `src/mozart/daemon/manager.py`:
    1. Add `self._observer_recorder: ObserverRecorder | None = None` after `self._snapshot_manager` (line 163)
    2. In `start()`, after semantic analyzer block (after line 254): create and start recorder
    3. In `_start_observer()` (line ~1058): call `recorder.register_job(job_id, meta.workspace)`
    4. In `_run_managed_task()`, before snapshot capture: call `recorder.flush(job_id)`
    5. In `_run_managed_task()` finally block (line ~1284): call `recorder.unregister_job(job_id)`
    6. In `shutdown()`, after observer stop (line ~932): call `recorder.stop(event_bus)`
    7. Add `observer_recorder` property

    ## Expert Review Fixes (3 changes)

    {{ review_fix("1. USE `enabled` GUARD, NOT `persist_events`: The plan gates recorder creation on `self._config.observer.persist_events`. This kills the ring buffer when persistence is disabled, silently breaking `mozart top`. The guard MUST be `self._config.observer.enabled`. The `persist_events` flag controls file I/O INSIDE the recorder. See ARCH section 5.2, INT section 5.") }}

    {{ review_fix("2. HANDLE DOUBLE-UNREGISTER IN stop(): During shutdown, `_run_managed_task` finally block and `stop()` can race. In `stop()`, iterate `list(self._jobs.keys())` (snapshot, not live view) to avoid RuntimeError from dict mutation during iteration. See ARCH section 4.2.") }}

    {{ review_fix("3. ADD TO STARTED LOG: Add `observer_recorder='active'` to the `manager.started` log message at line 256-262, matching the semantic_analyzer pattern. See ARCH section 5.5.") }}

    ## Validation Note

    Run the FULL existing test suite after this change to catch regressions:
    ```bash
    pytest tests/ -x -q --tb=short --timeout=120
    ```

    {{ tdd_workflow() }}

    Commit: `feat(observer): wire ObserverRecorder into JobManager lifecycle (#102)`

    {# ════════════════════════════════════════════════════════════════ #}

    {% elif stage == 7 %}
    # Task 7: Snapshot Enrichment — JSONL Capture + Git Context

    {{ project_context() }}

    Read the plan, section "Task 7". Then read `{{ review_dir }}/02-integration.md`
    section 6 for the async subprocess note and `{{ review_dir }}/02-testing.md`
    section 6 for git test isolation.

    ## What to Build

    Modify `src/mozart/daemon/snapshot.py`:
    1. Add `.mozart-observer.jsonl` to `_CAPTURE_PATTERNS` list
    2. Add `_capture_git_context(workspace, snapshot_dir)` method — runs git commands, writes `git-context.json`
    3. Call `_capture_git_context` from `capture()` after copying files

    Add snapshot tests to `tests/test_daemon_snapshot.py`.

    ## Expert Review Fixes (3 changes)

    {{ review_fix("1. USE ASYNC SUBPROCESS: `_capture_git_context` runs git commands. Use `asyncio.create_subprocess_exec` instead of `subprocess.run` to avoid blocking the event loop. For large repos, `git status --porcelain` can take seconds. If `capture()` is synchronous, make `_capture_git_context` sync but document the limitation. See INT expert section 6.") }}

    {{ review_fix("2. GIT TEST ISOLATION: Set `GIT_CONFIG_NOSYSTEM=1` and `HOME=/tmp/nonexistent` in test subprocess environments to isolate from global git config (hooks, templates, init.defaultBranch). See TEST expert section 6.") }}

    {{ review_fix("3. REMOVE handler.py FROM CHANGES: The design doc lists handler.py as a file to modify, but it's a generic dispatcher — all registration happens in process.py. Do NOT modify handler.py. See INT expert section 3.") }}

    For snapshot tests, also run existing snapshot tests to check for regressions:
    ```bash
    pytest tests/test_daemon_snapshot.py -x -v --tb=short
    ```

    {{ tdd_workflow() }}

    Commit: `feat(observer): snapshot enrichment with JSONL + git context (#102)`

    {# ════════════════════════════════════════════════════════════════ #}

    {% elif stage == 8 %}
    # Task 8: IPC Method — daemon.observer_events

    {{ project_context() }}

    Read the plan, section "Task 8".

    ## What to Build

    Modify `src/mozart/daemon/process.py`, in `_register_methods()`:
    - Add `handle_observer_events` handler after the `handle_events` block
    - Accepts `{"job_id": str | null, "limit": int}` params
    - Calls `manager.observer_recorder.get_recent_events(job_id, limit)`
    - Returns `{"events": [...]}`
    - If `manager.observer_recorder is None`, returns `{"events": []}`
    - Register as `"daemon.observer_events"`

    Follow the existing handler patterns in `_register_methods()` exactly —
    same signature, same closure style, same error handling.

    ## Notes

    No major review fixes for this task. The integration expert confirmed the
    IPC handler pattern is consistent with existing handlers.

    {{ tdd_workflow() }}

    Commit: `feat(observer): add daemon.observer_events IPC handler (#102)`

    {# ════════════════════════════════════════════════════════════════ #}

    {% elif stage == 9 %}
    # Task 9: TUI Integration — Timeline + Detail Panel

    {{ project_context() }}

    Read the plan, section "Task 9". Then read `{{ review_dir }}/02-integration.md`
    sections 4-6 for the TUI integration details.

    ## What to Build

    1. **`src/mozart/tui/reader.py`** — Add `get_observer_events(job_id, limit)` method
       that calls `daemon.observer_events` via IPC
    2. **`src/mozart/tui/panels/timeline.py`** — Add PROC entry type for `observer.process_*` events.
       Add `observer_events: list[dict[str, Any]]` as a NEW parameter to `update_data()`,
       separate from existing `ProcessEvent` list
    3. **`src/mozart/tui/panels/detail.py`** — Add file activity section showing recent
       `observer.file_*` events when a job is selected
    4. **`src/mozart/tui/app.py`** — Add `reader.get_observer_events()` call in the
       refresh cycle, route process events to timeline and file events to detail panel

    ## Expert Review Fixes (3 changes)

    {{ review_fix("1. PROCESS EVENT ASYMMETRY: `observer.process_spawned` events carry `{pid, name}` while `observer.process_exited` events carry `{pid, role}`. The TUI rendering MUST handle both shapes. Use `data.get('name', data.get('role', ''))` for the display label. See DATA expert section 2.") }}

    {{ review_fix("2. TIMELINE MERGE SORT: Observer PROC entries must interleave with existing profiler events by timestamp. Don't append them — merge them into the sorted entries list. See INT expert section 6.") }}

    {{ review_fix("3. SEQUENTIAL IPC CALLS: Call `get_observer_events()` sequentially with existing IPC calls (not parallel), to avoid overwhelming the single-threaded IPC handler. See INT expert section 4.") }}

    Read the existing TUI code carefully before modifying. Understand the current
    `update_data()` signature, `_render_timeline()` flow, and refresh cycle.

    {{ tdd_workflow() }}

    Commit: `feat(observer): wire observer events into mozart top TUI (#102)`

    {# ════════════════════════════════════════════════════════════════ #}

    {% elif stage == 10 %}
    # Task 10: Integration Test + Final Cleanup

    {{ project_context() }}

    ## What to Do

    1. **Run the full test suite** and fix any failures:
       ```bash
       cd {{ project }} && source .venv/bin/activate
       pytest tests/ -x -q --tb=short --timeout=120
       ```

    2. **Run type checking** on the new and modified files:
       ```bash
