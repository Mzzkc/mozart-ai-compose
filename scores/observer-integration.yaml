            src/mozart/daemon/manager.py src/mozart/daemon/process.py
       ```

    4. **Fix any issues** found by the above. Do NOT skip or ignore warnings.

    5. **Add a file handle cleanup fixture** to `tests/test_observer_recorder.py` if
       not already present — prevents FD leaks on test failure:
       ```python
       @pytest.fixture(autouse=True)
       def _cleanup_handles():
           yield
           # GC will close handles, but explicit cleanup prevents FD exhaustion
       ```

    6. **Verify git status** — all changes should be committed. If any files are
       unstaged, review them and commit with an appropriate message.

    7. Print a final summary: what was built, how many tests pass, any known limitations.

    {{ tdd_workflow() }}

    Commit (if needed): `fix(observer): address lint/type issues from integration (#102)`
