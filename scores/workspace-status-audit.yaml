# Workspace Status Audit Score
# Systematically audits every code subsystem for workspace-resident status tracking.
# Verifies that the daemon is the sole source of truth for job state.
#
# Execution Flow (3 stages, 8 concrete sheets):
#
#   Stage 1: Setup/Framing (sheet 1)
#        |
#        +----+----+----+----+----+----+
#        v    v    v    v    v    v
#   Stage 2: Audit x6 (sheets 2-7)        <-- fan_out: 6
#        |    |    |    |    |    |
#        +----+----+----+----+----+
#                  v
#   Stage 3: Synthesis (sheet 8)           <-- fan-in: waits for ALL
#
# Each instance of stage 2 audits a different subsystem:
#   1: src/mozart/cli/commands/     - CLI commands that write to workspace
#   2: src/mozart/daemon/           - daemon code that writes to workspace
#   3: src/mozart/execution/runner/ - runner code beyond logs/artifacts
#   4: src/mozart/state/            - state backends and workspace-relative paths
#   5: src/mozart/execution/validation/ - validation engine workspace writes
#   6: All src/mozart/              - broad grep for workspace path writes
#
# Usage:
#   mozart validate scores/workspace-status-audit.yaml
#   mozart run scores/workspace-status-audit.yaml

name: "workspace-status-audit"
description: "Fan-out audit of all code subsystems for workspace-resident status tracking"

workspace: "./audit-workspace"

backend:
  type: claude_cli
  skip_permissions: true
  timeout_seconds: 1800
  disable_mcp: true
  allowed_tools:
    - Read
    - Write
    - Glob
    - Grep
    - Bash

sheet:
  size: 1
  total_items: 3       # 3 logical stages (expands to 8 concrete sheets)

  fan_out:
    2: 6               # Stage 2 runs 6 parallel audit instances

  dependencies:
    2: [1]             # All audit instances depend on setup
    3: [2]             # Synthesis depends on all audit instances (fan-in)

parallel:
  enabled: true
  max_concurrent: 6

retry:
  max_retries: 2
  base_delay_seconds: 30

prompt:
  variables:
    project_root: "/home/emzi/Projects/mozart-ai-compose"
    subsystems:
      1:
        name: "CLI Commands"
        path: "src/mozart/cli/commands/"
        question: "Do any CLI commands write status/state files to the workspace directory?"
      2:
        name: "Daemon"
        path: "src/mozart/daemon/"
        question: "Does the daemon write any job state to workspace directories?"
      3:
        name: "Execution Runner"
        path: "src/mozart/execution/runner/"
        question: "Does the runner write anything beyond logs and artifacts to workspace?"
      4:
        name: "State Backends"
        path: "src/mozart/state/"
        question: "Do state backends ever use workspace-relative paths in daemon mode?"
      5:
        name: "Validation Engine"
        path: "src/mozart/execution/validation/"
        question: "Does the validation engine write state to workspace?"
      6:
        name: "Cross-Subsystem Grep"
        path: "src/mozart/"
        question: "Are there any workspace path writes, file creation in workspace, or .mozart-* patterns across the entire codebase?"

  template: |
    You are auditing the Mozart AI Compose codebase for workspace-resident status tracking.
    Stage {{ stage }} of {{ total_stages }} (sheet {{ sheet_num }} of {{ total_sheets }}).
    Project root: {{ project_root }}
    Workspace: {{ workspace }}

    {% if stage == 1 %}
    =========================================================================
    STAGE 1: Audit Setup and Framing
    =========================================================================

    Define what "workspace status remnant" means in the context of Mozart.

    BACKGROUND:
    Mozart's daemon should be the SOLE source of truth for job state. The workspace
    directory (the directory where a job writes its output) should only contain:
    - Legitimate output artifacts (files the agent creates as part of its work)
    - Log files (mozart.log)
    - Pause signal files (.mozart-pause)
    - State database files (.mozart-state.db / .mozart-state.json) managed by the state backend

    A "workspace status remnant" is any file or write operation in the workspace that:
    1. Tracks job status, progress, or control state
    2. Is written by Mozart's own code (not by the agent executing within a sheet)
    3. Could conflict with or duplicate the daemon's state tracking
    4. Could become stale if the daemon's state diverges

    TASKS:
    1. Read the project structure at {{ project_root }}/src/mozart/ to understand subsystem boundaries
    2. Define clear criteria for what constitutes a "status remnant" vs. a "legitimate workspace file"
    3. List the known legitimate workspace files (logs, state DB, pause signals, archives)
    4. Create a checklist template that each audit instance will use

    OUTPUT: Write to {{ workspace }}/01-audit-framing.md

    Format the output as:
    ```
    # Workspace Status Audit - Framing

    ## Definition of "Workspace Status Remnant"
    [clear definition]

    ## Legitimate Workspace Files
    [list of known legitimate files with justification]

    ## Audit Checklist
    [checklist each instance should follow]

    ## Subsystems to Audit
    [list of 6 subsystems with paths]
    ```

    End with: FRAMING_COMPLETE

    {% elif stage == 2 %}
    =========================================================================
    STAGE 2: Audit Instance {{ instance }} of {{ fan_count }}
    Subsystem: {{ subsystems[instance].name }}
    Path: {{ project_root }}/{{ subsystems[instance].path }}
    =========================================================================

    NOTE: This runs in PARALLEL with {{ fan_count - 1 }} other audit instances.

    Read the framing document: {{ workspace }}/01-audit-framing.md

    AUDIT QUESTION: {{ subsystems[instance].question }}

    TASKS:
    1. Read EVERY Python file in {{ project_root }}/{{ subsystems[instance].path }}
    {% if instance == 6 %}
    2. Run broad searches across ALL of {{ project_root }}/src/mozart/ for:
       - Patterns like: open(, write(, Path(, mkdir, touch applied to workspace paths
       - String patterns: ".mozart-", "workspace/", workspace + "/", workspace /
       - File creation: Path.write_text, Path.write_bytes, Path.touch, Path.mkdir
       - Any variable named workspace_path, workspace_dir, or similar being written to
    3. Cross-reference findings with known legitimate files from the framing document
    4. Flag ANY code path that writes to workspace for status/state tracking purposes
    {% else %}
    2. Identify ALL code paths that write files to any workspace directory
    3. For each write operation found, classify it as:
       - LEGITIMATE: log files, agent artifacts, state DB (managed by state backend)
       - REMNANT: status tracking, progress files, control signals beyond .mozart-pause
       - AMBIGUOUS: needs further investigation
    4. Record the file path, line number, and code context for each finding
    {% endif %}

    OUTPUT: Write to {{ workspace }}/02-audit-{{ instance }}.md

    Format as a structured report:
    ```
    # Audit Report: {{ subsystems[instance].name }}
    ## Scope: {{ project_root }}/{{ subsystems[instance].path }}
    ## Question: {{ subsystems[instance].question }}

    ## Findings

    ### Finding N
    - **File**: path/to/file.py:line_number
    - **Code**: `relevant code snippet`
    - **Classification**: LEGITIMATE | REMNANT | AMBIGUOUS
    - **Reason**: why this classification

    ## Summary
    - Total write operations found: N
    - Legitimate: N
    - Remnants: N
    - Ambiguous: N

    ## Answer
    [Direct answer to the audit question]
    ```

    End with: AUDIT_{{ instance }}_COMPLETE

    {% elif stage == 3 %}
    =========================================================================
    STAGE 3: Cross-Reference Synthesis
    =========================================================================

    Synthesize findings from ALL {{ fan_count }} audit instances.

    Read the framing document: {{ workspace }}/01-audit-framing.md

    Read ALL audit reports:
    {% for i in range(1, 7) %}
    - {{ workspace }}/02-audit-{{ i }}.md
    {% endfor %}

    TASKS:
    1. Cross-reference all findings across subsystems
    2. Identify any workspace write that appears in multiple subsystems (shared patterns)
    3. Identify any REMNANT or AMBIGUOUS findings that need attention
    4. Produce a final verdict

    VERDICT CRITERIA:
    - CLEAN: No workspace status remnants found. Only legitimate files (logs,
      artifacts, pause signals, state DB) are written to workspace by Mozart code.
    - REMNANTS FOUND: List specific code paths that write status to workspace,
      with file:line references and recommended actions.

    OUTPUT: Write to {{ workspace }}/03-synthesis.md

    Format:
    ```
    # Workspace Status Audit - Synthesis Report

    ## Cross-Reference Summary
    [Summary of all findings across subsystems]

    ## Shared Patterns
    [Any workspace writes appearing in multiple subsystems]

    ## Remnants Found
    [List of REMNANT and AMBIGUOUS findings, or "None"]

    ## Recommendations
    [Specific actions if remnants found, or confirmation if clean]

    VERDICT: CLEAN | REMNANTS FOUND
    [One-paragraph justification]
    ```

    End with: SYNTHESIS_COMPLETE

    {% endif %}

validations:
  # Stage 1: Framing
  - type: file_exists
    path: "{workspace}/01-audit-framing.md"
    condition: "stage == 1"
    description: "Audit framing document created"
  - type: content_contains
    path: "{workspace}/01-audit-framing.md"
    pattern: "FRAMING_COMPLETE"
    condition: "stage == 1"
    description: "Framing marked complete"

  # Stage 2: Each audit instance
  - type: file_exists
    path: "{workspace}/02-audit-{instance}.md"
    condition: "stage == 2"
    description: "Audit report created for this instance"
  - type: content_regex
    path: "{workspace}/02-audit-{instance}.md"
    pattern: "AUDIT_\\d+_COMPLETE"
    condition: "stage == 2"
    description: "Audit instance marked complete"

  # Stage 3: Synthesis
  - type: file_exists
    path: "{workspace}/03-synthesis.md"
    condition: "stage == 3"
    description: "Synthesis report created"
  - type: content_contains
    path: "{workspace}/03-synthesis.md"
    pattern: "VERDICT:"
    condition: "stage == 3"
    description: "Synthesis contains verdict"
  - type: content_contains
    path: "{workspace}/03-synthesis.md"
    pattern: "SYNTHESIS_COMPLETE"
    condition: "stage == 3"
    description: "Synthesis marked complete"

notifications:
  - type: desktop
    on_events:
      - job_complete
      - job_failed
