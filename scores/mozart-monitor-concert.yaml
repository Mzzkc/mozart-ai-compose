    - Parse duration string into seconds
    - Read from SQLite and replay snapshots
    - In TUI mode: show historical playback
    - In JSON mode: dump historical data

    **Mode 4: Trace (`--trace PID`)**
    - Request full strace attachment via IPC
    - Stream trace output to terminal

