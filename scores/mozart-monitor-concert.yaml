name: "mozart-monitor-concert"
description: "Implement mozart htop — real-time system monitor with TUI, logging, and learning integration"

workspace: "./monitor-workspace"

workspace_lifecycle:
  archive_on_fresh: true
  max_archives: 5

backend:
  type: claude_cli
  skip_permissions: true
  working_directory: /home/emzi/Projects/mozart-ai-compose
  timeout_seconds: 3600
  output_format: json

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 3000
  lookback_sheets: 5
  capture_files:
    - "{{ workspace }}/*.md"

sheet:
  size: 1
  total_items: 10

  fan_out:
    2: 3
    5: 2

  dependencies:
    2: [1]
    3: [2]
    4: [3]
    5: [4]
    6: [5]
    7: [6]
    8: [7]
    9: [8]
    10: [9]

parallel:
  enabled: true
  max_concurrent: 3

retry:
  max_retries: 2
  max_completion_attempts: 2
  completion_threshold_percent: 50

stale_detection:
  enabled: true
  idle_timeout_seconds: 1800  # 30min — verification stages run pytest/mypy/ruff as subprocesses

cost_limits:
  enabled: true
  max_cost_per_sheet: 5.00
  max_cost_per_job: 60.00

prompt:
  template: |
    {{ preamble }}

    {% if stage == 1 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 1: INVENTORY + MCP CLEANUP + DEPENDENCY SETUP                      ║
    ║  "Know the terrain before you build"                                      ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    **Step 1: Read the design document in full**
    Read `docs/plans/2026-02-23-mozart-monitor-htop-design.md` completely.
    This is your blueprint — every decision has been made. Implement it faithfully.

    **Step 2: Inventory existing code that will be modified or extended**
    Read these files completely:
    - `src/mozart/daemon/monitor.py` — ResourceMonitor (will be extended)
    - `src/mozart/daemon/system_probe.py` — SystemProbe (will be extended)
    - `src/mozart/daemon/event_bus.py` — EventBus (will add new event types)
    - `src/mozart/daemon/semantic_analyzer.py` — SemanticAnalyzer (will subscribe to anomalies)
    - `src/mozart/daemon/backpressure.py` — BackpressureController (will add scheduling hints)
    - `src/mozart/daemon/process.py` — DaemonProcess (will wire profiler)
    - `src/mozart/daemon/config.py` — DaemonConfig (will add profiler config)
    - `src/mozart/daemon/pgroup.py` — ProcessGroupManager (strace uses this)
    - `src/mozart/learning/patterns.py` — PatternType enum (will add new types)

    ```bash
    echo "=== EXISTING DAEMON STRUCTURE ==="
    find src/mozart/daemon -name "*.py" | sort
    echo "=== EXISTING CLI COMMANDS ==="
    ls src/mozart/cli/commands/
    echo "=== EXISTING TESTS ==="
    ls tests/test_daemon_*.py
    echo "=== CHECK DEPENDENCIES ==="
    pip show textual psutil pynvml 2>&1
    echo "=== PYTHON VERSION ==="
    python --version
    ```

    **Step 3: Install missing dependencies**
    ```bash
    cd /home/emzi/Projects/mozart-ai-compose
    pip install textual pynvml 2>&1 | tail -5
    ```

    **Step 4: MCP Server Cleanup**
    Remove unused MCP server directories. Keep ONLY github and playwright.

    ```bash
    MCP_DIR="/home/emzi/.claude/plugins/marketplaces/claude-plugins-official/external_plugins"
    echo "=== BEFORE CLEANUP ==="
    ls "$MCP_DIR/"

    # Remove unused servers
    for server in greptile stripe context7 supabase asana firebase serena slack linear laravel-boost gitlab; do
      if [ -d "$MCP_DIR/$server" ]; then
        rm -rf "$MCP_DIR/$server"
        echo "Removed: $server"
      fi
    done

    echo "=== AFTER CLEANUP ==="
    ls "$MCP_DIR/"
    ```

    **Step 5: Create the profiler package skeleton**
    ```bash
    mkdir -p src/mozart/daemon/profiler
    mkdir -p src/mozart/tui/panels
    ```

    Create empty `__init__.py` files for:
    - `src/mozart/daemon/profiler/__init__.py`
    - `src/mozart/tui/__init__.py`
    - `src/mozart/tui/panels/__init__.py`

    **Step 6: Verify existing tests pass**
    ```bash
    pytest tests/ -x --timeout=120 -q --tb=line 2>&1 | tail -10
    ```

    **Output to:** {{ workspace }}/01-inventory.md
    Include: design summary, code inventory table, dependency status,
    MCP cleanup results, test baseline, any concerns.

    {% elif stage == 2 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 2: FOUNDATION — {{ foundation_names[instance] | upper }}            ║
    ║  Instance {{ instance }} of {{ fan_count }} (PARALLEL)                      ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ readonly_for_other_instances }}

    Read {{ workspace }}/01-inventory.md for context.
    Read `docs/plans/2026-02-23-mozart-monitor-htop-design.md` for the design.

    {% if instance == 1 %}
    {# ═══════════════ MODELS + STORAGE ═══════════════ #}

    You are implementing **Pydantic models and SQLite storage** for the profiler.

    **File 1: `src/mozart/daemon/profiler/models.py`**

    Create Pydantic models matching the design:

    - `ProfilerConfig` — configuration for the profiler subsystem
      - `enabled: bool = True`
      - `interval_seconds: float = 5.0`
      - `strace_enabled: bool = True`
      - `strace_full_on_demand: bool = True`
      - `gpu_enabled: bool = True`
      - `storage_path: Path = Path("~/.mozart/monitor.db")`
      - `jsonl_path: Path = Path("~/.mozart/monitor.jsonl")`
      - `jsonl_max_bytes: int = 52428800` (50MB)
      - Nested `retention` and `anomaly` and `correlation` configs per design

    - `ProcessMetric` — per-process snapshot data
      - `pid`, `ppid`, `command`, `state`, `cpu_percent`, `rss_mb`, `vms_mb`
      - `threads`, `open_fds`, `age_seconds`
      - `job_id: str | None`, `sheet_num: int | None`
      - `syscall_counts: dict[str, int]`, `syscall_time_pct: dict[str, float]`

    - `GpuMetric` — per-GPU data
      - `index`, `utilization_pct`, `memory_used_mb`, `memory_total_mb`, `temperature_c`

    - `SystemSnapshot` — point-in-time complete snapshot
      - `timestamp`, `daemon_pid`
      - System memory fields, load averages
      - `processes: list[ProcessMetric]`
      - `gpus: list[GpuMetric]`
      - `pressure_level`, `running_jobs`, `active_sheets`
      - `zombie_count`, `zombie_pids`

    - `ProcessEvent` — lifecycle event
      - `timestamp`, `pid`, `event_type` (spawn/exit/signal/kill/oom)
      - `exit_code`, `signal_num`, `job_id`, `sheet_num`, `details`

    - `Anomaly` — detected anomaly
      - `timestamp`, `anomaly_type` (memory_spike/runaway_process/zombie/fd_exhaustion)
      - `pid`, `job_id`, `sheet_num`, `description`, `severity`
      - `metric_value`, `threshold`

    - `ResourceEstimate` — scheduling hint
      - `estimated_peak_memory_mb`, `estimated_cpu_seconds`, `confidence`

    **File 2: `src/mozart/daemon/profiler/storage.py`**

    Create `MonitorStorage` class:
    - `__init__(self, db_path: Path, jsonl_path: Path | None = None)`
    - `async def initialize()` — create tables + indexes (use the exact schema from the design doc)
    - `async def write_snapshot(snapshot: SystemSnapshot)` — insert into snapshots + process_metrics
    - `async def write_event(event: ProcessEvent)` — insert into process_events
    - `async def read_snapshots(since: float, limit: int = 100) -> list[SystemSnapshot]`
    - `async def read_events(since: float, limit: int = 100) -> list[ProcessEvent]`
    - `async def read_process_history(pid: int, since: float) -> list[ProcessMetric]`
    - `async def read_job_resource_profile(job_id: str) -> dict` — aggregate per-job
    - `async def cleanup(retention: RetentionConfig)` — apply retention policy
    - `def append_jsonl(snapshot: SystemSnapshot)` — write one NDJSON line with rotation
    - Use `aiosqlite` for async SQLite access

    Make sure to use `run_in_executor` or `aiosqlite` for non-blocking I/O.
    All SQLite operations must not block the event loop.

    **Output to:** {{ workspace }}/02-models-storage.md
    Include: files created, class summary, import verification.

    {% elif instance == 2 %}
    {# ═══════════════ GPU PROBE + STRACE MANAGER ═══════════════ #}

    You are implementing **GPU probing and strace management**.

    **File 1: `src/mozart/daemon/profiler/gpu_probe.py`**

    Create `GpuProbe` class (static methods, same pattern as SystemProbe):

    - `get_gpu_metrics() -> list[GpuMetric]`
      - Try pynvml first: `nvmlInit()`, iterate devices, get utilization/memory/temp
      - Fallback: shell `nvidia-smi --query-gpu=utilization.gpu,memory.used,memory.total,temperature.gpu --format=csv,noheader`
      - Graceful return `[]` if no GPU / no drivers
    - Handle all import/runtime errors gracefully (no GPU is normal)
    - `_pynvml_available: bool` flag set at import time

    **File 2: `src/mozart/daemon/profiler/strace_manager.py`**

    Create `StraceManager` class:

    - `__init__(self, enabled: bool = True)`
    - `async def attach(pid: int) -> bool` — spawn `strace -c -p PID -e trace=all` as subprocess
      - Track the strace subprocess PID
      - If strace not available, log warning and return False
    - `async def detach(pid: int) -> dict[str, Any] | None` — send SIGINT to strace, parse output
      - Parse the strace -c summary table format into `{syscall_name: count}` and `{syscall_name: time_pct}`
    - `async def attach_full_trace(pid: int, output_file: Path) -> bool` — on-demand `strace -f -t -p PID -o output_file`
    - `async def detach_all()` — cleanup all strace processes
    - Track attached PIDs in a dict: `_attached: dict[int, subprocess.Process]`
    - Parse strace -c output format:
      ```
      % time     seconds  usecs/call     calls    errors syscall
      ------ ----------- ----------- --------- --------- ----------------
       40.12    0.123456          82      1500           write
       28.33    0.087654          27      3200           read
      ```
    - Handle: strace not installed, permission denied, process already exited

    For both files:
    - Follow the existing `SystemProbe` pattern (try primary → fallback → graceful None)
    - Use `asyncio.create_subprocess_exec` for subprocess management
    - Register strace PIDs with ProcessGroupManager for cleanup

    **Output to:** {{ workspace }}/02-probes.md
    Include: files created, capability detection results, edge cases handled.

    {% elif instance == 3 %}
    {# ═══════════════ ANOMALY DETECTION + NEW PATTERN TYPES ═══════════════ #}

    You are implementing **anomaly detection and learning system extensions**.

    **File 1: `src/mozart/daemon/profiler/anomaly.py`**

    Create `AnomalyDetector` class:

    - `__init__(self, config: AnomalyConfig)` — thresholds from config
    - `detect(current: SystemSnapshot, history: list[SystemSnapshot]) -> list[Anomaly]`
      - **Memory spike**: RSS increased >50% (configurable) in last N snapshots (30s window)
      - **Runaway process**: Any child >90% CPU for >60s (configurable)
      - **Zombie detected**: zombie_count > 0
      - **FD exhaustion**: Any process with open_fds > 1000
      - **Memory pressure**: System available memory < 10% of total
    - Each anomaly includes: type, severity (info/warning/critical), affected PID/job, description

    **File 2: Extend `src/mozart/learning/patterns.py`**

    Add two new PatternTypes to the existing enum:

    ```python
    RESOURCE_ANOMALY = "resource_anomaly"
    """Resource anomaly detected during execution (memory spike, zombie, OOM)."""

    RESOURCE_CORRELATION = "resource_correlation"
    """Learned correlation between resource usage and outcomes."""
    ```

    Add guidance templates for these new types:
    ```python
    PatternType.RESOURCE_ANOMALY: "⚡ Resource anomaly: {desc} (seen {freq}x){trust}",
    PatternType.RESOURCE_CORRELATION: "📊 Resource pattern: {desc}{trust}",
    ```

    **File 3: Extend `src/mozart/daemon/config.py`**

    Add `ProfilerConfig` section to `DaemonConfig` as an optional field:
    ```python
    profiler: ProfilerConfig = ProfilerConfig()
    ```
    Import from `profiler.models`. Make it work with existing config loading.

    **Verify:**
    ```bash
    python -c "
    from mozart.learning.patterns import PatternType
    print('RESOURCE_ANOMALY:', PatternType.RESOURCE_ANOMALY.value)
    print('RESOURCE_CORRELATION:', PatternType.RESOURCE_CORRELATION.value)
    "
    pytest tests/test_validation_checks.py -x -q --tb=short 2>&1 | tail -5
    ```

    **Output to:** {{ workspace }}/02-anomaly-patterns.md
    Include: anomaly types, detection thresholds, new pattern types, config changes.

    {% endif %}

    {% elif stage == 3 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 3: PROFILER COLLECTOR + DAEMON WIRING                              ║
    ║  "Connect the pieces and wire into the daemon lifecycle"                  ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    Read the foundation outputs:
    - {{ workspace }}/02-models-storage.md
    - {{ workspace }}/02-probes.md
    - {{ workspace }}/02-anomaly-patterns.md
    Read `docs/plans/2026-02-23-mozart-monitor-htop-design.md`

    **File 1: `src/mozart/daemon/profiler/collector.py`**

    Create `ProfilerCollector` class — the central orchestrator:

    - `__init__(self, config: ProfilerConfig, monitor: ResourceMonitor, pgroup: ProcessGroupManager, event_bus: EventBus, manager: JobManager | None = None)`
    - `async def start()` — initialize storage, start collection loop, start strace manager
    - `async def stop()` — stop loop, detach all strace, flush storage
    - `async def collect_snapshot() -> SystemSnapshot` — gather all metrics:
      1. System memory from `SystemProbe.get_memory_mb()` + `/proc/meminfo`
      2. Per-process metrics from `psutil.Process.children(recursive=True)`
      3. GPU metrics from `GpuProbe.get_gpu_metrics()`
      4. Map PIDs to job_id/sheet_num via `pgroup`/`manager`
      5. Get strace summaries from `StraceManager` for each attached PID
      6. Get pressure level from monitor/backpressure
    - Collection loop:
      1. Collect snapshot
      2. Write to storage (SQLite + JSONL)
      3. Run anomaly detection
      4. Publish anomalies to EventBus as `monitor.anomaly` events
      5. Attach strace to new child processes, detach from exited ones
      6. Sleep for interval
    - Handle process lifecycle events from EventBus:
      - Subscribe to `sheet.started` → attach strace to new PID
      - Subscribe to `sheet.completed`/`sheet.failed` → record exit event, detach strace

    **File 2: `src/mozart/daemon/profiler/__init__.py`**

    Export: `ProfilerCollector`, `MonitorStorage`, `GpuProbe`, `StraceManager`,
    `AnomalyDetector`, `SystemSnapshot`, `ProcessMetric`, `ProcessEvent`, `Anomaly`

    **File 3: Wire into `src/mozart/daemon/process.py`**

    In `DaemonProcess.run()`, after the monitor is started (step 8):
    1. Create `ProfilerCollector` with config, monitor, pgroup, event_bus, manager
    2. Start it: `await self._profiler.start()`
    3. In shutdown: `await self._profiler.stop()` before `await self._monitor.stop()`

    Register new IPC methods:
    - `daemon.top` → returns latest snapshot as JSON
    - `daemon.top.stream` → returns JSONL path for streaming
    - `daemon.events` → returns recent process events

    **File 4: Add `monitor.anomaly` event type to `src/mozart/daemon/types.py`**

    Add to ObserverEvent documentation that `monitor.anomaly` events have:
    ```python
    {"event": "monitor.anomaly", "data": {"anomaly_type": "memory_spike", ...}}
    ```

