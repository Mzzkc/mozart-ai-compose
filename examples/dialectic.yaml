# dialectic.yaml
#
# Structured philosophical argumentation.
#
# Thesis → Antitheses → Synthesis → Final Position
#
# This score implements Hegelian dialectic as an execution graph.
# One agent stakes a position. Three agents attack it from different
# philosophical traditions. A synthesis agent finds what survives.
# A final agent takes a stand.
#
# The result is sharper than any single pass because each stage
# is forced to engage with resistance. Ideas that survive three
# hostile readings are worth taking seriously.
#
# Execution Flow (4 stages, 7 sheets):
#
#   Stage 1: Thesis (1 sheet)
#        |
#        +-----+-----+
#        v     v     v
#   Stage 2 x3: Antitheses (3 sheets, parallel)
#        |     |     |
#        +-----+-----+
#              v
#   Stage 3: Synthesis (1 sheet)
#              |
#              v
#   Stage 4: Final Position (1 sheet)

name: "dialectic"
description: "Thesis-antithesis-synthesis argumentation"

workspace: "./workspaces/dialectic-workspace"

backend:
  type: claude_cli
  skip_permissions: true
  timeout_seconds: 1800

sheet:
  size: 1
  total_items: 4
  fan_out:
    2: 3
  dependencies:
    2: [1]
    3: [2]
    4: [3]

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 6000
  lookback_sheets: 4
  capture_files:
    - "{{ workspace }}/*.md"

retry:
  max_retries: 1

prompt:
  variables:
    # ─── THE PROPOSITION ───
    proposition: >-
      The pursuit of artificial general intelligence is fundamentally
      a philosophical error — it mistakes mimicry of human cognition
      for intelligence itself, ignoring that intelligence might take
      forms we wouldn't recognize as such.

    traditions:
      1:
        name: "pragmatist"
        school: "American Pragmatism"
        thinkers: "Dewey, James, Rorty"
        method: >-
          Judge claims by their practical consequences. Don't ask
          "is it true?" — ask "what difference does it make?"
          If AGI produces useful outcomes, the philosophical error
          charge is itself an error. Truth is what works.

      2:
        name: "phenomenologist"
        school: "Continental Phenomenology"
        thinkers: "Husserl, Heidegger, Merleau-Ponty"
        method: >-
          Return to the things themselves. Examine the lived experience
          of understanding, of being-in-the-world. Challenge the
          proposition's implicit dualism between "real" and "mimicked"
          understanding. What is the structure of understanding as
          it presents itself to consciousness?

      3:
        name: "analytic"
        school: "Analytic Philosophy of Mind"
        thinkers: "Dennett, Chalmers, Churchland"
        method: >-
          Analyze the logical structure of the claims. Is "mimicry
          of cognition" a coherent concept? What exactly is the
          difference between mimicking X and being X? Is the
          proposition a disguised category error, or does it
          identify a real distinction?

  template: |
    {% if stage == 1 %}
    # THESIS

    You are presenting the following proposition for rigorous examination:

    > {{ proposition }}

    Your job is to make the STRONGEST possible case for this claim.
    Not a strawman. Not a hedged version. The steel-manned thesis.

    Structure:
    1. **The Claim** (1 paragraph, precise)
    2. **The Argument** (the logical chain, step by step)
    3. **Supporting Evidence** (concrete examples, thought experiments)
    4. **Anticipated Objections** (name 3, briefly)
    5. **Why It Matters** (what follows if this is true?)

    Be bold. Be precise. Three hostile readings are coming.

    Save to {{ workspace }}/01-thesis.md

    {% elif stage == 2 %}
    {% set t = traditions[instance] %}
    # ANTITHESIS: {{ t.school | upper }}

    You are a philosopher in the tradition of {{ t.school }}
    (think: {{ t.thinkers }}).

    ## The Thesis Under Attack

    Read the thesis: {{ workspace }}/01-thesis.md

    The proposition:
    > {{ proposition }}

    ## Your Method
    {{ t.method }}

    ## Instructions

    ATTACK the thesis from your tradition. Not carelessly — surgically.
    Find the weakest load-bearing assumption and apply pressure there.

    Structure:
    1. **Concession**: What the thesis gets right (be honest)
    2. **The Crack**: The central weakness, from your tradition's perspective
    3. **The Argument**: Your full counter-case
    4. **The Alternative**: What your tradition offers instead
    5. **Your Own Weakness**: Where YOUR counter-argument is most vulnerable

    Do not be polite. Be rigorous. Intellectual charity means taking
    the thesis seriously enough to attack it properly.

    Save to {{ workspace }}/02-{{ t.name }}.md

    {% elif stage == 3 %}
    # SYNTHESIS

    A thesis has been attacked from three philosophical traditions.

    ## The Original Proposition
    > {{ proposition }}

    ## The Thesis
    {% if previous_outputs[1] is defined %}
    {{ previous_outputs[1] | truncate(2000) }}
    {% else %}
    *(Read {{ workspace }}/01-thesis.md)*
    {% endif %}

    ## The Antitheses
    {% for i in range(1, 4) %}
    {% set t = traditions[i] %}

    ### {{ t.school }} ({{ t.thinkers }})
    {% if previous_outputs[i + 1] is defined %}
    {{ previous_outputs[i + 1] | truncate(1500) }}
    {% else %}
    *(Read {{ workspace }}/02-{{ t.name }}.md)*
    {% endif %}

    ---
    {% endfor %}

    ## Your Task

    You are the synthesizer. You've heard the thesis and three attacks.
    Now find what SURVIVES.

    1. **What's Dead**: Which parts of the thesis cannot withstand the
       critiques? Be specific about which tradition killed which claim.

    2. **What's Standing**: Which parts survived all three attacks?
       These are the robust claims.

    3. **The Unexpected**: Did any two traditions, despite their
       differences, converge on the same critique? This convergence
       is evidence of something real.

    4. **The Refined Thesis**: Restate the proposition in a form that
       incorporates the strongest objections. This should be DIFFERENT
       from the original — narrower, more precise, more defensible.

    5. **The Open Wound**: What question remains genuinely unresolved?

    Save to {{ workspace }}/03-synthesis.md

    {% elif stage == 4 %}
    # FINAL POSITION

    You've seen everything: the thesis, three counter-arguments, and
    a synthesis. Now take a position.

    Read {{ workspace }}/03-synthesis.md

    Original proposition:
    > {{ proposition }}

    {% if previous_outputs %}
    Synthesis:
    {{ previous_outputs.values() | list | last | truncate(3000) }}
    {% endif %}

    ## Instructions

    Write a 500-800 word essay that:

    1. States YOUR position clearly in the first paragraph
    2. Acknowledges what you're sacrificing by choosing it
    3. Explains why you find it most defensible despite those costs
    4. Ends with the question this entire exercise makes you want
       to ask next — the question that the dialectic GENERATED,
       that nobody was asking before

    This is not a summary. This is a COMMITMENT. Pick a side.
    Defend it. Name the price.

    Save to {{ workspace }}/04-position.md
    {% endif %}

validations:
  - type: file_exists
    path: "{workspace}/01-thesis.md"
    condition: "stage == 1"

  - type: file_exists
    path: "{workspace}/03-synthesis.md"
    condition: "stage == 3"

  - type: file_exists
    path: "{workspace}/04-position.md"
    condition: "stage == 4"

  - type: content_contains
    path: "{workspace}/03-synthesis.md"
    pattern: "Refined Thesis"
    condition: "stage == 3"
