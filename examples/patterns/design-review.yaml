# design-review.yaml
#
# Pattern: Rashomon Gate composed with Fan-out + Synthesis
#
# A reusable score for evaluating design documents through multiple
# analytical frames. Five TDF-aligned reviewers examine the SAME document
# from DIFFERENT perspectives (computational, scientific, cultural,
# experiential, meta). A synthesis stage categorizes findings by
# agreement level — convergent issues are systemic, divergent issues
# are trade-offs the author must decide. A final verdict distills
# everything into an actionable report.
#
# Why Rashomon Gate (not plain Fan-out): Every instance examines the
# SAME artifact — it's the analytical FRAME that varies, not the input.
# The pattern of agreement across frames reveals more than any single
# analysis. Plain fan-out divides work; Rashomon Gate multiplies
# perspectives on the same evidence.
#
# Why NOT Source Triangulation: Triangulation divides SOURCES (code vs
# docs vs tests). Here, there's one source (the design doc) examined
# through different lenses. The analytical frame, not the evidence, is
# what varies.
#
# Usage:
#   1. Set `doc` to the path of your design document
#   2. Optionally set `project_context` for domain-aware review
#   3. mzt run examples/design-review.yaml
#
# Execution Flow (4 movements, 8 sheets):
#
#   Movement 1: Comprehension (1 sheet)
#        |
#        +----+----+----+----+----+
#        v    v    v    v    v
#   Movement 2 x5: TDF Reviews (5 voices, parallel)
#        |    |    |    |    |
#        +----+----+----+----+
#                 v
#   Movement 3: Gap Synthesis (1 sheet)
#                 v
#   Movement 4: Verdict & Amendments (1 sheet)
#
# Each reviewer is adversarial but constructive — they find real
# problems, not nitpicks. The synthesis finds where reviewers
# AGREE (systemic issues) and where they DISAGREE (trade-offs
# the author needs to decide).
#
# Output:
#   01-comprehension.md  — structured breakdown of the design
#   02-review-*.md       — five independent TDF reviews
#   03-gap-synthesis.md  — cross-review analysis with priority stack
#   04-verdict.md        — final verdict, amendments, completeness score

name: "design-review"
description: "Multi-perspective design document review using Rashomon Gate pattern — five analytical frames with gap synthesis"

workspace: "../../workspaces/design-review-workspace"

instrument: claude-code
instrument_fallbacks:
  - anthropic_api
instrument_config:
  timeout_seconds: 1200

# Movement declarations — names appear in `mzt status` output
movements:
  1:
    name: "Comprehension"
  2:
    name: "TDF Reviews"
  3:
    name: "Gap Synthesis"
  4:
    name: "Verdict & Amendments"

parallel:
  enabled: true
  max_concurrent: 5
  stagger_delay_ms: 500

sheet:
  size: 1
  total_items: 4
  prelude:
    - file: "{{ doc }}"
      as: context
  fan_out:
    2: 5
  dependencies:
    2: [1]
    3: [2]
    4: [3]

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 8000
  lookback_sheets: 7
  capture_files:
    - "{{ workspace }}/*.md"

retry:
  max_retries: 1

prompt:
  variables:
    # ─────────────────────────────────────────────────────
    # [CHANGE THIS: path to the design document to review]
    # Point this at any design doc — architecture proposal,
    # API spec, system design, RFC, etc.
    # ─────────────────────────────────────────────────────
    doc: "[CHANGE THIS: path/to/your-design-document.md]"

    # [CHANGE THIS: brief project description for context-aware review]
    # Optional. If empty, the review focuses purely on the document.
    # Providing project context helps reviewers assess fit with existing
    # patterns, naming conventions, and architectural constraints.
    project_context: ""

    reviewers:
      1:
        name: "computational"
        code: "COMP"
        focus: >-
          You review for technical correctness and completeness.
          Data flows, component interfaces, state management,
          error paths, concurrency, and edge cases. You care about
          whether the design WORKS — not whether it's elegant.
        checklist: >-
          - Are all components defined with clear responsibilities?
          - Are interfaces between components specified?
          - Are data flows traceable end-to-end?
          - Are error/failure paths designed, not just happy paths?
          - Are concurrency and state consistency addressed?
          - Are there missing components the design implies but doesn't define?
          - Could an engineer implement this without guessing?

      2:
        name: "scientific"
        code: "SCI"
        focus: >-
          You review for testability, measurability, and evidence.
          Claims should be falsifiable. Decisions should cite reasoning.
          Success criteria should be measurable. You care about whether
          the design can be VALIDATED — not whether it sounds good.
        checklist: >-
          - Are success criteria defined and measurable?
          - Are design decisions justified with reasoning?
          - Are claims falsifiable or are they vague aspirations?
          - Is there a testing strategy that covers the design's claims?
          - Are there metrics to determine if the system works?
          - What would FAILURE look like, and how would you detect it?

      3:
        name: "cultural"
        code: "CULT"
        focus: >-
          You review for consistency with the project's identity,
          naming conventions, metaphors, and developer experience.
          You care about whether the design FITS — with the project's
          culture, existing patterns, and the people who will use it.
        checklist: >-
          - Is naming consistent with project conventions?
          - Does the design extend existing patterns or fight them?
          - Is the mental model coherent and learnable?
          - Are there terms that could confuse contributors?
          - Does the design respect the project's stated values?
          - Will the people building this understand WHY, not just WHAT?

      4:
        name: "experiential"
        code: "EXP"
        focus: >-
          You review from the perspective of everyone who touches
          this system: the end user, the developer implementing it,
          the agent receiving its output, the operator debugging it.
          You care about whether the design FEELS right to use.
        checklist: >-
          - What is the user's first experience? Is it designed or accidental?
          - What happens when things go wrong? Is the error experience designed?
          - What does the agent actually read? Is there a rendered example?
          - How does a developer debug a misconfiguration?
          - Is the happy path obvious and the failure path recoverable?
          - What cognitive load does this put on each persona?

      5:
        name: "meta"
        code: "META"
        focus: >-
          You review the design's assumptions, blind spots, and
          epistemic risks. What does the design take for granted?
          What would invalidate the whole approach? What questions
          should have been asked but weren't?
        checklist: >-
          - What assumptions does the design make that it doesn't state?
          - What would falsify the entire approach?
          - Are there circular dependencies or bootstrap problems?
          - What does the design NOT cover that it should acknowledge?
          - Is the scope appropriate, or is it over/under-ambitious?
          - What are the second-order effects the design ignores?

  template: |
    {% macro review_file(name) %}{{ workspace }}/02-review-{{ name }}.md{% endmacro %}

    {% if stage == 1 %}
    # Design Document Comprehension

    A design document has been injected above as context. Read it thoroughly.

    {% if project_context %}
    ## Project Context
    {{ project_context }}
    {% endif %}

    ## Your Task

    Produce a structured comprehension of the design:

    1. **Summary** (3-5 sentences): What is this design proposing?

    2. **Component Inventory**: List every component, system, or concept
       the design defines. For each: name, responsibility, dependencies.

    3. **Flow Map**: Trace the primary data/control flows end-to-end.
       Where does input enter? What transforms it? Where does output go?

    4. **Decision Log**: What design decisions are stated? What trade-offs
       are acknowledged? What alternatives were considered?

    5. **Scope Boundary**: What does the design explicitly say it does NOT
       cover? Are there implicit scope boundaries it doesn't state?

    6. **Open Questions**: What does the design leave unresolved? Are these
       intentional deferrals or gaps?

    7. **Reviewer Prep**: For each of the five review lenses (COMP, SCI,
       CULT, EXP, META), note 2-3 specific areas of the design that lens
       should focus on. Direct the reviewers to the most relevant sections.

    Save to {{ workspace }}/01-comprehension.md

    {% elif stage == 2 %}
    {% set reviewer = reviewers[instance] %}
    # TDF REVIEW: {{ reviewer.code }} — {{ reviewer.name | upper }}

    {{ reviewer.focus }}

    ## The Design
    The full design document was injected above as context. The comprehension
    stage has produced a structured breakdown — read it at
    {{ workspace }}/01-comprehension.md for the component inventory,
    flow map, and specific areas flagged for your lens.

    {% if project_context %}
    ## Project Context
    {{ project_context }}
    {% endif %}

    ## Your Review Checklist
    {{ reviewer.checklist }}

    ## Instructions

    You are an adversarial reviewer. Your job is to find REAL problems —
    not nitpicks, not style preferences, not "it would be nice if."
    Every issue you raise must be:
    - **Specific**: point to the exact section or component
    - **Consequential**: explain what breaks or degrades if unfixed
    - **Actionable**: suggest a concrete fix or clarifying question

    Structure your review:

    ### Verdict
    One of: APPROVE | APPROVE WITH NOTES | REQUEST CHANGES | REJECT
    One paragraph explaining your verdict.

    ### Strengths (2-4)
    What the design gets RIGHT from your lens. Be specific.

    ### Issues (ranked by severity)
    For each issue:
    - **Section**: Where in the design
    - **Problem**: What's wrong or missing
    - **Impact**: What breaks if unfixed
    - **Fix**: Concrete suggestion

    ### Risks
    Things that aren't wrong but could go wrong. Probability and impact.

    ### Required Amendments
    The minimum changes needed before you'd approve. If your verdict is
    APPROVE, this section should say "None."

    Save to {{ review_file(reviewer.name) }}

    {% elif stage == 3 %}
    # Gap Synthesis

    Five TDF-aligned reviewers have evaluated this design:

    {% for i in range(1, 6) %}
    {% set reviewer = reviewers[i] %}
    Read {{ review_file(reviewer.name) }} for the {{ reviewer.code }} review.
    {% endfor %}

    Also read {{ workspace }}/01-comprehension.md for the component inventory
    and flow map.

    ## Your Task

    Synthesize ALL five reviews into a unified gap analysis:

    ### 1. Convergent Issues
    Where do multiple reviewers flag the SAME problem? These are systemic
    gaps. For each: which reviewers flagged it, what's the core issue, and
    what's the fix.

    ### 2. Divergent Assessments
    Where do reviewers DISAGREE? One says it's fine, another says it's
    broken. For each: what's the tension, which perspective is more
    compelling, and what should the author decide.

    ### 3. Completeness Matrix
    Score each major section/component of the design:
    - **Fully specified**: An engineer could implement without guessing
    - **Partially specified**: Major decisions made, details missing
    - **Underspecified**: Significant gaps that would require design work
    - **Missing**: Something the design should cover but doesn't

    ### 4. Priority Stack
    Rank ALL issues from all reviewers by impact. Top 5 are blockers
    (fix before implementing). Next 5 are important (fix during implementation).
    Rest are enhancements (fix when convenient).

    ### 5. Verdict Distribution
    Tally the five verdicts. If any reviewer said REJECT, explain why
    and whether you agree. Produce an overall recommendation.

    Save to {{ workspace }}/03-gap-synthesis.md

    {% elif stage == 4 %}
    # Verdict & Amendments

    Read all previous outputs:
    - {{ workspace }}/01-comprehension.md
    - {{ workspace }}/03-gap-synthesis.md
    {% for i in range(1, 6) %}
    {% set reviewer = reviewers[i] %}
    - {{ review_file(reviewer.name) }}
    {% endfor %}

    ## Your Task

    Produce the FINAL review report. This is what the design author reads.

    ### Overall Verdict
    APPROVE | APPROVE WITH AMENDMENTS | REQUEST CHANGES | REJECT

    One paragraph. Be direct.

    ### Executive Summary
    3-5 bullet points: the most important findings across all reviewers.

    ### Required Amendments (if any)
    Numbered list. Each amendment:
    - What to change
    - Why (which reviewer(s) identified it, what breaks without it)
    - Suggested text or approach

    ### Recommended Improvements
    Things that aren't blockers but would strengthen the design.
    Numbered, brief.

    ### What the Design Gets Right
    3-5 specific strengths. Reviewers identified these — surface them
    so the author knows what to preserve.

    ### Completeness Score
    Rate overall design completeness: X/10
    Brief justification.

    Save to {{ workspace }}/04-verdict.md

    {% endif %}

validations:
  # ── Movement 1: Comprehension ──────────────────────────
  - type: file_exists
    path: "{workspace}/01-comprehension.md"
    condition: "stage == 1"
    description: "Comprehension document created"

  - type: content_contains
    path: "{workspace}/01-comprehension.md"
    pattern: "Component Inventory"
    condition: "stage == 1"
    description: "Comprehension includes component inventory"

  - type: content_contains
    path: "{workspace}/01-comprehension.md"
    pattern: "Flow Map"
    condition: "stage == 1"
    description: "Comprehension includes flow map"

  - type: content_contains
    path: "{workspace}/01-comprehension.md"
    pattern: "Reviewer Prep"
    condition: "stage == 1"
    description: "Comprehension includes reviewer preparation guidance"

  # ── Movement 2: TDF Reviews (per-instance + pre-synthesis) ──
  # Per-instance: catch failures immediately at the instance that caused them
  - type: file_exists
    path: "{workspace}/02-review-computational.md"
    condition: "stage == 2 and instance == 1"
    stage: 1
    description: "Computational review file created"

  - type: content_contains
    path: "{workspace}/02-review-computational.md"
    pattern: "Verdict"
    condition: "stage == 2 and instance == 1"
    stage: 2
    description: "Computational review contains verdict"

  - type: file_exists
    path: "{workspace}/02-review-scientific.md"
    condition: "stage == 2 and instance == 2"
    stage: 1
    description: "Scientific review file created"

  - type: content_contains
    path: "{workspace}/02-review-scientific.md"
    pattern: "Verdict"
    condition: "stage == 2 and instance == 2"
    stage: 2
    description: "Scientific review contains verdict"

  - type: file_exists
    path: "{workspace}/02-review-cultural.md"
    condition: "stage == 2 and instance == 3"
    stage: 1
    description: "Cultural review file created"

  - type: content_contains
    path: "{workspace}/02-review-cultural.md"
    pattern: "Verdict"
    condition: "stage == 2 and instance == 3"
    stage: 2
    description: "Cultural review contains verdict"

  - type: file_exists
    path: "{workspace}/02-review-experiential.md"
    condition: "stage == 2 and instance == 4"
    stage: 1
    description: "Experiential review file created"

  - type: content_contains
    path: "{workspace}/02-review-experiential.md"
    pattern: "Verdict"
    condition: "stage == 2 and instance == 4"
    stage: 2
    description: "Experiential review contains verdict"

  - type: file_exists
    path: "{workspace}/02-review-meta.md"
    condition: "stage == 2 and instance == 5"
    stage: 1
    description: "Meta review file created"

  - type: content_contains
    path: "{workspace}/02-review-meta.md"
    pattern: "Verdict"
    condition: "stage == 2 and instance == 5"
    stage: 2
    description: "Meta review contains verdict"

  # Pre-synthesis gate: verify all 5 reviews exist with expected structure
  - type: command_succeeds
    command: "test $(ls {workspace}/02-review-*.md 2>/dev/null | wc -l) -ge 5"
    condition: "stage == 3"
    description: "All five TDF review files exist before synthesis"

  - type: command_succeeds
    command: "test $(grep -l 'Verdict' {workspace}/02-review-*.md 2>/dev/null | wc -l) -ge 5"
    condition: "stage == 3"
    description: "All five TDF reviews contain a Verdict section"

  - type: command_succeeds
    command: "test $(grep -l 'Issues' {workspace}/02-review-*.md 2>/dev/null | wc -l) -ge 5"
    condition: "stage == 3"
    description: "All five TDF reviews contain an Issues section"

  - type: command_succeeds
    command: "test $(grep -l 'Required Amendments' {workspace}/02-review-*.md 2>/dev/null | wc -l) -ge 5"
    condition: "stage == 3"
    description: "All five TDF reviews contain Required Amendments"

  # ── Movement 3: Gap Synthesis ──────────────────────────
  - type: file_exists
    path: "{workspace}/03-gap-synthesis.md"
    condition: "stage == 3"
    description: "Gap synthesis document created"

  - type: content_contains
    path: "{workspace}/03-gap-synthesis.md"
    pattern: "Convergent Issues"
    condition: "stage == 3"
    description: "Synthesis identifies convergent issues across reviewers"

  - type: content_contains
    path: "{workspace}/03-gap-synthesis.md"
    pattern: "Priority Stack"
    condition: "stage == 3"
    description: "Synthesis includes prioritized issue ranking"

  - type: content_contains
    path: "{workspace}/03-gap-synthesis.md"
    pattern: "Completeness Matrix"
    condition: "stage == 3"
    description: "Synthesis includes completeness assessment per component"

  # ── Movement 4: Verdict & Amendments ───────────────────
  - type: file_exists
    path: "{workspace}/04-verdict.md"
    condition: "stage == 4"
    description: "Final verdict document created"

  - type: content_contains
    path: "{workspace}/04-verdict.md"
    pattern: "Overall Verdict"
    condition: "stage == 4"
    description: "Verdict contains overall assessment"

  - type: content_contains
    path: "{workspace}/04-verdict.md"
    pattern: "Executive Summary"
    condition: "stage == 4"
    description: "Verdict contains executive summary"

  - type: content_contains
    path: "{workspace}/04-verdict.md"
    pattern: "Required Amendments"
    condition: "stage == 4"
    description: "Verdict contains required amendments"

  - type: content_contains
    path: "{workspace}/04-verdict.md"
    pattern: "Completeness Score"
    condition: "stage == 4"
    description: "Verdict contains completeness score"
