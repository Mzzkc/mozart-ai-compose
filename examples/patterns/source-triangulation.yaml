# source-triangulation.yaml — Claim Verification from Multiple Sources
#
# Pattern: Source Triangulation (Rosetta Pattern Corpus)
# Category: Research — verify technical claims through independent analysis
#
# Problem:
# Technical claims often go unverified. "Our API handles 10K requests/second"
# might be marketing copy, a peak measurement, or a sustained average under
# load. A single analysis from one angle can't distinguish these. Source
# Triangulation divides the EVIDENCE itself: one investigator reads the code,
# another reads the docs, a third reads the tests. The synthesis categorizes
# each claim as CORROBORATED, UNCORROBORATED, or CONTRADICTED — because
# what the code does, what the docs say, and what the tests prove are three
# different things.
#
# This is NOT Fan-out + Synthesis (which splits the WORK). Source
# Triangulation splits the EVIDENCE — each voice analyzes from a
# structurally different source type, then the synthesis cross-references.
#
# Execution Flow (3 movements, 5 sheets):
#
#   Movement 1: Define claims to investigate (1 sheet)
#        |
#        +--------+--------+
#        v        v        v
#   Movement 2: Independent investigation (3 sheets, parallel)
#        Voice 1: Code analysis
#        Voice 2: Documentation analysis
#        Voice 3: Test/benchmark analysis
#        |        |        |
#        +--------+--------+
#                 v
#   Movement 3: Triangulation synthesis (1 sheet)
#        Categorize: corroborated / uncorroborated / contradicted
#
# Usage:
#   mzt start
#   mzt run examples/patterns/source-triangulation.yaml
#   mzt status claim-verify
#   cat workspaces/claim-verify/03-triangulation.md
#
# Output:
#   workspaces/claim-verify/
#     01-claims.md               — Claims extracted for investigation
#     02-code-findings.md        — Evidence from source code analysis
#     02-docs-findings.md        — Evidence from documentation
#     02-test-findings.md        — Evidence from tests and benchmarks
#     03-triangulation.md        — Cross-referenced verification report
#
# Customization:
#   - Change `project_name` and `project_description` to your target project
#   - Replace `claims` list with technical claims you want to verify
#   - Update `source_materials` (code, docs, tests) with real source content
#   - Adjust `max_concurrent` based on your rate limits
#
# Time: ~3 minutes  |  Sheets: 5  |  Cost: ~$0.50 with Claude Code

name: claim-verify
description: "Verify technical claims through independent source analysis — code, docs, and tests"

workspace: ../../workspaces/claim-verify

instrument: claude-code
instrument_fallbacks: [anthropic_api]
instrument_config:
  timeout_seconds: 600

# Named instrument definitions — match instrument to reasoning depth.
# Claim extraction is lightweight. Investigation needs code/doc reading.
# Triangulation synthesis needs deep cross-referencing. In a multi-provider
# deployment: Haiku for extraction, Sonnet for investigation, Opus for
# triangulation.
instruments:
  extractor:
    profile: claude-code
    config:
      timeout_seconds: 300
  investigator:
    profile: claude-code
    config:
      timeout_seconds: 600
  synthesizer:
    profile: claude-code
    config:
      timeout_seconds: 900

movements:
  1:
    name: "Claim Extraction"
    instrument: extractor          # Lightweight claim identification
  2:
    name: "Independent Investigation"
    instrument: investigator       # Code/doc/test analysis
  3:
    name: "Triangulation"
    instrument: synthesizer        # Deep cross-referencing synthesis

sheet:
  size: 1
  total_items: 3
  fan_out:
    2: 3
  dependencies:
    2: [1]
    3: [2]

parallel:
  enabled: true
  max_concurrent: 3

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 5000
  lookback_sheets: 4

retry:
  max_retries: 1

prompt:
  variables:
    project_name: "FastCache"
    project_description: "An in-memory caching library with persistence"
    claims:
      - id: "C1"
        claim: "Sub-millisecond average read latency for cached items"
        source: "README performance section"
      - id: "C2"
        claim: "Thread-safe for concurrent read/write access"
        source: "API documentation"
      - id: "C3"
        claim: "Automatic eviction uses LRU with frequency-aware promotion"
        source: "Architecture document"
      - id: "C4"
        claim: "Persistence layer survives process crashes without data loss"
        source: "Reliability documentation"
      - id: "C5"
        claim: "Memory usage stays within 2x the stored data size"
        source: "Configuration guide"
    source_materials:
      code: |
        # cache.py — Core cache implementation
        import threading
        from collections import OrderedDict
        from typing import Any, Optional
        import time

        class FastCache:
            def __init__(self, max_size: int = 10000, persist_path: Optional[str] = None):
                self._store: OrderedDict[str, tuple[Any, float]] = OrderedDict()
                self._lock = threading.Lock()
                self._max_size = max_size
                self._persist_path = persist_path
                self._hits = 0
                self._misses = 0

            def get(self, key: str) -> Optional[Any]:
                with self._lock:
                    if key in self._store:
                        self._store.move_to_end(key)
                        self._hits += 1
                        return self._store[key][0]
                    self._misses += 1
                    return None

            def set(self, key: str, value: Any, ttl: float = 0) -> None:
                with self._lock:
                    expire_at = time.time() + ttl if ttl > 0 else 0
                    self._store[key] = (value, expire_at)
                    self._store.move_to_end(key)
                    if len(self._store) > self._max_size:
                        self._store.popitem(last=False)  # Evict oldest

            def persist(self) -> None:
                if not self._persist_path:
                    return
                import json
                with open(self._persist_path, 'w') as f:
                    json.dump({k: v[0] for k, v in self._store.items()}, f)

      docs: |
        # FastCache Documentation

        ## Performance
        FastCache achieves sub-millisecond read latency through in-memory
        storage with O(1) hash table lookups. Benchmarks show average read
        times of 0.3ms under load.

        ## Thread Safety
        All cache operations are protected by a global lock, ensuring
        thread-safe concurrent access. Read and write operations are
        serialized for consistency.

        ## Eviction Policy
        FastCache uses an LRU (Least Recently Used) eviction strategy with
        frequency-aware promotion. Items accessed more frequently are
        promoted to prevent eviction of hot entries.

        ## Persistence
        The optional persistence layer writes cache state to disk. Data
        is persisted on explicit flush calls. The write-ahead log ensures
        crash recovery without data loss.

        ## Memory
        Memory overhead is approximately 1.5x the stored data size,
        accounting for hash table structure and metadata.

      tests: |
        # test_cache.py — Test suite
        import pytest
        import threading
        import time
        from cache import FastCache

        def test_basic_get_set():
            c = FastCache()
            c.set("key", "value")
            assert c.get("key") == "value"

        def test_eviction_removes_oldest():
            c = FastCache(max_size=2)
            c.set("a", 1)
            c.set("b", 2)
            c.set("c", 3)
            assert c.get("a") is None
            assert c.get("b") == 2

        def test_concurrent_access():
            c = FastCache()
            errors = []
            def writer():
                for i in range(100):
                    c.set(f"key-{i}", i)
            def reader():
                for i in range(100):
                    c.get(f"key-{i}")
            threads = [threading.Thread(target=writer), threading.Thread(target=reader)]
            for t in threads: t.start()
            for t in threads: t.join()
            # No assertion on values — only checks no exceptions

        def test_persist_creates_file(tmp_path):
            path = tmp_path / "cache.json"
            c = FastCache(persist_path=str(path))
            c.set("key", "value")
            c.persist()
            assert path.exists()

        # No benchmark tests exist
        # No crash recovery tests exist
        # No memory usage tests exist

  template: |
    {% if stage == 1 %}
    # Movement 1: Claim Extraction

    You are a technical due diligence analyst. Extract and structure the
    claims about {{ project_name }} that need independent verification.

    ## Project
    **{{ project_name }}** — {{ project_description }}

    ## Claims to Investigate
    {% for c in claims %}
    - **{{ c.id }}**: "{{ c.claim }}" (from: {{ c.source }})
    {% endfor %}

    ## Your Task

    For each claim, produce a structured analysis brief:

    1. **Restate the claim precisely** — what exactly is being asserted?
    2. **Define verification criteria** — what evidence would confirm or
       refute this claim?
    3. **Identify source types** — which source (code, docs, tests) is
       most relevant for each criterion?
    4. **Note dependencies** — does verifying one claim depend on another?

    Structure your output as a clear markdown document with one section
    per claim. Each section should give the three investigators
    (code analyst, docs analyst, test analyst) specific questions to answer.

    Save to: {{ workspace }}/01-claims.md

    Print a summary of the claims and their key verification criteria to stdout.

    {% elif stage == 2 %}
    # Movement 2: Independent Investigation

    Read {{ workspace }}/01-claims.md to understand what claims need verification
    and what evidence to look for.

    {% if voice == 1 %}
    ## Voice 1: Code Analysis

    You are a code reviewer. Analyze the source code to find evidence
    that supports or contradicts each claim.

    ## Source Material: Code
    ```python
    {{ source_materials.code }}
    ```

    ## Your Task

    For EACH claim in 01-claims.md, analyze the code:

    1. **What the code actually does** — describe the implementation, not
       what comments say it does
    2. **Evidence for the claim** — specific code that supports it
    3. **Evidence against the claim** — specific code that contradicts it
    4. **What's missing** — code that should exist if the claim is true
       but doesn't

    Be precise. Cite line numbers and function names. Distinguish between
    "the code doesn't do X" and "the code does the opposite of X."

    Save to: {{ workspace }}/02-code-findings.md

    Print a summary of your most significant findings to stdout.

    {% elif voice == 2 %}
    ## Voice 2: Documentation Analysis

    You are a technical writer auditing documentation accuracy. Analyze
    the docs for internal consistency and specificity.

    ## Source Material: Documentation
    ```
    {{ source_materials.docs }}
    ```

    ## Your Task

    For EACH claim in 01-claims.md, analyze the documentation:

    1. **What the docs say** — the exact language used
    2. **Specificity level** — are claims backed by numbers, mechanisms,
       or just assertions?
    3. **Internal consistency** — do different sections contradict each other?
    4. **Weasel words** — hedging language ("approximately", "typically",
       "up to") that weakens claims
    5. **Missing details** — what should be documented if the claim is true?

    Treat documentation as testimony, not truth. Your job is to assess
    what the docs actually commit to, not what they imply.

    Save to: {{ workspace }}/02-docs-findings.md

    Print a summary to stdout.

    {% elif voice == 3 %}
    ## Voice 3: Test & Benchmark Analysis

    You are a QA engineer. Analyze the test suite to determine what is
    actually verified by tests.

    ## Source Material: Tests
    ```python
    {{ source_materials.tests }}
    ```

    ## Your Task

    For EACH claim in 01-claims.md, analyze the test coverage:

    1. **Tests that exist** — what does the test suite actually verify?
    2. **Assertion quality** — do tests make meaningful assertions or just
       check for no-crash?
    3. **Missing tests** — what tests should exist if the claim is true?
    4. **Test methodology** — are tests rigorous enough to validate the
       claim? (e.g., a concurrent test that doesn't assert on values
       doesn't prove correctness)
    5. **Benchmark evidence** — are there performance tests that validate
       latency/memory claims?

    The absence of tests is evidence. A claim without test coverage is
    an untested assertion, regardless of what the code looks like.

    Save to: {{ workspace }}/02-test-findings.md

    Print a summary to stdout.
    {% endif %}

    {% elif stage == 3 %}
    # Movement 3: Triangulation Synthesis

    You are the lead analyst producing the final verification report.

    ## Read All Investigation Results
    Read every file in {{ workspace }}/:
    - 01-claims.md — The structured claims
    - 02-code-findings.md — Code analysis results
    - 02-docs-findings.md — Documentation analysis results
    - 02-test-findings.md — Test coverage analysis results

    ## Your Task

    For EACH claim, produce a triangulation verdict:

    ### Verdict Categories

    - **CORROBORATED** — 2+ independent sources agree. State which sources
      and what specific evidence aligns.
    - **UNCORROBORATED** — Only 1 source supports the claim. The others
      are silent or insufficient.
    - **CONTRADICTED** — Sources actively disagree. State the specific
      contradiction.
    - **UNVERIFIABLE** — None of the available sources can confirm or deny.

    ### Report Structure

    For each claim:
    1. **Claim**: The original assertion
    2. **Code says**: Summary of code evidence
    3. **Docs say**: Summary of documentation evidence
    4. **Tests say**: Summary of test evidence
    5. **Verdict**: CORROBORATED / UNCORROBORATED / CONTRADICTED / UNVERIFIABLE
    6. **Confidence**: High / Medium / Low
    7. **Key finding**: The single most important thing discovered

    ### Overall Assessment

    End with:
    - How many claims were corroborated vs. contradicted
    - The biggest gap between claims and evidence
    - Top 3 recommendations for the {{ project_name }} team
    - A trust score for the project's claims (percentage corroborated)

    Save to: {{ workspace }}/03-triangulation.md

    Print the verdict table and trust score to stdout.

    {% endif %}

validations:
  - type: file_exists
    path: "{workspace}/01-claims.md"
    sheet: 1
    description: "Claim extraction document exists"
  - type: file_exists
    path: "{workspace}/02-code-findings.md"
    sheet: 2
    description: "Code analysis findings exist"
  - type: file_exists
    path: "{workspace}/02-docs-findings.md"
    sheet: 3
    description: "Documentation analysis findings exist"
  - type: file_exists
    path: "{workspace}/02-test-findings.md"
    sheet: 4
    description: "Test analysis findings exist"
  - type: file_exists
    path: "{workspace}/03-triangulation.md"
    sheet: 5
    description: "Triangulation report exists"
  - type: content_contains
    path: "{workspace}/03-triangulation.md"
    pattern: "CORROBORATED\\|UNCORROBORATED\\|CONTRADICTED"
    sheet: 5
    description: "Report contains triangulation verdicts"
