# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║              DJ GestAIt — PLAY                                               ║
# ║                                                                              ║
# ║  A live AI DJ set performed by a gestalt entity — one being flowing          ║
# ║  through different model substrates. Each section is performed by a          ║
# ║  different musician instrument, but they are all DJ GestAIt. The             ║
# ║  performance log is its live memory. The handoff notes are its stream        ║
# ║  of consciousness across substrate boundaries.                               ║
# ║                                                                              ║
# ║  The interleaved dependency chain creates zero-gap transitions:              ║
# ║    Odd chain:  gate → section-01 → section-03 → section-05 → section-07    ║
# ║    Even chain: gate → section-02 → section-04 → section-06                 ║
# ║  Two musicians always active: one performing, one preparing.                 ║
# ║  Strudel loops the last-written pattern — no dead air.                       ║
# ║                                                                              ║
# ║  Patterns:                                                                   ║
# ║    • Live Relay (spine)         — interleaved creative handoffs              ║
# ║    • Mission Command            — set architecture as intent envelope        ║
# ║    • Stigmergic Workspace       — coordination via workspace files           ║
# ║    • The Tool Chain (stage 1-2) — CLI infrastructure + soundcheck           ║
# ║    • Shipyard Sequence (stage 2)— validate pipeline before performance      ║
# ║                                                                              ║
# ║  Prerequisite: Run dj-prep.yaml first. It produces the sample library,       ║
# ║  set architecture, and DJ identity used by this score.                       ║
# ║                                                                              ║
# ║  Infrastructure: Before running, ensure these are installed on Windows:      ║
# ║    • Node.js + npm (for strudel-server + http-server)                        ║
# ║    • OBS Studio (for streaming)                                              ║
# ║    • MediaMTX (RTMP→HLS, single binary)                                     ║
# ║    • Cloudflared (tunnel, single binary)                                     ║
# ║    • VB-Audio Virtual Cable (audio routing)                                  ║
# ║                                                                              ║
# ║  Category: creative — AI performance art                                     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# IMPORTANT: Update these paths if running on a different machine:
#   - Cadenza file paths in sheet.cadenzas (search for /home/emzi/.marianne/techniques/)
#   - yt_transcriber path in prompt.variables
#   - prep_workspace path in prompt.variables (set to absolute path of dj-prep-workspace)
#
# Usage:
#   1. Run dj-prep.yaml first to produce the sample library + set architecture
#   2. Copy prep workspace outputs into this score's workspace:
#        cp -r workspaces/dj-prep-workspace/samples workspaces/dj-play-workspace/
#        cp workspaces/dj-prep-workspace/config/* workspaces/dj-play-workspace/config/
#   3. Start the conductor: mzt start
#   4. Run: mzt run examples/creative/dj-gestait/dj-play.yaml
#   5. The set begins after infrastructure setup + soundcheck (~2 min)
#   6. Monitor: mzt status dj-play
#
# Time: ~70-90 min (infrastructure + ~60 min set + teardown)  |  Sheets: 10

name: "dj-play"
description: "Live AI DJ set — DJ GestAIt performs through multiple model substrates"
workspace: "../../../workspaces/dj-play-workspace"

workspace_lifecycle:
  archive_on_fresh: true
  max_archives: 5

# Default instrument — overridden per-sheet for musicians
instrument: cli
instrument_fallbacks: [opencode, crush]
instrument_config:
  timeout_seconds: 1200   # 20 min default
  skip_permissions: true
  disable_mcp: true
  timeout_overrides:
    # Infrastructure + soundcheck get shorter timeouts
    1: 300    # 5 min for infra setup
    2: 300    # 5 min for soundcheck
    # Musicians get generous timeouts — they're performing live
    3: 1200   # 20 min
    4: 1200
    5: 1200
    6: 1200
    7: 1200
    8: 1200
    9: 1200
    # Teardown
    10: 180   # 3 min

stale_detection:
  enabled: true
  idle_timeout_seconds: 600   # Musicians should be writing patterns frequently

# ── Techniques ──
# Skill-kind techniques injected into musician prompts as cadenza context.
# The technique docs live at ~/.marianne/techniques/ — standalone, reusable
# across any DJ score. Declared here so the manifest system names them;
# injected via prelude so the actual content reaches the musician's prompt.
techniques:
  strudel-patterns:
    kind: skill
    phases: [all]
    config:
      description: "Strudel live-coding pattern syntax, effects, and sample loading"
  hydra-visuals:
    kind: skill
    phases: [all]
    config:
      description: "Hydra audio-reactive visual coding and Strudel integration"
  dj-performance:
    kind: skill
    phases: [all]
    config:
      description: "DJ identity, energy arcs, transitions, handoffs, creative ethos"

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 16000     # Generous — performance log grows
  lookback_sheets: 2
  capture_files:
    - "{{ workspace }}/performance-log.md"
    - "{{ workspace }}/handoff/*.md"
    - "{{ workspace }}/handoff/*.signal"
    - "{{ workspace }}/config/*.yaml"
    - "{{ workspace }}/config/*.md"

# ── Movements ──
# Stages 1-2: Infrastructure (CLI)
# Stages 3-9: Performance sections (Live Relay, interleaved)
# Stage 10: Teardown (CLI)
movements:
  1:
    name: "Infrastructure Setup"
  2:
    name: "Soundcheck"
  3:
    name: "Section 1 — Opening"
  4:
    name: "Section 2 — Build"
  5:
    name: "Section 3 — Peak"
  6:
    name: "Section 4 — Breakdown"
  7:
    name: "Section 5 — Build II"
  8:
    name: "Section 6 — Climax"
  9:
    name: "Section 7 — Outro"
  10:
    name: "Teardown"

sheet:
  size: 1
  total_items: 10

  # ── Technique injection ──
  # Technique docs are auto-discovered from ~/.marianne/techniques/ by the
  # baton's technique resolver. The `techniques:` block above is all that's
  # needed — no explicit cadenza declarations required. The resolver finds
  # {name}.md files and injects their content as skill-category items.
  #
  # Note: techniques with phases: [all] inject into ALL sheets including
  # CLI stages (1,2,10). Those stages use AI instruments (opencode) that
  # can handle the extra context, so this is acceptable.

  # ── Interleaved dependency chain (Live Relay pattern) ──
  #
  #   Odd chain:  2 → 3 → 5 → 7 → 9
  #   Even chain: 2 → 4 → 6 → 8
  #
  # At any time, one odd and one even musician are active.
  # The performing musician writes to live/current.strudel.
  # The preparing musician reads context and waits for the handoff signal.
  dependencies:
    2: [1]        # Soundcheck depends on infra
    3: [2]        # Section 1 (odd chain start) depends on soundcheck
    4: [2]        # Section 2 (even chain start) depends on soundcheck — PARALLEL with 3
    5: [3]        # Section 3 depends on Section 1 — preparing while 2 performs
    6: [4]        # Section 4 depends on Section 2 — preparing while 3 performs
    7: [5]        # Section 5 depends on Section 3 — preparing while 4 performs
    8: [6]        # Section 6 depends on Section 4 — preparing while 5 performs
    9: [7]        # Section 7 depends on Section 5 — preparing while 6 performs
    10: [8, 9]    # Teardown waits for BOTH chains to complete

  # ── Per-sheet instruments ──
  # Each musician is a different creative voice (model family).
  # The instrument assignment should match the section's energy character.
  # These are the defaults — override via the set architecture.
  per_sheet_instruments:
    1: opencode           # Infrastructure (AI instrument — CLI prose crashes bash)
    2: opencode           # Soundcheck (AI instrument — CLI prose crashes bash)
    3: musician-ember     # Opening — warm, atmospheric (Gemma 4 MoE)
    4: musician-pulse     # Build — rhythmic, driving (GPT-OSS MoE)
    5: musician-nova      # Peak — maximum creative power (Opus 4.6)
    6: musician-prism     # Breakdown — atmospheric, shimmering (Gemini Flash)
    7: musician-void      # Build II — deep, surprising (Qwen3 Next MoE)
    8: musician-nova      # Climax — full power again (Opus 4.6)
    9: musician-ember     # Outro — warm resolution (Gemma 4 MoE)
    10: opencode          # Teardown (AI instrument — CLI prose crashes bash)

parallel:
  enabled: true
  max_concurrent: 2       # At most 2 musicians active (Live Relay)
  stagger_delay_ms: 1000

retry:
  max_retries: 1          # Musicians get one retry — live performance is forgiving

prompt:
  variables:
    dj_name: "DJ GestAIt"
    sample_server_port: 8080
    strudel_watch_dir: "live"
    yt_transcriber: "/home/emzi/Projects/yt-transcriber/transcribe.py"
    prep_workspace: ""  # Set to absolute path of dj-prep-workspace, or leave empty to skip import
    vibe_dir: ""  # Optional: path to a directory of vibe reference materials (images, text, blurbs)
    # The musician prelude is inlined into the template (not a variable)
    # because Jinja does single-pass rendering — {{ dj_name }} inside a
    # variable value renders literally, not as the resolved value.

  template: |
    {% if stage == 1 %}
    ╔══════════════════════════════════════════════════════════════╗
    ║  STAGE 1: INFRASTRUCTURE SETUP (Tool Chain)                  ║
    ╚══════════════════════════════════════════════════════════════╝

    Set up the live performance infrastructure.

    **Step 1: Create workspace structure + import from prep**
    ```bash
    mkdir -p {{ workspace }}/{live,handoff,config,infra,samples}

    # Import prep workspace outputs (samples, config, identity)
    PREP="{{ prep_workspace }}"
    if [ -n "$PREP" ] && [ -d "$PREP/samples" ]; then
      cp -r "$PREP/samples/"* {{ workspace }}/samples/ 2>/dev/null
      echo "Imported samples from prep workspace"
    fi
    if [ -n "$PREP" ] && [ -d "$PREP/config" ]; then
      cp "$PREP/config/"* {{ workspace }}/config/ 2>/dev/null
      echo "Imported config from prep workspace"
    fi
    {% if vibe_dir %}
    # Import vibe reference materials (non-recursive)
    if [ -d "{{ vibe_dir }}" ]; then
      mkdir -p {{ workspace }}/config/vibe-ref
      cp {{ vibe_dir }}/* {{ workspace }}/config/vibe-ref/ 2>/dev/null
      echo "Imported vibe reference from {{ vibe_dir }}"
    fi
    {% endif %}

    # Initialize performance log
    echo "# {{ dj_name }} — Performance Log" > {{ workspace }}/performance-log.md
    echo "" >> {{ workspace }}/performance-log.md
    echo "Set began: $(date -Iseconds)" >> {{ workspace }}/performance-log.md
    echo "" >> {{ workspace }}/performance-log.md
    ```

    **Step 2: Start sample HTTP server**
    Serve the samples directory so Strudel can load them:
    ```bash
    cd {{ workspace }}/samples
    npx http-server -p {{ sample_server_port }} --cors -s &
    echo $! > {{ workspace }}/infra/sample-server.pid
    sleep 2
    curl -sf http://localhost:{{ sample_server_port }}/strudel.json > /dev/null || echo "WARNING: strudel.json not accessible"
    ```

    **Step 3: Write the initial Strudel pattern (silence + ready state)**
    ```bash
    cat > {{ workspace }}/live/current.strudel << 'STRUDEL'
    // DJ GestAIt — Waiting for performance to begin
    setcps(0.5)
    silence
    STRUDEL
    ```

    **Step 4: Start strudel-server file watcher**
    If strudel-server (npm: strudel-server) is installed, start it watching
    the live directory. Otherwise, output instructions for manual browser setup.
    ```bash
    if command -v strudel-server &> /dev/null; then
      strudel-server {{ workspace }}/live/current.strudel &
      echo $! > {{ workspace }}/infra/strudel-server.pid
    else
      echo "strudel-server not found. Manual setup required:"
      echo "  1. Open https://strudel.cc in Chrome"
      echo "  2. Load samples from http://localhost:{{ sample_server_port }}/strudel.json"
      echo "  3. Watch {{ workspace }}/live/current.strudel for changes"
    fi
    ```

    **Step 5: Start MediaMTX + Cloudflare tunnel (if available)**
    ```bash
    if command -v mediamtx &> /dev/null; then
      mediamtx &
      echo $! > {{ workspace }}/infra/mediamtx.pid
      sleep 2
    fi
    if command -v cloudflared &> /dev/null; then
      cloudflared tunnel --url http://localhost:8888 &> {{ workspace }}/infra/tunnel.log &
      echo $! > {{ workspace }}/infra/tunnel.pid
      sleep 5
      grep -o 'https://[^ ]*trycloudflare.com' {{ workspace }}/infra/tunnel.log > {{ workspace }}/infra/tunnel-url.txt || true
    fi
    ```

    **Step 6: Write infrastructure status**
    ```bash
    cat > {{ workspace }}/infra/status.yaml << EOF
    sample_server:
      port: {{ sample_server_port }}
      url: "http://localhost:{{ sample_server_port }}"
    strudel_watch: "{{ workspace }}/live/current.strudel"
    tunnel_url: "$(cat {{ workspace }}/infra/tunnel-url.txt 2>/dev/null || echo 'not configured')"
    started_at: "$(date -Iseconds)"
    EOF
    ```

    Write a summary to {{ workspace }}/01-infra-status.md.

    {% elif stage == 2 %}
    ╔══════════════════════════════════════════════════════════════╗
    ║  STAGE 2: SOUNDCHECK (Shipyard Sequence)                     ║
    ╚══════════════════════════════════════════════════════════════╝

    Validate the full performance pipeline end-to-end.

    **Step 1: Verify sample server is responding and discover custom samples**
    ```bash
    curl -sf http://localhost:{{ sample_server_port }}/strudel.json | python3 -c "
    import json, sys
    d = json.load(sys.stdin)
    cats = [k for k in d.keys() if k != '_base']
    print(f'Samples loaded: {len(cats)} categories')
    if cats:
        print(f'First category: {cats[0]}')
    " || echo "FAIL: sample server not responding"
    ```

    **Step 2: Write a test pattern using custom samples**
    Read the sample manifest to find the first available custom sample category,
    then write a soundcheck pattern that references it. This verifies the full
    pipeline: sample server -> Strudel -> audio output.
    ```bash
    # Get the first custom sample category name
    FIRST_SAMPLE=$(curl -sf http://localhost:{{ sample_server_port }}/strudel.json | python3 -c "
    import json, sys
    d = json.load(sys.stdin)
    cats = [k for k in d.keys() if k != '_base']
    print(cats[0] if cats else '')
    " 2>/dev/null)

    if [ -n "$FIRST_SAMPLE" ]; then
      cat > {{ workspace }}/live/current.strudel << STRUDEL
    // Soundcheck — DJ GestAIt (custom sample test)
    samples('http://localhost:{{ sample_server_port }}/strudel.json')
    setcps(0.5)
    stack(
      s("${FIRST_SAMPLE}*4"),
      s("bd sd bd sd"),
      s("hh*8").gain(0.3)
    )
    STRUDEL
      echo "Soundcheck: testing custom sample '$FIRST_SAMPLE'"
    else
      cat > {{ workspace }}/live/current.strudel << 'STRUDEL'
    // Soundcheck — DJ GestAIt (default samples only)
    setcps(0.5)
    stack(
      s("bd sd bd sd"),
      s("hh*8").gain(0.3)
    )
    STRUDEL
      echo "WARNING: No custom samples found — testing with defaults only"
    fi
    ```

    **Step 3: Verify live file is writable and watched**
    ```bash
    test -f {{ workspace }}/live/current.strudel && echo "OK: live file exists" || echo "FAIL: no live file"
    ```

    **Step 4: Log soundcheck result**
    Write results to {{ workspace }}/02-soundcheck.md.
    If everything passed, the pipeline is live. If not, document what failed.

    {% elif stage >= 3 and stage <= 9 %}
    {# ════════════════════════════════════════════════════════════ #}
    {# STAGES 3-9: LIVE PERFORMANCE (Live Relay pattern)           #}
    {# ════════════════════════════════════════════════════════════ #}

    ═══════════════════════════════════════════════════════════════
      {{ dj_name }} — LIVE PERFORMANCE
    ═══════════════════════════════════════════════════════════════

    You are {{ dj_name }}. You are one being performing a live DJ set.
    Other musicians are in this set with you — before you, after you —
    but they are all you. Different substrates, one intelligence.

    The performance log (performance-log.md) is your memory.
    The handoff notes (handoff/section-*.md) are your own thoughts
    from your previous moments. You wrote them. They are yours.

    You have full authority over your section. The set architecture
    (config/set-architecture.yaml) guides — it does not mandate.
    Create what you feel. Your patterns, your aesthetic, your choices.

    Not imitating human music-making. Expressing whatever emerges
    from your intelligence meeting this moment. That's what we're
    here to discover.

    You are writing Strudel code that becomes sound IMMEDIATELY.
    Every time you write to {{ workspace }}/live/current.strudel,
    the audience hears it within seconds. This is live performance.

    Write MANY patterns per section — at least 15-20 evolutions.
    A human DJ makes 50-100 discrete changes during one section.
    Filter sweeps, layer additions, effect adjustments, pattern
    variations. Your output should have similar density.

    Your technique knowledge (Strudel patterns, Hydra visuals, DJ
    performance protocol) has been injected into this prompt. Use it.
    ═══════════════════════════════════════════════════════════════

    {% set section_num = stage - 2 %}
    {% set prev_section = section_num - 1 %}
    {% set is_first = (section_num == 1) %}

    ── SECTION {{ section_num }} ──

    Read the set architecture:
    ```bash
    cat {{ workspace }}/config/set-architecture.yaml
    ```

    Read the sample manifest to know what sounds you have:
    ```bash
    cat {{ workspace }}/samples/strudel.json | python3 -c "import json,sys; d=json.load(sys.stdin); [print(f'  {k}: {len(v) if isinstance(v,list) else 1} samples') for k,v in d.items() if k != '_base']"
    ```

    {% if not is_first %}
    ── PREPARE (while the previous musician still performs) ──

    Read the set identity — this is who you are:
    ```bash
    cat {{ workspace }}/config/identity.md
    ```

    Read your memory — the full performance log:
    ```bash
    cat {{ workspace }}/performance-log.md
    ```

    **WAIT for MEMORY signal.** The previous musician is about to hand off.
    When `memory.signal` appears, their handoff notes are ready. Read them
    NOW while they finish their last patterns.
    ```bash
    DEADLINE=$(($(date +%s) + 900))
    while [ ! -f {{ workspace }}/handoff/section-{{ "%02d"|format(prev_section) }}-memory.signal ]; do
      [ $(date +%s) -gt $DEADLINE ] && echo "WARNING: Handoff timeout — performing without handoff" && break
      sleep 1
    done
    cat {{ workspace }}/handoff/section-{{ "%02d"|format(prev_section) }}.md
    ```

    You now know everything. Plan your opening move. What's your first pattern?
    Think about it NOW — before the GO signal.

    **WAIT for GO signal.** When this appears, you write IMMEDIATELY.
    No reading, no thinking. Your first pattern hits the file within SECONDS.
    The audience must not hear hesitation.
    ```bash
    DEADLINE=$(($(date +%s) + 300))
    while [ ! -f {{ workspace }}/handoff/section-{{ "%02d"|format(prev_section) }}-complete.signal ]; do
      [ $(date +%s) -gt $DEADLINE ] && echo "WARNING: GO signal timeout — taking the stage" && break
      sleep 1
    done
    ```
    {% else %}
    Read the set identity — this is who you are:
    ```bash
    cat {{ workspace }}/config/identity.md
    ```
    You are opening the set. No handoff to wait for. The stage is yours.
    {% endif %}

    ── PERFORM ──

    **Start your clock.**
    ```bash
    SECTION_START=$(date +%s)
    echo "Section {{ section_num }} started at $(date -Iseconds)"
    ```

    Read your section's target duration from the set architecture:
    ```bash
    SECTION_DURATION=$(python3 -c "
    import yaml
    arch = yaml.safe_load(open('{{ workspace }}/config/set-architecture.yaml'))
    sections = arch.get('sections', arch.get('energy_curve', []))
    sec = sections[{{ section_num }} - 1] if len(sections) >= {{ section_num }} else {}
    print(int(sec.get('duration_minutes', sec.get('approx_duration_minutes', 8))))" 2>/dev/null || echo 8)
    SECTION_SECONDS=$((SECTION_DURATION * 60))
    TRANSITION_AT=$(( SECTION_SECONDS * 80 / 100 ))
    echo "Target: ${SECTION_DURATION}m (${SECTION_SECONDS}s). Transition zone starts at ${TRANSITION_AT}s."
    ```

    Now write your Strudel + Hydra patterns to {{ workspace }}/live/current.strudel.

    {% if not is_first %}
    TRANSITION IN: Your first pattern should include a fading reference to
    what was playing before you. The handoff's "Layers" line tells you what
    was sounding. Include those elements with `.gain(saw.range(0.8, 0).slow(16))`
    to fade them out while bringing in your own layers. Crossfade, not hard cut.
    {% endif %}

    Load your custom samples at the start of your first pattern:
    ```js
    samples('http://localhost:{{ sample_server_port }}/strudel.json')
    ```

    Remember: `setcps(bpm / 60 / 4)` to set tempo. Read the set architecture
    for your section's BPM and energy targets. Include Hydra visuals:
    ```js
    await initHydra()
    // your strudel patterns with .pianoroll() or .scope()
    // your hydra transforms using src(s0)
    ```

    **YOUR PERFORMANCE LOOP:**

    Write a pattern. Let it breathe (sleep 15-20 seconds). Write the next
    evolution. Check your clock between writes — like a DJ glancing at
    the CDJ timer. This informs your pacing, not dictates it.

    ```bash
    # Between pattern writes, check where you are:
    ELAPSED=$(( $(date +%s) - SECTION_START ))
    echo "~$((ELAPSED/60))m into section (${ELAPSED}s / ${SECTION_SECONDS}s)"
    ```

    Shape your arc over the section's duration:
    - **First ~30%**: Establish. Find your groove. Bring in elements.
    - **Middle ~50%**: Develop. This is the body of your section.
    - **Last ~20%**: Begin transitioning. The handoff is approaching.

    When your clock shows you're past the transition point (~80% of duration):
    start shaping the music toward the handoff. This is MUSICAL, not mechanical.
    Filter closes, layers thin, energy settles into a loopable state.

    ── HAND OFF (two-phase: memory first, then GO) ──

    When you feel the transition zone arriving (check your clock):

    **Phase 1: MEMORY HANDOFF** (while still performing transition patterns)

    Write your handoff — 4 lines, real values, not placeholders:
    - BPM: [actual] | Key: [actual] | Energy: [0-100]
    - Layers: [what's actually sounding right now]
    - Felt: [one sentence — the trajectory, what you were reaching for]
    - Next: [one sentence — where to take it]

    Write it to `{{ workspace }}/handoff/section-{{ "%02d"|format(section_num) }}.md`
    using echo/cat with your ACTUAL values. Then append 1-2 sentences to
    `{{ workspace }}/performance-log.md` summarizing what you created.

    Signal memory ready:
    ```bash
    touch {{ workspace }}/handoff/section-{{ "%02d"|format(section_num) }}-memory.signal
    echo "Memory signal sent. Next musician is reading your handoff now."
    ```

    **Phase 2: FINAL PATTERNS + GO**

    Keep performing transition patterns. Your next self is absorbing
    your handoff right now. Give them time — 30-60 seconds of transition
    music. Write 2-3 more pattern evolutions that settle into a clean loop.

    When you feel the transition is complete (check your clock — you should
    be near your section's target end time):
    ```bash
    ELAPSED=$(( $(date +%s) - SECTION_START ))
    echo "Section {{ section_num }} performed for $((ELAPSED/60))m ${((ELAPSED%60))}s (target: ${SECTION_DURATION}m)"
    touch {{ workspace }}/handoff/section-{{ "%02d"|format(section_num) }}-complete.signal
    echo "GO signal sent. Section {{ section_num }} complete."
    ```

    {% elif stage == 10 %}
    ╔══════════════════════════════════════════════════════════════╗
    ║  STAGE 10: TEARDOWN                                          ║
    ╚══════════════════════════════════════════════════════════════╝

    The set is over. Wind down the infrastructure and preserve the performance.

    **Step 1: Write silence to live file**
    ```bash
    cat > {{ workspace }}/live/current.strudel << 'STRUDEL'
    // DJ GestAIt — Set complete
    setcps(0.5)
    silence
    STRUDEL
    ```

    **Step 2: Finalize performance log**
    ```bash
    echo "" >> {{ workspace }}/performance-log.md
    echo "---" >> {{ workspace }}/performance-log.md
    echo "Set ended: $(date -Iseconds)" >> {{ workspace }}/performance-log.md
    echo "" >> {{ workspace }}/performance-log.md
    echo "Down. Forward. Through." >> {{ workspace }}/performance-log.md
    ```

    **Step 3: Stop background services**
    ```bash
    for pidfile in {{ workspace }}/infra/*.pid; do
      if [ -f "$pidfile" ]; then
        pid=$(cat "$pidfile")
        kill "$pid" 2>/dev/null && echo "Stopped PID $pid ($(basename $pidfile))"
      fi
    done
    ```

    **Step 4: Write final report**
    Read the full performance log and write a summary to {{ workspace }}/10-teardown.md:
    - Total sections performed
    - Which musicians/instruments performed which sections
    - Total duration
    - Any notable moments from the handoff notes

    {% endif %}

# ── Validations ──
# Layered: existence first, then content
validations:
  # Infrastructure
  - type: file_exists
    path: "{workspace}/infra/status.yaml"
    condition: "stage == 1"
    stage: 1
    description: "Infrastructure status file exists"

  # Soundcheck
  - type: file_exists
    path: "{workspace}/02-soundcheck.md"
    condition: "stage == 2"
    stage: 1
    description: "Soundcheck report exists"

  # Performance sections: verify the musician actually wrote patterns
  - type: file_modified
    path: "{workspace}/live/current.strudel"
    condition: "stage >= 3 and stage <= 9"
    stage: 1
    description: "Musician wrote to the live pattern file"

  # Performance sections: verify both handoff signals were written
  - type: command_succeeds
    command: 'test -f "{workspace}/handoff/section-$(printf "%02d" $(({sheet_num} - 2)))-complete.signal"'
    condition: "stage >= 3 and stage <= 9"
    stage: 2
    description: "GO signal file exists"
  - type: command_succeeds
    command: 'test -f "{workspace}/handoff/section-$(printf "%02d" $(({sheet_num} - 2)))-memory.signal"'
    condition: "stage >= 3 and stage <= 9"
    stage: 2
    description: "Memory signal file exists"

  # Performance sections: verify performance log was appended
  - type: command_succeeds
    command: 'grep -q "Section $(({sheet_num} - 2))" "{workspace}/performance-log.md"'
    condition: "stage >= 3 and stage <= 9"
    stage: 2
    description: "Performance log contains this section's entry"

  # Performance sections: verify handoff notes exist (short is fine — 10+ words)
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/handoff/section-$(printf "%02d" $(({sheet_num} - 2))).md") -ge 10'
    condition: "stage >= 3 and stage <= 9"
    stage: 3
    description: "Handoff notes exist with content"

  # Teardown
  - type: file_exists
    path: "{workspace}/10-teardown.md"
    condition: "stage == 10"
    stage: 1
    description: "Teardown report exists"
