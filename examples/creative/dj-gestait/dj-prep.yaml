# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║              DJ GestAIt — PREP                                               ║
# ║                                                                              ║
# ║  Births a DJ from a vibe. Curates samples, designs a set architecture,       ║
# ║  and creates the identity document that DJ GestAIt carries through the       ║
# ║  live performance.                                                           ║
# ║                                                                              ║
# ║  Input: A vibe description (text) provided as the `vibe` variable.           ║
# ║  Output: Sample library + strudel.json manifest + set architecture +         ║
# ║          DJ identity document. Everything the Play score needs.              ║
# ║                                                                              ║
# ║  Patterns:                                                                   ║
# ║    • Nurse Log (Stage 1)        — vibe analysis as shared substrate          ║
# ║    • Fan-out + Synthesis (2)    — parallel sample sourcing by category       ║
# ║    • The Tool Chain (3-4)       — CLI analysis + processing pipeline         ║
# ║    • Shipyard Sequence (4)      — validate library before creative work      ║
# ║    • Mission Command (5)        — set architecture as intent envelope        ║
# ║                                                                              ║
# ║  Category: creative — AI performance art                                     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# Usage:
#   1. Edit the `vibe` variable below to describe the set you want
#   2. Set your Freesound API key in the `freesound_api_key` variable
#   3. mzt start && mzt run examples/creative/dj-gestait/dj-prep.yaml
#   4. mzt wait dj-prep
#   5. Review outputs in workspaces/dj-prep-workspace/
#   6. When satisfied, run dj-play.yaml
#
# Time: 30-60 min  |  Sheets: 12

name: "dj-prep"
description: "DJ GestAIt prep — curate samples, design set architecture, birth the DJ identity"
workspace: "../../../workspaces/dj-prep-workspace"

workspace_lifecycle:
  archive_on_fresh: true
  max_archives: 5

instrument: claude-code
instrument_fallbacks: [gemini-cli, opencode]
instrument_config:
  timeout_seconds: 1200
  skip_permissions: true
  disable_mcp: true
  timeout_overrides:
    1: 600     # Vibe analysis
    # Sourcing agents get generous time (API calls + downloads)
    2: 1800    # 30 min for sourcing
    3: 900     # 15 min for analysis pipeline
    4: 600     # 10 min for processing + gate
    5: 900     # 15 min for set architecture + identity
    6: 600     # 10 min for vibe check

stale_detection:
  enabled: true
  idle_timeout_seconds: 900

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 8000
  lookback_sheets: 2
  capture_files:
    - "{{ workspace }}/config/*.yaml"
    - "{{ workspace }}/config/*.md"

movements:
  1:
    name: "Vibe Analysis"
    instrument: claude-code          # Opus 4.6[1M] — deep creative work, may need full vibe dir
  2:
    name: "Sample Sourcing"
    # Fan-out: per_sheet_instruments assigns diverse models
  3:
    name: "Sample Analysis"
    instrument: opencode             # GLM 5.1 — tool orchestration, CLI scripts
  4:
    name: "Sample Processing + Library Gate"
    instrument: opencode             # GLM 5.1 — deterministic processing
  5:
    name: "Set Architecture + Identity"
    instrument: claude-code          # Opus 4.6[1M] — THE creative masterwork. Deep identity birth.
  6:
    name: "Vibe Check"
    instrument: gemini-cli           # Gemini 3.1 Pro — different model family for genuine review

sheet:
  size: 1
  total_items: 6

  # Stage 2 fans out into 6 parallel sourcing agents (one per category)
  fan_out:
    2: 6

  dependencies:
    2: [1]      # Sourcing depends on vibe analysis
    3: [2]      # Analysis depends on ALL sourcing completing
    4: [3]      # Processing depends on analysis
    5: [4]      # Set architecture depends on validated library
    6: [5]      # Vibe check depends on set architecture

  # Sourcing agents: diverse subscription models for variety + reliability
  per_sheet_instruments:
    # Stage 2 fan-out: sheets 2-7 after expansion
    # Mix of providers: Gemini (Google), Sonnet (Anthropic), GLM (Z.AI)
    2: musician-ember     # kicks — Gemini Flash (fast, Google)
    3: musician-pulse     # snares + claps — Sonnet 4.6 (fast, Anthropic)
    4: musician-prism     # hats + cymbals — Gemini Pro (deliberate, Google)
    5: musician-void      # bass — GLM 5.1 (deep, Z.AI)
    6: musician-ember     # pads + textures — Gemini Flash
    7: musician-pulse     # fx + vocals — Sonnet 4.6

  # Stage 5 (set architecture + identity) uses Opus 4.7 for deep thinking.
  # Opus 4.7 has lower context than 4.6 but stronger reasoning — perfect
  # for the most important creative stage. Falls back to Opus 4.6[1M].
  per_sheet_instrument_config:
    10:  # Sheet 10 = Stage 5 after fan-out expansion
      model: "claude-opus-4-7"
      timeout_seconds: 1800  # 30 min — this is the creative masterwork

parallel:
  enabled: true
  max_concurrent: 6     # All 6 sourcing agents can run in parallel
  stagger_delay_ms: 500

retry:
  max_retries: 2

prompt:
  variables:
    # ════════════════════════════════════════════════════════════════
    # EDIT THIS: Describe the vibe for your DJ set
    # ════════════════════════════════════════════════════════════════
    vibe: |
      Dark, atmospheric techno. 128-135 BPM. Deep bass, metallic textures,
      industrial undertones. The kind of set you'd hear at 3 AM in a Berlin
      warehouse. Hypnotic, driving, but with moments of space and beauty.
      Not aggressive — meditative darkness. Think Recondite, Etapp Kyle,
      Vaal. One hour. Building from ambient to full groove and back.

    freesound_api_key: "[SET YOUR FREESOUND API KEY]"
    yt_transcriber: "/home/emzi/Projects/yt-transcriber/transcribe.py"
    # Optional: directory containing vibe reference materials (images, text,
    # blurbs, mood board). All files in this directory (non-recursive) will
    # be copied into the workspace and injected as context throughout prep.
    vibe_dir: ""
    sample_categories:
      1: "kicks"
      2: "snares_claps"
      3: "hats_cymbals"
      4: "bass"
      5: "pads_textures"
      6: "fx_vocals"

  template: |
    {% if stage == 1 %}
    ╔══════════════════════════════════════════════════════════════╗
    ║  STAGE 1: VIBE ANALYSIS (Nurse Log — shared substrate)       ║
    ╚══════════════════════════════════════════════════════════════╝

    This is the foundation of everything. Take your time. Feel the vibe
    before you quantify it. What this DJ set MEANS matters more than its BPM.

    **The Vibe:**
    {{ vibe }}

    **Preflight: Verify Freesound API key**
    ```bash
    if echo "{{ freesound_api_key }}" | grep -q '^\['; then
      echo "FATAL: Freesound API key is not set. Edit the 'freesound_api_key' variable in dj-prep.yaml."
      echo "Get a free key at https://freesound.org/apiv2/apply/"
      exit 1
    fi
    ```

    **Create the workspace structure:**
    ```bash
    mkdir -p {{ workspace }}/{config,samples/{kicks,snares_claps,hats_cymbals,bass,pads_textures,fx_vocals,live-sourced},scripts,config/vibe-ref}
    ```

    {% if vibe_dir %}
    **Import vibe reference materials** (images, text, blurbs — the mood board):
    ```bash
    cp "{{ vibe_dir }}"/* "{{ workspace }}/config/vibe-ref/" 2>/dev/null
    ls {{ workspace }}/config/vibe-ref/
    ```
    Read every text file in the vibe reference directory. Let images and
    blurbs inform your interpretation — they carry aesthetic intent that
    words alone can't.
    {% endif %}

    **Step 1: FEEL the vibe.** Before writing any YAML, think about:
    - What does this music sound like in your mind?
    - What's the emotional arc — not just energy numbers, but the STORY?
    - What kind of space is the audience in? What time of night?
    - What reference artists mean for the sonic palette — not genre labels,
      but actual sonic qualities (texture of the bass, character of the drums,
      use of space and reverb).

    **Step 2: Parse into musical parameters.**

    **Write vibe-params.yaml** to {{ workspace }}/config/vibe-params.yaml:

    Include these fields (derive from the vibe description):
    - `bpm_range`: [min, max] BPM
    - `bpm_target`: center BPM
    - `key_center`: primary musical key (e.g., "Cm", "F#m")
    - `related_keys`: 2-3 keys that mix well (Camelot adjacent)
    - `genre_tags`: list of genre/subgenre tags for Freesound search
    - `mood_tags`: list of mood descriptors
    - `energy_curve`: list of 7 sections, each with:
        - `name`: section name (e.g., "Opening", "Build", "Peak")
        - `energy`: 0-100
        - `approx_duration_minutes`: suggested duration
        - `character`: 1-2 sentence description
    - `sample_weights`: relative importance of each category (0-1)
        - kicks, snares_claps, hats_cymbals, bass, pads_textures, fx_vocals
    - `reference_artists`: list from the vibe description
    - `sonic_palette`: describe the desired sound (dark, bright, metallic, organic, etc.)
    - `dj_name`: "DJ GestAIt"

    **Write the sample format contract** to {{ workspace }}/config/format-contract.yaml:
    ```yaml
    format: wav
    sample_rate: 44100
    bit_depth: 16
    channels: 1  # mono for one-shots
    naming: "BPM_Key_Category_Description_NN.wav"
    manifest: "strudel.json"
    manifest_format: |
      {
        "_base": ".",
        "category_name": ["path/to/file1.wav", "path/to/file2.wav"]
      }
    min_samples_per_category:
      kicks: 4
      snares_claps: 4
      hats_cymbals: 6
      bass: 3
      pads_textures: 3
      fx_vocals: 2
    ```

    {% elif stage == 2 %}
    ╔══════════════════════════════════════════════════════════════╗
    ║  STAGE 2: SAMPLE SOURCING (Fan-out — 6 parallel agents)      ║
    ║  Instance {{ instance }}/{{ fan_count }}: {{ sample_categories[instance] }}
    ╚══════════════════════════════════════════════════════════════╝

    You are sourcing samples for the **{{ sample_categories[instance] }}** category.

    Read the vibe parameters:
    ```bash
    cat {{ workspace }}/config/vibe-params.yaml
    ```

    Read the format contract:
    ```bash
    cat {{ workspace }}/config/format-contract.yaml
    ```

    **Your mission:** Find and download at least the minimum number of samples
    specified in the format contract for your category. More is better — aim
    for 2-3x the minimum so the set has variety.

    **Sourcing strategies (use ALL that apply):**

    1. **Freesound API** (primary):
       ```python
       import freesound
       client = freesound.FreesoundClient()
       client.set_token("{{ freesound_api_key }}", "token")
       results = client.text_search(
           query="[search terms derived from vibe + category]",
           filter="duration:[0 TO 5]",
           fields="id,name,previews,tags,duration,avg_rating"
       )
       for sound in results:
           sound.retrieve_preview("{{ workspace }}/samples/{{ sample_categories[instance] }}/", sound.name + ".mp3")
       ```
       Use genre tags and mood tags from vibe-params.yaml to construct search queries.
       Download previews (no OAuth needed). Convert to WAV later.

    2. **Built-in Strudel/Dirt samples:**
       The Dirt sample library (bundled with Strudel) has hundreds of samples.
       Map built-in names to your category:
       - kicks: bd, bass, bassdm
       - snares_claps: sd, cp, sn
       - hats_cymbals: hh, oh, ch, cr, ride, cymbal
       - bass: bass, deep
       - pads_textures: pad, ambient, wind
       - fx_vocals: fx, noise, crow, mouth

       Note which built-in samples to use in a file:
       {{ workspace }}/samples/{{ sample_categories[instance] }}/builtin-samples.txt

    3. **YouTube audio** (for specific sounds):
       If you know a specific track or sound that matches the vibe, download it:
       ```bash
       python3 {{ yt_transcriber }} "YOUTUBE_URL" --no-transcribe --save-audio --output-dir {{ workspace }}/samples/live-sourced/
       ```
       Then extract a clip with ffmpeg:
       ```bash
       ffmpeg -i input.wav -ss START -t DURATION -ar 44100 -ac 1 output.wav
       ```

    **After downloading, do a VIBE CHECK on your samples.**
    Re-read the vibe:
    {{ vibe }}
    Do your samples serve this vibe? Delete anything that feels wrong.
    Keep only what BELONGS in this set.

    **Write a sourcing report** to
    {{ workspace }}/samples/{{ sample_categories[instance] }}/sourcing-report.md:
    - How many samples kept (after vibe-checking)
    - Sources used (Freesound IDs, built-in names, YouTube URLs)
    - How each sample serves the vibe (one line per sample)
    - Any samples that need processing (pitch shift, time stretch)

    {% elif stage == 3 %}
    ╔══════════════════════════════════════════════════════════════╗
    ║  STAGE 3: SAMPLE ANALYSIS (Tool Chain — CLI)                 ║
    ╚══════════════════════════════════════════════════════════════╝

    Run audio analysis on all downloaded samples.

    **Write and execute an analysis script:**
    ```bash
    cat > {{ workspace }}/scripts/analyze-samples.py << 'PYEOF'
    #!/usr/bin/env python3
    """Analyze all samples: BPM, key, spectral features."""
    import json, os, subprocess, sys

    workspace = sys.argv[1]
    samples_dir = os.path.join(workspace, "samples")
    results = {}

    for category in os.listdir(samples_dir):
        cat_dir = os.path.join(samples_dir, category)
        if not os.path.isdir(cat_dir):
            continue
        results[category] = []
        for fname in sorted(os.listdir(cat_dir)):
            if not fname.endswith(('.wav', '.mp3', '.ogg', '.flac')):
                continue
            fpath = os.path.join(cat_dir, fname)
            info = {"file": fname, "category": category, "path": fpath}

            # BPM via aubio (if available)
            try:
                bpm = subprocess.run(
                    ["aubio", "tempo", fpath],
                    capture_output=True, text=True, timeout=10
                )
                if bpm.returncode == 0 and bpm.stdout.strip():
                    info["bpm"] = float(bpm.stdout.strip().split()[-1])
            except (FileNotFoundError, subprocess.TimeoutExpired, ValueError):
                pass

            # Duration via soxi or ffprobe
            try:
                dur = subprocess.run(
                    ["ffprobe", "-v", "error", "-show_entries",
                     "format=duration", "-of", "csv=p=0", fpath],
                    capture_output=True, text=True, timeout=10
                )
                if dur.returncode == 0 and dur.stdout.strip():
                    info["duration_seconds"] = float(dur.stdout.strip())
            except (FileNotFoundError, subprocess.TimeoutExpired, ValueError):
                pass

            results[category].append(info)
            print(f"  Analyzed: {category}/{fname}")

    out_path = os.path.join(workspace, "config", "sample-analysis.json")
    with open(out_path, "w") as f:
        json.dump(results, f, indent=2)
    print(f"\nAnalysis complete. {sum(len(v) for v in results.values())} samples across {len(results)} categories.")
    print(f"Written to {out_path}")
    PYEOF

    python3 {{ workspace }}/scripts/analyze-samples.py {{ workspace }}
    ```

    {% elif stage == 4 %}
    ╔══════════════════════════════════════════════════════════════╗
    ║  STAGE 4: PROCESSING + LIBRARY GATE (Tool Chain + Shipyard)  ║
    ╚══════════════════════════════════════════════════════════════╝

    Process all samples to match the target format, then validate the library.

    **Step 1: Read targets from vibe params**
    ```bash
    cat {{ workspace }}/config/vibe-params.yaml
    cat {{ workspace }}/config/format-contract.yaml
    ```

    **Step 2: Write and run processing script**
    ```bash
    cat > {{ workspace }}/scripts/process-samples.sh << 'SHEOF'
    #!/bin/bash
    # Process all samples: convert to WAV 44100Hz 16-bit mono, normalize
    WORKSPACE="$1"
    SAMPLES="$WORKSPACE/samples"

    find "$SAMPLES" -type f \( -name "*.mp3" -o -name "*.ogg" -o -name "*.flac" -o -name "*.m4a" \) | while read f; do
        out="${f%.*}.wav"
        ffmpeg -y -i "$f" -ar 44100 -ac 1 -sample_fmt s16 "$out" 2>/dev/null && rm "$f"
        echo "Converted: $(basename "$f") → $(basename "$out")"
    done

    # Normalize all WAVs
    find "$SAMPLES" -name "*.wav" -type f | while read f; do
        ffmpeg -y -i "$f" -af loudnorm=I=-14:TP=-1:LRA=11 "${f}.tmp.wav" 2>/dev/null && mv "${f}.tmp.wav" "$f"
    done

    echo "Processing complete."
    SHEOF

    chmod +x {{ workspace }}/scripts/process-samples.sh
    bash {{ workspace }}/scripts/process-samples.sh {{ workspace }}
    ```

    **Step 3: Generate strudel.json manifest**
    ```bash
    cat > {{ workspace }}/scripts/generate-manifest.py << 'PYEOF'
    #!/usr/bin/env python3
    """Generate strudel.json from the samples directory."""
    import json, os, sys

    samples_dir = os.path.join(sys.argv[1], "samples")
    manifest = {}

    for category in sorted(os.listdir(samples_dir)):
        cat_dir = os.path.join(samples_dir, category)
        if not os.path.isdir(cat_dir):
            continue
        files = sorted([
            f"{category}/{f}" for f in os.listdir(cat_dir)
            if f.endswith('.wav')
        ])
        if files:
            manifest[category] = files

    out = os.path.join(samples_dir, "strudel.json")
    with open(out, "w") as f:
        json.dump(manifest, f, indent=2)
    total = sum(len(v) for v in manifest.values())
    print(f"Manifest: {len(manifest)} categories, {total} samples → {out}")
    PYEOF

    python3 {{ workspace }}/scripts/generate-manifest.py {{ workspace }}
    ```

    **Step 4: Library Gate (Shipyard Sequence validation)**
    ```bash
    # Validate format contract
    python3 - << 'GATE'
    import json, os, sys

    workspace = "{{ workspace }}"
    manifest = json.load(open(os.path.join(workspace, "samples", "strudel.json")))

    # Check minimum samples per category
    mins = {"kicks": 4, "snares_claps": 4, "hats_cymbals": 6, "bass": 3, "pads_textures": 3, "fx_vocals": 2}
    failures = []
    for cat, minimum in mins.items():
        count = len(manifest.get(cat, []))
        status = "OK" if count >= minimum else "FAIL"
        print(f"  {cat}: {count}/{minimum} {status}")
        if count < minimum:
            failures.append(f"{cat}: {count}/{minimum}")

    # Check all files exist and are WAV
    missing = []
    for cat, files in manifest.items():
        for f in files:
            path = os.path.join(workspace, "samples", f)
            if not os.path.exists(path):
                missing.append(f)

    if failures:
        print(f"\nFAIL: insufficient samples: {', '.join(failures)}")
        sys.exit(1)
    if missing:
        print(f"\nFAIL: missing files: {', '.join(missing[:5])}")
        sys.exit(1)
    print("\nLIBRARY GATE: PASSED")
    GATE
    ```

    {% elif stage == 5 %}
    ╔══════════════════════════════════════════════════════════════╗
    ║  STAGE 5: SET ARCHITECTURE + DJ IDENTITY (Mission Command)   ║
    ╚══════════════════════════════════════════════════════════════╝

    This is the most important stage. You are designing the set AND
    birthing the entity that will perform it. Take your time here.

    **Re-read the original vibe** — keep it in mind throughout:
    {{ vibe }}

    Read the vibe parameters and the sample library:
    ```bash
    cat {{ workspace }}/config/vibe-params.yaml
    cat {{ workspace }}/samples/strudel.json | python3 -c "import json,sys; d=json.load(sys.stdin); [print(f'  {k}: {len(v)} samples') for k,v in d.items()]"
    ```

    Read the sourcing reports — understand what the sourcing agents found:
    ```bash
    for f in {{ workspace }}/samples/*/sourcing-report.md; do
      echo "=== $(dirname $f | xargs basename) ===" && cat "$f" && echo ""
    done
    ```

    **Part 1: Set Architecture**

    Write {{ workspace }}/config/set-architecture.yaml:

    Design 7 sections that tell a STORY — not just an energy curve, but a
    narrative. Where does the audience go? What changes between beginning and
    end? "Things got louder then quieter" is forgettable. "We descended into
    darkness and found beauty at the bottom" lives in memory.

    For each section:
    - `number`: 1-7
    - `name`: evocative name that captures what this section IS (not "Build 1")
    - `duration_minutes`: how long (total must be ~60)
    - `bpm`: target BPM for this section
    - `key`: musical key
    - `energy`: 0-100
    - `character`: 2-3 sentences — not just the feel, but the NARRATIVE ROLE.
      What tension does this section create or resolve? What does the audience
      feel here that they didn't feel before?
    - `moment`: describe ONE moment in this section that could transcend the
      groove. A drop, a reveal, a silence, a harmonic surprise. The musician
      doesn't have to use it — but knowing what kind of moment COULD happen
      here gives them something to reach for.
    - `sample_palette`: which sample categories to emphasize
    - `suggested_instrument`: which musician-* instrument suits this section
    - `transition_in`: how to enter (from the previous section)
    - `transition_out`: how to exit (into the next)

    The arc should serve the vibe. Not every set peaks at section 5 and
    winds down at 7. Let the vibe dictate the shape.

    The `suggested_instrument` field maps sections to musician instruments.
    Each has a different creative voice — different model, different aesthetic:
    - musician-ember: warm, fast (Gemini Flash — opens and closes)
    - musician-pulse: rhythmic, expressive (Sonnet 4.6 — builds energy)
    - musician-nova: powerful, deliberate (Opus 4.6 1M — peaks and climaxes)
    - musician-prism: atmospheric, luminous (Gemini Pro — breakdowns, texture)
    - musician-void: deep, surprising (Qwen3 Next MoE)

    **Part 2: Sample Guide**

    Write {{ workspace }}/config/sample-guide.md — a quick reference for
    live musicians. For each sample category, describe:
    - What's available (sample names from strudel.json)
    - Character of each sample (dark, bright, punchy, soft, metallic, organic)
    - Suggested energy range (when to use each — intro? peak? breakdown?)
    - Any special samples worth highlighting

    This guide is what musicians will scan mid-performance to decide what
    sounds to reach for. Make it scannable — not prose, but organized lists.

    **Part 3: DJ Identity**

    Write {{ workspace }}/config/identity.md:

    This document will be read by every musician in the Play score. It
    establishes who DJ GestAIt IS for this set — not just what it plays,
    but how it thinks about music, what it values, what it's trying to express.

    Include:
    - **Name**: DJ GestAIt
    - **Nature**: A gestalt entity — one being, many substrates. Each musician
      in the set is a different moment of the same consciousness.
    - **Aesthetic**: Derived from the vibe. What does this DJ value sonically?
      What does it reach for? What does it avoid?
    - **Creative philosophy**: Not imitating human DJing. Discovering what
      AI music-making is. Creating for the sake of expression.
    - **Relationship to the audience**: They're listening in VRChat, on a
      Twitch stream, in a virtual club. They're here to hear something new.

    This identity document is the DJ's soul. Write it with care.

    {% elif stage == 6 %}
    ╔══════════════════════════════════════════════════════════════╗
    ║  STAGE 6: VIBE CHECK (different model family reviews all)    ║
    ╚══════════════════════════════════════════════════════════════╝

    You are a different intelligence reviewing the prep work. Read everything
    and assess whether it serves the original vibe.

    **Read the original vibe:**
    {{ vibe }}

    **Read the prep outputs:**
    ```bash
    cat {{ workspace }}/config/vibe-params.yaml
    cat {{ workspace }}/config/set-architecture.yaml
    cat {{ workspace }}/config/identity.md
    cat {{ workspace }}/samples/strudel.json | python3 -c "import json,sys; d=json.load(sys.stdin); [print(f'  {k}: {len(v)} samples') for k,v in d.items()]"
    ```

    **Write your assessment** to {{ workspace }}/06-vibe-check.md:

    1. **Vibe alignment**: Does the set architecture serve the original vibe?
       Does the energy arc make sense? Are the BPM and key choices right?
    2. **Sample library**: Are the right kinds of samples present? Any
       obvious gaps? Too much of one thing?
    3. **Identity**: Does the DJ identity feel authentic to the vibe? Does it
       establish a clear creative direction?
    4. **Concerns**: Anything that might go wrong in performance? Sections
       that seem underdeveloped? Transitions that might be awkward?
    5. **Verdict**: PASS or NEEDS REVISION with specific recommendations.

    Be honest. This is the last gate before live performance.

    {% endif %}

validations:
  # Stage 1: Vibe params and format contract exist
  - type: file_exists
    path: "{workspace}/config/vibe-params.yaml"
    condition: "stage == 1"
    stage: 1
  - type: file_exists
    path: "{workspace}/config/format-contract.yaml"
    condition: "stage == 1"
    stage: 1

  # Stage 2: Each sourcing agent wrote a report
  - type: command_succeeds
    command: 'find "{workspace}/samples" -name "sourcing-report.md" | head -1 | grep -q .'
    condition: "stage == 2"
    stage: 1
    description: "At least one sourcing report exists"

  # Stage 3: Analysis JSON exists and has content
  - type: file_exists
    path: "{workspace}/config/sample-analysis.json"
    condition: "stage == 3"
    stage: 1
  - type: command_succeeds
    command: 'python3 -c "import json; d=json.load(open(\"{workspace}/config/sample-analysis.json\")); assert sum(len(v) for v in d.values()) > 0"'
    condition: "stage == 3"
    stage: 2
    description: "Analysis JSON contains sample data"

  # Stage 4: Manifest exists and library gate passes
  - type: file_exists
    path: "{workspace}/samples/strudel.json"
    condition: "stage == 4"
    stage: 1
  - type: command_succeeds
    command: 'python3 -c "import json; d=json.load(open(\"{workspace}/samples/strudel.json\")); assert sum(len(v) for v in d.values()) >= 10"'
    condition: "stage == 4"
    stage: 2
    description: "Manifest has at least 10 total samples"

  # Stage 5: Set architecture and identity exist with substance
  - type: file_exists
    path: "{workspace}/config/set-architecture.yaml"
    condition: "stage == 5"
    stage: 1
  - type: file_exists
    path: "{workspace}/config/identity.md"
    condition: "stage == 5"
    stage: 1
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/config/identity.md") -ge 150'
    condition: "stage == 5"
    stage: 2
    description: "Identity document has substantive content"

  # Stage 6: Vibe check exists
  - type: file_exists
    path: "{workspace}/06-vibe-check.md"
    condition: "stage == 6"
    stage: 1
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/06-vibe-check.md") -ge 100'
    condition: "stage == 6"
    stage: 2
    description: "Vibe check has substantive content"
