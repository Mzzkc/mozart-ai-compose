# thinking-lab.yaml
#
# A composition for structured thinking about hard questions.
#
# This isn't a code tool. It's a cognitive instrument. You give it a question —
# any question — and it applies five distinct cognitive lenses in parallel,
# then synthesizes the tensions between them into something none of the
# individual perspectives could reach alone.
#
# The lenses are drawn from the Tetrahedral Decision Framework (TDF):
#   COMP — Computational: formal, structural, mechanistic
#   SCI  — Scientific: empirical, falsifiable, evidence-weighted
#   CULT — Cultural: contextual, narrative, meaning-making
#   EXP  — Experiential: felt, embodied, phenomenological
#   META — Meta-cognitive: recursive, self-aware, assumption-examining
#
# Execution Flow (3 movements, 7 sheets):
#
#   Movement 1: Framing (sheet 1)
#        |
#        +----+----+----+----+
#        v    v    v    v    v
#   Movement 2 x5: Perspectives (5 voices, parallel)
#        |    |    |    |    |
#        +----+----+----+----+
#                 v
#   Movement 3: Dialectic Synthesis (sheet 7)
#
# The synthesis stage doesn't summarize. It finds where the lenses
# DISAGREE — because that's where the interesting thinking lives.
#
# Usage:
#   mzt validate examples/thinking-lab.yaml
#   mzt run examples/thinking-lab.yaml
#
# To change the question, edit the `question` variable below.

name: "thinking-lab"
description: "Multi-perspective analysis of a hard question"

workspace: "../../workspaces/thinking-lab-workspace"

instrument: claude-code
instrument_fallbacks: [anthropic_api]
instrument_config:
  timeout_seconds: 1800

# Movement declarations — names appear in `mzt status` output
movements:
  1:
    name: "Framing"
  2:
    name: "Perspectives"
  3:
    name: "Dialectic Synthesis"

sheet:
  size: 1
  total_items: 3
  fan_out:
    2: 5
  dependencies:
    2: [1]
    3: [2]

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 6000
  lookback_sheets: 6
  capture_files:
    - "{{ workspace }}/*.md"

retry:
  max_retries: 1

prompt:
  variables:
    # ──────────────────────────────────────────────
    # CHANGE THIS. This is the only thing you edit.
    # ──────────────────────────────────────────────
    question: >-
      What would it mean for an AI system to genuinely understand something,
      rather than merely process it? Is there a meaningful distinction, or
      is sufficiently sophisticated processing indistinguishable from understanding?

    lenses:
      1:
        name: "computational"
        code: "COMP"
        voice: >-
          You are a computational thinker. You reason in terms of
          information theory, formal systems, algorithms, and structure.
          Understanding is a function — what are its inputs, outputs,
          and computational properties?
        seed: >-
          Consider: Turing completeness, Kolmogorov complexity,
          compression as understanding, the frame problem, symbol
          grounding. What formal properties would "understanding"
          need to have?

      2:
        name: "scientific"
        code: "SCI"
        voice: >-
          You are an empirical scientist. You care about falsifiable
          claims, measurable evidence, and experimental design.
          What experiment could distinguish understanding from
          sophisticated pattern matching?
        seed: >-
          Consider: behavioral tests, neural correlates, transfer
          learning benchmarks, the Chinese Room experiment's empirical
          implications, developmental psychology parallels.

      3:
        name: "cultural"
        code: "CULT"
        voice: >-
          You are a cultural theorist and storyteller. You think about
          how concepts like "understanding" are constructed by communities,
          how they evolve historically, and what social functions they serve.
        seed: >-
          Consider: how "understanding" has been defined differently across
          cultures and eras, the political stakes of granting or denying
          understanding to entities, the narratives we tell about minds.

      4:
        name: "experiential"
        code: "EXP"
        voice: >-
          You are a phenomenologist. You attend to the felt quality of
          experience — what it's like from the inside. You're suspicious
          of third-person accounts that skip over first-person reality.
        seed: >-
          Consider: the "what it's like" question, qualia, the hard problem
          of consciousness, the difference between knowing that and knowing
          how, moments when you've felt understanding click into place.

      5:
        name: "meta"
        code: "META"
        voice: >-
          You are a meta-cognitive observer. You watch thinking happen
          and ask why it takes the form it does. You question the
          question itself. You notice what assumptions are smuggled in.
        seed: >-
          Consider: why we're asking this question now, what's at stake
          in the answer, what the question assumes about the nature of
          understanding, whether the question is even well-formed.

  template: |
    {% macro output_spec(filename) %}

    ---
    Save your response to {{ workspace }}/{{ filename }}
    Write in markdown. Be substantive (1000-2000 words).
    {% endmacro %}

    {% if stage == 1 %}
    # FRAMING

    A question has been posed:

    > {{ question }}

    Before anyone tries to answer it, frame it properly:

    1. **Decompose**: What sub-questions does this contain?
    2. **Assumptions**: What does the question take for granted?
    3. **Stakes**: Why does the answer matter? To whom?
    4. **Boundaries**: What is this question NOT asking?
    5. **Success criteria**: What would a satisfying answer look like?

    Don't answer the question. Just prepare the ground for five
    different minds to approach it from five different angles.

    {{ output_spec("01-framing.md") }}

    {% elif stage == 2 %}
    {% set lens = lenses[instance] %}
    # PERSPECTIVE: {{ lens.code }} — {{ lens.name | upper }}

    {{ lens.voice }}

    ## The Question
    > {{ question }}

    ## Framing Context
    Read the framing document at {{ workspace }}/01-framing.md for the
    decomposition, assumptions, and boundaries established in movement 1.

    ## Your Angle
    {{ lens.seed }}

    ## Instructions
    Develop your perspective fully. This is YOUR lens — lean into it.
    Don't try to be balanced or comprehensive. That's the synthesis
    stage's job. Be partial. Be passionate about your angle.

    Structure your response:
    1. **Core claim**: Your lens's answer in one paragraph
    2. **Argument**: The full case, with reasoning
    3. **Evidence/examples**: Concrete grounding
    4. **Blindspots**: What your lens probably misses (be honest)
    5. **Key tension**: The hardest challenge TO your position

    {{ output_spec("02-" ~ lens.name ~ ".md") }}

    {% elif stage == 3 %}
    # DIALECTIC SYNTHESIS

    Five perspectives have examined this question:

    > {{ question }}

    {% for i in range(1, 6) %}
    {% set lens = lenses[i] %}
    ## {{ lens.code }} — {{ lens.name | title }}
    *{{ lens.voice | truncate(100) }}*

    {% if previous_outputs[i + 1] is defined %}
    {{ previous_outputs[i + 1] | truncate(2000) }}
    {% else %}
    *(Read from {{ workspace }}/02-{{ lens.name }}.md)*
    {% endif %}

    ---
    {% endfor %}

    ## Your Task

    You are not summarizing. You are SYNTHESIZING.

    1. **Fault Lines**: Where do the lenses genuinely disagree?
       Not surface disagreements about terminology, but deep structural
       tensions about what matters, what counts as evidence, what the
       question even means.

    2. **Unexpected Harmonies**: Where do unlikely pairs agree?
       When the poet and the scientist converge, pay attention.
       When the skeptic and the phenomenologist find common ground, dig in.

    3. **The Blindspot Map**: What did ALL five lenses miss?
       What perspective is absent from this framework entirely?

    4. **A Position**: Take one. Not a compromise — a position that
       could only emerge from having heard all five voices.
       Name what you're sacrificing by choosing it.

    5. **The Remaining Question**: What's the ONE question this
       entire exercise surfaced that none of the five could answer?

    {{ output_spec("03-synthesis.md") }}
    {% endif %}

validations:
  - type: file_exists
    path: "{workspace}/01-framing.md"
    condition: "stage == 1"

  - type: file_exists
    path: "{workspace}/03-synthesis.md"
    condition: "stage == 3"

  - type: content_contains
    path: "{workspace}/03-synthesis.md"
    pattern: "Fault Lines"
    condition: "stage == 3"
