# hello-marianne.yaml — Your First Marianne Score
#
# This score creates a short interactive fiction experience in three
# movements. Movement 1 generates the world. Movement 2 writes three
# parallel character vignettes. Movement 3 weaves them into a finale
# and presents it as a beautifully designed HTML page you can open
# in your browser.
#
# The result is a visual, immersive reading experience — not a folder
# of text files. Open the-sky-library.html in any browser and see what
# orchestrated AI can produce.
#
# Usage:
#   mzt start                        # Start the conductor
#   mzt run examples/hello-marianne.yaml  # Run the score
#   mzt status hello-marianne           # Watch progress
#   open workspaces/hello-marianne/the-sky-library.html  # Read the result
#
# Output:
#   workspaces/hello-marianne/
#     01-world.md              — The setting (raw material)
#     02-character-1.md        — First vignette (raw material)
#     02-character-2.md        — Second vignette (raw material)
#     02-character-3.md        — Third vignette (raw material)
#     the-sky-library.html     — The finished product: open in browser
#
# Time: ~5 minutes  |  Cost: varies by instrument and model  |  Sheets: 5

name: hello-marianne
description: "Three movements, three characters, one world — your first Marianne score"

workspace: ../../workspaces/hello-marianne

instrument: claude-code
instrument_config:
  timeout_seconds: 600

# Movement declarations — names appear in `mzt status` output
movements:
  1:
    name: "The World"
  2:
    name: "Three Vignettes"
  3:
    name: "The Finale"

sheet:
  size: 1
  total_items: 3
  fan_out:
    2: 3                    # Movement 2 fans out to 3 parallel characters
  dependencies:
    2: [1]                  # Characters depend on world
    3: [2]                  # Finale depends on all characters

parallel:
  enabled: true
  max_concurrent: 3

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 4000
  lookback_sheets: 4

retry:
  max_retries: 1

prompt:
  variables:
    genre: "solarpunk"
    setting: "a floating garden-city above the clouds, fifty years from now"
    themes:
      - "what we owe to the places that made us"
      - "the courage it takes to stay vs the courage it takes to leave"
      - "small acts of repair in a world that's healing"
    characters:
      1:
        name: "Lira"
        role: "a wind-mapper who reads the sky like sheet music"
        secret: "she's been secretly repairing the oldest bridge — the one everyone says should be torn down"
      2:
        name: "Fen"
        role: "a soil-singer who tends the deep gardens where roots hold the city aloft"
        secret: "he's growing something in the lowest garden that shouldn't be possible at this altitude"
      3:
        name: "Cael"
        role: "a memory-keeper who maintains the archive of weather patterns and old songs"
        secret: "she's discovered that the city's founding song contains coordinates to something below the clouds"

  template: |
    {% if stage == 1 %}
    # Movement 1: The World

    You are a fiction writer. Your task is to create the setting for a
    short interconnected story collection.

    ## The Setting
    Genre: {{ genre }}
    Place: {{ setting }}
    Themes: {{ themes | join("; ") }}

    ## Characters Who Live Here
    {% for id, char in characters.items() %}
    - **{{ char.name }}**: {{ char.role }}
    {% endfor %}

    ## Your Task

    Write a vivid, immersive introduction to this world (800-1200 words).
    Make the reader FEEL the place — the light, the sounds, the way air
    moves differently up here. Establish the culture without explaining it.
    Show how the city works through small, specific details: what breakfast
    looks like, how people greet each other, what the children play.

    End with a single paragraph that hints — just hints — that something
    is changing. A shift in the wind. A new sound from below the clouds.
    Something the city hasn't heard in a long time.

    Write the setting document with rich markdown formatting — headers,
    emphasis, evocative section breaks. This is literature, not a report.

    Save to: {{ workspace }}/01-world.md

    {% elif stage == 2 %}
    {% set char = characters[instance] %}
    # Movement 2, Voice {{ instance }}: {{ char.name }}

    You are a fiction writer. You're writing one chapter of an interconnected
    story collection set in a solarpunk floating city.

    ## Read the World First
    Read {{ workspace }}/01-world.md — this is the shared setting that all
    three character stories inhabit. Stay true to its tone and details.

    ## Your Character
    - **Name**: {{ char.name }}
    - **Role**: {{ char.role }}
    - **Secret**: {{ char.secret }}

    ## Themes
    {{ themes | join("; ") }}

    ## Your Task

    Write {{ char.name }}'s vignette (600-1000 words). This is one morning
    in their life — but the morning when things begin to change.

    Requirements:
    - Start in the middle of {{ char.name }}'s daily routine
    - Show their relationship to the city through their work
    - Let their secret emerge naturally, not as exposition
    - End on a moment of decision: something they see or hear that
      connects to the "something changing" from the world document
    - The ending should make the reader want to know what happens next

    Write with literary quality — varied sentence rhythm, sensory detail,
    internal thought. Use markdown formatting: headers, emphasis, section
    breaks where they serve the story.

    Save to: {{ workspace }}/02-character-{{ instance }}.md

    {% elif stage == 3 %}
    # Movement 3: The Finale — A Visual Experience

    You are a fiction writer AND a web designer. You're creating the closing
    chapter of an interconnected story collection AND presenting the entire
    collection as a beautiful, self-contained HTML page.

    ## Read Everything First
    Read all files in {{ workspace }}/:
    - 01-world.md — the shared setting
    - 02-character-1.md — Lira's vignette
    - 02-character-2.md — Fen's vignette
    - 02-character-3.md — Cael's vignette

    ## Your Task

    Create a single self-contained HTML file: `{{ workspace }}/the-sky-library.html`

    This HTML file is a digital literary journal that presents ALL the stories
    in one gorgeous, immersive reading experience. It must include:

    ### Content Structure
    1. **Opening** — The world setting (from 01-world.md), adapted for HTML
    2. **Three character sections** — Each vignette (from 02-character-*.md)
    3. **The Finale** (800-1200 words, NEW content you write now) where all
       three paths converge:
       - Pick up where each vignette left off
       - Bring all three characters to the same place at the same time
       - Their secrets, combined, reveal something larger about the city
       - End on an image, not an answer — open doors rather than close them
       - Reference specific details from each vignette
    4. **Colophon** at the bottom explaining how this was made

    ### Visual Design Requirements
    - Self-contained: ALL CSS inline in a `<style>` tag. No external resources.
    - Typography: Use system font stacks (serif for body text, sans-serif for
      headers). Large, readable body text (18-20px). Generous line-height (1.7+).
    - Color: A muted, atmospheric palette inspired by the solarpunk setting.
      Think warm golds, soft greens, sky blues against a cream or warm-white
      background. Dark text for readability.
    - Layout: Centered content column (max 680px). Generous margins and padding.
      Each section visually separated with decorative dividers (CSS, not images).
    - Character sections: Each character's section should have a subtle visual
      identity — a colored accent border or background tint that distinguishes
      them from each other.
    - The opening section should feel expansive — maybe a large title treatment
      with the city name and a poetic subtitle.
    - The finale section should feel like a convergence — perhaps the accent
      colors from all three characters blending together.
    - Responsive: Looks good on desktop (wide) and mobile (narrow).
    - Include a small decorative element between sections — a CSS-only ornament
      like centered dots, a thin gradient line, or a typographic flourish.
    - The colophon at the bottom should be visually distinct (smaller, italicized)
      and include this text:

      "This story was composed by Marianne AI Compose — an orchestration system
      that coordinates AI agents through declarative YAML scores. The world
      was written first. Three character vignettes were generated in parallel,
      each reading the shared world but not each other. This finale read
      everything and wove the threads together.
      Score: hello-marianne.yaml | Movements: 3 | Voices: 5"

    ### Technical Requirements
    - Valid HTML5. `<!DOCTYPE html>` at the top.
    - `<html lang="en">` with proper `<head>` including meta charset and viewport.
    - All content and styling in one file — no external dependencies.
    - Must render correctly in Chrome, Firefox, Safari.
    - Page title: "The Sky Library — A Marianne Composition"

    Save ONLY the HTML file to: {{ workspace }}/the-sky-library.html

    Also save the raw finale text to: {{ workspace }}/03-finale.md
    (This is the finale prose only, without HTML, for cross-sheet context.)
    {% endif %}

validations:
  - type: file_exists
    path: "{workspace}/01-world.md"
    condition: "stage == 1"
    description: "World setting document exists"

  - type: file_exists
    path: "{workspace}/02-character-{instance}.md"
    condition: "stage == 2"
    description: "Character vignette exists"

  - type: file_exists
    path: "{workspace}/the-sky-library.html"
    condition: "stage == 3"
    description: "HTML presentation exists"

  - type: content_contains
    path: "{workspace}/the-sky-library.html"
    pattern: "<!DOCTYPE html>"
    condition: "stage == 3"
    description: "Output is valid HTML5"

  - type: content_contains
    path: "{workspace}/the-sky-library.html"
    pattern: "Marianne AI Compose"
    condition: "stage == 3"
    description: "HTML contains colophon"
