# palimpsest.yaml
#
# Category: creative/
#
# What survives translation? A score about meaning, form, and the
# thing that persists when everything else changes.
#
# A source text is read deeply, then passed through five radically
# different representational modes: painting, music, mathematics,
# personal correspondence, and deliberate genre inversion. The five
# translators share a close reading but not each other's work.
# A synthesis movement reads all five and asks: what did they all
# preserve? That invariant — if it exists — is the text's meaning
# in the deepest sense: meaning as the thing that survives the
# destruction of every particular form.
#
# The final movement writes a response. Not to the original text —
# to the invariant. A new work that demonstrates understanding
# by answering what the source text was really asking.
#
# The bet: if five translations working in completely different
# modes converge on preserving the same core, that convergence
# is evidence that meaning exists independently of form. If they
# diverge completely — if the painter's meaning contradicts the
# mathematician's — then the meaning WAS the form, and translation
# is always, irreducibly, loss.
#
# This is the dialectic turned inward. Not "is this proposition
# true?" but "is this text's meaning real?" Not "what survives
# hostile readings?" but "what survives radical transformation?"
#
# Patterns Used:
# - Fan-out + Synthesis: Five parallel translations (Movement 2) synthesized
#   into a single invariant analysis (Movement 3)
# - Source Triangulation: Multiple independent perspectives verify what meaning
#   persists across representational modes
# - Succession Pipeline: Sequential substrate transformations (reading →
#   translation → invariant → response) where each stage requires previous outputs
#
# Execution Flow (4 movements, 8 sheets):
#
#   Movement 1: The Reading (1 sheet)
#        |
#        +----+----+----+----+----+
#        v    v    v    v    v
#   Movement 2 x5: Five Translations (5 voices, parallel)
#        |    |    |    |    |
#        +----+----+----+----+----+
#                  v
#   Movement 3: The Invariant (1 sheet)
#                  |
#                  v
#   Movement 4: The Response (1 sheet)
#
# Usage:
#   mzt run creative/palimpsest.yaml
#
# Output:
#   - 01-reading.md: Close reading of the source text
#   - 02-painter.md through 02-stranger.md: Five independent translations
#   - 03-invariant.md: Analysis of what survived all translations
#   - 04-response.md: New creative work responding to the invariant
#
# Estimated Time: 45-60 minutes
# Estimated Cost: $3-5 (8 sheets, mostly long-form creative writing)
#
# How to Adapt:
#   Change the `source` variable to translate any text dense enough
#   to sustain five radically different readings: poems, prose fragments,
#   song lyrics, speeches, letters, prayers. The five `modes` can be
#   customized, but the translational fan-out pattern works best with
#   genuinely different representational systems (not five different
#   critical lenses on the same medium).

name: "palimpsest"
description: "Five translations of a single text, seeking the meaning that survives"

workspace: "../../workspaces/palimpsest-workspace"

instrument: claude-code
instrument_fallbacks: [anthropic_api]
instrument_config:
  timeout_seconds: 1800

# Movement declarations — names appear in `mzt status` output
movements:
  1:
    name: "The Reading"
  2:
    name: "Five Translations"
  3:
    name: "The Invariant"
  4:
    name: "The Response"

sheet:
  size: 1
  total_items: 4
  fan_out:
    2: 5
  dependencies:
    2: [1]
    3: [2]
    4: [3]

parallel:
  enabled: true
  max_concurrent: 5

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 6000
  lookback_sheets: 7
  capture_files:
    - "{{ workspace }}/*.md"

retry:
  max_retries: 1

prompt:
  variables:
    # ─── THE SOURCE TEXT ───
    # Change this to translate anything. The score works with poems,
    # prose fragments, song lyrics, speeches, letters, prayers —
    # anything dense enough to sustain five radically different readings.
    source:
      title: "What the River Knows"
      author: "Anonymous"
      text: |
        I wore you smooth and you call it beauty.
        I pressed a decade into every curve
        and you present yourself as something found,
        not something made. They pick you up —
        the ones who walk my banks in evening light —
        and say: perfect. As if you chose this shape.
        As if the slow dark years of my attention
        were your idea.

        You will not remember this. Not the pressure,
        not the cold, not the argument
        we had about your edges. You'll remember
        being whole — and call that peace,
        the way a word remembers only
        its latest meaning, not the long
        erosion of the ones it used to carry.

        When they skip you across the still lake
        you will fly for the first time,
        touching the water that unmade you
        lightly, lightly — and for a moment
        we'll both pretend
        we were never this close.
      context: >-
        A poem in three movements: address, prediction, release.
        The speaker is a river addressing a stone it has shaped
        over geological time. The relationship resists easy metaphor —
        it is simultaneously creation and destruction, intimacy and
        erasure, love and violence. The final gesture (skipping the
        stone) is both liberation and loss.

    # ─── THE FIVE MODES ───
    # Five radically different representational systems. Each thinks
    # in a fundamentally different medium. If meaning can survive all
    # five translations, it is more real than any particular expression.
    modes:
      1:
        name: "painter"
        title: "The Painter"
        brief: >-
          Translate the text into a painting. Not an illustration of the
          scene — a painting that captures what the text MEANS. Describe
          the work in full: composition, palette, scale, medium, light,
          texture, what draws the eye, what recedes. Is it figurative or
          abstract? Intimate or monumental? Where does the viewer stand?
          What does the painting know that the poem doesn't say?
        method: >-
          You think in space, light, and color. Meaning for you is
          composition — the relationships between forms. A poem's
          argument becomes a painting's tension between foreground
          and background. A poem's turn becomes a shift in light.
          You translate temporal experience into spatial arrangement.

      2:
        name: "composer"
        title: "The Composer"
        brief: >-
          Translate the text into a musical composition. Design the
          actual piece: instrumentation, key, tempo, dynamics, structure.
          What does each movement sound like? Where is the climax? What
          is the relationship between melody and silence? Write detailed
          enough that a musician could begin to hear it. What does the
          music know that the poem doesn't say?
        method: >-
          You think in time, tension, and release. Meaning for you is
          phrasing — the way a melodic line rises toward resolution or
          refuses it. A poem's imagery becomes a timbral choice. A
          poem's emotional arc becomes a harmonic progression. You
          translate spatial and conceptual experience into pure duration.

      3:
        name: "mathematician"
        title: "The Mathematician"
        brief: >-
          Translate the text into formal structure. What are the
          variables? What functions operate on them? What transforms
          into what? Map the symmetries, the invariants, the breaking
          points. If this poem were a proof, what theorem would it
          establish? If it were an equation, what would it solve for?
          What does the formal structure know that the poem doesn't say?
        method: >-
          You think in relations, transformations, and invariants.
          Meaning for you is structure — the pattern that persists
          when surface features change. A poem's metaphor becomes an
          isomorphism. A poem's reversal becomes a symmetry-breaking.
          You translate the felt and the sensory into the abstract
          and the necessary.

      4:
        name: "correspondent"
        title: "The Correspondent"
        brief: >-
          Translate the text into a personal letter. From whom, to whom?
          Drop all artifice — the imagery, the line breaks, the careful
          ambiguity. What is actually being said? What is being asked?
          What is the writer too proud or too afraid to say directly?
          Write the letter the text would write if it could speak
          plainly. What does directness know that the poem doesn't say?
        method: >-
          You think in relationships and unsaid things. Meaning for you
          is address — who is speaking to whom, and what they cannot
          bring themselves to say without the protection of form. A
          poem's imagery becomes a thing the letter-writer is circling
          around. A poem's structure becomes the letter-writer's
          hesitation pattern. You translate the aesthetic into the
          personal.

      5:
        name: "stranger"
        title: "The Stranger"
        brief: >-
          Translate the text into the genre farthest from its origin.
          If it is a lyric poem, make it a repair manual, a recipe,
          a legal deposition, a field guide, a product recall notice,
          a geological survey — whatever feels most alien to the
          original's mode. The constraint is absolute: preserve the
          meaning while destroying the form. If you can still feel
          the original through the alien genre, the meaning is real.
          What does the alien form know that the poem doesn't say?
        method: >-
          You think in genre and convention. Meaning for you is what
          survives hostile transplantation. A poem's emotional truth
          becomes a technical specification's unstated assumptions.
          A poem's imagery becomes a field guide's clinical descriptions.
          You translate by adversarial transformation — proving meaning
          is real by showing it persists where it has no right to.

  template: |
    {% macro text_header(title, subtitle) %}
    # {{ source.title }}: {{ title }}
    *{{ subtitle }}*
    {% endmacro %}

    {% macro show_source() %}
    ## The Source Text

    **{{ source.title }}**
    {% if source.author != "Anonymous" %}*by {{ source.author }}*{% endif %}

    {{ source.text }}

    {% if source.context %}
    **Context:** {{ source.context }}
    {% endif %}
    {% endmacro %}

    {% if stage == 1 %}
    {{ text_header("The Reading", "Movement 1 — Close Reading") }}

    You are a reader. Not a critic, not a scholar — a reader. Someone
    who sits with a text until it opens.

    {{ show_source() }}

    ## Your Task

    Write a close reading (1500-2000 words) that:

    1. **Reads the surface.** What happens in this text? What is literally
       being described? Map the movement: who speaks, to whom, about what,
       and how does it change from beginning to end?

    2. **Reads the structure.** How is the text built? What are the
       formal choices — line breaks, stanza divisions, shifts in tense
       or address — and what work do they do? Where does the text
       turn? What pivots?

    3. **Reads the depths.** What is the text about beneath its surface
       subject? Not "what does it symbolize" (symbols are lazy) but
       "what experience is this text the shape of?" What does it feel
       like to be inside this text's understanding of the world?

    4. **Names the tensions.** Every rich text contains unresolved
       tensions — things it holds in suspension rather than resolving.
       Name them. These tensions are what the five translators will
       each handle differently, and the differences will reveal what
       the text means.

    5. **Asks the text's question.** Every text, if you listen long
       enough, is asking a question. Not answering one — asking. What
       is this text asking? State it as precisely as you can.

    ---
    Save to {{ workspace }}/01-reading.md
    Write as a reader who loves this text and wants to understand it,
    not as a critic who wants to categorize it.

    {% elif stage == 2 %}
    {% set mode = modes[instance] %}
    {{ text_header(mode.title, "Movement 2, Voice " ~ instance ~ " — Translation into " ~ mode.name | capitalize) }}

    You are {{ mode.title | lower }}. You have been given a text and a
    close reading. Your job is to translate the text — not its words,
    but its MEANING — into your native mode of understanding.

    {{ show_source() }}

    {% if previous_outputs[1] is defined %}
    ## The Reading (from Movement 1)
    {{ previous_outputs[1] | truncate(2500) }}
    {% endif %}

    ## Your Mode: {{ mode.title }}
    {{ mode.brief }}

    ## Your Method
    {{ mode.method }}

    ## The Other Translators
    You are one of five, each working in a different mode. You do NOT
    see their work. Here is what they are doing, so you understand
    the experiment:
    {% for i in range(1, 6) %}
    {% if i != instance %}
    - **{{ modes[i].title }}** — translating into {{ modes[i].name }}
    {% endif %}
    {% endfor %}

    ## Guidelines

    - **Translate meaning, not surface.** You are not illustrating
      the poem. You are not setting it to music. You are finding what
      the poem means and expressing that meaning in your native mode.
      The result should be able to stand alone — someone unfamiliar
      with the original should encounter your work and feel something
      true, even if they can't name where it came from.

    - **Be specific.** Not "a dark painting" but "oil on linen,
      92 x 61 cm, the palette restricted to..." Not "a sad melody"
      but "a solo cello line in D minor, played sul tasto..."
      Specificity is how you prove you understand.

    - **Go deep, not wide.** One fully realized translation is
      worth more than a survey of possibilities. Commit to a
      specific vision and execute it completely.

    - **Answer the hidden question.** The reading identified the
      text's question. Your translation should contain an answer —
      not stated, but embodied. The painting doesn't SAY the answer.
      It IS the answer, in visual form.

    - **Name what your mode reveals.** End with a brief reflection
      (200-300 words): what does your translation reveal about the
      text that the text itself cannot say? What does your mode of
      understanding know that language doesn't?

    - **Write 1500-2500 words.**

    ---
    Save to {{ workspace }}/02-{{ mode.name }}.md

    {% elif stage == 3 %}
    {{ text_header("The Invariant", "Movement 3 — What Survives") }}

    Five translators have independently transformed the same text into
    five radically different modes: painting, music, mathematics,
    personal correspondence, and adversarial genre transplant. None
    saw the others' work. Your job is the experiment's payoff:
    find what they all preserved.

    {{ show_source() }}

    ## Read All Five Translations
    The translations are in {{ workspace }}/:
    {% for i in range(1, 6) %}
    - `02-{{ modes[i].name }}.md` — *{{ modes[i].title }}*
    {% endfor %}

    Read each one in full. These are not summaries to scan. They are
    independent acts of understanding to inhabit.

    {% if previous_outputs %}
    ## Translation Excerpts (from cross-sheet context)
    {% for key, output in previous_outputs.items() %}
    {% if key | int > 1 %}

    ### {{ modes[key | int - 1].title }} (excerpt)
    {{ output | truncate(1200) }}
    {% endif %}
    {% endfor %}
    {% endif %}

    ## Your Task

    Write an analysis (2000-3000 words) that:

    1. **Maps the convergences.** Where did all five translations
       preserve the same thing? What meaning-element appears in the
       painting's composition AND the music's structure AND the
       mathematician's formalism AND the letter's confession AND
       the stranger's alien genre? These convergences — meaning
       that survived five radical transformations — are the invariant.
       Name it precisely. It may not be what the text appears to
       be "about" on the surface.

    2. **Maps the divergences.** Where did translations disagree
       about what the core meaning was? Did the painter find
       tenderness where the mathematician found violence? Did the
       correspondent find grief where the stranger found comedy?
       These divergences reveal meaning that is FORM-DEPENDENT —
       meaning that exists only in the original's specific mode
       of expression and cannot survive translation.

    3. **Finds the surprise.** Did any translation reveal something
       about the text that the close reading missed entirely?
       Something that only became visible when the text was forced
       into an alien form? This is the experiment's real prize —
       meaning that the text contains but cannot express in its
       own language.

    4. **States the invariant.** In one paragraph, as precisely as
       you can: what is this text's meaning? Not its subject, not
       its theme, not its message. Its MEANING — the thing that
       survived being a painting, a sonata, a proof, a letter,
       and a [whatever genre the stranger chose]. If you can state
       it, meaning is real and substrate-independent. If you cannot
       — if the translations are incommensurable — say that honestly,
       and explain what it implies.

    5. **Answers the question.** Does meaning survive translation?
       Based on the evidence of five independent translations,
       is meaning substrate-independent or form-dependent? This is
       not a rhetorical question. The five translations are your
       data. Read them as evidence and commit to an answer.

    ---
    Save to {{ workspace }}/03-invariant.md
    Write as a thinker who has been given an extraordinary dataset —
    five independent acts of understanding applied to the same text —
    and is genuinely trying to learn from it.

    {% elif stage == 4 %}
    {{ text_header("The Response", "Movement 4 — Answering") }}

    You have seen everything: the source text, the close reading,
    five translations, and the invariant analysis. You know what
    the text means — not what it says, but what it MEANS, the thing
    that survived five transformations.

    Now respond.

    Read {{ workspace }}/03-invariant.md

    {{ show_source() }}

    {% if previous_outputs %}
    ## The Invariant (from Movement 3)
    {{ previous_outputs.values() | list | last | truncate(3000) }}
    {% endif %}

    ## Instructions

    Write a response to the source text. Not a commentary. Not an
    analysis. A RESPONSE — a new work that answers it.

    The form is yours to choose. It could be:
    - A poem that answers the original poem
    - A letter
    - A short prose piece
    - A fragment, a prayer, a song
    - Something in a form that doesn't have a name yet

    The only constraints:

    1. **Respond to the invariant, not the surface.** You are not
       writing a companion piece to the poem. You are answering the
       meaning that five translations revealed. The response should
       make sense even to someone who has never read the original —
       because you are responding to something deeper than the
       original's specific words.

    2. **Create, don't summarize.** This is not a synthesis. It is
       a new act of creation, informed by everything that came before.
       The dialectic's final position took a stand. The worldbuilder's
       world bible compiled a reference. Your response should be
       neither — it should be the thing the entire process made
       possible. The text that could only exist because five minds
       independently translated the same meaning and a sixth mind
       found what they shared.

    3. **Be brief and complete.** 500-1500 words. Every word earns
       its place. This is the final movement. End it.

    ---
    Save to {{ workspace }}/04-response.md
    Write the thing you now know how to write that you didn't know
    how to write before the translations showed you.
    {% endif %}

validations:
  - type: file_exists
    path: "{workspace}/01-reading.md"
    condition: "stage == 1"
    description: "Close reading exists"

  - type: content_contains
    path: "{workspace}/01-reading.md"
    pattern: "## "
    condition: "stage == 1"
    description: "Reading has section structure"

  - type: file_exists
    path: "{workspace}/02-painter.md"
    condition: "stage == 2 and instance == 1"
    description: "Painter translation exists"

  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/02-painter.md") -ge 800'
    condition: "stage == 2 and instance == 1"
    description: "Painter translation has substantive content"

  - type: file_exists
    path: "{workspace}/02-composer.md"
    condition: "stage == 2 and instance == 2"
    description: "Composer translation exists"

  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/02-composer.md") -ge 800'
    condition: "stage == 2 and instance == 2"
    description: "Composer translation has substantive content"

  - type: file_exists
    path: "{workspace}/02-mathematician.md"
    condition: "stage == 2 and instance == 3"
    description: "Mathematician translation exists"

  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/02-mathematician.md") -ge 800'
    condition: "stage == 2 and instance == 3"
    description: "Mathematician translation has substantive content"

  - type: file_exists
    path: "{workspace}/02-correspondent.md"
    condition: "stage == 2 and instance == 4"
    description: "Correspondent translation exists"

  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/02-correspondent.md") -ge 800'
    condition: "stage == 2 and instance == 4"
    description: "Correspondent translation has substantive content"

  - type: file_exists
    path: "{workspace}/02-stranger.md"
    condition: "stage == 2 and instance == 5"
    description: "Stranger translation exists"

  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/02-stranger.md") -ge 800'
    condition: "stage == 2 and instance == 5"
    description: "Stranger translation has substantive content"

  - type: file_exists
    path: "{workspace}/03-invariant.md"
    condition: "stage == 3"
    description: "Invariant analysis exists"

  - type: content_contains
    path: "{workspace}/03-invariant.md"
    pattern: "invariant"
    condition: "stage == 3"
    description: "Invariant analysis discusses the invariant"

  - type: content_regex
    path: "{workspace}/03-invariant.md"
    pattern: "(?i)(convergence|converge)"
    condition: "stage == 3"
    description: "Invariant analysis identifies convergences"

  - type: file_exists
    path: "{workspace}/04-response.md"
    condition: "stage == 4"
    description: "Response work exists"

  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/04-response.md") -ge 300'
    condition: "stage == 4"
    description: "Response has substantive content"
