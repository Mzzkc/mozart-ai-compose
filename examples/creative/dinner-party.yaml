# dinner-party.yaml
#
# Category: creative/
# Pattern: Fan-out + Synthesis (Rosetta pattern #1)
#
# Plan a dinner party from scratch.
#
# This score proves Marianne isn't a coding tool — it's an orchestration
# tool for any complex, multi-faceted task that benefits from parallel
# planning and structured synthesis.
#
# A dinner party is a design problem with hard constraints (dietary needs,
# budget, timing) and soft ones (ambiance, flow, surprise). Planning it
# well requires thinking about food, people, space, and time simultaneously.
# Fan-out handles the simultaneous part.
#
# Usage:
#   mzt run examples/creative/dinner-party.yaml
#
# Customization:
#   Edit prompt.variables.party and prompt.variables.guests for your event.
#   Each track's focus can be adjusted to match your priorities.
#
# Output:
#   Produces a complete dinner party plan in the-plan.md with menu, drinks,
#   timeline, shopping list, and contingencies.
#
# Estimated time: 8-12 minutes
# Estimated cost: $0.30-0.60 (6 sheets)
#
# Execution Flow (3 movements, 6 concrete sheets):
#
#   Movement 1: Guest Brief (sheet 1)
#        |
#        +------+------+------+
#        v      v      v      v
#   Movement 2 x4: Planning Tracks (4 voices, parallel)
#        |      |      |      |
#        +------+------+------+
#                  v
#   Movement 3: The Plan (sheet 6)
#
# Movement 2 voices:
#   1. Menu Design (courses, recipes, dietary accommodations)
#   2. Drinks Program (pairings, non-alcoholic options, timing)
#   3. Ambiance & Flow (table, music, lighting, conversation starters)
#   4. Timeline & Logistics (shopping, prep schedule, day-of rundown)

name: "dinner-party"
description: "Plan a dinner party with parallel planning tracks"

workspace: "../../workspaces/dinner-party-workspace"

instrument: claude-code
instrument_fallbacks: [anthropic_api]
instrument_config:
  timeout_seconds: 1200

# Movement declarations — names appear in `mzt status` output
movements:
  1:
    name: "Guest Brief"
  2:
    name: "Planning Tracks"
  3:
    name: "The Plan"

sheet:
  size: 1
  total_items: 3
  fan_out:
    2: 4
  dependencies:
    2: [1]
    3: [2]

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 5000
  lookback_sheets: 5

retry:
  max_retries: 1

prompt:
  variables:
    # ─── EDIT THESE FOR YOUR PARTY ───
    party:
      occasion: "Friendsgiving"
      date: "Saturday, November 22"
      time: "6:30 PM"
      guest_count: 8
      budget: "$200 total"
      kitchen: "Standard home kitchen, one oven, gas stove, no sous vide"
      vibe: "Warm, unhurried, lots of laughter. Not formal."

    guests:
      - { name: "Sam", dietary: "vegetarian", note: "loves mushrooms" }
      - { name: "Jordan", dietary: "none", note: "adventurous eater" }
      - { name: "Alex", dietary: "gluten-free", note: "newly diagnosed, sensitive about it" }
      - { name: "Riley", dietary: "none", note: "doesn't drink alcohol" }
      - { name: "Morgan", dietary: "dairy-free", note: "great cook, will want to help" }
      - { name: "Casey", dietary: "none", note: "picky, comfort food fan" }
      - { name: "Drew", dietary: "vegetarian", note: "Sam's partner" }
      - { name: "Pat", dietary: "none", note: "bringing their famous sourdough" }

    tracks:
      1:
        name: "menu"
        title: "Menu Design"
        focus: >-
          Design a 3-course menu plus snacks. Every dish must work for all
          dietary restrictions — no separate "special" plates. The vegetarians
          shouldn't feel like an afterthought. The gluten-free guest shouldn't
          have to ask about every dish.
        output: "menu.md"

      2:
        name: "drinks"
        title: "Drinks Program"
        focus: >-
          Plan drinks for the whole evening — arrival through dessert.
          Include thoughtful non-alcoholic options (not just "sparkling water").
          Riley doesn't drink; make their options feel as special as anyone's wine.
          Budget-conscious — suggest specific bottles with price ranges.
        output: "drinks.md"

      3:
        name: "ambiance"
        title: "Ambiance & Flow"
        focus: >-
          Design the experience. Table setting, music playlist concept,
          lighting, conversation starters for early awkward moments.
          Morgan wants to help — give them a meaningful role, not busywork.
          Plan for the moment when someone inevitably ends up in the kitchen.
        output: "ambiance.md"

      4:
        name: "logistics"
        title: "Timeline & Logistics"
        focus: >-
          Build backward from 6:30 PM Saturday. Shopping list with store
          sections. Prep timeline (what can be done Thursday, Friday, Saturday
          morning, day-of). Pat is bringing sourdough — coordinate with that.
          Plan for the realistic scenario where something takes longer than expected.
        output: "logistics.md"

  template: |
    {% macro guest_summary() %}
    ## Guests ({{ guests | length }} people)
    {% for g in guests %}
    - **{{ g.name }}**: {{ g.dietary if g.dietary != "none" else "no restrictions" }}{% if g.note %} — {{ g.note }}{% endif %}
    {% endfor %}

    Dietary summary: {{ guests | selectattr("dietary", "ne", "none") | map(attribute="dietary") | unique | join(", ") }}
    {% endmacro %}

    {% if stage == 1 %}
    # Guest Brief: {{ party.occasion }}

    You're planning a dinner party. Before the parallel planning tracks begin,
    establish the shared context that all tracks need.

    ## The Basics
    - **Occasion**: {{ party.occasion }}
    - **Date/Time**: {{ party.date }}, {{ party.time }}
    - **Budget**: {{ party.budget }}
    - **Kitchen**: {{ party.kitchen }}
    - **Vibe**: {{ party.vibe }}

    {{ guest_summary() }}

    ## Your Task

    Write a brief (500-800 words) that captures:
    1. **Constraint matrix**: All dietary restrictions in one clear table
    2. **Social dynamics**: Who knows whom? Any pairings to encourage?
    3. **Hidden requirements**: Things that aren't stated but matter
       (e.g., Alex is newly gluten-free — be discreet, not performative about it)
    4. **The one thing that makes this party THIS party**: What's the
       soul of this gathering? Everything else should serve it.

    Save to {{ workspace }}/00-brief.md

    {% elif stage == 2 %}
    {% set track = tracks[instance] %}
    # {{ track.title }}

    You are one of four parallel planning tracks for a {{ party.occasion }}.

    Read the guest brief: {{ workspace }}/00-brief.md

    ## Party Context
    - **Date/Time**: {{ party.date }}, {{ party.time }}
    - **Budget**: {{ party.budget }} (your track's share: ~${{ (200 / 4) | round | int }})
    - **Kitchen**: {{ party.kitchen }}
    - **Vibe**: {{ party.vibe }}

    {{ guest_summary() }}

    ## Your Focus
    {{ track.focus }}

    ## Output
    Be specific and actionable. Not "consider a warm appetizer" — give
    an actual recipe or recommendation. Not "play some jazz" — suggest
    a specific playlist concept with 3-4 anchor artists.

    Save to {{ workspace }}/{{ track.output }}

    {% elif stage == 3 %}
    # The Plan: {{ party.occasion }}

    Four planning tracks have been working in parallel. Your job: weave them
    into a single, coherent dinner party plan.

    ## Source Materials
    {% for i in range(1, 5) %}
    {% set track = tracks[i] %}

    ### {{ track.title }}
    {% if previous_outputs[i + 1] is defined %}
    {{ previous_outputs[i + 1] | truncate(2000) }}
    {% else %}
    *(See {{ workspace }}/{{ track.output }})*
    {% endif %}

    ---
    {% endfor %}

    ## Synthesis Task

    Build a single document that someone could hand to a friend and say
    "here, this is the plan." It should include:

    1. **At a Glance**: The party in 5 bullet points
    2. **The Menu**: Final menu with dietary notes per dish
    3. **Drinks**: What to buy, what to serve when
    4. **Day-Of Timeline**: Hour-by-hour from noon to midnight
    5. **Shopping List**: Organized by store section, with quantities
    6. **Setup Checklist**: What goes where, when
    7. **Morgan's Role**: Their specific contribution (they want to help)
    8. **Backup Plan**: What to do when the oven takes 20 minutes longer

    Total budget check: does it all fit in {{ party.budget }}?
    If not, identify what to cut.

    Save to {{ workspace }}/the-plan.md
    {% endif %}

validations:
  - type: file_exists
    path: "{workspace}/00-brief.md"
    condition: "stage == 1"

  - type: file_exists
    path: "{workspace}/the-plan.md"
    condition: "stage == 3"

  - type: content_contains
    path: "{workspace}/the-plan.md"
    pattern: "Shopping List"
    condition: "stage == 3"
