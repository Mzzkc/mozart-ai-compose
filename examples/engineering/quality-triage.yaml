    Plus `{{ workspace }}/project-profile.yaml` for context.

    ## Synthesis Dimensions

    ### 1. Cross-reviewer triangulation

    Group findings by (file, line-range-within-50, related-category). When 2+ reviewers
    independently flag the same file/region:
    - **CORROBORATED** → high confidence; these are the strongest signal
    - Pay extra attention when different personas flagged the same region for
      *different* categorical reasons — that's where the deepest issues live

    Solo findings (flagged by exactly 1 reviewer) are **UNCORROBORATED** — medium
    confidence. Keep them unless they contradict stronger signal.

    ### 2. Cross-lens triangulation

    Persona-lens map:
    - field-engineer: EXP + SCI + COMP
    - architect:      SCI + META + CULT
    - newcomer:       COMP + CULT + EXP
    - steward:        META + CULT + SCI

    When a finding is flagged by reviewers whose combined lenses cover 3+ distinct
    dimensions (COMP / SCI / CULT / EXP / META), mark it as **multi-dimensional**.
    These are findings that resist single-lens review.

    ### 3. Blind-spot check

    After synthesis, ask: "What did NONE of the 4 personas catch that project-profile's
    intent_sources (or conventional patterns for this language/framework) imply we
    should have caught?" Emit up to 5 blind-spot notes in a dedicated section.

    ### 4. Cross-persona narrative

    Write a 150-300 word "where the personas agreed and disagreed" summary. This is
    not decoration — stage 6 uses it to write the issue bodies filed against the repo.

    ## Output

    Emit `{{ workspace }}/05-local-findings.yaml`:

