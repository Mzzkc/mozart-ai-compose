    reviewers: 4
    raw_finding_counts:
      field_engineer: 0
      architect: 0
      newcomer: 0
      steward: 0
    synthesized_findings:
      - id: "local-001"
        file: "..."
        line: 0                          # or null
        category: "..."                  # inherited from reviewer categories
        severity: "critical|high|medium|low"
        confidence: "high|medium|low"
        triangulation:
          flagged_by: ["field_engineer", "architect"]
          lenses_covered: ["COMP", "SCI", "META"]
          lens_dimensions_count: 3
          multi_dimensional: true       # true iff lens_dimensions_count >= 3
        tier_hint: 1                     # INTEGER effort hint: 1=small/isolated,
                                         # 2=medium/multi-file, 3=architectural/risky
                                         # Stage 9 uses this when assembling the DAG.
        summary: "<one-paragraph summary, used as issue title seed in stage 6>"
        evidence: "<specific evidence>"
        impact: "<why operators/maintainers/newcomers care>"
