    ## Discipline

    - Dedup is YOUR job. Do not let the same bug appear 3 times because 3 reviewers
      worded it differently.
    - When reviewers contradict, surface the contradiction in `cross_persona_narrative`
      — don't pick a side silently.
    - Solo findings stay unless they contradict stronger signal.
    - **Cap `synthesized_findings` at 60.** If more survive dedup, keep the
      highest-severity/confidence ones and summarize the rest at the bottom.
      Stage 6 will file one GH issue per synthesized finding — 60 is already a lot.

    {% elif stage == 6 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 6: FILE LOCAL FINDINGS AS TRACKER ISSUES                              ║
    ║  "Review findings become first-class issues in the DAG"                      ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    Local code-review findings become real tracker issues so that:
    (a) the dependency investigators in stage 7 can analyze them alongside external
        issues (one corpus, one graph)
    (b) issue-solver can solve and close them the same way it solves external issues
    (c) humans can track, assign, and discuss them via normal tracker workflow

    ## Tracker Abstraction

    The score supports multiple issue trackers via the `issue_tracker` variable:

    | Tracker | Filing mode | Existing-issue fetch |
    |---|---|---|
    | `github` | Live API via `gh` CLI | `gh issue list --json number,title,body,state` |
    | `jira`   | CSV export (manual import) | `jira-cli` if available, else side-report for fetch only |
    | `linear` | CSV export (manual import) | Linear API if `LINEAR_API_KEY` set, else side-report for fetch only |
    | `none`   | Side-report only | n/a |

    For `jira`/`linear`, if the fetch channel is unavailable, the stage still
    writes a CSV with ALL synthesized findings (no dedup possible without fetch)
    but annotates each row with `dedup_applied: false` so operators know to
    eyeball duplicates during CSV import.

    ## Preflight: write capability

    ```bash
    SIDE_REPORT_MODE=0
    FETCH_AVAILABLE=1

    {% if issue_tracker == "github" %}
    # GitHub: require `gh` auth + repo/public_repo scope for writes.
    if ! gh auth status 2>&1 | grep -q "Logged in"; then
      echo "WRITE_UNAVAILABLE: gh not authenticated"
      SIDE_REPORT_MODE=1
    elif ! gh auth status 2>&1 | grep -Eq "repo|public_repo"; then
      echo "WRITE_UNAVAILABLE: gh token lacks repo scope"
      SIDE_REPORT_MODE=1
    fi
    {% elif issue_tracker == "jira" %}
    # Jira: CSV export mode. "Write" = file the CSV. Fetch is best-effort via
    # jira-cli (https://github.com/ankitpokhrel/jira-cli). If absent, we still
    # produce the CSV but skip fetch-based dedup.
    if ! command -v jira >/dev/null 2>&1; then
      echo "FETCH_UNAVAILABLE: jira-cli not installed — CSV output without dedup"
      FETCH_AVAILABLE=0
    elif ! jira me >/dev/null 2>&1; then
      echo "FETCH_UNAVAILABLE: jira-cli not configured — CSV output without dedup"
      FETCH_AVAILABLE=0
    fi
    {% elif issue_tracker == "linear" %}
    # Linear: CSV export. Fetch via Linear GraphQL if LINEAR_API_KEY set.
    if [ -z "${LINEAR_API_KEY:-}" ]; then
      echo "FETCH_UNAVAILABLE: LINEAR_API_KEY unset — CSV output without dedup"
      FETCH_AVAILABLE=0
    fi
    {% else %}
    # none: always side-report.
    SIDE_REPORT_MODE=1
    {% endif %}

    echo "ISSUE_TRACKER={{ issue_tracker }}"
    echo "SIDE_REPORT_MODE=$SIDE_REPORT_MODE"
    echo "FETCH_AVAILABLE=$FETCH_AVAILABLE"
    ```

    ## Filing logic

    Read `{{ workspace }}/05-local-findings.yaml` and `{{ workspace }}/issues/sanitized-corpus.yaml`.

    For each `synthesized_findings` entry (capped at 50 per run to avoid spam):

    1. **Skip filters** (do NOT file):
       - `severity: low` AND `confidence: low` (would just be noise)
       - Tier-hint 3 (architectural) findings MAY be skipped by the operator — file them
         but mark the body with a clear "NEEDS HUMAN REVIEW" preamble
       - Any finding whose summary is empty

    2. **Dedup against existing issues by stable fingerprint.**

       Title-based dedup is unreliable because stage-5 summaries are LLM-generated
       and rephrase across runs (same finding → different title → false miss). The
       filing script MUST dedup on a deterministic per-finding signature, not title.

       Fingerprint format: `category|file|line` (use `-` for missing line). Example:
       `resource_leak|src/marianne/daemon/bus.py|147`.

       Embed the fingerprint as an HTML comment on the last line of each issue body
       (or in a dedicated CSV column for CSV-based trackers):
       ```
       <!-- quality-triage-fingerprint: category|file|line -->
       ```
       The comment is invisible in rendered markdown but greppable via API.

       On filing, fetch existing issues filed by this score across ALL states
       (open, closed — so already-resolved findings aren't re-filed). Fetch
       command branches by tracker:

       ```bash
       {% if issue_tracker == "github" %}
       gh issue list --repo "{{ repo }}" --label "{{ local_finding_label }}" \
         --state all --json number,body,state,title --limit 500 > /tmp/existing.json
       {% elif issue_tracker == "jira" %}
       # jira-cli outputs TSV/JSON. Filter by label. Only run if FETCH_AVAILABLE=1.
       if [ "$FETCH_AVAILABLE" = "1" ]; then
         jira issue list --project "{{ repo }}" --label "{{ local_finding_label }}" \
           --plain --raw > /tmp/existing.json
       else
         echo "[]" > /tmp/existing.json
       fi
       {% elif issue_tracker == "linear" %}
       # Linear GraphQL — only run if FETCH_AVAILABLE=1.
       if [ "$FETCH_AVAILABLE" = "1" ]; then
         curl -sS -X POST https://api.linear.app/graphql \
           -H "Authorization: $LINEAR_API_KEY" -H "Content-Type: application/json" \
           -d '{"query":"{ issues(filter:{labels:{name:{eq:\"{{ local_finding_label }}\"}}}) { nodes { identifier title description state { name } } } }"}' \
           > /tmp/existing.json
       else
         echo '{"data":{"issues":{"nodes":[]}}}' > /tmp/existing.json
       fi
       {% else %}
       echo "[]" > /tmp/existing.json   # no fetch for issue_tracker=none
       {% endif %}
       ```
       Parse the fingerprint out of each existing issue body (regex on the comment
       marker). Build a `dict[fingerprint] -> {number, state}`.

       **Legacy-issue fallback.** Issues filed before this fingerprint scheme
       existed will NOT have the comment in their body. For those, also build a
       `dict[title] -> {number, state}` index as a secondary match. On lookup,
       check fingerprint first; if no match AND the candidate's generated title
       exactly matches a title in the legacy index, treat that as a duplicate
       hit (record with `match_via: "title"` so operators can spot legacy rows).

       For each candidate finding, compute its fingerprint and look it up:
       - Match found, state=open → skip, record under `skipped_duplicate`
         with `{local_id, existing_issue_number, existing_state: "open"}`.
       - Match found, state=closed → skip, record under `skipped_already_resolved`
         with `{local_id, existing_issue_number, existing_state: "closed"}`.
         Do NOT reopen closed issues automatically — an operator closed it for a
         reason (fixed, won't-fix, dup-of-upstream).
       - No match → proceed to file.

       Also dedup within the current run (same fingerprint appearing twice in
       `synthesized_findings` — rare but possible if stage 5 missed it): keep the
       first, record the second under `skipped_duplicate` with
       `{local_id, existing_issue_number: <first-filed-in-this-run>}`.

    2b. **Semantic dedup pass** (your judgment, not the script's).

       Fingerprint dedup only catches exact `category|file|line` matches. It misses:
       - Same defect re-categorized across runs (`silent_failure` vs `debug_gap`
         vs `contract_violation` for the same catch-and-discard pattern).
       - Line shifts from unrelated edits (issue at line 147 this run, 152 next).
       - Split-by-file symptom vs cause (handler.go flagged this run, the
         library function it calls flagged last run — same underlying bug).
       - Cross-run rephrasings where the root cause is identical but the
         evidence/impact text differs.

       After fingerprint dedup, BEFORE generating the filing script, read the
       remaining candidate findings AND the bodies of existing open issues
       filed by this score (already fetched in step 2). For each candidate,
       ask yourself: *does an existing open issue describe the same underlying
       defect?* Use these criteria:

       | Signal | Weight |
       |---|---|
       | Same file AND same function/symbol | strong |
       | Overlapping evidence snippets (same quoted code) | strong |
       | Same root cause described in different words | strong |
       | Different file but one calls the other (symptom vs cause) | moderate |
       | Different category but same described pattern | moderate |
       | Same category + similar severity + adjacent lines (±20) | moderate |
       | Title lexically similar (>50% word overlap) | weak |

       Rule: **two strong signals, OR one strong + two moderate, = duplicate.**
       Weak signals alone never justify a skip.

       For each semantic duplicate, record under `skipped_semantic_duplicate`
       in `06-filed-locals.yaml`:
       ```yaml
       - local_id: local-NNN
         existing_issue_number: <number>
         reasoning: "<1-2 sentences: which signals matched>"
         confidence: "high" | "medium"      # medium when the call felt close
       ```

       Do NOT skip on "medium" confidence if the existing issue is in a DIFFERENT
       file — that's the split-symptom case, and filing is the safer default.
       File it but note the relationship in the new issue's body with a line:
       `Related: may be symptom/cause-pair with #<existing>` (appended just
       before the fingerprint comment).

       Print your reasoning for each semantic dedup decision into
       `{{ workspace }}/06-semantic-dedup.md` so operators can audit:
       ```markdown
       ## Semantic Dedup Audit

       ### local-NNN — SKIPPED as dup of #<number>
       **Signals matched:** <list>
       **Reasoning:** <text>
       **Confidence:** high/medium

       ### local-MMM — FILED with related-to #<number>
       **Signals matched:** <list — insufficient to dedup>
       **Reasoning:** <why this is distinct enough to file>
       ```

       This audit file is REQUIRED — without it, a wrong skip is invisible and an
       operator has no way to recover the finding.

    3. **File new issue** (only when SIDE_REPORT_MODE=0):

       Title format: `[review] <category>: <one-line-summary>` (truncate to 80 chars,
       strip shell-dangerous chars using the same regex as stage 3).

       Shared issue body (markdown; used verbatim for github, embedded in
       description column for jira/linear CSV):
       ```markdown
       **Source:** quality-triage local review (4-persona synthesis)

       **Category:** <category>
       **Severity:** <severity>
       **Confidence:** <confidence>
       **File:** `<file>`<if line>:`<line>`</if>
       **Suggested scope:** <single-file|multi-file|architectural>

       ## Finding

       <summary>

       ## Evidence

       ```
       <evidence block>
       ```

       ## Impact

       <impact>

       ## Triangulation

       Flagged by: <flagged_by list>
       Lenses covered: <lenses_covered list> (<lens_dimensions_count> dimensions)
       <if multi_dimensional>This is a multi-dimensional finding — it resists single-lens review.</if>

       ---
       *Filed by quality-triage. Effort tier hint: <tier_hint>.*

       <!-- quality-triage-fingerprint: <category>|<file>|<line-or-dash> -->
       ```

       The trailing HTML comment is the dedup fingerprint. It is REQUIRED — without
       it, subsequent runs cannot detect duplicates. For CSV-based trackers
       (jira/linear) that strip HTML from the description, ALSO put the
       fingerprint in a dedicated `Fingerprint` CSV column (see per-tracker
       format below) so dedup still works on future imports.

       Labels: `{{ local_finding_label }}`, `tier-<tier_hint>`, `severity-<severity>`.

       **Per-tracker filing:**

       {% if issue_tracker == "github" %}
       Use `gh issue create --repo "{{ repo }}" -F body.md -t "<title>" -l ...`.
       Never interpolate body into the shell. Capture the returned issue number
       and URL.
       {% elif issue_tracker == "jira" %}
       Append a CSV row to `{{ workspace }}/06-issues.csv` with columns:
       `Summary, Description, Issue Type, Priority, Labels, Fingerprint`.

       - Summary: the title (no `[review]` prefix — Jira issues show project key).
       - Description: the full markdown body above (Jira supports markdown render
         in modern instances; for legacy wiki-syntax instances, the import UI
         can convert).
       - Issue Type: `Bug` (default; tier-3 architectural → `Task`).
       - Priority: severity-critical→Highest, high→High, medium→Medium, low→Low.
       - Labels: comma-separated `{{ local_finding_label }},tier-<tier_hint>,severity-<severity>`.
       - Fingerprint: `<category>|<file>|<line-or-dash>` (the dedicated column
         makes dedup robust even if Jira strips the HTML comment).

       Do NOT call any Jira API to create issues — operators import the CSV
       manually via Jira's bulk import UI. This keeps the score safe to run
       without write credentials.
       {% elif issue_tracker == "linear" %}
       Append a CSV row to `{{ workspace }}/06-issues.csv` with columns:
       `Title, Description, Status, Priority, Estimate, Labels, Fingerprint`.

       - Title: the `[review]`-prefixed title.
       - Description: the full markdown body above (Linear renders markdown).
       - Status: `Backlog` (importer default).
       - Priority: severity-critical→Urgent, high→High, medium→Medium, low→Low.
       - Estimate: tier-1→1, tier-2→2, tier-3→5.
       - Labels: comma-separated `{{ local_finding_label }},tier-<tier_hint>,severity-<severity>`.
       - Fingerprint: `<category>|<file>|<line-or-dash>`.

       Operators import via Linear's CSV import (Settings → Import/Export → CSV).
       {% else %}
       issue_tracker=none → this branch is unreachable (preflight sets
       SIDE_REPORT_MODE=1). Nothing to file.
       {% endif %}

    4. **Append to sanitized-corpus.yaml** — for each filed/CSV-row issue, add an
       entry to the corpus so stage 7 dep-investigation sees the unified set:
       ```yaml
       - number: <filed number or CSV row index, e.g. "csv-17">
         title: "<filed title (already sanitized)>"
         labels: ["{{ local_finding_label }}", "tier-<tier_hint>", "severity-<severity>"]
         scanner_verdict: "CLEAN"   # came from our own reviewers; no untrusted input
         source: "local"            # distinguishes from external issues
         body: "<finding summary + evidence + impact>"
         local_finding_id: "<local-NNN>"  # traceback to 05-local-findings.yaml
         fingerprint: "<category>|<file>|<line-or-dash>"
       ```
       For CSV-based trackers, `number` uses the prefix `csv-<rowIndex>` so
       downstream stages can still reference the entry even though no real
       tracker ID exists until the operator imports the CSV.

    ## Side-report mode (SIDE_REPORT_MODE=1)

    When write isn't available (gh unauthed, issue_tracker=none, or any other
    reason the preflight set SIDE_REPORT_MODE=1), do NOT fail the stage. Instead:
    - Write `{{ workspace }}/06-filed-locals.yaml` with:
      ```yaml
      mode: "side_report"
      reason: "<specific reason — e.g. 'gh unauthed', 'issue_tracker=none'>"
      filed: []
      side_report_findings: [ ... every synthesized finding, copied verbatim,
                              including computed fingerprint ... ]
      ```
    - Do NOT modify `sanitized-corpus.yaml` — external-only flow continues.
    - Stage 7 investigators will see only external issues.
    - Operators can re-run stage 6 later by re-running the score with the
      tracker write channel restored.

    ## Output

    1. `{{ workspace }}/06-filed-locals.yaml`:
       ```yaml
       mode: "filed" | "side_report"
       total_candidates: <N>
       filed: [ {local_id, issue_number, url, title, fingerprint, related_to?}, ... ]
       skipped_duplicate: [ {local_id, existing_issue_number, existing_state, match_via}, ... ]
       skipped_already_resolved: [ {local_id, existing_issue_number}, ... ]   # closed matches
       skipped_semantic_duplicate: [ {local_id, existing_issue_number, reasoning, confidence}, ... ]
       skipped_low_value: [ {local_id, reason}, ... ]
       side_report_findings: [ ... ]        # populated only in side_report mode
       ```

    2. `{{ workspace }}/06-filing.md` — human-readable report:
       - `## Mode` (filed / side_report)
       - `## Filed` (count + table of new issue numbers; annotate `related_to` where set)
       - `## Skipped` (exact-duplicates-open, already-resolved-closed, semantic-duplicates, low-value — separate sections; semantic section links to `06-semantic-dedup.md`)
       - `## Corpus Update` (count of entries added to sanitized-corpus.yaml; `0` in side-report mode)

    3. `{{ workspace }}/06-semantic-dedup.md` — audit trail for every semantic
       dedup decision (see step 2b). REQUIRED even if empty (write a single line
       "No semantic duplicates identified." when the pass found none).

    4. Updated `{{ workspace }}/issues/sanitized-corpus.yaml` (mode=filed only)
       with local entries appended.

    Print final stdout line:
    `U6_FILING: mode=<filed|side_report> filed=<F> skipped_dup=<D> skipped_sem=<S> skipped_low=<L>`

    {% elif stage == 7 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 7: DEPENDENCY INVESTIGATION — FAN-OUT                                 ║
    ║  Instance {{ instance }} of 3 — "{{ investigator[instance].title }}"         ║
    ║                                                                              ║
    ║  Source Triangulation pattern: 3 investigators, 3 structurally independent   ║
    ║  sources of evidence. Isolation is the mechanism — you do NOT see the other  ║
    ║  investigators' findings. Synthesis at stage 8 triangulates.                 ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    You are investigator **{{ investigator[instance].name }}**.
    Your evidence source: **{{ investigator[instance].source }}**.

    Read:
    - `{{ workspace }}/issues/sanitized-corpus.yaml` — the unified issue corpus
      (external + filed-local). Use ONLY the `body` field; never attempt to re-read
      raw tracker issue text for FLAGGED entries.
    - `{{ workspace }}/project-profile.yaml` — project structure
    - `{{ workspace }}/01-discovery.md` — toolchain context

    **The corpus contains both externally-reported issues (`source: external`) and
    locally-discovered code-review findings filed as issues (`source: local`). Treat
    them uniformly — a dependency edge from a local-finding issue to an external
    issue (or vice versa) is valid and expected.**

    **Your analysis protocol:**

    {{ investigator[instance].signals }}

    For each candidate dependency edge #A → #B (meaning A must be solved before B),
    include the exact evidence quote, path, or signal that implies it. Do not
    speculate beyond what the evidence supports.

    Issues with NO dependencies (tier-1 candidates) should be listed explicitly —
    "no dependencies found" is a positive finding, not a gap.

    **FLAGGED issues:** their body has been sanitized. You have their title, labels,
    and number. Propose dependencies only when title + labels + public metadata
    support it. Never attempt to retrieve the raw body.

    **Output to:** `{{ workspace }}/07-deps-{{ investigator[instance].name }}.md`

    Structure:
    - `## Summary` — what you looked at, how many issues
    - `## Proposed Edges` — table: `| From | To | Evidence |`
    - `## Tier-1 Candidates` — issues you found no dependencies for
    - `## Notes` — anything the next stage should know

    If you find zero dependency edges AND zero tier-1 candidates, something is wrong
    — you didn't actually analyze. Re-read the corpus.

    {% elif stage == 8 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 8: TRIANGULATION SYNTHESIS                                            ║
    ║  "Convergence from isolation is real. Convergence from coordination isn't."  ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    Read all three investigator reports:
    - `{{ workspace }}/07-deps-issues.md`
    - `{{ workspace }}/07-deps-code.md`
    - `{{ workspace }}/07-deps-tests.md`

    Also read `{{ workspace }}/issues/sanitized-corpus.yaml` for the issue set.

    For each proposed edge `#A → #B` (across all three reports), classify:

    - **CORROBORATED** — 2 or more investigators independently propose this edge.
      Strong dependency. Record which sources agreed and their evidence.
    - **UNCORROBORATED** — exactly 1 investigator proposes it. Weak dependency.
      Include with `edge_strength: uncorroborated`; breakable.
    - **CONTRADICTED** — investigators disagree on direction (A→B vs B→A). No edge
      added. Document both positions and why they differ.

    Then compute tier-1 issues: issues that **no investigator** proposed as the "To"
    side of any edge. These have no dependencies and can be solved first.

    **Output to:** `{{ workspace }}/08-triangulation.md`

    Required sections:
    - `## Corroborated Edges` — table with sources and evidence columns
    - `## Uncorroborated Edges` — table with source and evidence columns
    - `## Contradicted` — table showing both positions (or "None")
    - `## Independent Issues (Tier-1)` — bullet list of issues with no dependencies
    - `## Coverage Check` — total issues from corpus vs total mentioned in analysis

    Do not summarize. Don't average conflicting positions. Show the structure so
    stage 9 can assemble the DAG mechanically.

    {% elif stage == 9 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 9: DAG ASSEMBLY                                                       ║
    ║  "The data becomes the program"                                              ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    Read `{{ workspace }}/08-triangulation.md` and
    `{{ workspace }}/issues/sanitized-corpus.yaml`.

    Assemble `{{ workspace }}/issue-dag.yaml` using schema `issue-triage-dag-v1` —
    the exact schema issue-solver consumes:

    ```yaml
    dag_metadata:
      schema: "issue-triage-dag-v1"
      source_score: "quality-triage"
      repo: "{{ repo }}"
      label: "{{ issue_label }}"
      local_label: "{{ local_finding_label }}"
      generated: "<ISO 8601 timestamp>"
      total_issues: <N>
      total_edges: <N>
      tiers: <N>
    issues:
      - number: <int>
        title: "<title>"
        tier: <int>               # 1 = no deps; compute from depends_on graph
        depends_on: [<int>, ...]  # list of issue numbers
        edge_strength: "corroborated | uncorroborated | independent"
        evidence: "<brief>"
        scanner_verdict: "CLEAN | FLAGGED"
        source: "external | local"  # propagated from sanitized-corpus.yaml
    resolved: []   # solver appends here
    ```

    **Tier computation:** tier is the length of the longest path from any tier-1
    root to this issue + 1. Issues with `depends_on: []` are tier 1. An issue
    depending on a tier-2 and a tier-3 is tier 4. Document the tier distribution.

    **Acyclicity** — run a topological sort. If a cycle exists, break the weakest
    edge (UNCORROBORATED before CORROBORATED) and document which edge was broken
    in `## Notes` below.

    Verify with this script:
    ```bash
    python3 - <<'PY'
    import yaml, pathlib, sys
    from collections import defaultdict, deque
    d = yaml.safe_load(pathlib.Path("{{ workspace }}/issue-dag.yaml").read_text())
    assert d.get("dag_metadata", {}).get("schema") == "issue-triage-dag-v1", "schema mismatch"
    issues = {i["number"]: i for i in d["issues"]}
    in_deg = {n: 0 for n in issues}
    graph = defaultdict(list)
    for i in d["issues"]:
        for dep in i.get("depends_on") or []:
            if dep not in issues:
                print(f"ERROR: issue #{i['number']} depends on unknown #{dep}", file=sys.stderr)
                sys.exit(1)
            graph[dep].append(i["number"])
            in_deg[i["number"]] += 1
    q = deque([n for n,v in in_deg.items() if v == 0])
    visited = 0
    while q:
        n = q.popleft(); visited += 1
        for m in graph[n]:
            in_deg[m] -= 1
            if in_deg[m] == 0: q.append(m)
    if visited != len(issues):
        print(f"ERROR: cycle detected ({visited}/{len(issues)} sorted)", file=sys.stderr)
        sys.exit(1)
    print(f"Acyclic: {len(issues)} issues, topological sort verified")
    PY
    ```

    Every `depends_on` entry must reference a number that exists in `issues`. Every
    issue in the sanitized corpus must appear in the DAG (no silent drops).

    **Output to:** `{{ workspace }}/09-dag.md`

    Sections:
    - `## DAG Summary` — total issues, edges, tiers, local-vs-external counts
    - `## Verification` — topo sort output (must say "Acyclic: ...")
    - `## Notes` — broken edges (if any), coverage issues, tier distribution

    {% elif stage == 10 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 10: HANDOFF MANIFEST                                                  ║
    ║  "The door that issue-solver walks through"                                  ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    Read `{{ workspace }}/issue-dag.yaml` and `{{ workspace }}/09-dag.md`.
    The harness and smoke gate were already verified in stage 2 — do not re-run.

    Write `{{ workspace }}/10-ready.md`:

    ```markdown
    # Quality Triage Complete

    ## Project
    - Repo: {{ repo }}
    - External label: {{ issue_label }}
    - Local-finding label: {{ local_finding_label }}
    - Profile: project-profile.yaml
    - Harness: project-harness/ (test.sh, lint.sh, typecheck.sh, smoke.sh)

    ## Issues
    - Total in DAG: <N>
    - External (from tracker): <N>
    - Local (code-review filed): <N>   # 0 if side-report mode
    - Clean / Flagged: <N> / <N>
    - Tiers: <N>

    ## DAG
    - Total edges: <N>  (<M> corroborated, <K> uncorroborated)
    - Tier-1 (no deps): <list of numbers>
    - Critical path length: <N> issues
    - Schema: issue-triage-dag-v1  (solver-compatible)

    ## Handoff
    - Triage workspace: {{ workspace }}
    - Solver reads: issue-dag.yaml, issues/sanitized-corpus.yaml, project-harness/, project-profile.yaml
    - Solver mutates: issue-dag.yaml (resolved list) — atomic write per iteration

    Ready for Score 2 (issue-solver).
    ```

    Verify the DAG still parses:
    ```bash
    python3 -c "import yaml; yaml.safe_load(open('{{ workspace }}/issue-dag.yaml'))"
    ```

    If parsing fails, the DAG was corrupted between stages 9 and 10 — stop and
    report. Do not claim readiness.

    {% endif %}

validations:
  # ── Stage 1: Project Discovery ──────────────────────────────────────────────
  - type: file_exists
    path: "{workspace}/01-discovery.md"
    description: "Discovery report exists"
    condition: "sheet_num >= 1"
  - type: content_contains
    path: "{workspace}/01-discovery.md"
    pattern: "## Commands Discovered"
    description: "Discovery lists commands"
    condition: "sheet_num >= 1"
    stage: 2
  - type: content_contains
    path: "{workspace}/01-discovery.md"
    pattern: "## Confidence"
    description: "Discovery records confidence levels"
    condition: "sheet_num >= 1"
    stage: 2

  # ── Stage 2: Harness + Shipyard Gate ────────────────────────────────────────
  - type: file_exists
    path: "{workspace}/02-harness.md"
    description: "Harness report exists"
    condition: "sheet_num >= 2"
  - type: file_exists
    path: "{workspace}/project-profile.yaml"
    description: "Project profile exists"
    condition: "sheet_num >= 2"
  - type: command_succeeds
    command: 'python3 -c "import yaml; yaml.safe_load(open(\"{workspace}/project-profile.yaml\"))"'
    description: "Project profile is valid YAML"
    condition: "sheet_num >= 2"
    stage: 2
  - type: command_succeeds
    command: 'test -x "{workspace}/project-harness/test.sh" && test -x "{workspace}/project-harness/lint.sh" && test -x "{workspace}/project-harness/typecheck.sh" && test -x "{workspace}/project-harness/smoke.sh"'
    description: "All four harness scripts exist and are executable"
    condition: "sheet_num >= 2"
    stage: 2
  - type: content_contains
    path: "{workspace}/02-harness.md"
    pattern: "SHIPYARD_GATE: PASS"
    description: "Shipyard gate: smoke.sh passed against the project"
    condition: "sheet_num >= 2"
    stage: 3

  # ── Stage 3: Issue Fetch + Safe Triage ──────────────────────────────────────
  - type: file_exists
    path: "{workspace}/03-triage.md"
    description: "Triage report exists"
    condition: "sheet_num >= 3"
  - type: file_exists
    path: "{workspace}/issues/sanitized-corpus.yaml"
    description: "Sanitized issue corpus exists"
    condition: "sheet_num >= 3"
  - type: command_succeeds
    command: |
      python3 -c "
      import yaml
      d = yaml.safe_load(open('{workspace}/issues/sanitized-corpus.yaml'))
      assert isinstance(d, dict), 'root must be dict'
      assert 'issues' in d, 'missing issues key'
      for i in d['issues']:
          assert 'scanner_verdict' in i, f\"issue {i.get('number')} missing scanner_verdict\"
          assert i['scanner_verdict'] in ('CLEAN','FLAGGED'), f\"bad verdict {i['scanner_verdict']}\"
      print(f'OK: {len(d[\"issues\"])} issues, all have verdicts')
      "
    description: "Sanitized corpus has scanner_verdict on every issue"
    condition: "sheet_num >= 3"
    stage: 2

  # ── Stage 4: Local Review fan-out (sheets 4-7) ──────────────────────────────
  - type: file_exists
    path: "{workspace}/04-review-field-engineer.yaml"
    description: "Field Engineer review output exists"
    condition: "stage == 4 and instance == 1"
  - type: file_exists
    path: "{workspace}/04-review-architect.yaml"
    description: "Architect review output exists"
    condition: "stage == 4 and instance == 2"
  - type: file_exists
    path: "{workspace}/04-review-newcomer.yaml"
    description: "Newcomer review output exists"
    condition: "stage == 4 and instance == 3"
  - type: file_exists
    path: "{workspace}/04-review-steward.yaml"
    description: "Steward review output exists"
    condition: "stage == 4 and instance == 4"
  - type: content_contains
    path: "{workspace}/04-review-field-engineer.yaml"
    pattern: "reviewer: \"field-engineer\""
    description: "Field Engineer reviewer tag present"
    condition: "stage == 4 and instance == 1"
    stage: 2
  - type: content_contains
    path: "{workspace}/04-review-architect.yaml"
    pattern: "reviewer: \"architect\""
    description: "Architect reviewer tag present"
    condition: "stage == 4 and instance == 2"
    stage: 2
  - type: content_contains
    path: "{workspace}/04-review-newcomer.yaml"
    pattern: "reviewer: \"newcomer\""
    description: "Newcomer reviewer tag present"
    condition: "stage == 4 and instance == 3"
    stage: 2
  - type: content_contains
    path: "{workspace}/04-review-steward.yaml"
    pattern: "reviewer: \"steward\""
    description: "Steward reviewer tag present"
    condition: "stage == 4 and instance == 4"
    stage: 2

  # ── Stage 5: Local Synthesis (sheet 8) ──────────────────────────────────────
  - type: file_exists
    path: "{workspace}/05-local-findings.yaml"
    description: "Local synthesis output exists"
    condition: "sheet_num >= 8"
  - type: content_contains
    path: "{workspace}/05-local-findings.yaml"
    pattern: "synthesized_findings:"
    description: "Synthesis emits synthesized_findings section"
    condition: "sheet_num >= 8"
    stage: 2
  - type: content_contains
    path: "{workspace}/05-local-findings.yaml"
    pattern: "cross_persona_narrative:"
    description: "Synthesis emits cross_persona_narrative"
    condition: "sheet_num >= 8"
    stage: 2
  - type: content_contains
    path: "{workspace}/05-local-findings.yaml"
    pattern: "blind_spots:"
    description: "Synthesis emits blind_spots section"
    condition: "sheet_num >= 8"
    stage: 2

  # ── Stage 6: File Local Findings (sheet 9) ──────────────────────────────────
  - type: file_exists
    path: "{workspace}/06-filed-locals.yaml"
    description: "Filing manifest exists"
    condition: "sheet_num >= 9"
  - type: file_exists
    path: "{workspace}/06-filing.md"
    description: "Filing report exists"
    condition: "sheet_num >= 9"
  - type: file_exists
    path: "{workspace}/06-semantic-dedup.md"
    description: "Semantic dedup audit trail exists"
    condition: "sheet_num >= 9"
  - type: command_succeeds
    command: |
      python3 -c "
      import yaml
      d = yaml.safe_load(open('{workspace}/06-filed-locals.yaml'))
      assert d.get('mode') in ('filed', 'side_report'), f\"bad mode {d.get('mode')}\"
      print(f'OK: mode={d[\"mode\"]}')
      "
    description: "Filing manifest has valid mode (filed or side_report)"
    condition: "sheet_num >= 9"
    stage: 2

  # ── Stage 7: Dependency Investigation fan-out (sheets 10-12) ────────────────
  - type: file_exists
    path: "{workspace}/07-deps-issues.md"
    description: "Issues investigator output exists"
    condition: "stage == 7 and instance == 1"
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/07-deps-issues.md") -ge 100'
    description: "Issues investigator produced substantive analysis"
    condition: "stage == 7 and instance == 1"
    stage: 2
  - type: file_exists
    path: "{workspace}/07-deps-code.md"
    description: "Code investigator output exists"
    condition: "stage == 7 and instance == 2"
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/07-deps-code.md") -ge 100'
    description: "Code investigator produced substantive analysis"
    condition: "stage == 7 and instance == 2"
    stage: 2
  - type: file_exists
    path: "{workspace}/07-deps-tests.md"
    description: "Tests investigator output exists"
    condition: "stage == 7 and instance == 3"
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/07-deps-tests.md") -ge 100'
    description: "Tests investigator produced substantive analysis"
    condition: "stage == 7 and instance == 3"
    stage: 2

  # ── Stage 8: Triangulation (sheet 13) ───────────────────────────────────────
  - type: file_exists
    path: "{workspace}/08-triangulation.md"
    description: "Triangulation report exists"
    condition: "sheet_num >= 13"
  - type: content_contains
    path: "{workspace}/08-triangulation.md"
    pattern: "## Corroborated"
    description: "Triangulation reports corroborated edges"
    condition: "sheet_num >= 13"
    stage: 2
  - type: content_contains
    path: "{workspace}/08-triangulation.md"
    pattern: "## Uncorroborated"
    description: "Triangulation reports uncorroborated edges"
    condition: "sheet_num >= 13"
    stage: 2
  - type: content_contains
    path: "{workspace}/08-triangulation.md"
    pattern: "## Independent Issues"
    description: "Triangulation identifies tier-1 issues"
    condition: "sheet_num >= 13"
    stage: 2

  # ── Stage 9: DAG Assembly (sheet 14) ────────────────────────────────────────
  - type: file_exists
    path: "{workspace}/09-dag.md"
    description: "DAG report exists"
    condition: "sheet_num >= 14"
  - type: file_exists
    path: "{workspace}/issue-dag.yaml"
    description: "issue-dag.yaml exists"
    condition: "sheet_num >= 14"
  - type: command_succeeds
    command: |
      python3 -c "
      import yaml
      d = yaml.safe_load(open('{workspace}/issue-dag.yaml'))
      assert d.get('dag_metadata', {}).get('schema') == 'issue-triage-dag-v1', 'schema must be issue-triage-dag-v1 for solver compatibility'
      assert 'issues' in d and 'resolved' in d
      assert isinstance(d['resolved'], list)
      print(f'DAG valid: {len(d[\"issues\"])} issues, schema={d[\"dag_metadata\"][\"schema\"]}')
      "
    description: "DAG uses issue-triage-dag-v1 schema (solver-compatible)"
    condition: "sheet_num >= 14"
    stage: 2
  - type: command_succeeds
    command: |
      python3 -c "
      import yaml
      from collections import defaultdict, deque
      d = yaml.safe_load(open('{workspace}/issue-dag.yaml'))
      issues = {i['number']: i for i in d['issues']}
      in_deg = {n: 0 for n in issues}
      graph = defaultdict(list)
      for i in d['issues']:
          for dep in i.get('depends_on') or []:
              assert dep in issues, f'unknown dep #{dep}'
              graph[dep].append(i['number']); in_deg[i['number']] += 1
      q = deque([n for n,v in in_deg.items() if v == 0])
      visited = 0
      while q:
          n = q.popleft(); visited += 1
          for m in graph[n]:
              in_deg[m] -= 1
              if in_deg[m] == 0: q.append(m)
      assert visited == len(issues), f'cycle: {visited}/{len(issues)}'
      print(f'Acyclic: {len(issues)} issues')
      "
    description: "DAG is acyclic (topological sort succeeds)"
    condition: "sheet_num >= 14"
    stage: 3

  # ── Stage 10: Handoff (sheet 15) ────────────────────────────────────────────
  - type: file_exists
    path: "{workspace}/10-ready.md"
    description: "Handoff manifest exists"
    condition: "sheet_num >= 15"
  - type: content_contains
    path: "{workspace}/10-ready.md"
    pattern: "Ready for Score 2"
    description: "Manifest declares readiness"
    condition: "sheet_num >= 15"
    stage: 2
  - type: command_succeeds
    command: 'python3 -c "import yaml; yaml.safe_load(open(\"{workspace}/issue-dag.yaml\"))"'
    description: "DAG still parses at end of pipeline"
    condition: "sheet_num >= 15"
    stage: 2

# Chain to issue-solver.yaml — artifacts are contract-identical with issue-triage,
# so solver consumes without adaptation. EDIT job_path to the absolute path of
# issue-solver.yaml on your system before first run (relative paths resolve from
# the conductor's CWD, not this score's directory).
on_success:
  - type: run_job
    job_path: "[CHANGE THIS: ABSOLUTE path to examples/engineering/issue-solver.yaml]"
    description: "Chain to issue-solver. Quality-triage emits issue-triage-dag-v1 schema, so issue-solver consumes directly."
    detached: true
    fresh: true

concert:
  enabled: true
  max_chain_depth: 2        # this score (1) → issue-solver (1 hop; solver self-chains internally)
  cooldown_between_jobs_seconds: 60
  inherit_workspace: false
