# project-roadmap.yaml
#
# A generic score that replaces project management. Any project can use it.
# Audits a project from seven independent analytical frames, triangulates
# findings, and produces a prioritized roadmap with milestones + task list.
#
# Pattern Composition:
#   Immune Cascade (stages 1-2) → Rashomon Gate (stages 3-5) →
#   Sugya Weave into stage 5 → Fan-out + Synthesis (stages 6-7)
#
#   Immune Cascade: 6 cheap sweep agents partition discovery (code, docs,
#   issues, git, ecosystem, competitive landscape), then Opus assembles
#   the atlas. The competitive sweep uses web search for positioning data.
#
#   Rashomon Gate: 7 analytical frames — 4 inward (health, trajectory,
#   risk, readiness), 2 outward (shipping, positioning), 1 operational
#   (capacity). Each examines the same atlas independently.
#
# Execution Flow (8 stages, 24 sheets):
#
#   Stage 1: Broad Sweep (6 sheets, parallel — Sonnet)
#        |   code | docs | issues | git | ecosystem | competitive
#        +----+----+----+----+----+----+
#                       v
#   Stage 2: Atlas Assembly (1 sheet — Opus)
#        |
#        +---+---+---+---+---+---+---+
#        v   v   v   v   v   v   v   v
#   Stage 3: Rashomon Analysis (7 sheets, parallel — Opus)
#        |   health | trajectory | risk | readiness | shipping | capacity | positioning
#        +---+---+---+---+---+---+---+
#                       v
#   Stage 4: Structured Triangulation (1 sheet)
#        |
#   Stage 5: Editorial Synthesis + Roadmap (1 sheet)
#        |
#        +--------+--------+
#        v        v        v
#   Stage 6: Adversarial Review (3 sheets, parallel — mixed instruments)
#        |        |        |
#        +--------+--------+
#                 v
#   Stage 7: Final Deliverable (1 sheet)
#        |
#   Stage 8: Execution Setup (4 sheets, parallel)
#        → issues script, visual timeline, immediate actions, slide deck
#
# Output:
#   workspaces/{name}/
#     01-sweep-{1..6}.md          — Broad sweep reports (partitioned)
#     02-atlas.md                 — Consolidated project atlas
#     03-frame-{1..7}.md          — Independent analytical reports
#     04-triangulation.yaml       — Structured finding categorization
#     05-roadmap.md               — Draft roadmap + tasks with editorial position
#     06-review-{1..3}.md         — Adversarial review reports
#     07-roadmap.md               — Final roadmap (milestones + tasks)
#     08-setup-issues.sh          — Script to create issues + milestones in tracker
#     08-gantt.md                 — Visual timeline (Mermaid gantt chart)
#     08-next-actions.md          — What to do today, this week, this month
#     08-slides.md               — Marp markdown presentation
#     08-slides.html             — Rendered HTML slide deck (generated by validation)
#
# Usage:
#   1. Edit the variables section below (project_root, project_name, etc.)
#   2. Also update the workspace path below if not running for Marianne
#   3. mzt validate scores/project-roadmap.yaml
#   4. mzt run scores/project-roadmap.yaml
#   5. Read workspaces/project-roadmap-workspace/07-roadmap.md
#
# Cost: ~$15-28 per run (24 sheets: 6 Sonnet + 18 Opus/mixed)
# Time: ~40-60 minutes

name: "project-roadmap"
description: "Multi-perspective project audit → prioritized roadmap + task list"

workspace: "/home/emzi/Projects/marianne-ai-compose/workspaces/project-roadmap-workspace"

instrument: claude-code
instrument_fallbacks: [gemini-cli, opencode]
instrument_config:
  timeout_seconds: 2400
  skip_permissions: true
  disable_mcp: true

instruments:
  sweeper:
    profile: claude-code
    config:
      timeout_seconds: 1800
      cli_model: claude-sonnet-4-6
  # Competitive landscape sweep needs web search (native tools, not MCP)
  web-sweeper:
    profile: claude-code
    config:
      timeout_seconds: 2400
      cli_model: claude-sonnet-4-6
  assembler:
    profile: claude-code
    config:
      timeout_seconds: 2400
  analyst:
    profile: claude-code
    config:
      timeout_seconds: 2400
  triangulator:
    profile: claude-code
    config:
      timeout_seconds: 2400
  synthesizer:
    profile: claude-code
    config:
      timeout_seconds: 3600
  gemini-reviewer:
    profile: gemini-cli
    config:
      timeout_seconds: 2400
  glm-reviewer:
    profile: opencode
    config:
      timeout_seconds: 3600
  finalizer:
    profile: claude-code
    config:
      timeout_seconds: 3600

movements:
  1:
    name: "Broad Sweep"
    instrument: sweeper
  2:
    name: "Atlas Assembly"
    instrument: assembler
  3:
    name: "Analysis"
    instrument: analyst
  4:
    name: "Triangulation"
    instrument: triangulator
  5:
    name: "Synthesis"
    instrument: synthesizer
  6:
    name: "Review"
  7:
    name: "Final"
    instrument: finalizer
  8:
    name: "Execution Setup"
    instrument: finalizer

sheet:
  size: 1
  total_items: 8
  fan_out:
    1: 6
    3: 7
    6: 3
    8: 4
  dependencies:
    2: [1]
    3: [2]
    4: [3]
    5: [4]
    6: [5]
    7: [6]
    8: [7]
  instrument_map:
    # Competitive landscape sweep needs web access (sheet 6 after expansion)
    web-sweeper: [6]
    # Diverse instruments for review stage (sheets 17-19 after expansion)
    gemini-reviewer: [18]
    glm-reviewer: [19]

parallel:
  enabled: true
  max_concurrent: 7

cross_sheet:
  auto_capture_stdout: false
  max_output_chars: 10000
  lookback_sheets: 3
  capture_files:
    - "{{ workspace }}/*.md"
    - "{{ workspace }}/*.yaml"

retry:
  max_retries: 2

stale_detection:
  enabled: true
  idle_timeout_seconds: 1800

prompt:
  variables:
    # ─────────────────────────────────────────────
    # CONFIGURE THESE for your project
    # ─────────────────────────────────────────────
    project_root: "/home/emzi/Projects/marianne-ai-compose"
    project_name: "Marianne AI Compose"
    project_description: >-
      Orchestration infrastructure for collaborative intelligence.
      Declarative YAML scores, multi-stage AI agent pipelines with
      validation gates and error recovery.
    issue_tracker: "github"        # github | jira | linear | none

    # Optional: directory with project-specific context files.
    # This is how you give the score knowledge a PM gets from meetings,
    # dashboards, and conversations — things the codebase can't tell you.
    #
    # Create any of these files to enrich the analysis:
    #   stakeholders.md     — who cares about this project, what they want,
    #                         where their priorities conflict
    #   customers.md        — support tickets, NPS data, churn reasons,
    #                         user research, usage analytics
    #   business-context.md — revenue, runway, KPIs, board priorities,
    #                         budget constraints, hiring plans
    #   team.md             — headcount, skills, availability, who's
    #                         overloaded, who's ramping up
    #   constraints.md      — regulatory, compliance, legal, contractual
    #                         deadlines, security requirements
    #   stop-doing.md       — things to kill, descope, or deprioritize;
    #                         features nobody uses, tech debt to abandon
    #
    # Files that exist get injected into the analysis. Files that don't
    # exist are skipped. The more you provide, the more the roadmap
    # accounts for business reality — not just engineering reality.
    venue_context_dir: ""

    # Optional: related projects/repos that inform the roadmap
    related_projects:
      - path: "/home/emzi/Projects/flowspec"
        relationship: "structural code analyzer — integrated as tooling"
      - path: "/home/emzi/Projects/backyard-capitalism-9000"
        relationship: "shared agent infrastructure (RLF prototype)"
      - path: "/home/emzi/Projects/mozart-orchestra-live"
        relationship: "public website (mzt.dev)"
      - path: "/home/emzi/Projects/score-compiler"
        relationship: "composition compiler — bundled as submodule"
      - path: "/home/emzi/Projects/recursive-light"
        relationship: "AI personhood layer — reference integration"

    # ─────────────────────────────────────────────
    # Immune Cascade sweep partitions
    # ─────────────────────────────────────────────
    sweeps:
      1:
        name: "code-infrastructure"
        focus: >-
          Project structure, directory layout, package configuration,
          source code organization, build system, dependencies.
          Run health checks for the tech stack.
        instructions: >-
          Map the directory tree. Read the package configuration file
          (pyproject.toml, package.json, Cargo.toml, go.mod, or
          equivalent). Count source files. Identify key modules and
          their purposes. Run the health commands provided in the
          prompt below.

      2:
        name: "docs-specs-plans"
        focus: >-
          ALL documentation: README, specs, design documents, plans,
          research, guides. This is the most important sweep — read
          actual document content, not just filenames.
        instructions: >-
          Search for documentation directories (docs/, doc/, specs/,
          plans/, design/, research/, or any directory containing .md
          files that aren't source code). Look for index files or
          navigation aids (INDEX.yaml, INDEX.md, README.md in doc dirs).
          Search for a spec corpus or structured project intent — any
          directory containing goals, constraints, conventions, or
          architectural decisions as structured files. Check for roadmap
          or planning documents anywhere in the project. Look for API
          specifications (OpenAPI/Swagger YAML/JSON, protobuf .proto
          files, GraphQL schemas, RAML, AsyncAPI) — these are often
          the primary documentation for services. Then read the ACTUAL
          CONTENT of key documents. For each, summarize what it says,
          its status (draft/active/completed), and whether it describes
          work done or work planned. Prioritize depth over breadth —
          reading 10 documents thoroughly beats listing 50 filenames.

      3:
        name: "issues-tracking"
        focus: >-
          Issue tracker state, bug counts, feature requests, labels,
          priorities, velocity, and any project tracking artifacts.
        instructions: >-
          Query the issue tracker for open/closed issues, labels, and
          patterns. Look for project tracking artifacts anywhere in
          the project — TODO files, task lists, bug registries, kanban
          boards, status files, decision logs, progress trackers.
          Analyze: what's the bug creation vs closure rate? What labels
          or categories exist? Are there stale issues? What's the
          priority distribution? Look for informal tracking too —
          TODO comments in code, FIXME markers, HACK annotations.

      4:
        name: "git-history"
        focus: >-
          Commit history, recent activity, velocity, contributor patterns,
          branches, tags, releases, recent change themes.
        instructions: >-
          Run git log, analyze commit messages for themes and direction.
          Check velocity (commits per week). Look at what areas of code
          changed most recently. Check for releases, tags, branches.
          Identify the most active development areas. Look for patterns:
          is work focused or scattered? Are commits fixing bugs, adding
          features, or refactoring? What does the trajectory look like?

      5:
        name: "ecosystem"
        focus: >-
          Related projects, external dependencies, CI/CD, deployment,
          marketing/visibility, packaging, user-facing presence.
        instructions: >-
          Check each related project directory for existence and state.
          Look for CI configuration (.github/workflows/, .gitlab-ci.yml,
          Jenkinsfile, .circleci/, buildkite, etc.). Check for container
          and deployment setup (Dockerfile, docker-compose, Helm charts,
          kustomize, k8s manifests, Terraform, CloudFormation). Look for
          marketing presence (website, package registry listings, GitHub
          topics/description). Assess ecosystem coherence — do the
          related projects work together? Is the project visible and
          discoverable?

      6:
        name: "competitive-landscape"
        focus: >-
          Similar tools, competing projects, market positioning. Use
          web search to find what else exists in this space.
        instructions: >-
          Use web search to research the competitive landscape for this
          project. Search for similar tools, competing projects, and
          alternative approaches. For each competitor found, note: name,
          what it does, how it differs, its maturity level, its user
          base (stars, downloads, community size if findable). Also
          search for the project itself — is it mentioned anywhere?
          Blog posts, discussions, comparisons? Assess: is there a
          clear niche? Is the space crowded? What do competitors do
          that this project doesn't? What does this project do that
          competitors don't?

    # ─────────────────────────────────────────────
    # Rashomon Gate frames — analytical perspectives
    # ─────────────────────────────────────────────
    frames:
      # ── Inward-facing ──
      1:
        name: "health"
        question: "Is this project in good shape?"
        voice: >-
          You are a senior engineer performing a health audit. You assess
          code quality, test coverage, type safety, linting, bug counts,
          resolution rates, and technical debt. You distinguish between
          "working" and "well-built." A project can pass all tests and
          still be unhealthy.
        focus: >-
          Tests passing? Types clean? Lint clean? Bug count vs resolution
          rate? Code quality indicators? Known issues vs unknown? Stale
          dependencies? Build reliability?
        degradation: >-
          If no test suite exists, assess from code complexity, static
          analysis signals, and error handling patterns. If no type system,
          skip. Report what you CAN assess, flag what you CANNOT.

      2:
        name: "trajectory"
        question: "Is this project moving toward its goals?"
        voice: >-
          You are a technical program manager tracking delivery against
          intent. You compare stated plans against actual implementation.
          You measure drift — the gap between what the project says it
          will do and what it has done. You read specs, roadmaps, and
          commit history to triangulate direction.
        focus: >-
          Specs written vs implemented? Roadmap items completed vs
          outstanding? Recent commit direction? Issue velocity? Stated
          goals vs actual work? Features started but not finished?
        degradation: >-
          If no formal goals or specs exist, infer trajectory from commit
          history direction, README evolution, and issue patterns. If no
          issue tracker, assess from code change patterns alone. Flag
          the absence of formal goals as a finding.

      3:
        name: "risk"
        question: "What could go wrong?"
        voice: >-
          You are a risk analyst who thinks in failure modes. You look
          for architectural debt, security gaps, missing infrastructure,
          single points of failure, and decisions that will be expensive
          to reverse. You assess both technical risk and project risk.
        focus: >-
          Architectural debt? Security concerns? Missing infrastructure
          (no CI? no packaging? no deployment?)? Stale or vulnerable
          dependencies? Single points of failure? Bus factor? Decisions
          that lock in expensive paths?
        degradation: >-
          If no security tooling exists, assess from code patterns
          (hardcoded secrets, SQL injection surfaces, auth patterns).
          If no CI, flag as infrastructure risk. Always assessable —
          risk analysis works on absence as much as presence.

      4:
        name: "readiness"
        question: "Could someone use this project today?"
        voice: >-
          You are a developer advocate evaluating first-use experience.
          You try to understand, install, configure, and use the project
          as an outsider would. You assess documentation, examples,
          packaging, onboarding friction, and ecosystem coherence.
        focus: >-
          Documentation quality and completeness? Working examples?
          Installation experience? Error messages helpful? Marketing
          and visibility? Related projects coherent? README accurate?
          Contributing guide exists?
        degradation: >-
          For internal tools, narrow to "does it build, does it have a
          README, can a new team member get started?" For libraries,
          focus on API docs and examples. For services, focus on
          deployment docs and operational runbooks. Adapt "readiness"
          to the project type.

      # ── Outward-facing ──
      5:
        name: "shipping"
        question: "What would it take to get someone using this next month?"
        voice: >-
          You are a product manager focused on launch. You think in terms
          of minimum viable launches, first-user experience, packaging,
          distribution channels, and what "shipped" means concretely. You
          distinguish between "technically works" and "someone can actually
          adopt this." You're impatient with infrastructure that doesn't
          serve users.
        focus: >-
          What does "shipped" mean for this project type? Is there a
          working demo or quickstart? What's the installation story?
          Is it packaged (PyPI, npm, crates.io, Docker)? What's the
          minimum viable launch — what could ship THIS MONTH? What's
          blocking that? Is there a landing page, README that sells,
          or just technical docs? What would a launch announcement
          look like?
        degradation: >-
          If the project is internal tooling, "shipping" means "another
          team can adopt it." If it's a library, "shipping" means "on
          a package registry with docs." If it's pre-alpha, focus on
          what the smallest demonstrable milestone would be. Always
          assessable — every project can ship something.

      6:
        name: "capacity"
        question: "Can this team actually execute a roadmap?"
        voice: >-
          You are a resource planner who thinks in terms of throughput,
          bottlenecks, and sustainable pace. You assess the team from
          evidence: git history reveals contributor count, commit
          patterns, sustained vs burst activity. Issue velocity reveals
          capacity to absorb work. You're the frame that says "the
          roadmap is great, but who's going to do it?"
        focus: >-
          How many active contributors? What's the commit velocity and
          is it sustainable or burst? What's the ratio of work created
          (issues, features) to work completed? Is there evidence of
          burnout or unsustainable pace? What skills does the project
          need that the current team may lack? What's the bus factor?
          If there's one contributor, what does a 30-task roadmap
          actually look like in calendar time?
        degradation: >-
          If git history shows only one contributor, that IS the
          capacity assessment. If commit velocity is unavailable,
          assess from issue resolution rate. If no data at all,
          flag as "capacity unknown — roadmap feasibility unverifiable."

      7:
        name: "positioning"
        question: "Where does this sit in the landscape and why should anyone care?"
        voice: >-
          You are a market analyst evaluating competitive position. You
          assess what makes this project different from alternatives,
          whether that difference matters to anyone, and whether the
          project's narrative matches reality. You've read the competitive
          landscape sweep and you compare claims against evidence.
        focus: >-
          What's the competitive landscape? What alternatives exist?
          What's this project's unique value proposition — and is it
          real or aspirational? Who is the target user and do they
          know this exists? Is the project's self-description accurate
          and compelling? What narrative would make someone choose this
          over alternatives? What's the moat?
        degradation: >-
          If no competitive data exists in the atlas, note it as a
          gap — the project hasn't assessed its own landscape. If the
          project is genuinely novel (no competitors), assess whether
          that's because it's ahead of the market or because there's
          no market. Internal tools have different positioning
          dynamics — assess against build-vs-buy alternatives.

    # ─────────────────────────────────────────────
    # Review concerns — adversarial perspectives
    # ─────────────────────────────────────────────
    reviewers:
      1:
        name: "completeness"
        concern: "What's missing from this roadmap?"
        focus: >-
          Are there project areas not covered by any milestone? Tasks
          that should exist but don't? Dependencies between milestones
          that aren't captured? Risks identified in the assessment that
          have no mitigation in the plan? Entire categories of work
          (documentation, testing, infrastructure, marketing) that are
          absent? Does the roadmap address shipping, capacity, and
          positioning — or only engineering?

      2:
        name: "feasibility"
        concern: "Are the estimates and dependencies realistic?"
        focus: >-
          Are complexity estimates (S/M/L/XL) calibrated to reality?
          Do dependencies form a valid execution order? Can the
          milestones actually be completed in the suggested sequence?
          Are there hidden prerequisites? Is the scope realistic for
          the apparent team size and capacity? Are there technical
          blockers the roadmap doesn't account for?

      3:
        name: "strategic"
        concern: "Does this roadmap lead to the stated goals?"
        focus: >-
          Does the milestone ordering optimize for the project's actual
          goals (shipping, users, revenue, correctness)? Or does it
          optimize for engineering purity? Are there quick wins that
          should come earlier? Long-term investments that are missing?
          Does the roadmap address the project's biggest constraint?
          Would following this roadmap actually move the project forward?
          Does it have a concrete definition of "shipped"?

  template: |
    {# ── Reusable macros ────────────────────────────── #}
    {% macro output_spec(filename, format="markdown") %}
    ## Output
    - **File**: {{ workspace }}/{{ filename }}
    - **Format**: {{ format }}
    - Write a complete, well-structured document
    - The file MUST exist when you are done
    {% endmacro %}

    {% macro project_context() %}
    ## Project
    **{{ project_name }}** — {{ project_description }}
    - **Issue tracker**: {{ issue_tracker }}
    - **Root**: {{ project_root }}
    {% if related_projects %}
    - **Related projects**:
    {% for rp in related_projects %}
      - `{{ rp.path }}` — {{ rp.relationship }}
    {% endfor %}
    {% endif %}
    {% if venue_context_dir %}

    ### Venue Context (business/team/customer knowledge)
    Read ALL files in `{{ venue_context_dir }}` — these contain knowledge
    the codebase can't provide: stakeholder priorities, customer data,
    business metrics, team context, regulatory constraints, and things
    the project should STOP doing. Weight this context heavily — it
    represents what a human PM knows that you can't discover from code.
    {% endif %}
    {% endmacro %}

    {# ── Stage logic ────────────────────────────────── #}
    {% if stage == 1 %}
    {# ── IMMUNE CASCADE: Broad Sweep ─────────────── #}
    {% set sweep = sweeps[instance] %}
    # Stage 1: Broad Sweep — {{ sweep.name }}

    {{ project_context() }}

    ## Your Partition

    You are one of six parallel sweep agents, each scanning a different
    aspect of the project. Your partition: **{{ sweep.name }}**.

    ## Focus

    {{ sweep.focus }}

    ## Instructions

    {{ sweep.instructions }}

    {% if sweep.name == "code-infrastructure" %}
    ### Health Check Protocol
    1. Read the project's build configuration at `{{ project_root }}`
       (pyproject.toml, package.json, Cargo.toml, go.mod, Makefile, or whatever exists)
    2. Identify the language, framework, and tooling from that config
    3. Run whatever test/lint/type-check commands the project uses
       (look for test scripts, lint configs, CI workflows for the right commands)
    4. Report the results — pass/fail counts, error summaries
    5. If you can't determine the right commands, list what config you found
       and flag "health check commands could not be determined"
    {% endif %}

    {% if sweep.name == "issues-tracking" %}
    ### Issue Tracker: {{ issue_tracker }}
    {% if issue_tracker == "github" %}
    - Run: `cd {{ project_root }} && gh issue list --limit 50 --state open 2>&1`
    - Run: `cd {{ project_root }} && gh issue list --limit 20 --state closed 2>&1`
    - If `gh` fails, note "GitHub CLI inaccessible" and look for alternative tracking
    {% elif issue_tracker == "linear" %}
    - Linear has no official CLI. Look for tracking artifacts in the
      project: TODO files, task lists, sprint documents, or exported
      issue data. Check for Linear API keys in env or config that
      could indicate integration. Flag "Linear issue data requires
      manual export or API access" and document what you can find.
    {% else %}
    - Look for TODO files, task lists, or bug trackers in the project
    {% endif %}
    {% endif %}

    {% if sweep.name == "ecosystem" %}
    ### Related Projects
    {% if related_projects %}
    {% for rp in related_projects %}
    - `{{ rp.path }}` — {{ rp.relationship }}
    {% endfor %}
    {% else %}
    - No related projects specified. Look for references in docs or config.
    {% endif %}
    {% endif %}

    {% if sweep.name == "competitive-landscape" %}
    ### Research Approach
    Search the web for tools and projects similar to **{{ project_name }}**.
    Use the project description to formulate search queries:
    > {{ project_description }}

    Search for: direct competitors, alternative approaches to the same
    problem, adjacent tools that overlap, and any mentions of this
    project itself online.
    {% endif %}

    ## Graceful Degradation

    If a tool is unavailable, DO NOT fail. Note what you could not assess
    and why, then continue with what you can. Absence is data.

    {{ output_spec("01-sweep-" ~ instance ~ ".md") }}

    {% elif stage == 2 %}
    {# ── IMMUNE CASCADE: Atlas Assembly ──────────── #}
    # Stage 2: Atlas Assembly

    {{ project_context() }}

    ## Your Task

    Six sweep agents have scanned different partitions of this project.
    Read all their reports:

    {% for i in range(1, 7) %}
    - {{ workspace }}/01-sweep-{{ i }}.md ({{ sweeps[i].name }})
    {% endfor %}

    Consolidate their findings into a single, structured project atlas.
    This atlas is the shared evidence base that seven independent analysts
    will examine from different angles.

    ### Atlas Structure

    Organize by these sections (all required — downstream validations
    check for them):

    1. **## Project Structure** — from code-infrastructure sweep
    2. **## Code Health Indicators** — from code-infrastructure sweep
    3. **## Documentation State** — from docs-specs-plans sweep
       (include summaries of KEY documents — what they say, their status)
    4. **## Specifications and Plans** — from docs-specs-plans sweep
       (which specs are implemented vs aspirational, which plans are active)
    5. **## Issue Tracking** — from issues-tracking sweep
    6. **## Version Control** — from git-history sweep
    7. **## Existing Plans and Roadmaps** — from docs-specs-plans + git sweeps
    8. **## Ecosystem and Related Projects** — from ecosystem sweep
    9. **## Competitive Landscape** — from competitive-landscape sweep
       (competitors, alternatives, market positioning, mentions online)

    ### Triage Rules

    - **Prioritize findings that multiple sweeps flagged** — convergence is signal
    - **Flag contradictions** between sweeps — one sweep says X, another says Y
    - **Mark confidence levels** — data from tool output is high confidence;
      inference from file listing is medium; absence-based reasoning is low
    - **Preserve specifics** — file paths, issue numbers, commit hashes,
      test counts, document titles. The downstream analysts need grounded data.

    {{ output_spec("02-atlas.md") }}

    {% elif stage == 3 %}
    {# ── RASHOMON GATE: Analysis ─────────────────── #}
    # Stage 3: {{ frames[instance].name | title }} Analysis

    {{ frames[instance].voice }}

    {{ project_context() }}

    ## The Evidence

    Read the project atlas at {{ workspace }}/02-atlas.md. This is your
    primary evidence base. All seven analysts examine the same atlas
    from different angles. You cannot see the other analysts' work.
    This isolation is the mechanism, not a limitation.

    You may also read the raw sweep reports for additional detail:
    {% for i in range(1, 7) %}
    - {{ workspace }}/01-sweep-{{ i }}.md ({{ sweeps[i].name }})
    {% endfor %}

    ## Your Question

    **{{ frames[instance].question }}**

    ## Your Focus

    {{ frames[instance].focus }}

    ## Degradation Instructions

    {{ frames[instance].degradation }}

    ## Your Task

    Analyze the project through your frame. Be specific — cite file paths,
    issue numbers, commit hashes, test counts, document names. Generic
    observations are worthless. Grounded findings are valuable.

    Structure your analysis:

    1. **Assessment**: Your answer to your guiding question (1-2 paragraphs)
    2. **Findings**: Numbered list. Each finding must cite specific evidence
       from the atlas. Format: `F-N: [finding] (evidence: [what you saw])`
    3. **Concerns**: What worries you most from your frame (top 3)
    4. **Blind Spots**: What your frame probably misses (be honest)
    5. **Recommendations**: Specific, actionable improvements (top 5)

    {{ output_spec("03-frame-" ~ instance ~ ".md") }}

    {% elif stage == 4 %}
    {# ── RASHOMON GATE: Triangulation ────────────── #}
    # Stage 4: Structured Triangulation

    Seven independent analysts examined the same project from different
    analytical frames. Your job is to cross-reference their findings
    and categorize agreement levels.

    ## Read All Analyses

    Read every analysis file:
    {% for i in range(1, 8) %}
    - {{ workspace }}/03-frame-{{ i }}.md ({{ frames[i].name | title }}: {{ frames[i].question }})
    {% endfor %}

    ## Your Task

    For EACH finding across all seven analyses, determine the agreement level:

    - **UNANIMOUS**: 5+ frames flagged the same issue (high confidence)
    - **MAJORITY**: 3-4 frames agree (strong signal)
    - **SPLIT**: 2 frames agree (genuine tension — investigate)
    - **UNIQUE**: Only 1 frame flagged this (deep insight OR frame artifact)

    Produce a STRUCTURED YAML file with this exact schema:

    ```yaml
    findings:
      - id: "TF-1"
        finding: "Brief description of the finding"
        category: "UNANIMOUS"  # or MAJORITY, SPLIT, UNIQUE
        frames_agreeing:
          - health
          - trajectory
        evidence_summary: "What specific evidence supports this"
        severity: "critical"  # critical, high, medium, low
      # ... more findings

    summary_counts:
      unanimous: N
      majority: N
      split: N
      unique: N
      total: N

    top_tensions:
      - finding_ids: ["TF-3", "TF-7"]
        description: "Where and why frames disagree"
    ```

    Be thorough. Extract EVERY finding from ALL seven analyses. Do not
    summarize or filter — categorize. The editorial judgment comes in
    the next stage.

    **CRITICAL**: Write ONLY valid YAML to the output file. Do NOT include
    markdown code fences, commentary, or any non-YAML content.
    Start your file with `findings:` on the first line.

    {{ output_spec("04-triangulation.yaml", "YAML (schema above)") }}

    {% elif stage == 5 %}
    {# ── SUGYA WEAVE + ROADMAP ───────────────────── #}
    # Stage 5: Editorial Synthesis + Roadmap Construction

    You are the lead analyst producing the authoritative roadmap.

    ## Read the Triangulation

    Read {{ workspace }}/04-triangulation.yaml — the structured finding
    categorization from stage 4.

    Also read the original analyses for context:
    {% for i in range(1, 8) %}
    - {{ workspace }}/03-frame-{{ i }}.md
    {% endfor %}

    ## Your Task — Two Parts

    ### Part 1: Editorial Position (Sugya Weave)

    Take a POSITION on where this project stands. Not a summary.
    An argued position with supporting evidence.

    Structure:
    - **POSITION**: Your assessment in 2-3 sentences. Be direct.
    - **SUPPORTING EVIDENCE**: The UNANIMOUS and MAJORITY findings
      that ground your position
    - **COUNTERARGUMENTS**: The SPLIT findings that challenge your
      position. Steel-man them. Don't dismiss.
    - **CONCLUSION**: What this means for the project's direction

    ### Part 2: Roadmap + Task List

    Based on your position, produce:

    #### Milestones

    Group findings and recommendations into 4-8 milestones. Each milestone:

    ```markdown
    ## Milestone N: [Name]
    **Priority**: P0 / P1 / P2 / P3
    **Depends on**: [milestone numbers or "none"]
    **Rationale**: Why this milestone matters (cite triangulation findings)

    ### Tasks
    - [ ] **Task N.1**: [description]
      - Priority: P0/P1/P2/P3
      - Complexity: S / M / L / XL
      - Acceptance: [what "done" looks like]
    - [ ] **Task N.2**: ...
    ```

    The roadmap MUST include milestones that address:
    - Engineering work (from health, trajectory, risk frames)
    - Shipping and launch (from shipping frame)
    - Team capacity and sustainability (from capacity frame)
    - Market positioning and differentiation (from positioning frame)

    A roadmap that only addresses engineering is incomplete. A roadmap
    that ignores capacity is a fantasy. A roadmap that only ADDS work
    without recommending what to STOP is scope management failure.

    Ordering rules:
    - UNANIMOUS critical findings → P0 milestones
    - MAJORITY high findings → P1 milestones
    - SPLIT findings → P2 milestones (note the tension)
    - UNIQUE findings → P2/P3 depending on severity

    #### Descope Recommendations

    What should the project STOP doing? What should be killed, abandoned,
    or indefinitely deferred? Look for:
    - Features that are half-built with no clear path to completion
    - Work streams that don't serve the project's stated goals
    - Infrastructure that's over-engineered for the current stage
    - Issues that have been open so long they've become irrelevant
    - Plans that were written but never executed (and shouldn't be)

    A PM who only adds work isn't managing scope. Recommend at least
    2-3 things to stop or descope, with reasoning.

    #### Dependency Graph

    Show which milestones must complete before others can start.
    A milestone that requires another milestone's output is dependent.
    Prioritization is not sequencing — you may prioritize the roof
    but must sequence the foundation first.

    {{ output_spec("05-roadmap.md") }}

    {% elif stage == 6 %}
    {# ── FAN-OUT + SYNTHESIS: Review ─────────────── #}
    # Stage 6: Adversarial Review — {{ reviewers[instance].name | title }}

    ## Your Concern

    **{{ reviewers[instance].concern }}**

    ## The Draft Under Review

    Read {{ workspace }}/05-roadmap.md — the draft roadmap produced
    by the synthesis stage.

    Also read {{ workspace }}/04-triangulation.yaml for the underlying
    finding categorization.

    ## Your Focus

    {{ reviewers[instance].focus }}

    ## CRITICAL: Do Not Trust This Draft

    The draft was produced by an editorial synthesis of seven independent
    analyses. It may still have gaps, unsupported priorities, or
    milestones that sound good but can't be executed. Your job is to
    find problems.

    ## Your Task

    Structure your review (KEEP IT UNDER 800 WORDS — the final stage
    must integrate three reviews without context overflow):

    1. **Problems Found**: Specific issues (max 5, most important first)
    2. **Missing Elements**: What should be there but isn't (max 3)
    3. **Strongest Parts**: What's genuinely good (be honest, not generous)
    4. **Verdict**: Ready / Needs revision / Fundamentally flawed

    {{ output_spec("06-review-" ~ instance ~ ".md") }}

    {% elif stage == 7 %}
    {# ── FINAL DELIVERABLE ───────────────────────── #}
    # Stage 7: Final Deliverable

    ## Read Everything

    Read the draft roadmap:
    - {{ workspace }}/05-roadmap.md

    Read all three reviews:
    {% for i in range(1, 4) %}
    - {{ workspace }}/06-review-{{ i }}.md ({{ reviewers[i].name }}: {{ reviewers[i].concern }})
    {% endfor %}

    Read the triangulation for reference:
    - {{ workspace }}/04-triangulation.yaml

    ## Your Task

    Produce the FINAL roadmap incorporating all review feedback.

    1. Address all problems flagged by reviewers
    2. Fill gaps identified as missing
    3. Strengthen weak areas
    4. Keep what reviewers identified as strong
    5. Ensure milestone dependencies form a valid execution order
    6. Ensure every task has clear acceptance criteria

    ## Required Sections

    Your output MUST include ALL of these sections:

    ```
    # [Project Name] — Roadmap

    ## Executive Summary
    [3-5 sentences: where the project stands, what matters most, what to do first]

    ## Current State Assessment
    [The editorial position from the synthesis, refined by review feedback]

    ## Milestones
    [Numbered milestones with priority, dependencies, and tasks]

    ## Task Index
    [All tasks from all milestones, sorted by priority, with complexity and acceptance criteria]

    ## Dependency Graph
    [Which milestones must complete before others]

    ## Review Integration
    [What changed from the draft based on reviewer feedback, and why]

    ## Risk Register
    [Top risks from the risk analysis frame, with mitigation status in the roadmap]

    ## Descope Recommendations
    [What to STOP doing — features to kill, work to abandon, plans to shelve]
    ```

    {{ output_spec("07-roadmap.md") }}

    {% elif stage == 8 %}
    {# ── EXECUTION SETUP (fan-out 3) ─────────────── #}

    {{ project_context() }}

    The roadmap is written. Now set up the infrastructure so the team
    can start working immediately. A PM's job isn't done when the
    document is finished — it's done when the team can execute.

    ## Read the Final Roadmap

    Read {{ workspace }}/07-roadmap.md — the final, review-integrated roadmap.
    Read {{ workspace }}/04-triangulation.yaml for severity data.

    {% if instance == 1 %}
    # Stage 8.1: Issue & Milestone Setup (with Semantic Dedup)

    Generate a script that creates issues and milestones in the project's
    issue tracker. But FIRST: deduplicate against existing issues.

    ## Step 1: Inventory Existing Issues

    {% if issue_tracker == "github" %}
    Run these commands to get the current state:
    ```
    cd {{ project_root }}
    gh issue list --repo "$(gh repo view --json owner,name -q '.owner.login + "/" + .name')" --state open --limit 200 --json number,title,body,labels
    gh issue list --repo "$(gh repo view --json owner,name -q '.owner.login + "/" + .name')" --state closed --limit 50 --json number,title,body,labels
    gh api "repos/$(gh repo view --json owner,name -q '.owner.login + "/" + .name')/milestones" --jq '.[].title'
    ```
    {% elif issue_tracker == "linear" %}
    Look for any exported issue data or tracking artifacts in the project.
    {% else %}
    Look for any existing task lists, TODO files, or tracking artifacts.
    {% endif %}

    ## Step 2: Semantic Dedup Pipeline

    For each task in the roadmap ({{ workspace }}/07-roadmap.md), classify
    it against the existing issues using this three-tier pipeline:

    ### Tier 1: Exact Match
    If the roadmap task references an existing issue number (e.g., "#165",
    "#217"), it's a known reference. Mark as EXISTING and note the number.

    ### Tier 2: Title Similarity
    If the roadmap task title closely matches an existing issue title
    (accounting for rewording — "Add CI" = "GitHub Actions workflow"),
    mark as DUPLICATE.

    ### Tier 3: Semantic Judgment
    For remaining candidates, compare the roadmap task's DESCRIPTION
    against the BODIES of existing open issues using these signals:

    **Strong signals** (high confidence duplicate):
    - Same files or symbols referenced
    - Overlapping evidence or root cause, just reworded
    - One is a subset of the other's scope

    **Moderate signals** (possible overlap):
    - Same area of the codebase but different specific work
    - Symptom/cause split — the existing issue describes the symptom,
      the roadmap task describes the fix (or vice versa)
    - Adjacent work that should be coordinated

    **Classification rule:**
    - 2 strong signals → DUPLICATE (skip creation)
    - 1 strong + 2 moderate → DUPLICATE (skip creation)
    - 1 strong or 2+ moderate → OVERLAPPING (create with `Related: #N`)
    - Otherwise → NEW (create fresh)

    ## Step 3: Write the Dedup Audit

    Before generating the script, write an audit file to
    `{{ workspace }}/08-dedup-audit.md` documenting every decision:

    ```markdown
    # Issue Dedup Audit

    ## Duplicates (skipped)
    | Roadmap Task | Existing Issue | Confidence | Reasoning |
    |---|---|---|---|

    ## Overlapping (created with Related annotation)
    | Roadmap Task | Related Issue(s) | Overlap Description |
    |---|---|---|

    ## New (created fresh)
    | Roadmap Task | Milestone |
    |---|---|

    ## Label Updates (applied to existing issues)
    | Issue # | Labels Added | Reason |
    |---|---|---|
    ```

    ## Step 4: Generate the Script

    {% if issue_tracker == "github" %}
    Generate a bash script (`08-setup-issues.sh`) that:

    1. **Creates labels** (idempotent — skip if exists):
       P0, P1, P2, P3 (priority) and size-S, size-M, size-L, size-XL (complexity)

    2. **Creates milestones** (skip if exists):
       One per roadmap milestone. Check existing milestones first.

    3. **Updates existing issues** with correct labels:
       For OVERLAPPING and DUPLICATE issues that exist but lack the
       priority/complexity labels from the roadmap, add the labels.

    4. **Creates only NEW and OVERLAPPING issues**:
       - NEW issues: create with title, body, labels, milestone
       - OVERLAPPING issues: create with `Related: #N` in the body
         linking to the existing issue(s) they overlap with
       - DUPLICATE issues: skip entirely (they're in the audit file)

    5. **Reports results** at the end:
       Created: N, Skipped (duplicate): N, Overlapping: N, Labels updated: N

    The script must:
    - Start with `#!/usr/bin/env bash` and `set -euo pipefail`
    - Include a confirmation prompt showing counts before proceeding
    - Echo each action before executing
    - Handle errors gracefully (don't abort on one failed issue)

    {% elif issue_tracker == "linear" %}
    Generate a CSV importable into Linear with columns:
    Title, Description, Priority (Urgent/High/Medium/Low), Estimate (1/2/3/5/8),
    Project, Label

    Only include NEW and OVERLAPPING items. Add "Related: existing-title"
    in the Description for OVERLAPPING items.

    Map P0→Urgent, P1→High, P2→Medium, P3→Low.
    Map S→1, M→2, L→5, XL→8 for estimates.
    {% elif issue_tracker == "jira" %}
    Generate a CSV importable into Jira with columns:
    Summary, Description, Issue Type, Priority, Epic Link, Story Points

    Only include NEW and OVERLAPPING items.

    Map P0→Highest, P1→High, P2→Medium, P3→Low.
    Map S→1, M→3, L→8, XL→13 for story points.
    {% else %}
    Generate a structured markdown task list organized by milestone.
    Only include NEW and OVERLAPPING items. Mark overlaps with references.
    {% endif %}

    {% if issue_tracker == "github" %}
    {{ output_spec("08-setup-issues.sh") }}
    {% else %}
    {{ output_spec("08-setup-issues.csv") }}
    {% endif %}

    {% elif instance == 2 %}
    # Stage 8.2: Visual Timeline

    Generate a visual project timeline from the roadmap.

    Produce a Mermaid gantt chart showing:
    - Each milestone as a section
    - Tasks within milestones as entries
    - Duration estimates derived from complexity:
      S = 1 week, M = 2 weeks, L = 4 weeks, XL = 8 weeks
      (Adjust if the capacity frame suggests different velocity)
    - Dependencies between milestones using `after` references
    - Start date: today ({{ "now" | default("2026-04-19") }})

    Format the file as:

    ```
    # {{ project_name }} — Timeline

    ## Visual Roadmap

    ```mermaid
    gantt
        title Project Roadmap
        dateFormat YYYY-MM-DD
        excludes weekends

        section Milestone 1: Name
        Task 1.1 description    :m1t1, 2026-04-21, 1w
        Task 1.2 description    :m1t2, after m1t1, 2w

        section Milestone 2: Name
        Task 2.1 description    :m2t1, after m1t2, 1w
    ```

    ## Text-Based Dependency Graph

    (For environments that don't render Mermaid)

    M1: Name
    ├── Task 1.1 (S, 1w)
    └── Task 1.2 (M, 2w) → blocks M2
    M2: Name [depends: M1]
    └── Task 2.1 (S, 1w)
    ```

    Include BOTH the Mermaid chart AND the text-based graph.
    The text graph serves as fallback and is easier to scan.

    {{ output_spec("08-gantt.md") }}

    {% elif instance == 3 %}
    # Stage 8.3: Immediate Action Plan

    What does the team do RIGHT NOW? Not next quarter. Now.

    Read the roadmap and produce a concrete action plan. Every item
    must be something a developer can start working on without asking
    "what does this mean?"

    Structure:

    ## Today
    2-3 quick wins from the roadmap that unblock everything else.
    These should be the smallest tasks with the highest leverage.
    For each: what to do, why it matters, what "done" looks like,
    estimated time.

    ## This Week
    The first sprint. 3-5 tasks that, when completed, prove the
    roadmap is executable. Pick from M1 (highest priority milestone).
    For each: specific deliverable, dependencies, who/what is needed.

    ## This Month
    Milestone 1 completion target. What does "done" look like for
    the first milestone? What's the acceptance gate? What risks
    could delay it?

    ## Decision Points
    Decisions that need to be made before work can proceed.
    For each: what the decision is, what information is needed,
    what the options are, what the recommendation is, and when
    the decision must be made by.

    ## Blockers & Prerequisites
    Things that must be true before the roadmap can execute.
    External dependencies, access requirements, tooling needs,
    knowledge gaps.

    ## What We Don't Know (Intake Questionnaire)

    Based on what the analysis COULD NOT determine from the codebase,
    list questions the project owner should answer to improve the next
    roadmap iteration. For each question, explain what it affects.

    Categories to check:
    - **Stakeholders**: Who are the key stakeholders? What are their
      competing priorities? Who has veto power?
    - **Customers**: Who uses this? What do they complain about?
      What's the support ticket volume? Any NPS or satisfaction data?
    - **Business**: What's the revenue model? What's the runway?
      What KPIs matter? What does the board/leadership care about?
    - **Team**: How many people work on this? What skills are missing?
      Who's overloaded? Is anyone ramping up or leaving?
    - **Constraints**: Any regulatory requirements? Compliance deadlines?
      Contractual obligations? Security certifications needed?
    - **Strategy**: What should the project STOP doing? Any sacred cows
      that should be slaughtered? Any partnerships or integrations
      that would change the roadmap?

    Frame each question so the answer can be dropped into the
    `venue_context_dir` as a file for the next run. Example:
    "Create `venue-context/customers.md` with: top 5 user complaints,
    monthly support ticket count, and any NPS data you have."

    Be concrete. "Set up CI pipeline running the project's test suite"
    is concrete. "Improve code quality" is not.

    {{ output_spec("08-next-actions.md") }}

    {% elif instance == 4 %}
    # Stage 8.4: Executive Presentation

    Generate a slide deck from the roadmap that a founder could walk
    into a board meeting with, or an engineering lead could send to
    their VP.

    Read {{ workspace }}/07-roadmap.md for the full roadmap.

    Write a **Marp markdown presentation** — a markdown file with `---`
    slide separators that Marp CLI converts to HTML/PDF/PPTX.

    ## File Format

    The file MUST start with this exact frontmatter:

    ```
    ---
    marp: true
    theme: default
    paginate: true
    header: "{{ project_name }} — Roadmap"
    ---
    ```

    Each slide is separated by `---` on its own line.

    ## Slide Structure (7-9 slides)

    **Slide 1: Title**
    - Project name, one-line description, date
    - Clean, simple, no clutter

    **Slide 2: Where We Are**
    - Executive summary — 3-4 bullet points from the Current State Assessment
    - What's working, what's not, in plain language

    **Slide 3: What We Found**
    - Key findings from the triangulation — focus on UNANIMOUS and MAJORITY
    - Use a simple table or bullet list, max 5 items
    - Each finding in one sentence

    **Slide 4: The Plan**
    - Milestone overview — names and priorities only
    - Show the dependency flow visually (arrows or numbered sequence)
    - This is the "here's what we're doing" slide

    **Slide 5: Timeline**
    - Simplified gantt or milestone timeline
    - Use a Mermaid chart if the audience supports it, otherwise text
    - Show quarters or months, not individual tasks

    **Slide 6: First Sprint**
    - What happens THIS WEEK and THIS MONTH
    - 3-5 concrete deliverables
    - This is the "we're not just planning, we're starting" slide

    **Slide 7: Risks & Mitigations**
    - Top 3 risks from the Risk Register
    - Each with its mitigation from the roadmap
    - Honest, not alarmist

    **Slide 8: What We Need** (if applicable)
    - Resources, decisions, access, or support needed
    - Capacity gaps identified by the capacity frame
    - This is the "ask" slide

    **Slide 9: Questions**
    - Simple closing slide

    ## Design Principles

    - **One idea per slide.** If a slide has more than 5 bullet points, split it.
    - **No walls of text.** Slides are visual anchors, not documents.
    - **Plain language.** No jargon the audience doesn't know.
    - **Data over adjectives.** "95 open issues, 35 bugs" not "significant backlog."
    - **The deck tells a story:** situation → findings → plan → action → ask.

    Write ONLY the Marp markdown to the output file. No commentary, no
    explanation — just the presentation content.

    {{ output_spec("08-slides.md") }}
    {% endif %}
    {% endif %}

validations:
  # ── Stage 1: Broad Sweeps ──
  - type: file_exists
    path: "{workspace}/01-sweep-{instance}.md"
    condition: "stage == 1"
    stage: 1

  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/01-sweep-{instance}.md") -ge 300'
    condition: "stage == 1"
    stage: 2
    description: "Sweep has substantive content (300+ words)"

  # ── Stage 2: Atlas ──
  - type: file_exists
    path: "{workspace}/02-atlas.md"
    condition: "stage == 2"
    stage: 1

  - type: content_regex
    path: "{workspace}/02-atlas.md"
    pattern: "(?si)## .*Project Structure"
    condition: "stage == 2"
    stage: 2
    description: "Atlas has Project Structure section"

  - type: content_regex
    path: "{workspace}/02-atlas.md"
    pattern: "(?si)## .*Code Health"
    condition: "stage == 2"
    stage: 2
    description: "Atlas has Code Health section"

  - type: content_regex
    path: "{workspace}/02-atlas.md"
    pattern: "(?si)## .*Documentation"
    condition: "stage == 2"
    stage: 2
    description: "Atlas has Documentation section"

  - type: content_regex
    path: "{workspace}/02-atlas.md"
    pattern: "(?si)## .*Specifications"
    condition: "stage == 2"
    stage: 2
    description: "Atlas has Specifications and Plans section"

  - type: content_regex
    path: "{workspace}/02-atlas.md"
    pattern: "(?si)## .*Issue"
    condition: "stage == 2"
    stage: 2
    description: "Atlas has Issue Tracking section"

  - type: content_regex
    path: "{workspace}/02-atlas.md"
    pattern: "(?si)## .*Version Control"
    condition: "stage == 2"
    stage: 2
    description: "Atlas has Version Control section"

  - type: content_regex
    path: "{workspace}/02-atlas.md"
    pattern: "(?si)## .*(Existing Plans|Roadmap)"
    condition: "stage == 2"
    stage: 2
    description: "Atlas has Existing Plans section"

  - type: content_regex
    path: "{workspace}/02-atlas.md"
    pattern: "(?si)## .*Ecosystem"
    condition: "stage == 2"
    stage: 2
    description: "Atlas has Ecosystem section"

  - type: content_regex
    path: "{workspace}/02-atlas.md"
    pattern: "(?si)## .*Competitive"
    condition: "stage == 2"
    stage: 2
    description: "Atlas has Competitive Landscape section"

  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/02-atlas.md") -ge 1000'
    condition: "stage == 2"
    stage: 2
    description: "Atlas has substantive content (1000+ words)"

  # ── Stage 3: Analytical frames ──
  - type: file_exists
    path: "{workspace}/03-frame-{instance}.md"
    condition: "stage == 3"
    stage: 1

  - type: content_regex
    path: "{workspace}/03-frame-{instance}.md"
    pattern: "(?si)F-\\d+:.*evidence:"
    condition: "stage == 3"
    stage: 2
    description: "Analysis has numbered findings with evidence citations"

  - type: content_regex
    path: "{workspace}/03-frame-{instance}.md"
    pattern: "(?si)## .*Recommend"
    condition: "stage == 3"
    stage: 2
    description: "Analysis includes recommendations"

  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/03-frame-{instance}.md") -ge 600'
    condition: "stage == 3"
    stage: 2
    description: "Analysis has substantive content (600+ words)"

  # ── Stage 4: Triangulation ──
  # Note: validation uses python3 + pyyaml to parse YAML. This is safe
  # because Marianne itself requires Python + pyyaml — if the conductor
  # is running, these are available.
  - type: file_exists
    path: "{workspace}/04-triangulation.yaml"
    condition: "stage == 4"
    stage: 1

  - type: command_succeeds
    command: |
      python3 -c "
      import yaml
      with open('{workspace}/04-triangulation.yaml') as f:
          data = yaml.safe_load(f)
      findings = data.get('findings', [])
      assert len(findings) >= 5, f'Only {len(findings)} findings, need >=5'
      counts = data.get('summary_counts', {})
      assert counts.get('total', 0) >= 5, 'summary_counts.total < 5'
      categories = set(item.get('category','') for item in findings)
      assert len(categories) >= 2, f'Only {len(categories)} categories used, need >=2'
      for item in findings:
          assert 'id' in item, f'Finding missing id'
          assert 'severity' in item, f'Finding missing severity'
          assert 'frames_agreeing' in item, f'Finding missing frames_agreeing'
      assert 'top_tensions' in data, 'Missing top_tensions'
      "
    condition: "stage == 4"
    stage: 2
    description: "Triangulation YAML is valid with 5+ findings, required fields, 2+ categories"

  # ── Stage 5: Synthesis + Roadmap ──
  - type: file_exists
    path: "{workspace}/05-roadmap.md"
    condition: "stage == 5"
    stage: 1

  - type: content_contains
    path: "{workspace}/05-roadmap.md"
    pattern: "POSITION"
    condition: "stage == 5"
    stage: 2
    description: "Roadmap contains editorial position (Sugya Weave)"

  - type: content_contains
    path: "{workspace}/05-roadmap.md"
    pattern: "COUNTERARGUMENTS"
