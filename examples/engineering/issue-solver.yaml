    **Step 1: Safety preflight — branch and tree state**
    ```bash
    cd {{ project_root }}
    CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
    echo "Current branch: $CURRENT_BRANCH"
    # Warn loudly if on main — autonomous push to main is high-risk.
    # The user can choose to suppress this by setting ALLOW_PUSH_TO_MAIN=1 in their env,
    # but by default the solver will NOT push to main/master/trunk automatically.
    case "$CURRENT_BRANCH" in
      main|master|trunk)
        if [ "${ALLOW_PUSH_TO_MAIN:-0}" != "1" ]; then
          echo "FATAL: solver is on protected branch '$CURRENT_BRANCH'."
          echo "Either check out a feature branch first, or set ALLOW_PUSH_TO_MAIN=1 to override."
          exit 1
        fi
        echo "WARNING: pushing to '$CURRENT_BRANCH' because ALLOW_PUSH_TO_MAIN=1"
        ;;
    esac
    git status --short | head -30
    git diff --stat
    ```

    **Step 2: Read issue details for the commit message (safely)**
    ```bash
    ISSUE_NUM=$(grep -oE 'SELECTED_ISSUE: #[0-9]+' {{ workspace }}/01-selected-issue.md | grep -oE '[0-9]+' | head -1)
    # ISSUE_TITLE is already sanitized by the triage score (shell-dangerous chars
    # stripped before it ever reaches this workspace). Read it, don't interpolate
    # into a shell command string — write it to a file and pass via git commit -F.
    grep 'ISSUE_TITLE:' {{ workspace }}/01-selected-issue.md | sed 's/ISSUE_TITLE: //' > {{ workspace }}/.issue-title
    echo "Issue: #$ISSUE_NUM — $(cat {{ workspace }}/.issue-title)"
    ```

    **Step 3: Selective staging**

    Do NOT use `git add -A` — stage ONLY files this issue's implementation
    touched. Review the plan and phase results to identify them.

    ```bash
    git add <each modified source file explicitly>
    git diff --cached --stat
    ```

    If `git diff --cached --stat` shows unrelated files, unstage them:
    ```bash
    git restore --staged path/to/unrelated/file
    ```

    Do NOT stage the solver's workspace or the triage workspace.

    **Step 4: Sync with remote (fail loudly on fetch errors)**
    ```bash
    # No stderr suppression — network/auth failures MUST surface, not silently
    # degrade BEHIND to 0 and commit over stale state.
    git fetch origin "$CURRENT_BRANCH" || git fetch origin || {
      echo "FATAL: git fetch failed — refusing to commit without a current view of remote"
      exit 1
    }
    UPSTREAM=$(git rev-parse --abbrev-ref "$CURRENT_BRANCH@{upstream}" 2>/dev/null || echo "")
    if [ -n "$UPSTREAM" ]; then
      BEHIND=$(git rev-list "HEAD..$UPSTREAM" --count)
      echo "Commits behind $UPSTREAM: $BEHIND"
      if [ "$BEHIND" -gt 0 ]; then
        git stash
        git pull --rebase origin "$CURRENT_BRANCH"
        git stash pop || true   # stash pop conflicts surface below
      fi
    else
      echo "Branch $CURRENT_BRANCH has no upstream — will set on push"
    fi
    ```

    Resolve any merge conflicts carefully — keep both our changes and
    remote changes where possible.

    **Step 5: Commit (title passed via file — never interpolated into shell)**
    ```bash
    TITLE=$(cat {{ workspace }}/.issue-title)
    cat > {{ workspace }}/.commit-msg <<COMMITEOF
    fix: $TITLE (#$ISSUE_NUM)

    Resolves #$ISSUE_NUM

    Co-Authored-By: Marianne AI Compose <noreply@marianne.ai>
    COMMITEOF
    git commit -F {{ workspace }}/.commit-msg
    ```

    Note: `-F <file>` reads the commit message from a file, bypassing all
    shell interpretation. Even if the title somehow contained backticks or
    `$()` (the triage scanner should have stripped these), they are now
    literal text in the commit message — never executable.

    **Step 6: Push**
    ```bash
    if [ -n "$UPSTREAM" ]; then
      git push
    else
      git push -u origin "$CURRENT_BRANCH"
    fi
    ```

    If push fails due to new remote commits:
    ```bash
    git pull --rebase origin "$CURRENT_BRANCH" && git push
    ```
    Do NOT force-push.

