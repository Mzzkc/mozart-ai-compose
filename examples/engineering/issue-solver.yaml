    {% elif stage == 17 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 17: CLOSE + DAG UPDATE + SELF-CHAIN GATE                             ║
    ║  "Close the loop — and write the loop closure into the DAG"                  ║
    ║                                                                              ║
    ║  Three responsibilities:                                                     ║
    ║    1. Close the GitHub issue                                                 ║
    ║    2. Append the issue to triage_workspace/issue-dag.yaml resolved list      ║
    ║       atomically (temp file + rename) — this is the cross-score state        ║
    ║       handoff that makes self-chaining work                                  ║
    ║    3. Validation-as-Control-Flow: chain gate validation fails if             ║
    ║       NO_ISSUES_REMAINING, halting the on_success self-chain                 ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    **Handle NO_ISSUES_REMAINING first:**
    ```bash
    if grep -q 'NO_ISSUES_REMAINING' {{ workspace }}/01-selected-issue.md; then
      cat > {{ workspace }}/17-close.md <<'MDEOF'
    # Close & Chain Gate: Terminal

    ## Issue Closed
    - Number: n/a (no issue selected)

    ## DAG Update
    - Skipped (no issue to record)

    ## Chain Gate
    - Issues processed this iteration: no
    - Chain should continue: no
    - NO_ISSUES_REMAINING — chain gate validation WILL FAIL by design to stop the on_success self-chain.
    MDEOF
      echo "Terminal iteration — chain will stop at validation."
      exit 0
    fi
    ```

    **Ordering matters.** We update the DAG FIRST (authoritative local state),
    then close the GitHub issue. If the DAG update fails, we retry without
    having closed the issue. If the GitHub close fails after the DAG update,
    the next iteration simply skips this resolved-but-unclosed issue — which
    is recoverable. The reverse order (close → DAG) creates an infinite loop
    on "closed but still-eligible" issues if the DAG write fails.

    **Step 1: Atomically append to the DAG's resolved list**

    Cross-score state handoff: the next self-chain iteration reads
    issue-dag.yaml at Stage 1; this mutation tells it which issues are done.

    ```bash
    ISSUE_NUM=$(grep -oE 'SELECTED_ISSUE: #[0-9]+' {{ workspace }}/01-selected-issue.md | grep -oE '[0-9]+' | head -1)
    python3 - <<PY
    import yaml, pathlib, os, tempfile, sys
    dag_path = pathlib.Path("{{ triage_workspace }}/issue-dag.yaml")
    dag = yaml.safe_load(dag_path.read_text())
    resolved = dag.setdefault("resolved", [])
    num = $ISSUE_NUM
    if num in resolved:
        print(f"#{num} already in resolved list — no-op")
        sys.exit(0)
    resolved.append(num)
    # Atomic write: tempfile in same directory (same filesystem) + os.replace.
    fd, tmp = tempfile.mkstemp(
        prefix=".issue-dag.",
        suffix=".yaml.tmp",
        dir=str(dag_path.parent),
    )
    try:
        with os.fdopen(fd, "w") as f:
            yaml.safe_dump(dag, f, sort_keys=False, allow_unicode=True)
        os.replace(tmp, dag_path)
        print(f"#{num} appended to resolved (total resolved: {len(resolved)})")
    except BaseException:
        # BaseException catches KeyboardInterrupt too — clean up tmp file.
        try:
            os.unlink(tmp)
        except OSError:
            pass
        raise
    PY
    ```

    **Step 2: Verify the DAG still parses after mutation**
    ```bash
    python3 -c "import yaml; yaml.safe_load(open('{{ triage_workspace }}/issue-dag.yaml'))" \
      && echo "DAG integrity verified" \
      || { echo "FATAL: DAG corrupted after mutation — halt before closing issue"; exit 1; }
    ```

    **Step 3: Close the GitHub issue (only after DAG is updated)**
    ```bash
    ITER=$(cat {{ workspace }}/.iteration 2>/dev/null || echo "?")
    # Build the comment body in a file to avoid shell-interpolating untrusted text.
    cat > {{ workspace }}/.close-comment <<CLOSEEOF
    Resolved by automated issue solver (iteration $ITER).

    **Commit:** $(cd {{ project_root }} && git log --oneline -1)
    **Changes:** $(cd {{ project_root }} && git diff --stat HEAD~1 | tail -5)

    *Closed automatically.*
    CLOSEEOF
    gh issue close "$ISSUE_NUM" --comment "$(cat {{ workspace }}/.close-comment)" || {
      echo "WARNING: gh issue close failed for #$ISSUE_NUM — DAG already marks it resolved, so next iteration will skip it."
      # Do not exit 1 here: the DAG is the source of truth for chain progression.
      # A failed issue-close is an operational nit to investigate, not a fatal error.
    }
    ```

    **Step 4: Archive this iteration**

    Archive dir lives OUTSIDE `{{ workspace }}` so that `archive_on_fresh`
    on the next iteration doesn't re-archive old archives (avoids nested
    archive trees and disk sprawl).

    ```bash
    ITER=$(cat {{ workspace }}/.iteration 2>/dev/null || echo "0")
    ARCHIVE="{{ workspace }}/../issue-solver-iterations/iteration-$ITER"
    mkdir -p "$ARCHIVE"
    cp {{ workspace }}/*.md "$ARCHIVE/" 2>/dev/null || true
    cp {{ workspace }}/*.sh "$ARCHIVE/" 2>/dev/null || true
    echo "Archived iteration $ITER to $ARCHIVE"
    ```

    **Step 5: Write the close report**

    **Output to:** `{{ workspace }}/17-close.md`

    ```markdown
    # Close & Chain Gate: Issue #N

    ## Issue Closed
    - Number: #N
    - Status: closed on GitHub
    - Comment posted: yes

    ## DAG Update
    - Appended #N to `{{ triage_workspace }}/issue-dag.yaml` resolved list
    - Atomic write: yes (temp file + rename)
    - Post-mutation parse check: PASS
    - Total resolved after this iteration: <N>

    ## Archive
    - Iteration: N
    - Files archived to: <path>

    ## Chain Gate
    - Issues processed this iteration: yes
    - Chain should continue: yes (next iteration will pick a new issue from the updated DAG)
    ```

    The chain gate validation below decides whether the on_success hook
    fires. For a successful issue resolution, validation passes and the
    next iteration begins in a fresh workspace.
    {% endif %}

validations:
  # ── Stage 1: Issue selection ──────────────────────────────────────────────
  - type: file_exists
    path: "{workspace}/01-selected-issue.md"
    description: "Issue selection report exists"
    condition: "sheet_num >= 1"

  - type: command_succeeds
    command: |
      FILE="{workspace}/01-selected-issue.md"
      if grep -qE 'SELECTED_ISSUE: #[0-9]+' "$FILE" || grep -q 'NO_ISSUES_REMAINING' "$FILE"; then
        exit 0
      else
        exit 1
      fi
    description: "Selection has issue number or NO_ISSUES_REMAINING sentinel"
    condition: "sheet_num >= 1"
    stage: 2

  # ── Stage 2: Investigation ────────────────────────────────────────────────
  - type: file_exists
    path: "{workspace}/02-investigation.md"
    description: "Investigation report exists"
    condition: "sheet_num >= 2"

  - type: content_regex
    path: "{workspace}/02-investigation.md"
    pattern: "(?i)##\\s+(summary|root cause|design analysis|affected files|complexity)|NO_ISSUES_REMAINING"
    description: "Investigation has structured sections or sentinel"
    condition: "sheet_num >= 2"
    stage: 2

  # ── Stage 3: Plan + verify.sh ─────────────────────────────────────────────
  - type: file_exists
    path: "{workspace}/03-plan.md"
    description: "Phase plan exists"
    condition: "sheet_num >= 3"

  - type: command_succeeds
    command: 'grep -qE "^TOTAL_PHASES: [0-4]$" "{workspace}/03-plan.md"'
    description: "Plan has TOTAL_PHASES: 0-4 on its own line (required for skip_when_command)"
    condition: "sheet_num >= 3"
    stage: 2

  - type: file_exists
    path: "{workspace}/verify.sh"
    description: "Verification script exists"
    condition: "sheet_num >= 3"

  - type: command_succeeds
    command: 'test -x "{workspace}/verify.sh"'
    description: "Verification script is executable"
    condition: "sheet_num >= 3"
    stage: 2

  # ── Stage 4: Phase 1 fix ──────────────────────────────────────────────────
  - type: file_exists
    path: "{workspace}/04-phase1-fix.md"
    description: "Phase 1 fix results exist"
    condition: "sheet_num >= 4"

  - type: content_regex
    path: "{workspace}/04-phase1-fix.md"
    pattern: "(?i)completion:\\s+\\d+%|NO_ISSUES_REMAINING"
    description: "Phase 1 fix reports completion or sentinel"
    condition: "sheet_num >= 4"
    stage: 2

  # ── Stage 5: Phase 1 completion ───────────────────────────────────────────
  - type: file_exists
    path: "{workspace}/05-phase1-complete.md"
    description: "Phase 1 completion results exist"
    condition: "sheet_num >= 5"

  - type: content_regex
    path: "{workspace}/05-phase1-complete.md"
    pattern: "(?i)completion:\\s+\\d+%|NO_ISSUES_REMAINING"
    description: "Phase 1 completion reports completion or sentinel"
    condition: "sheet_num >= 5"
    stage: 2

  # ── Stages 6-11: Phases 2-4 (conditionally skipped by skip_when_command) ──
  - type: file_exists
    path: "{workspace}/06-phase2-fix.md"
    description: "Phase 2 fix results exist"
    condition: "sheet_num == 6"

  - type: content_regex
    path: "{workspace}/06-phase2-fix.md"
    pattern: "(?i)completion:\\s+\\d+%"
    description: "Phase 2 fix reports completion percentage"
    condition: "sheet_num == 6"
    stage: 2

  - type: file_exists
    path: "{workspace}/07-phase2-complete.md"
    description: "Phase 2 completion results exist"
    condition: "sheet_num == 7"

  - type: content_regex
    path: "{workspace}/07-phase2-complete.md"
    pattern: "(?i)completion:\\s+\\d+%"
    description: "Phase 2 completion reports completion percentage"
    condition: "sheet_num == 7"
    stage: 2

  - type: file_exists
    path: "{workspace}/08-phase3-fix.md"
    description: "Phase 3 fix results exist"
    condition: "sheet_num == 8"

  - type: content_regex
    path: "{workspace}/08-phase3-fix.md"
    pattern: "(?i)completion:\\s+\\d+%"
    description: "Phase 3 fix reports completion percentage"
    condition: "sheet_num == 8"
    stage: 2

  - type: file_exists
    path: "{workspace}/09-phase3-complete.md"
    description: "Phase 3 completion results exist"
    condition: "sheet_num == 9"

  - type: content_regex
    path: "{workspace}/09-phase3-complete.md"
    pattern: "(?i)completion:\\s+\\d+%"
    description: "Phase 3 completion reports completion percentage"
    condition: "sheet_num == 9"
    stage: 2

  - type: file_exists
    path: "{workspace}/10-phase4-fix.md"
    description: "Phase 4 fix results exist"
    condition: "sheet_num == 10"

  - type: content_regex
    path: "{workspace}/10-phase4-fix.md"
    pattern: "(?i)completion:\\s+\\d+%"
    description: "Phase 4 fix reports completion percentage"
    condition: "sheet_num == 10"
    stage: 2

  - type: file_exists
    path: "{workspace}/11-phase4-complete.md"
    description: "Phase 4 completion results exist"
    condition: "sheet_num == 11"

  - type: content_regex
    path: "{workspace}/11-phase4-complete.md"
    pattern: "(?i)completion:\\s+\\d+%"
    description: "Phase 4 completion reports completion percentage"
    condition: "sheet_num == 11"
    stage: 2

  # ── Stage 12: Fan-out reviews (sheets 12-14) ─────────────────────────────
  - type: file_exists
    path: "{workspace}/12-review-functional.md"
    description: "Functional review exists"
    condition: "stage == 12 and instance == 1"

  - type: content_regex
    path: "{workspace}/12-review-functional.md"
    pattern: "(?i)\\b(PASS|FAIL)\\b"
    description: "Functional review has verdict"
    condition: "stage == 12 and instance == 1"
    stage: 2

  - type: file_exists
    path: "{workspace}/12-review-e2e.md"
    description: "E2E/smoke review exists"
    condition: "stage == 12 and instance == 2"

  - type: content_regex
    path: "{workspace}/12-review-e2e.md"
    pattern: "(?i)\\b(PASS|FAIL)\\b"
    description: "E2E review has verdict"
    condition: "stage == 12 and instance == 2"
    stage: 2

  - type: file_exists
    path: "{workspace}/12-review-quality.md"
    description: "Code quality review exists"
    condition: "stage == 12 and instance == 3"

  - type: content_regex
    path: "{workspace}/12-review-quality.md"
    pattern: "(?i)\\b(PASS|FAIL)\\b"
    description: "Code quality review has verdict"
    condition: "stage == 12 and instance == 3"
    stage: 2

  # ── Stage 13: Synthesis (sheet 15) ────────────────────────────────────────
  - type: file_exists
    path: "{workspace}/13-synthesis.md"
    description: "Review synthesis exists"
    condition: "sheet_num >= 15"

  - type: content_contains
    path: "{workspace}/13-synthesis.md"
    pattern: "## Summary"
    description: "Synthesis has summary section"
    condition: "sheet_num >= 15"
    stage: 2

  # ── Stage 14: Docs (sheet 16) ─────────────────────────────────────────────
  - type: file_exists
    path: "{workspace}/14-docs.md"
    description: "Documentation update report exists"
    condition: "sheet_num >= 16"

  - type: content_regex
    path: "{workspace}/14-docs.md"
    pattern: "(?i)documentation\\s+update"
    description: "Docs report has correct header"
    condition: "sheet_num >= 16"
    stage: 2

  # ── Stage 15: Final verification (sheet 17) ──────────────────────────────
  - type: file_exists
    path: "{workspace}/15-verification.md"
    description: "Final verification report exists"
    condition: "sheet_num >= 17"

  - type: content_contains
    path: "{workspace}/15-verification.md"
    pattern: "## Results"
    description: "Verification report has results section"
    condition: "sheet_num >= 17"
    stage: 2

  - type: command_succeeds
    command: 'cd "{project_root}" && bash "{workspace}/verify.sh"'
    description: "Verification script passes"
    condition: "sheet_num >= 17"
    stage: 2
    timeout_seconds: 600

  # ── Stage 16: Commit (sheet 18) ──────────────────────────────────────────
  - type: file_exists
    path: "{workspace}/16-commit.md"
    description: "Commit report exists"
    condition: "sheet_num >= 18"

  - type: content_contains
    path: "{workspace}/16-commit.md"
    pattern: "## Commit"
    description: "Commit report has commit section"
    condition: "sheet_num >= 18"
    stage: 2

  # Real commit verification — HEAD must actually reference an issue.
  # A clean report alone isn't proof; HEAD's commit message must cite the issue.
  - type: command_succeeds
    command: 'cd "{project_root}" && git log --oneline -1 | grep -qE "\(#[0-9]+\)|Resolves #[0-9]+"'
    description: "HEAD commit references an issue number (actual commit, not just report)"
    condition: "sheet_num >= 18"
    stage: 2
    timeout_seconds: 30

  # ── Stage 17: Close + DAG update + chain gate (sheet 19) ─────────────────
  - type: file_exists
    path: "{workspace}/17-close.md"
    description: "Close and chain gate report exists"
    condition: "sheet_num == 19"

  - type: content_contains
    path: "{workspace}/17-close.md"
    pattern: "## Chain Gate"
    description: "Close report has chain gate section"
    condition: "sheet_num == 19"
    stage: 2

  # DAG integrity after mutation — parse check. Fails if mutation corrupted YAML.
  - type: command_succeeds
    command: 'python3 -c "import yaml; yaml.safe_load(open(\"{triage_workspace}/issue-dag.yaml\"))"'
    description: "Triage DAG still parses after Stage 17 mutation"
    condition: "sheet_num == 19"
    stage: 2

  # Chain gate: Validation-as-Control-Flow.
  # When NO_ISSUES_REMAINING, this validation intentionally fails — which
  # prevents the on_success hook from firing and halts the self-chain.
  # When an issue was processed, this passes and the chain continues.
  - type: command_succeeds
    command: |
      if grep -q 'NO_ISSUES_REMAINING' "{workspace}/01-selected-issue.md" 2>/dev/null; then
        echo "No issues remaining — halting self-chain"
        exit 1
      else
        echo "Issue processed — chain may continue"
        exit 0
      fi
    description: "Self-chain gate: fails when NO_ISSUES_REMAINING to stop the chain"
    condition: "sheet_num == 19"

# Self-chain to solve the next issue from the DAG.
# IMPORTANT: job_path MUST be an absolute path — relative paths resolve from
# the conductor's CWD, not this score's directory. On each iteration the
# previous workspace is archived (archive_on_fresh) and a fresh one is created.
on_success:
  - type: run_job
    job_path: "[CHANGE THIS: ABSOLUTE path to this score, e.g. /abs/path/to/examples/engineering/issue-solver.yaml]"
    description: "Chain to solve next issue from the DAG"
    detached: true
    fresh: true

concert:
  enabled: true
  max_chain_depth: 30
  cooldown_between_jobs_seconds: 300
  inherit_workspace: false
