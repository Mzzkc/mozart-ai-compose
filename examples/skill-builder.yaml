# skill-builder.yaml
#
# A score that teaches a skill through progressive, structured stages.
#
# Most tutorials are monologues. This is a curriculum — designed,
# sequenced, with each stage building on the last. The cross-sheet
# context means each lesson knows what was taught before and can
# reference it, reinforce it, or deliberately challenge it.
#
# The fan-out movement creates parallel practice exercises at different
# difficulty levels, so the learner gets breadth and depth simultaneously.
#
# Execution Flow (5 movements, 9 sheets):
#
#   Movement 1: Assessment & Foundations (1 sheet)
#        |
#   Movement 2: Core Concepts (1 sheet)
#        |
#        +-----+-----+
#        v     v     v
#   Movement 3 x3: Practice (3 voices, parallel)
#        |     |     |
#        +-----+-----+
#              v
#   Movement 4: Integration (1 sheet)
#              |
#              v
#   Movement 5: Mastery Check & Next Steps (1 sheet)
#
# To teach a different skill, change the `skill` variables below.
# The template logic is skill-agnostic — it works for anything
# from watercolor painting to systems design to fermentation.

name: "skill-builder"
description: "Progressive skill-building curriculum generator"

workspace: "../workspaces/skill-builder-workspace"

instrument: claude-code
instrument_config:
  timeout_seconds: 1200

# Movement declarations — names appear in `mozart status` output
movements:
  1:
    name: "Assessment & Foundations"
  2:
    name: "Core Concepts"
  3:
    name: "Practice"
  4:
    name: "Integration"
  5:
    name: "Mastery Check"

sheet:
  size: 1
  total_items: 5
  fan_out:
    3: 3
  dependencies:
    2: [1]
    3: [2]
    4: [3]
    5: [4]

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 5000
  lookback_sheets: 4

retry:
  max_retries: 1

prompt:
  variables:
    # ─── WHAT ARE WE TEACHING? ───
    skill:
      name: "Fermentation"
      domain: "food science and home cooking"
      target_learner: >-
        A curious home cook who's eaten kimchi and sourdough but never
        made either. Comfortable in the kitchen. No science background.
        Wants to understand WHY things ferment, not just follow recipes.
      goal: >-
        After completing this curriculum, the learner should be able to
        start a sourdough culture, make a basic vegetable ferment, and
        explain the microbiology of what's happening in plain language.
      prerequisites: "Basic cooking skills, access to a kitchen, mason jars"

    difficulty_levels:
      1:
        name: "guided"
        label: "Guided Practice"
        approach: >-
          Hand-holding. Step-by-step with explanations for every step.
          Include exact measurements, temperatures, and times.
          Anticipate mistakes and warn about them in advance.
          The learner should feel safe to try this immediately.
        exercise: "Make a simple sauerkraut (just cabbage and salt)"

      2:
        name: "exploratory"
        label: "Exploratory Practice"
        approach: >-
          Give the framework, not the steps. Explain the principles,
          then let the learner design their own ferment. Suggest
          variables to experiment with (salt %, temperature, time).
          Encourage taking notes and observing changes daily.
        exercise: "Design a custom vegetable ferment with 3+ ingredients"

      3:
        name: "troubleshooting"
        label: "Troubleshooting Practice"
        approach: >-
          Present 5 realistic scenarios of fermentation gone wrong
          (mold, off smells, too salty, nothing happening, explosion).
          For each, explain what happened, why, and how to fix or
          prevent it. Use these failures as teaching moments about
          the underlying science.
        exercise: "Diagnose and fix common fermentation problems"

  template: |
    {% macro lesson_header(title, movement_desc) %}
    # {{ skill.name }}: {{ title }}
    *Movement {{ movement }} of {{ total_movements }} — {{ movement_desc }}*
    *For: {{ skill.target_learner | truncate(80) }}*
    {% endmacro %}

    {% macro save_to(filename) %}

    ---
    Save to {{ workspace }}/{{ filename }}
    Format: Markdown, written directly to the learner (use "you").
    Tone: Warm, encouraging, knowledgeable but not condescending.
    {% endmacro %}

    {% if stage == 1 %}
    {{ lesson_header("Where Are We Starting?", "Assessment & Foundations") }}

    ## Context
    - **Skill**: {{ skill.name }} ({{ skill.domain }})
    - **Learner**: {{ skill.target_learner }}
    - **Goal**: {{ skill.goal }}
    - **Prerequisites**: {{ skill.prerequisites }}

    ## Your Task

    Write the opening lesson that:

    1. **Hooks them**: Why is {{ skill.name | lower }} fascinating? What's the
       one fact that makes people say "wait, really?" Lead with wonder, not theory.

    2. **Orients them**: Where does {{ skill.name | lower }} fit in the bigger
       picture of {{ skill.domain }}? Brief history — not a textbook chapter,
       just enough to feel grounded.

    3. **Maps the journey**: Preview what they'll learn across all {{ total_movements }}
       movements. Make the parallel practice voices sound exciting, not intimidating.

    4. **Gives them ONE thing to do today**: A tiny, zero-risk action they can
       take right now that makes them feel like they've started. Not homework.
       A gift.

    {{ save_to("01-foundations.md") }}

    {% elif stage == 2 %}
    {{ lesson_header("The Core Ideas", "Conceptual Framework") }}

    {% if previous_outputs[1] is defined %}
    ## What We Covered Last Time
    {{ previous_outputs[1] | truncate(800) }}
    {% endif %}

    ## Your Task

    Teach the 3-5 core concepts of {{ skill.name | lower }} that everything
    else builds on. These are the load-bearing ideas.

    For each concept:
    - **Name it** clearly (give it a memorable label)
    - **Explain it** without jargon first, then introduce the proper term
    - **Show it** with a concrete, sensory example
    - **Connect it** to something they already understand from cooking

    End with a "mental model" — a single metaphor or diagram (described in
    text) that ties all the concepts together. The learner should be able
    to hold the whole framework in their head.

    {{ save_to("02-core-concepts.md") }}

    {% elif stage == 3 %}
    {% set level = difficulty_levels[instance] %}
    {{ lesson_header(level.label, "Practice") }}

    {% if previous_outputs[2] is defined %}
    ## Core Concepts (from Movement 2)
    {{ previous_outputs[2] | truncate(1000) }}
    {% endif %}

    ## Practice Level: {{ level.label }}

    {{ level.approach }}

    ## Exercise
    **{{ level.exercise }}**

    Write this as a self-contained practice guide. The learner should be
    able to print this page and take it to the kitchen.

    {% if instance == 1 %}
    Include a "what you'll need" checklist at the top.
    {% elif instance == 2 %}
    Include a "fermentation journal" template they can copy.
    {% elif instance == 3 %}
    Include photos-to-look-for descriptions (what does healthy vs
    unhealthy fermentation LOOK like?).
    {% endif %}

    {{ save_to("03-practice-" ~ level.name ~ ".md") }}

    {% elif stage == 4 %}
    {{ lesson_header("Putting It Together", "Integration") }}

    You've taught foundations, core concepts, and three levels of practice.
    Now tie it all together.

    {% if previous_outputs %}
    ## What's Been Covered
    {% for key, output in previous_outputs.items() %}
    {% if output | length > 200 %}
    ### From Sheet {{ key }}
    {{ output | truncate(600) }}
    {% endif %}
    {% endfor %}
    {% endif %}

    ## Your Task

    Write an integration lesson that:

    1. **Connects the dots**: How do the core concepts show up in each
       practice exercise? Help the learner see the pattern.

    2. **Levels up**: Now that they've practiced, introduce ONE advanced
       concept they couldn't have understood before. The reward for practice.

    3. **Builds a personal routine**: Help them design a weekly
       {{ skill.name | lower }} practice that fits their life. Not ambitious.
       Sustainable. Something they'll actually do.

    4. **Celebrates**: Name what they've accomplished. Be specific about
       what they can now do that they couldn't before.

    {{ save_to("04-integration.md") }}

    {% elif stage == 5 %}
    {{ lesson_header("What's Next?", "Mastery Check & Future Path") }}

    ## Your Task

    Write the final lesson:

    1. **Self-Assessment Quiz**: 10 questions (mix of knowledge and judgment
       calls). Not trivia — questions that test whether they UNDERSTAND,
       not just remember. Include answers with explanations.

    2. **The Next 3 Skills**: What should they learn next? For each:
       - What it is
       - Why it builds on what they've learned
       - One resource to start with

    3. **The Community**: Where do {{ skill.name | lower }} enthusiasts
       gather? Subreddits, books, local groups, YouTube channels.
       Be specific — names, not categories.

    4. **A Letter to Their Future Self**: Write a short note (100 words)
       from "your instructor" to "you, six months from now." Encouraging,
       specific, a little funny.

    {{ save_to("05-mastery.md") }}
    {% endif %}

validations:
  - type: file_exists
    path: "{workspace}/01-foundations.md"
    condition: "stage == 1"

  - type: file_exists
    path: "{workspace}/02-core-concepts.md"
    condition: "stage == 2"

  - type: file_exists
    path: "{workspace}/05-mastery.md"
    condition: "stage == 5"
