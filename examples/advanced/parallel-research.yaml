# Example: Parallel Research with Explicit Sheet Dependencies
# Category: advanced/
# Demonstrates Marianne's parallel execution via explicit sheet dependencies.
#
# What This Score Does:
# Conducts multi-source research by running 3 independent search sheets in
# parallel (academic, industry, patents), then synthesizes findings into a
# report that identifies convergent evidence, divergent claims, and gaps.
#
# Compare with research/parallel-research-fanout.yaml:
# Both scores produce the same outcome. The difference is the parallelism
# mechanism:
#
#   Fan-out version (parallel-research-fanout.yaml):
#     Uses `fan_out: { 2: 3 }` to replicate a single template across 3 voices.
#     Each voice receives the same prompt with different `{{ voice }}` variables.
#     Best when parallel sheets do the SAME task on different data — add voices
#     by changing a number, not by writing new prompts.
#
#   This version (parallel-research.yaml):
#     Defines each parallel sheet individually with unique prompts and dedicated
#     instructions per search domain. Best when parallel sheets do DIFFERENT
#     tasks requiring specialized, hand-crafted instructions per domain.
#
# Trade-offs:
#   Fan-out: Less duplication, parameterized via variables, easier to scale.
#   Explicit deps: Full control over each sheet's prompt, domain-specific
#   instructions, no template contortions for per-voice differences.
#
# Pattern: Fan-out + Synthesis (manual variant)
# The DAG shape matches the pattern: setup -> parallel work -> synthesis -> final.
# The mechanism differs: explicit per-sheet dependencies instead of fan_out
# expansion. This is useful when each parallel sheet needs substantially
# different instructions that would be awkward to express via Jinja conditionals.
#
# Execution Flow (6 sheets across 4 logical phases):
#
#   Sheet 1: Setup
#        |
#        +----------+-----------+
#        v          v           v
#   Sheet 2    Sheet 3     Sheet 4       <-- Run in PARALLEL (all depend on 1)
#   (academic) (industry)  (patents)
#        |          |           |
#        +----------+-----------+
#                   v
#              Sheet 5: Synthesis        <-- Waits for ALL parallel sheets
#                   v
#              Sheet 6: Final Report
#
# How to Customize:
# 1. Change research_topic to your area of interest
# 2. Modify the search domain prompts (sheets 2-4) for your source types
# 3. Adjust the synthesis criteria (sheet 5) for your domain
# 4. Update workspace path to your desired output location
#
# Usage:
#   mzt validate examples/advanced/parallel-research.yaml
#   mzt run examples/advanced/parallel-research.yaml
#   mzt status parallel-research -w ../../workspaces/parallel-workspace
#
# Estimated Time: ~15-25 minutes (3 parallel searches + synthesis + report)
# Estimated Cost: $0.50-$3.00 (depends on research depth)
#
# Output:
#   - 01-research-setup.md: Search strategy and quality criteria
#   - 02-academic-findings.md: Peer-reviewed research findings
#   - 03-industry-findings.md: Industry practitioner perspectives
#   - 04-patent-findings.md: Innovation trends from patent databases
#   - 05-synthesis.md: Cross-source analysis with convergence scoring
#   - 06-final-report.md: Executive research report with recommendations

name: "parallel-research"
description: "Multi-source research with parallel execution via explicit dependencies"

workspace: "../../workspaces/parallel-workspace"

instrument: claude-code
instrument_fallbacks: [anthropic_api]
instrument_config:
  timeout_seconds: 1800

# Movement declarations — names appear in `mzt status` output
movements:
  1:
    name: "Research Setup"
  2:
    name: "Academic Research"
  3:
    name: "Industry Research"
  4:
    name: "Patent Research"
  5:
    name: "Cross-Source Synthesis"
  6:
    name: "Final Report"

sheet:
  size: 1
  total_items: 6
  start_item: 1

  # =========================================================================
  # PARALLEL EXECUTION: Sheet Dependency DAG
  # =========================================================================
  #
  # Format: { sheet_num: [list of prerequisite sheets] }
  #
  # Sheets without entries start immediately (or after config order).
  # Sheets with same prerequisites run in PARALLEL.
  #
  dependencies:
    # Sheets 2, 3, 4 all depend only on sheet 1 -> they run in PARALLEL
    2: [1]    # Academic search waits for setup
    3: [1]    # Industry search waits for setup (PARALLEL with 2)
    4: [1]    # Patent search waits for setup (PARALLEL with 2 and 3)

    # Sheet 5 depends on ALL parallel sheets -> waits for all to complete
    5: [2, 3, 4]

    # Sheet 6 is sequential after synthesis
    6: [5]

parallel:
  enabled: true
  max_concurrent: 3

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 3000
  lookback_sheets: 3

retry:
  max_retries: 2
  base_delay_seconds: 30

# =========================================================================
# PROMPT TEMPLATE
# =========================================================================

prompt:
  variables:
    research_topic: "[CHANGE THIS: your research topic, e.g., 'AI code generation tools and their impact on software development productivity']"

  template: |
    You are conducting multi-source research on: {{ research_topic }}

    This is sheet {{ stage }} of {{ total_stages }}.
    Workspace: {{ workspace }}

    {% if stage == 1 %}
    =========================================================================
    SHEET 1: Research Setup (Foundation)
    =========================================================================

    Establish the research framework and search strategy.

    TASKS:
    1. Define key search terms and Boolean operators for the topic
    2. Identify target sources for each parallel search:
       - Academic: Google Scholar, arXiv, ACM DL, IEEE
       - Industry: Tech blogs, company reports, developer surveys
       - Patents: USPTO, Google Patents, EPO
    3. Create a quality criteria checklist for evaluating sources
    4. Define the scope boundaries (what's in, what's out)

    OUTPUT:
    Write to: {{ workspace }}/01-research-setup.md

    Structure your output with these sections:
    ## Search Strategy
    (Key terms, Boolean operators, scope boundaries)

    ## Source Categories
    (Target sources per domain, with rationale)

    ## Quality Criteria
    (Checklist for evaluating source relevance and reliability)

    End the file with: RESEARCH_SETUP_COMPLETE

    {% elif stage == 2 %}
    =========================================================================
    SHEET 2: Academic Literature Search (PARALLEL)
    =========================================================================

    NOTE: This sheet runs in PARALLEL with sheets 3 and 4.

    Search academic sources for peer-reviewed research.

    Read: {{ workspace }}/01-research-setup.md (for search terms and quality criteria)

    TASKS:
    1. Search academic databases using the defined search strategy
    2. Extract key findings from top 10 relevant papers
    3. Note methodologies and metrics used in each study
    4. Identify research gaps and limitations

    OUTPUT:
    Write to: {{ workspace }}/02-academic-findings.md

    ## Methodology
    (Databases searched, queries used, selection criteria)

    ## Findings
    Format each finding as:
    ```
    SOURCE: [citation]
    FINDING: [key finding]
    METHODOLOGY: [how measured]
    RELEVANCE: [high/medium/low]
    ```

    ## Research Gaps
    (What's missing from the academic literature)

    End with: ACADEMIC_SEARCH_COMPLETE

    {% elif stage == 3 %}
    =========================================================================
    SHEET 3: Industry Reports Search (PARALLEL)
    =========================================================================

    NOTE: This sheet runs in PARALLEL with sheets 2 and 4.

    Search industry sources for practitioner perspectives.

    Read: {{ workspace }}/01-research-setup.md (for search terms and quality criteria)

    TASKS:
    1. Search tech blogs, company engineering blogs, and reports
    2. Find developer survey results (Stack Overflow, JetBrains, etc.)
    3. Extract adoption statistics and productivity claims
    4. Note vendor vs independent sources (flag potential bias)

    OUTPUT:
    Write to: {{ workspace }}/03-industry-findings.md

    ## Methodology
    (Sources searched, selection criteria, bias assessment approach)

    ## Findings
    Format each finding as:
    ```
    SOURCE: [url/report name]
    TYPE: [vendor/independent/survey]
    FINDING: [key finding]
    SAMPLE_SIZE: [if applicable]
    RELEVANCE: [high/medium/low]
    ```

    ## Industry Gaps
    (What practitioners aren't measuring or reporting)

    End with: INDUSTRY_SEARCH_COMPLETE

    {% elif stage == 4 %}
    =========================================================================
    SHEET 4: Patent Search (PARALLEL)
    =========================================================================

    NOTE: This sheet runs in PARALLEL with sheets 2 and 3.

    Search patent databases for innovation trends.

    Read: {{ workspace }}/01-research-setup.md (for search terms and quality criteria)

    TASKS:
    1. Search patent databases for relevant filings
    2. Identify major patent holders and their filing volumes
    3. Track filing trends over time (growth, decline, pivots)
    4. Note key technological approaches and innovations

    OUTPUT:
    Write to: {{ workspace }}/04-patent-findings.md

    ## Methodology
    (Databases searched, classification codes, date ranges)

    ## Findings
    Format each finding as:
    ```
    PATENT: [number/title]
    ASSIGNEE: [company]
    YEAR: [filing year]
    APPROACH: [technical approach]
    RELEVANCE: [high/medium/low]
    ```

    ## Innovation Trends
    (Filing trends, emerging approaches, consolidation patterns)

    End with: PATENT_SEARCH_COMPLETE

    {% elif stage == 5 %}
    =========================================================================
    SHEET 5: Cross-Source Synthesis
    =========================================================================

    Synthesize findings from ALL parallel searches.

    Read ALL parallel outputs:
    - {{ workspace }}/02-academic-findings.md
    - {{ workspace }}/03-industry-findings.md
    - {{ workspace }}/04-patent-findings.md

    Your task is NOT to summarize. Find what emerges from the collision.

    TASKS:
    1. Identify CONVERGENT findings (appear in multiple source types)
    2. Identify DIVERGENT findings (source types disagree)
    3. Note GAPS (topics covered by one source type but not others)
    4. Assess overall evidence strength per major claim

    CONVERGENCE SCORING:
    - HIGH convergence: Finding supported by academic + industry + patents
    - MEDIUM convergence: Finding supported by 2 of 3 source types
    - LOW convergence: Finding from single source type only

    OUTPUT:
    Write to: {{ workspace }}/05-synthesis.md

    Structure with these sections:
    ## Convergent Findings
    (Claims with multi-source support, with convergence level and citations)

    ## Divergent Findings
    (Where sources disagree — don't resolve by averaging, explain why they differ)

    ## Evidence Gaps
    (Topics missing from one or more source types)

    ## Confidence Assessment
    (Overall strength of evidence per major theme)

    End with: SYNTHESIS_COMPLETE

    {% elif stage == 6 %}
    =========================================================================
    SHEET 6: Final Research Report
    =========================================================================

    Generate the final research report.

    Read: {{ workspace }}/05-synthesis.md

    OUTPUT:
    Write to: {{ workspace }}/06-final-report.md

    Structure:
    ## Executive Summary
    (Key findings in 3-5 bullet points)

    ## Methodology
    (Multi-source parallel search approach, domains covered, quality criteria)

    ## Key Findings
    (Prioritized by convergence score — highest convergence first)

    ## Discussion
    (Interpretation, implications, and what the convergence/divergence patterns reveal)

    ## Limitations
    (Methodological constraints, potential biases, coverage gaps)

    ## Recommendations
    (Actionable next steps based on findings)

    ## References
    (Consolidated from all source domains)

    End with: RESEARCH_COMPLETE

    {% endif %}

# =========================================================================
# VALIDATIONS
# =========================================================================
# Staged: stage 1 = existence checks (fast), stage 2 = content quality checks

validations:
  # --- Sheet 1: Research Setup ---
  - type: file_exists
    path: "{workspace}/01-research-setup.md"
    condition: "sheet_num == 1"
    description: "Research setup document created"
    stage: 1
  - type: content_contains
    path: "{workspace}/01-research-setup.md"
    pattern: "RESEARCH_SETUP_COMPLETE"
    condition: "sheet_num == 1"
    description: "Setup marked complete"
    stage: 2
  - type: content_contains
    path: "{workspace}/01-research-setup.md"
    pattern: "## Search Strategy"
    condition: "sheet_num == 1"
    description: "Setup has search strategy section"
    stage: 2
  - type: content_contains
    path: "{workspace}/01-research-setup.md"
    pattern: "## Quality Criteria"
    condition: "sheet_num == 1"
    description: "Setup has quality criteria section"
    stage: 2

  # --- Sheet 2: Academic search (parallel) ---
  - type: file_exists
    path: "{workspace}/02-academic-findings.md"
    condition: "sheet_num == 2"
    description: "Academic findings created"
    stage: 1
  - type: content_contains
    path: "{workspace}/02-academic-findings.md"
    pattern: "ACADEMIC_SEARCH_COMPLETE"
    condition: "sheet_num == 2"
    description: "Academic search complete"
    stage: 2
  - type: content_regex
    path: "{workspace}/02-academic-findings.md"
    pattern: "SOURCE:.*\\n.*FINDING:"
    condition: "sheet_num == 2"
    description: "Academic findings use structured format"
    stage: 2
  - type: content_contains
    path: "{workspace}/02-academic-findings.md"
    pattern: "## Findings"
    condition: "sheet_num == 2"
    description: "Academic findings has Findings section"
    stage: 2

  # --- Sheet 3: Industry search (parallel) ---
  - type: file_exists
    path: "{workspace}/03-industry-findings.md"
    condition: "sheet_num == 3"
    description: "Industry findings created"
    stage: 1
  - type: content_contains
    path: "{workspace}/03-industry-findings.md"
    pattern: "INDUSTRY_SEARCH_COMPLETE"
    condition: "sheet_num == 3"
    description: "Industry search complete"
    stage: 2
  - type: content_regex
    path: "{workspace}/03-industry-findings.md"
    pattern: "SOURCE:.*\\n.*TYPE:"
    condition: "sheet_num == 3"
    description: "Industry findings use structured format"
    stage: 2
  - type: content_contains
    path: "{workspace}/03-industry-findings.md"
    pattern: "## Findings"
    condition: "sheet_num == 3"
    description: "Industry findings has Findings section"
    stage: 2

  # --- Sheet 4: Patent search (parallel) ---
  - type: file_exists
    path: "{workspace}/04-patent-findings.md"
    condition: "sheet_num == 4"
    description: "Patent findings created"
    stage: 1
  - type: content_contains
    path: "{workspace}/04-patent-findings.md"
    pattern: "PATENT_SEARCH_COMPLETE"
    condition: "sheet_num == 4"
    description: "Patent search complete"
    stage: 2
  - type: content_regex
    path: "{workspace}/04-patent-findings.md"
    pattern: "PATENT:.*\\n.*ASSIGNEE:"
    condition: "sheet_num == 4"
    description: "Patent findings use structured format"
    stage: 2
  - type: content_contains
    path: "{workspace}/04-patent-findings.md"
    pattern: "## Findings"
    condition: "sheet_num == 4"
    description: "Patent findings has Findings section"
    stage: 2

  # --- Sheet 5: Synthesis ---
  - type: file_exists
    path: "{workspace}/05-synthesis.md"
    condition: "sheet_num == 5"
    description: "Synthesis document created"
    stage: 1
  - type: content_contains
    path: "{workspace}/05-synthesis.md"
    pattern: "SYNTHESIS_COMPLETE"
    condition: "sheet_num == 5"
    description: "Synthesis complete"
    stage: 2
  - type: content_contains
    path: "{workspace}/05-synthesis.md"
    pattern: "## Convergent Findings"
    condition: "sheet_num == 5"
    description: "Synthesis has convergent findings section"
    stage: 2
  - type: content_contains
    path: "{workspace}/05-synthesis.md"
    pattern: "## Divergent Findings"
    condition: "sheet_num == 5"
    description: "Synthesis has divergent findings section"
    stage: 2
  - type: content_regex
    path: "{workspace}/05-synthesis.md"
    pattern: "(?i)(HIGH|MEDIUM|LOW)\\s+(convergence|confidence)"
    condition: "sheet_num == 5"
    description: "Convergence scoring applied"
    stage: 2

  # --- Sheet 6: Final report ---
  - type: file_exists
    path: "{workspace}/06-final-report.md"
    condition: "sheet_num == 6"
    description: "Final report created"
    stage: 1
  - type: content_contains
    path: "{workspace}/06-final-report.md"
    pattern: "RESEARCH_COMPLETE"
    condition: "sheet_num == 6"
    description: "Research complete"
    stage: 2
  - type: content_contains
    path: "{workspace}/06-final-report.md"
    pattern: "## Executive Summary"
    condition: "sheet_num == 6"
    description: "Report has executive summary"
    stage: 2
  - type: content_contains
    path: "{workspace}/06-final-report.md"
    pattern: "## Recommendations"
    condition: "sheet_num == 6"
    description: "Report has recommendations section"
    stage: 2
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/06-final-report.md") -ge 500'
    condition: "sheet_num == 6"
    description: "Final report has substantive content (500+ words)"
    stage: 2

notifications:
  - type: desktop
    on_events:
      - job_complete
      - job_failed
