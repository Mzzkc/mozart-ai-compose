# contract-generator.yaml — Legal Contract Generation
#
# Category: product/ — Product building and business workflows
#
# A Marianne score that generates a complete legal contract from a brief.
# Demonstrates multi-stage document generation with structural validation:
#
#   Movement 1: Analyze the contract brief and extract structured terms
#   Movement 2: Generate contract sections in parallel (3 voices)
#               - Voice 1: Definitions & parties
#               - Voice 2: Obligations & deliverables
#               - Voice 3: Terms, liability & dispute resolution
#   Movement 3: Assemble, cross-reference, and produce the final contract
#
# Patterns demonstrated:
#   - Fan-out + Synthesis: Parallel section drafting with final assembly
#   - Prefabrication: Shared analysis (01-analysis.json) guides all drafting teams
#   - Barn Raising: Consistent formatting standards across parallel sections
#
# Demonstrates how Marianne orchestrates multi-stage document generation
# that would be a single monolithic prompt in other tools.
#
# Usage:
#   mzt start
#   mzt run examples/product/contract-generator.yaml
#   mzt status contract-gen
#   open workspaces/contract-gen/contract-final.md
#
# Customization:
#   Edit prompt.variables to change contract type, parties, scope, and terms.
#   All contract-specific details are parameterized - this score works for
#   any service agreement by updating the variables section.
#
# Output:
#   workspaces/contract-gen/
#     01-analysis.json          — Structured term extraction
#     02-definitions.md         — Definitions, parties, recitals
#     02-obligations.md         — Obligations, deliverables, milestones
#     02-terms.md               — Terms, liability, disputes, termination
#     contract-final.md         — The assembled contract
#
# Time: ~3 minutes  |  Cost: ~$0.50  |  Sheets: 5

name: contract-gen
description: "Generate a complete legal contract from a brief — parallel section drafting with cross-referencing"

workspace: ../../workspaces/contract-gen

instrument: claude-code
instrument_fallbacks: [anthropic_api]
instrument_config:
  timeout_seconds: 600

movements:
  1:
    name: "Term Extraction"
  2:
    name: "Section Drafting"
  3:
    name: "Assembly"

sheet:
  size: 1
  total_items: 3
  fan_out:
    2: 3
  dependencies:
    2: [1]
    3: [2]

parallel:
  enabled: true
  max_concurrent: 3

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 6000
  lookback_sheets: 4

retry:
  max_retries: 1

prompt:
  variables:
    contract_type: "Software Development Services Agreement"
    client:
      name: "Meridian Health Systems, Inc."
      jurisdiction: "State of California"
      type: "Healthcare technology company"
    provider:
      name: "CloudForge Solutions, LLC"
      jurisdiction: "State of Delaware"
      type: "Software development firm"
    scope: |
      Design, develop, and deploy a patient portal web application with:
      - Secure patient authentication (HIPAA compliant)
      - Appointment scheduling and management
      - Medical records viewing (read-only)
      - Secure messaging between patients and providers
      - Insurance verification integration
    timeline: "12 months from effective date"
    budget: "$480,000 USD, payable in monthly milestones"
    special_terms:
      - "HIPAA Business Associate Agreement required"
      - "Source code escrow with neutral third party"
      - "90-day warranty period post-deployment"
      - "Mutual NDA already in place (reference: NDA-2024-0847)"

  template: |
    {% if stage == 1 %}
    # Movement 1: Contract Term Extraction

    You are a legal analyst. Analyze the following contract brief and produce
    a structured analysis that will guide three parallel drafting teams.

    ## Contract Brief

    **Type:** {{ contract_type }}
    **Client:** {{ client.name }} ({{ client.type }}, {{ client.jurisdiction }})
    **Provider:** {{ provider.name }} ({{ provider.type }}, {{ provider.jurisdiction }})

    **Scope:**
    {{ scope }}

    **Timeline:** {{ timeline }}
    **Budget:** {{ budget }}

    **Special Terms:**
    {% for term in special_terms %}
    - {{ term }}
    {% endfor %}

    ## Your Task

    Produce a JSON analysis file with the following structure:

    ```json
    {
      "parties": {
        "client": { "legal_name": "...", "role": "...", "jurisdiction": "..." },
        "provider": { "legal_name": "...", "role": "...", "jurisdiction": "..." }
      },
      "defined_terms": ["list of terms that need formal definitions"],
      "obligations": {
        "provider": ["list of provider obligations"],
        "client": ["list of client obligations"]
      },
      "milestones": ["list of payment/delivery milestones"],
      "risk_areas": ["list of areas needing protective clauses"],
      "regulatory": ["list of regulatory requirements"],
      "governing_law": "...",
      "dispute_resolution": "recommended approach"
    }
    ```

    Be thorough. Every defined term, obligation, and risk area you identify
    here becomes a section in the final contract. Missing something here means
    it's missing from the contract.

    Save to: {{ workspace }}/01-analysis.json

    Print the JSON to stdout as well so downstream sheets can reference it.

    {% elif stage == 2 %}
    # Movement 2, Voice {{ voice }}: Contract Section Drafting

    You are a contract attorney drafting one section of a {{ contract_type }}.

    ## Read the Analysis First
    Read {{ workspace }}/01-analysis.json — this is the structured analysis
    that guides your drafting. Use its defined terms, obligations, and risk
    areas as your source material.

    {% if voice == 1 %}
    ## Your Section: Definitions, Parties & Recitals

    Draft the opening sections of the contract:

    1. **Preamble** — Parties, effective date, recitals (WHEREAS clauses)
    2. **Definitions** — Formal definitions for ALL terms identified in the
       analysis. Each definition must be precise and self-contained.
       Use standard legal formatting: "Term" means [definition].
    3. **Scope of Work** — Formal description of the services, referencing
       the deliverables and milestones from the analysis.

    Every defined term MUST appear in bold quotes on first use.
    Cross-reference the analysis's `defined_terms` list — every entry
    needs a definition.

    Save to: {{ workspace }}/02-definitions.md

    {% elif voice == 2 %}
    ## Your Section: Obligations, Deliverables & Milestones

    Draft the core performance sections:

    1. **Provider Obligations** — Each obligation from the analysis gets its
       own numbered subsection with acceptance criteria.
    2. **Client Obligations** — Client's responsibilities (access, feedback
       timelines, approvals, payment).
    3. **Deliverables** — Formal deliverable descriptions with acceptance
       criteria and delivery dates.
    4. **Payment Schedule** — Milestone-based payment tied to deliverables.
       Include late payment terms.

    Reference the analysis's `obligations` and `milestones` sections.
    Every obligation must have a measurable acceptance criterion.

    Save to: {{ workspace }}/02-obligations.md

    {% elif voice == 3 %}
    ## Your Section: Terms, Liability & Dispute Resolution

    Draft the protective and procedural sections:

    1. **Term and Termination** — Duration, renewal, termination for cause
       and convenience, effect of termination.
    2. **Confidentiality** — Reference the existing NDA, add contract-specific
       confidentiality obligations.
    3. **Intellectual Property** — Work-for-hire, license grants, pre-existing
       IP, source code escrow terms.
    4. **Limitation of Liability** — Caps, exclusions, carve-outs for
       willful misconduct and IP infringement.
    5. **Indemnification** — Mutual indemnification with standard carve-outs.
    6. **Regulatory Compliance** — HIPAA requirements, BAA reference,
       security obligations.
    7. **Dispute Resolution** — Based on the analysis's recommendation.
    8. **General Provisions** — Notices, amendments, severability, entire
       agreement, force majeure.

    Reference the analysis's `risk_areas` and `regulatory` sections.
    Every risk area must be addressed by at least one protective clause.

    Save to: {{ workspace }}/02-terms.md
    {% endif %}

    ## Drafting Standards
    - Use formal legal language but keep it readable
    - Number all sections and subsections (1.1, 1.2, etc.)
    - Cross-reference between sections where appropriate
    - Include bracketed placeholders for dates: [EFFECTIVE DATE]
    - Use "shall" for obligations, "may" for permissions
    - Every clause must be self-contained — readable without context

    Print a summary of your section to stdout (section titles, key terms defined).

    {% elif stage == 3 %}
    # Movement 3: Contract Assembly

    You are a senior contract attorney assembling a complete
    {{ contract_type }} from separately drafted sections.

    ## Read All Sections
    Read every file in {{ workspace }}/:
    - 01-analysis.json — The structured analysis
    - 02-definitions.md — Definitions, parties, recitals
    - 02-obligations.md — Obligations, deliverables, milestones
    - 02-terms.md — Terms, liability, dispute resolution

    ## Your Task

    Assemble these into a single, coherent contract document:

    1. **Merge** — Combine all sections in standard contract order
    2. **Cross-reference** — Ensure section numbers are consistent and
       cross-references between sections are correct
    3. **Defined terms** — Verify every term used in obligations/terms
       sections appears in the definitions section. Flag any gaps.
    4. **Consistency** — Ensure party names, dates, amounts, and
       terminology are consistent throughout
    5. **Completeness** — Check that every obligation in the analysis
       appears in the contract. Flag any gaps.
    6. **Signature block** — Add standard signature blocks for both parties

    ## Output

    Save the assembled contract to: {{ workspace }}/contract-final.md

    Print a quality summary to stdout:
    - Number of sections and subsections
    - Number of defined terms
    - Any gaps or inconsistencies found
    - Any recommendations for human review

    {% endif %}

validations:
  - type: file_exists
    path: "{workspace}/01-analysis.json"
    sheet: 1
    description: "Term extraction JSON exists"
  - type: content_contains
    path: "{workspace}/01-analysis.json"
    pattern: "defined_terms"
    sheet: 1
    description: "Analysis identifies terms requiring formal definitions"
  - type: file_exists
    path: "{workspace}/02-definitions.md"
    sheet: 2
    description: "Definitions and parties section drafted"
  - type: content_regex
    path: "{workspace}/02-definitions.md"
    pattern: "\\d+\\.\\d+"
    sheet: 2
    description: "Definitions uses numbered subsections"
  - type: file_exists
    path: "{workspace}/02-obligations.md"
    sheet: 3
    description: "Obligations and deliverables section drafted"
  - type: content_contains
    path: "{workspace}/02-obligations.md"
    pattern: "Deliverable"
    sheet: 3
    description: "Obligations section covers deliverables"
  - type: file_exists
    path: "{workspace}/02-terms.md"
    sheet: 4
    description: "Terms and liability section drafted"
  - type: content_contains
    path: "{workspace}/02-terms.md"
    pattern: "HIPAA"
    sheet: 4
    description: "Terms section addresses regulatory compliance"
  - type: file_exists
    path: "{workspace}/contract-final.md"
    sheet: 5
    description: "Assembled contract exists"
  - type: content_contains
    path: "{workspace}/contract-final.md"
    pattern: "Meridian Health Systems"
    sheet: 5
    description: "Final contract names the client"
  - type: content_contains
    path: "{workspace}/contract-final.md"
    pattern: "CloudForge Solutions"
    sheet: 5
    description: "Final contract names the provider"
