# Iterative Development Loop — Generator Config
#
# This config drives scripts/generate-iterative-dev-loop.py to produce
# a Mozart score implementing an iterative development loop.
#
# Usage:
#   python scripts/generate-iterative-dev-loop.py examples/iterative-dev-loop-config.yaml \
#     -o examples/iterative-dev-loop.yaml
#
#   python scripts/generate-iterative-dev-loop.py examples/iterative-dev-loop-config.yaml \
#     --dry-run
#
#   python scripts/generate-iterative-dev-loop.py examples/iterative-dev-loop-config.yaml \
#     -o examples/iterative-dev-loop.yaml --cycles 3

# Job identity
name: "iterative-dev-loop-example"
workspace: "../workspaces/dev-loop-example"
spec_dir: "./specs/my-feature/"

# How many development cycles before forced exit (early exit via verdicts)
cycles: 20

# Spec quality: sketch | outline | detailed
# - sketch:   Specs are intentionally loose. Agents fill gaps using TDF perspective.
# - outline:  Structure clear, details missing. Agents fill tactical details.
# - detailed: Specs are comprehensive. Agents follow closely.
# The intent alignment agent can override per-area in the intent brief.
# spec_quality: detailed

# Agent counts — defaults shown. Override to scale the team.
# agents:
#   managers: 1         # Team managers (fan-out, each manages a subset)
#   workers: 3          # Investigators + Implementers
#   qa: 3               # Test designers (paired with workers via hierarchy)
#   docs: 2             # Documentation specialists
#   reviewers: 5        # TDF reviewers (5 perspectives)
#   antagonists: 2      # Adversarial validators (blind)
#   dreamers: 5         # Memory consolidators

# Persona overrides — TDF-aligned defaults used for omitted entries.
# Each persona has: name, voice, focus
# personas:
#   manager_personas:
#     1:
#       name: "META"
#       voice: "Your custom voice for manager 1..."
#       focus: "Your custom focus..."
#   worker_personas:
#     1:
#       name: "COMP"
#       voice: "Your custom voice for worker 1..."
#       focus: "Your custom focus..."
#   qa_personas: { ... }
#   doc_personas: { ... }
#   reviewer_personas: { ... }
#   antagonist_personas: { ... }

# Hierarchy — explicit relationships between agents.
# If omitted, auto-computed via round-robin from agent counts.
# hierarchy:
#   reports:                       # Manager → direct reports
#     1:
#       workers: [1, 2, 3]
#       qa: [1, 2, 3]
#       docs: [1, 2]
#   pairings:
#     qa_to_workers:               # QA → workers they test for
#       1: [1]
#       2: [2]
#       3: [3]
#     doc_to_workers:              # Doc → workers they document
#       1: [1, 2]
#       2: [3]
#   dreamer_groups:                # Dreamer → agents whose memory they consolidate
#     1: [worker-1, worker-2, worker-3]
#     2: [qa-1, qa-2, qa-3]
#     3: [manager-1, doc-1, doc-2]
#     4: [reviewer-1, reviewer-2, reviewer-3, reviewer-4, reviewer-5]
#     5: collective

# Files injected into ALL agent prompts (goes under sheet: in generated score)
# sheet:
#   prelude:
#     - file: "./coding-standards.md"
#       as: skill
#     - file: "./project-context.md"
#       as: context

instrument: claude-code
instrument_config:
  timeout_seconds: 3600

# Custom validations — applied to specified roles each cycle
# custom_validations:
#   - type: command_succeeds
#     command: 'cd {workspace} && pytest tests/ -x -q'
#     description: "All tests pass"
#     applies_to: [implementer, antagonist]
#   - type: command_succeeds
#     command: 'cd {workspace} && python -c "from app import main"'
#     description: "App imports without error"
#     applies_to: [antagonist]

# Execution tuning
parallel:
  enabled: true
  max_concurrent: 5

retry:
  max_retries: 2
  base_delay_seconds: 15
  max_completion_attempts: 3
  completion_threshold_percent: 100

rate_limit:
  wait_minutes: 60
  max_waits: 12

stale_detection:
  enabled: true
  idle_timeout_seconds: 1800
