    stage: 2

  - type: content_regex
    path: "{workspace}/02-sampling-plan.md"
    pattern: "(?i)bias|limitation"
    description: "Sampling plan acknowledges biases or limitations"
    condition: "sheet_num >= 2"
    stage: 2

