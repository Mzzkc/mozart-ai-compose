  - type: content_regex
    path: "{workspace}/06-error-analysis.md"
    pattern: "(?i)bias|error pattern|systematic"
    description: "Error analysis identifies bias or patterns"
    condition: "sheet_num >= 6"
    stage: 2

  - type: content_regex
    path: "{workspace}/06-error-analysis.md"
    pattern: "(?i)recommendation"
