  - type: command_succeeds
    command: "cd /home/emzi/Projects/mozart-ai-compose && git checkout daemon-symphony -q && .venv/bin/python -c 'from mozart.daemon.config import DaemonConfig; from mozart.daemon.process import DaemonProcess; from mozart.daemon.manager import JobManager; from mozart.daemon.ipc.server import IPCServer; print(\"OK\")' ; _r=$?; git checkout main -q; exit $_r"
    description: "Daemon imports succeed"
    condition: "stage >= 14"

  - type: command_succeeds
    command: "cd /home/emzi/Projects/mozart-ai-compose && git checkout main -q && .venv/bin/mozart validate examples/sheet-review.yaml --json 2>/dev/null; test $? -le 1"
    description: "CLI canary on main"
    condition: "stage >= 14"

  - type: command_succeeds
    command: "cd /home/emzi/Projects/mozart-ai-compose && git checkout daemon-symphony -q && .venv/bin/pytest tests/ -x --timeout=120 -q --tb=line --no-header 2>&1 | tail -1 | grep -qE '[0-9]+ passed' ; _r=$?; git checkout main -q; exit $_r"
