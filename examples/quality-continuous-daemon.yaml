# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║       CONTINUOUS QUALITY: DAEMON GENERAL REVIEW                            ║
# ║                                                                            ║
# ║  Comprehensive quality review of the entire daemon package:                ║
# ║  - Architecture, component wiring, dependency flow                        ║
# ║  - Real testing, coverage gaps, stress tests                              ║
# ║  - Code quality, silent failures, error handling                          ║
# ║  - Integration, backwards compatibility, IPC flow                         ║
# ║                                                                            ║
# ║  Self-chaining iterative review with 3 batch fix rounds.                  ║
# ║  Batch 3 is fanned out for parallel even/odd issue handling.              ║
# ║                                                                            ║
# ║  Branch protocol:                                                          ║
# ║    Stage 1 checks out daemon-symphony; stages 1-11 STAY on it            ║
# ║    Stage 2 (parallel) is READ-ONLY — no branch switching                  ║
# ║    Stages 12-14 manage branch state independently                         ║
# ║                                                                            ║
# ║  Execution Flow (14 stages, 19 concrete sheets):                          ║
# ║                                                                            ║
# ║    Stage 1:  Full Daemon Inventory                                        ║
# ║         |                                                                  ║
# ║         +------+-------+-------+                                          ║
# ║         v      v       v       v                                          ║
# ║    Stage 2 x4: Deep-Dives (PARALLEL)                                     ║
# ║      [Architecture] [Testing] [CodeQuality] [Integration]                ║
# ║         |      |       |       |                                          ║
# ║         +------+-------+-------+                                          ║
# ║                   v                                                        ║
# ║    Stage 3:  Category Discovery & Issue Catalog                           ║
# ║    Stage 4:  Fix Prioritization & Batching                                ║
# ║    Stage 5:  Batch 1 — Quick Wins (70%+)                                 ║
# ║    Stage 6:  Batch 1 — Completion Pass                                    ║
# ║    Stage 7:  Batch 2 — Medium Effort (70%+)                              ║
# ║    Stage 8:  Batch 2 — Completion Pass                                    ║
# ║         +----------+                                                       ║
# ║         v          v                                                       ║
# ║    Stage 9 x2: Batch 3 — Significant (50%+, PARALLEL)                    ║
# ║      [Even IDs]  [Odd IDs]                                                ║
# ║         +----------+                                                       ║
# ║         v          v                                                       ║
# ║    Stage 10 x2: Batch 3 — Completion (PARALLEL)                          ║
# ║      [Even IDs]  [Odd IDs]                                                ║
# ║         +----------+                                                       ║
# ║                   v                                                        ║
# ║    Stage 11: Verification & Summary                                       ║
# ║    Stage 12: Commit & Push (to daemon-symphony)                           ║
# ║    Stage 13: Merge Conflict Resolution                                    ║
# ║    Stage 14: Final Integration Verification                               ║
# ║                                                                            ║
# ║  Usage:                                                                    ║
# ║    cd ~/Projects/mozart-ai-compose                                         ║
# ║    setsid env -u CLAUDECODE mozart run \                                   ║
# ║      examples/quality-continuous-daemon.yaml \                             ║
# ║      --fresh > .quality-daemon-workspace/mozart.log 2>&1 &                ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "quality-continuous-daemon"
description: "General daemon quality review — architecture, testing, code quality, integration"

workspace: "./workspaces/quality-daemon-workspace-2"

workspace_lifecycle:
  archive_on_fresh: true
  max_archives: 5

instrument: claude-code
instrument_config:
  working_directory: /home/emzi/Projects/mozart-ai-compose
  timeout_seconds: 3000

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 3000
  lookback_sheets: 5
  capture_files:
    - "{{ workspace }}/*.md"
    - "{{ workspace }}/*.yaml"

sheet:
  size: 1
  total_items: 14

  fan_out:
    2: 4
    9: 2
    10: 2

  dependencies:
    2: [1]
    3: [2]
    4: [3]
    5: [4]
    6: [5]
    7: [6]
    8: [7]
    9: [8]
    10: [9]
    11: [10]
    12: [11]
    13: [12]
    14: [13]

parallel:
  enabled: true
  max_concurrent: 4

retry:
  max_retries: 2

prompt:
  template: |
    {{ preamble }}

    {% if stage == 1 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 1: FULL DAEMON INVENTORY                                            ║
    ║  "Know exactly what exists before you touch anything"                      ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}

    **Step 1: Track iteration**
    ```bash
    mkdir -p {{ workspace }}
    if [ -f {{ workspace }}/.iteration ]; then
      ITER=$(cat {{ workspace }}/.iteration)
      ITER=$((ITER + 1))
    else
      ITER=1
    fi
    echo $ITER > {{ workspace }}/.iteration
    echo "=== DAEMON QUALITY ITERATION $ITER ==="
    ```

    **Step 2: Inventory ALL daemon components**
    ```bash
    echo "=== DAEMON SOURCE FILES ==="
    wc -l src/mozart/daemon/*.py src/mozart/daemon/ipc/*.py 2>/dev/null

    echo "=== DAEMON TEST FILES ==="
    wc -l tests/test_daemon_*.py

    echo "=== COMPONENT DEPENDENCY MAP ==="
    grep -rn "^from mozart.daemon\|^import mozart.daemon" src/mozart/daemon/ --include="*.py" | head -40

    echo "=== CROSS-COMPONENT WIRING ==="
    grep -rn "scheduler\|rate_coordinator\|backpressure\|learning_hub\|monitor\|job_service\|manager" \
      src/mozart/daemon/process.py src/mozart/daemon/manager.py 2>/dev/null | head -30
    ```

    **Step 3: Read each daemon module in full**
    - `src/mozart/daemon/config.py` — DaemonConfig
    - `src/mozart/daemon/types.py` — Type definitions
    - `src/mozart/daemon/output.py` — OutputProtocol
    - `src/mozart/daemon/job_service.py` — JobService (core execution)
    - `src/mozart/daemon/process.py` — DaemonProcess entry point
    - `src/mozart/daemon/manager.py` — JobManager lifecycle
    - `src/mozart/daemon/monitor.py` — ResourceMonitor
    - `src/mozart/daemon/pgroup.py` — ProcessGroups
    - `src/mozart/daemon/health.py` — HealthChecks
    - `src/mozart/daemon/scheduler.py` — GlobalSheetScheduler
    - `src/mozart/daemon/rate_coordinator.py` — RateLimitCoordinator
    - `src/mozart/daemon/backpressure.py` — BackpressureController
    - `src/mozart/daemon/learning_hub.py` — LearningHub
    - `src/mozart/daemon/detect.py` — Daemon detection
    - `src/mozart/daemon/ipc/server.py` — IPC server
    - `src/mozart/daemon/ipc/client.py` — IPC client
    - `src/mozart/daemon/ipc/protocol.py` — JSON-RPC protocol
    - `src/mozart/daemon/ipc/handler.py` — IPC handler

    **Step 4: Run ALL daemon tests to establish baseline**
    ```bash
    echo "=== ALL DAEMON TESTS ==="
    pytest tests/test_daemon_*.py -v --tb=short 2>&1 | tail -50
    echo "=== FULL SUITE ==="
    pytest tests/ -x --timeout=120 -q --tb=line 2>&1 | tail -5
    ```

    Save to {{ workspace }}/00-daemon-inventory.md with: Iteration number,
    Component Stats table (file, LOC, test file, test count), Dependency Map,
    Wiring Status, Test Baseline, Key Concerns.

    **Output to:** {{ workspace }}/00-daemon-inventory.md

    {% elif stage == 2 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 2: DEEP-DIVE — {{ review_types[instance] | upper }}                  ║
    ║  Instance {{ instance }} of {{ fan_count }} (running in PARALLEL)            ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}
    {{ readonly_constraint }}

    **Read:** {{ workspace }}/00-daemon-inventory.md

    {% if instance == 1 %}
    {# ═══════════════ ARCHITECTURE REVIEW ═══════════════ #}

    You are the **Architecture Review Analyst**. Examine the daemon's structural
    design across ALL components.

    **Read in full:** ALL files in `src/mozart/daemon/` and `src/mozart/daemon/ipc/`

    **1. Component Responsibilities** — Is each module focused? Any god classes?
    Overlapping responsibilities? Clear boundaries?

    **2. Dependency Graph** — Who imports whom? Circular dependencies?
    ```bash
    grep -rn "^from mozart.daemon\|^import mozart.daemon" src/mozart/daemon/ --include="*.py" | sort
    ```

    **3. Startup/Shutdown Flow** — DaemonProcess → components init order?
    Graceful shutdown? Resource cleanup? Signal handling?

    **4. Error Propagation** — How do errors flow between components?
    IPC → Handler → Manager → JobService? Missing error paths?

    **5. Configuration Consistency** — DaemonConfig fields used consistently?
    Defaults sensible? Validation adequate?

    **6. Concurrency Model** — Lock usage across components? Consistent patterns?
    ```bash
    grep -rn "self._lock\|asyncio.Lock\|async with" src/mozart/daemon/ --include="*.py" | head -30
    ```

    **7. Missing Architecture** — Dead code? Unused interfaces? Missing abstractions?

    **Output to:** {{ workspace }}/01-architecture-review.md

    {% elif instance == 2 %}
    {# ═══════════════ TESTING REVIEW ═══════════════ #}

    You are the **Testing Review Analyst**. Evaluate test quality and coverage
    across ALL daemon test files.

    **Read in full:** ALL `tests/test_daemon_*.py` files

    **1. Real vs Mock Balance** — Are tests testing real behavior or just mocking?
    Which components have integration-style tests? Which are pure unit?
    ```bash
    grep -cn "Mock\|patch\|MagicMock\|AsyncMock" tests/test_daemon_*.py | sort -t: -k2 -rn
    ```

    **2. Scenario Coverage** — Are realistic workflows tested?
    Submit → run → complete? Rate limit → backoff → retry?
    Startup → jobs → shutdown? Multi-job concurrent execution?

    **3. Edge Cases** — Empty inputs? None values? Duplicate operations?
    Concurrent access? Resource exhaustion?

    **4. Stress Tests** — Any tests with 50+ sheets? 10+ concurrent jobs?
    Rapid state changes? Memory pressure simulation?

    **5. Error Path Testing** — Backend failures? IPC disconnection?
    Config validation errors? Partial initialization?

    **6. Test Organization** — Consistent patterns? Shared fixtures?
    Test isolation? Flaky test risk?

    **7. Coverage Gaps** — List every untested public method/class.

    **Output to:** {{ workspace }}/02-testing-review.md

    {% elif instance == 3 %}
    {# ═══════════════ CODE QUALITY REVIEW ═══════════════ #}

    You are the **Code Quality Analyst**. Find silent failures, code debt,
    and quality issues across ALL daemon modules.

    **Read in full:** ALL files in `src/mozart/daemon/` and `src/mozart/daemon/ipc/`

    **1. Silent Failures** — Bare except? Swallowed exceptions? Errors logged
    but not propagated? return None on error?
    ```bash
    grep -rn "except:\|except Exception\|pass$\|return None" src/mozart/daemon/ --include="*.py" | head -30
    ```

    **2. Error Handling** — Consistent patterns? Appropriate error types?
    Missing error handling? Overly broad catches?

    **3. Type Safety** — Missing type hints? Inconsistent types? Any use
    of `Any` that could be more specific?
    ```bash
    grep -rn ": Any\|-> Any\|Optional\[Any\]" src/mozart/daemon/ --include="*.py" | head -20
    ```

    **4. Logging Quality** — Structured logging used? Consistent levels?
    Missing context in log messages? Log spam risk?

    **5. Dead Code** — Unused methods? Unreachable branches?
    Commented-out code? Placeholder implementations?

    **6. Code Duplication** — Repeated patterns that should be abstracted?
    Copy-paste code across modules?

    **7. Resource Management** — File handles closed? Async cleanup?
    Memory leaks in long-running scenarios?

    **Output to:** {{ workspace }}/03-code-quality-review.md

    {% elif instance == 4 %}
    {# ═══════════════ INTEGRATION REVIEW ═══════════════ #}

    You are the **Integration Review Analyst**. Examine cross-component
    wiring and backwards compatibility.

    **Read in full:**
    - `src/mozart/daemon/process.py` — DaemonProcess (wires everything)
    - `src/mozart/daemon/manager.py` — JobManager (orchestrates jobs)
    - `src/mozart/daemon/job_service.py` — JobService (executes jobs)
    - `src/mozart/daemon/ipc/server.py` — IPC server
    - `src/mozart/daemon/ipc/handler.py` — IPC handler
    - `src/mozart/daemon/detect.py` — Daemon detection

    **1. Component Wiring** — How does DaemonProcess connect components?
    Are all components initialized? Proper dependency injection?
    ```bash
    grep -n "self\.\|=.*(" src/mozart/daemon/process.py | head -40
    ```

    **2. IPC Flow** — Client → Server → Handler → Manager → JobService?
    Are all JSON-RPC methods properly routed? Error responses correct?

    **3. Daemon Detection** — How does CLI detect running daemon?
    Race conditions? Stale socket? Multiple daemons?
    ```bash
    cat src/mozart/daemon/detect.py
    ```

    **4. Backwards Compatibility** — Does non-daemon Mozart still work?
    Are daemon-only imports guarded? Optional dependencies?

    **5. Scheduler/RateCoord/Backpressure Wiring** — Are these actually
    connected to the execution path, or standalone?
    ```bash
    grep -rn "scheduler\|rate_coordinator\|backpressure" \
      src/mozart/daemon/manager.py src/mozart/daemon/job_service.py src/mozart/daemon/process.py 2>/dev/null | head -30
    ```

    **6. Health Check Integration** — Are health checks actually wired?
    What do they report? Are they tested end-to-end?

    **Output to:** {{ workspace }}/04-integration-review.md

    {% endif %}

    {% elif stage == 3 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 3: CATEGORY DISCOVERY (up to 25 Work Items from Deep-Dives)         ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}

    {% if previous_outputs %}
    {{ previous_outputs[2][:600] if 2 in previous_outputs else "" }}
    {{ previous_outputs[3][:600] if 3 in previous_outputs else "" }}
    {{ previous_outputs[4][:600] if 4 in previous_outputs else "" }}
    {{ previous_outputs[5][:600] if 5 in previous_outputs else "" }}
    {% endif %}

    **Read the COMPLETE files:**
    - {{ workspace }}/00-daemon-inventory.md
    - {{ workspace }}/01-architecture-review.md
    - {{ workspace }}/02-testing-review.md
    - {{ workspace }}/03-code-quality-review.md
    - {{ workspace }}/04-integration-review.md

    Select **up to 25 actionable work items** across the entire daemon package.

    **Categories:** Safety, Integration, Testing, Architecture, CodeQuality,
    Concurrency, Performance, ErrorHandling, DeadCode, Cleanup

    **Output to:** {{ workspace }}/05-category-discovery.yaml
    Format: `issues: [{id: D001, source, category, file, line, severity, description, suggested_fix, fix_effort}]`

    {% elif stage == 4 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 4: FIX PRIORITIZATION & BATCHING                                    ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}

    Read {{ workspace }}/05-category-discovery.yaml.

    **Score:** `severity * (1/effort)` + category bonuses:
    - +2: Safety, Concurrency, Integration
    - +1: Testing, ErrorHandling, Architecture

    **Batch into 3 groups:**
    - Batch 1: Quick wins (simple fixes, edge cases, trivial tests)
    - Batch 2: Medium (stress tests, concurrency fixes, error handling)
    - Batch 3: Significant (integration wiring, architecture changes, cross-component)

    **IMPORTANT:** Assign each issue a numeric ID (D001, D002, ...).
    Batch 3 issues will be split: **even IDs** (D002, D004, ...) handled by
    one parallel instance, **odd IDs** (D001, D003, ...) by another.

    **Output to:** {{ workspace }}/06-fix-plan.md

    {% elif stage == 5 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 5: BATCH 1 — QUICK WINS (70%+ REQUIRED)                             ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}

    Read {{ workspace }}/06-fix-plan.md and fix Batch 1 issues.
    **MANDATORY: Complete at least 70% of Batch 1 issues.**

    Scope: Only `src/mozart/daemon/`, `src/mozart/daemon/ipc/`, and `tests/test_daemon_*.py`.

    {{ batch_rules }}

    **Output to:** {{ workspace }}/07-batch1-fixes.md
    Format: `**Total:** N` / `**Fixed:** N` / `**Completion:** N%` + Fixed/Deferred tables.

    {% elif stage == 6 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 6: BATCH 1 — COMPLETION PASS                                        ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}

    Read {{ workspace }}/07-batch1-fixes.md. Complete ALL deferred items.
    ```bash
    pytest tests/test_daemon_*.py -v --tb=short 2>&1 | tail -40
    pytest tests/ -x --timeout=120 -q 2>&1 | tail -5
    ```

    **Output to:** {{ workspace }}/08-batch1-completion.md

    {% elif stage == 7 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 7: BATCH 2 — MEDIUM EFFORT (70%+ REQUIRED)                          ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}

    Read {{ workspace }}/06-fix-plan.md. Fix Batch 2 issues.
    **MANDATORY: Complete at least 70%.**

    Focus: stress tests, concurrency fixes, error handling improvements,
    missing test coverage for real scenarios.

    {{ batch_rules }}

    **Output to:** {{ workspace }}/09-batch2-fixes.md
    Format: `**Total:** N` / `**Fixed:** N` / `**Completion:** N%` + tables.

    {% elif stage == 8 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 8: BATCH 2 — COMPLETION PASS                                        ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}

    Read {{ workspace }}/09-batch2-fixes.md. Complete ALL deferred items.
    ```bash
    pytest tests/test_daemon_*.py -v --tb=short 2>&1 | tail -40
    pytest tests/ -x --timeout=120 -q 2>&1 | tail -5
    ```

    **Output to:** {{ workspace }}/10-batch2-completion.md

    {% elif stage == 9 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 9: BATCH 3 — SIGNIFICANT FIXES (50%+ REQUIRED)                      ║
    ║  Instance {{ instance }} of {{ fan_count }}:                                 ║
    ║  {% if instance == 1 %}EVEN-numbered issues (D002, D004, ...){% elif instance == 2 %}ODD-numbered issues (D001, D003, ...){% endif %}              ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}

    Read {{ workspace }}/06-fix-plan.md.
    **MANDATORY: Complete at least 50% of YOUR assigned issues.**

    {% if instance == 1 %}
    **YOUR SCOPE: EVEN-numbered Batch 3 issues only.**
    Handle issues whose numeric ID suffix is even: D002, D004, D006, D008, etc.
    Skip any odd-numbered issues — the other instance handles those.
    {% elif instance == 2 %}
    **YOUR SCOPE: ODD-numbered Batch 3 issues only.**
    Handle issues whose numeric ID suffix is odd: D001, D003, D005, D007, etc.
    Skip any even-numbered issues — the other instance handles those.
    {% endif %}

    Focus: integration wiring, architecture changes, cross-component fixes.

    {{ batch_rules }}

    {% if instance == 1 %}
    **Output to:** {{ workspace }}/11-batch3-even-fixes.md
    {% elif instance == 2 %}
    **Output to:** {{ workspace }}/11-batch3-odd-fixes.md
    {% endif %}
    Format: `**Total:** N` / `**Fixed:** N` / `**Completion:** N%` + Fixed/Deferred tables.

    {% elif stage == 10 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 10: BATCH 3 — COMPLETION PASS                                       ║
    ║  Instance {{ instance }} of {{ fan_count }}:                                 ║
    ║  {% if instance == 1 %}EVEN-numbered issues{% elif instance == 2 %}ODD-numbered issues{% endif %}                                              ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}

    {% if instance == 1 %}
    Read {{ workspace }}/11-batch3-even-fixes.md. Complete ALL deferred even-numbered items.
    {% elif instance == 2 %}
    Read {{ workspace }}/11-batch3-odd-fixes.md. Complete ALL deferred odd-numbered items.
    {% endif %}

    ```bash
    pytest tests/test_daemon_*.py -v --tb=short 2>&1 | tail -40
    pytest tests/ -x --timeout=120 -q 2>&1 | tail -5
    ```

    {% if instance == 1 %}
    **Output to:** {{ workspace }}/12-batch3-even-completion.md
    {% elif instance == 2 %}
    **Output to:** {{ workspace }}/12-batch3-odd-completion.md
    {% endif %}

    {% elif stage == 11 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 11: VERIFICATION & SUMMARY                                           ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}

    ```bash
    pytest --tb=short 2>&1 | tee {{ workspace }}/13-test-output.txt | tail -50
    ```
    ```bash
    pytest tests/test_daemon_*.py -v --tb=short 2>&1 | tail -50
    ```
    ```bash
    mypy src/mozart/daemon/ --ignore-missing-imports 2>&1 | tail -30
    ```
    ```bash
    ruff check src/mozart/daemon/ 2>&1 | tail -20
    ```
    ```bash
    python -c "
    from mozart.daemon.config import DaemonConfig
    from mozart.daemon.process import DaemonProcess
    from mozart.daemon.manager import JobManager
    from mozart.daemon.monitor import ResourceMonitor
    from mozart.daemon.scheduler import GlobalSheetScheduler
    from mozart.daemon.rate_coordinator import RateLimitCoordinator
    from mozart.daemon.backpressure import BackpressureController
    from mozart.daemon.learning_hub import LearningHub
    from mozart.daemon.ipc.server import IPCServer
    from mozart.daemon.ipc.client import IPCClient
    print('ALL DAEMON IMPORTS OK')
    "
    ```
    ```bash
    mozart validate examples/sheet-review.yaml --json 2>/dev/null
    test $? -le 1 && echo "CLI canary PASSED" || echo "CLI canary FAILED"
    ```

    Read BOTH batch 3 results:
    - {{ workspace }}/11-batch3-even-fixes.md
    - {{ workspace }}/11-batch3-odd-fixes.md
    - {{ workspace }}/12-batch3-even-completion.md
    - {{ workspace }}/12-batch3-odd-completion.md

    Create summary with: Daemon test counts (before->after), issues by category,
    issues fixed per batch (including batch 3 even/odd breakdown),
    production readiness assessment, verdict.

    **Output to:** {{ workspace }}/13-summary.md

    {% elif stage == 12 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 12: COMMIT CHANGES TO DAEMON-SYMPHONY                               ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}

    ```bash
    git status --short | grep -E "\.py$" | head -30
    ```

    Read batch files (07 through 13, including 11-batch3-even/odd and
    12-batch3-even/odd) and build commit message listing every
    fixed issue by ID. Write to {{ workspace }}/14-commit-message.txt.

    Stage ONLY touched .py files explicitly. Sync with remote, commit, push.
    ```bash
    git commit -F {{ workspace }}/14-commit-message.txt
    git push origin daemon-symphony
    ```

    **Output to:** {{ workspace }}/14-commit.md

    {{ branch_return }}

    {% elif stage == 13 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 13: MERGE CONFLICT RESOLUTION                                        ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}

    Read {{ workspace }}/14-commit.md. If "committed" -> pass-through.
    If "conflicts_pending" -> resolve, test, commit, push.

    **Output to:** {{ workspace }}/15-merge-resolution.md

    {{ branch_return }}

    {% elif stage == 14 %}
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  STAGE 14: FINAL INTEGRATION VERIFICATION                                   ║
    ╚══════════════════════════════════════════════════════════════════════════════╝

    {{ branch_checkout }}

    ```bash
    pytest tests/test_daemon_*.py -v --tb=short 2>&1 | tail -50
    pytest tests/ -x --timeout=120 -q 2>&1 | tail -10
    python -c "
    from mozart.daemon.config import DaemonConfig
    from mozart.daemon.process import DaemonProcess
    from mozart.daemon.manager import JobManager
    from mozart.daemon.monitor import ResourceMonitor
    from mozart.daemon.scheduler import GlobalSheetScheduler
    from mozart.daemon.rate_coordinator import RateLimitCoordinator
    from mozart.daemon.backpressure import BackpressureController
    from mozart.daemon.learning_hub import LearningHub
    from mozart.daemon.ipc.server import IPCServer
    from mozart.daemon.ipc.client import IPCClient
    print('ALL DAEMON IMPORTS OK')
    " 2>&1
    mozart validate examples/sheet-review.yaml --json 2>/dev/null
    echo "Exit code: $?"
    echo "All daemon tests:"
    pytest tests/test_daemon_*.py -q --tb=no 2>&1 | tail -1
    ```

    **Output to:** {{ workspace }}/16-final-verification.md

    {{ branch_return }}

    {% endif %}

  variables:
    preamble: |
      ╔══════════════════════════════════════════════════════════════════════════╗
      ║       DAEMON SYMPHONY: QUALITY REVIEW                                  ║
      ║                                                                        ║
      ║  Targeted review of the daemon-symphony branch                         ║
      ║  Focus: integration, real testing, production readiness                ║
      ╚══════════════════════════════════════════════════════════════════════════╝

      **Project:** Mozart AI Compose at /home/emzi/Projects/mozart-ai-compose
      **Branch:** daemon-symphony (all work happens here, return to main at end)

      **The Daemon Quality Checklist:**
      - Integration: Are components actually wired together?
      - Testing: Are real scenarios tested, not just mocks?
      - Failures: Does the daemon degrade gracefully?
      - Resources: Are long-running resource leaks prevented?
      - Compatibility: Does non-daemon Mozart still work?

    review_types:
      1: "Architecture"
      2: "Testing"
      3: "Code Quality"
      4: "Integration"

    branch_checkout: |
      **Branch Protocol:**
      ```bash
      cd /home/emzi/Projects/mozart-ai-compose
      git checkout daemon-symphony 2>/dev/null || true
      echo "Branch: $(git branch --show-current)"
      ```
      NEVER commit to `main`. NEVER use `git add .` or `git add -A`. Only stage specific files.

    readonly_constraint: |
      **READ-ONLY stage (PARALLEL). Do NOT modify src/ or tests/.**
      **Do NOT run git write operations. ONLY write your output file.**

    branch_return: |
      ```bash
      cd /home/emzi/Projects/mozart-ai-compose && git checkout main
      ```

    batch_rules: |
      **Rules:**
      - One logical change at a time
      - Run daemon tests after each change: `pytest tests/test_daemon_*.py -x -q --tb=short`
      - Run full suite periodically: `pytest -x -q --tb=short`
      - DO NOT SKIP unless genuinely blocked
      - "Already fixed" is acceptable ONLY if you verify it's actually fixed

      **INVALID skip reasons (will fail validation):**
      - "Risky" without specific test failure
      - "Low benefit" — that's not your call
      - "Extensive testing needed" — that IS the job
      - "Better for future version" — do it now

validations:
  # Stage 1: Inventory
  - type: file_exists
    path: "{workspace}/00-daemon-inventory.md"
    description: "Daemon inventory must exist"
    condition: "stage >= 1"

  # Stage 2: Deep-dives (per-instance)
  - type: file_exists
    path: "{workspace}/01-architecture-review.md"
    description: "Architecture review must exist"
    condition: "stage == 2 and instance == 1"

  - type: file_exists
    path: "{workspace}/02-testing-review.md"
    description: "Testing review must exist"
    condition: "stage == 2 and instance == 2"

  - type: file_exists
    path: "{workspace}/03-code-quality-review.md"
    description: "Code quality review must exist"
    condition: "stage == 2 and instance == 3"

  - type: file_exists
    path: "{workspace}/04-integration-review.md"
    description: "Integration review must exist"
    condition: "stage == 2 and instance == 4"

  # Stage 3: Category discovery
  - type: file_exists
    path: "{workspace}/05-category-discovery.yaml"
    description: "Category discovery must exist"
    condition: "stage >= 3"

  # Stage 4: Fix plan
  - type: file_exists
    path: "{workspace}/06-fix-plan.md"
    description: "Fix plan must exist"
    condition: "stage >= 4"

  # Stage 5: Batch 1 fixes
  - type: file_exists
    path: "{workspace}/07-batch1-fixes.md"
    description: "Batch 1 results must exist"
    condition: "stage >= 5"

  - type: command_succeeds
    command: |
      FILE="{workspace}/07-batch1-fixes.md"
      if [ ! -f "$FILE" ]; then exit 1; fi
      COMPLETION=$(grep -oE 'Completion.*[0-9]+%' "$FILE" | grep -oE '[0-9]+' | head -1)
      if [ -z "$COMPLETION" ]; then
        FIXED=$(grep -E '^\*\*Fixed:\*\*' "$FILE" | grep -oE '[0-9]+' | head -1)
        TOTAL=$(grep -E '^\*\*Total:\*\*' "$FILE" | grep -oE '[0-9]+' | head -1)
        if [ -n "$FIXED" ] && [ -n "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
          COMPLETION=$((FIXED * 100 / TOTAL))
        fi
      fi
      [ -n "$COMPLETION" ] && [ "$COMPLETION" -ge 70 ]
    description: "Batch 1 >=70% completion"
    condition: "stage >= 5"

  # Stage 6: Batch 1 completion
  - type: file_exists
    path: "{workspace}/08-batch1-completion.md"
    description: "Batch 1 completion must exist"
    condition: "stage >= 6"

  # Stage 7: Batch 2 fixes
  - type: file_exists
    path: "{workspace}/09-batch2-fixes.md"
