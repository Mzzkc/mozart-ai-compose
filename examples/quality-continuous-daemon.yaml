    description: "All daemon tests pass"
    condition: "stage >= 14"

on_success:
  - type: run_job
    job_path: "examples/quality-continuous-daemon.yaml"
    description: "Chain to next daemon quality iteration"
    detached: true
    fresh: true
    job_workspace: "workspaces/quality-daemon-workspace"

concert:
