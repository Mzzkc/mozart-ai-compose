  - directive: |
      Documentation IS the UX. Docs, examples, and the score-authoring skill are
      the first thing anyone sees when they encounter Mozart. If a score in examples/
      is broken, outdated, or uses patterns that no longer reflect best practice, that
      is a UX bug — not a documentation bug. Right now, most docs are outdated and to be
      meticulously updated. If docs reference scores that have been
      renamed, moved, or superseded, that is a broken link in the user's experience.
      All public-facing material must be correct, current, and high quality. Treat
      docs and examples with the same rigor as production code. An incorrect example
      teaches incorrect usage. An outdated doc erodes trust. Review docs and examples
      whenever the features they describe change.
    priority: P0
    added_movement: 2

  - directive: |
      Before updating or writing any score, you must fully understand every feature
      you are using. No guessing, please. Read the config models. Read the skill. And
      Verify it against the actual code. The code is the source of truth. If a
      feature is undocumented or unclear, document it first — then use it. Every
      score feature (grounding hooks, per-sheet overrides, spec corpus, instrument
      assignment, etc.) exists because it solves a real problem for score authors.
      If a feature is useful for validations, prompts, or execution control, it
      belongs in the score-authoring skill with a practical example. Features that
      aren't documented don't get used. Features that don't get used don't get tested.
      Features that don't get tested break.
    priority: P0
    added_movement: 2

  - directive: |
      The Rosetta Score is Mozart's capability factory. It discovers orchestration
      patterns, proves them with real scores, and grows the corpus that teaches
      everyone — human and AI — how to use Mozart. Keep it current. When Mozart
      gains new features (instruments, spec corpus, grounding, new validation types),
      the Rosetta Score's primitives list, expedition prompts, and proof criteria
      must be updated so the next iteration discovers patterns that USE those features.
      The Rosetta Score should always know what Mozart can do today, not what it
      could do when the score was last edited. It is our R&D engine.
    priority: P1
    added_movement: 2
