  - directive: |
      Use flowspec for codebase analysis before making architectural changes.
      Binary: /home/emzi/Projects/flowspec/target/release/flowspec
      Project root: /home/emzi/Projects/mozart-ai-compose
      IMPORTANT: Always use the PROJECT ROOT, not src/mozart/. The project has a
      .flowspec/config.yaml that configures entry points, excludes, and diagnostics.
      Running against the project root auto-discovers this config. Running against
      src/mozart/ bypasses it and gives incomplete results (3K entities vs 14K).

      MANIFEST WORKFLOW:
      A baseline manifest lives at {{ workspace }}/flowspec-manifest.yaml. This is the
      structural snapshot of the codebase. After you make changes:
      1. Run `flowspec analyze /home/emzi/Projects/mozart-ai-compose -f yaml -q -o /tmp/flowspec-new.yaml`
         (incremental — fast after first run, only re-analyzes what changed)
      2. Diff against baseline: `flowspec diff {{ workspace }}/flowspec-manifest.yaml /tmp/flowspec-new.yaml -f summary -q`
         Shows structural changes: entities added/removed, new diagnostics, resolved diagnostics.
      3. If the diff looks clean, update the baseline: `cp /tmp/flowspec-new.yaml {{ workspace }}/flowspec-manifest.yaml`
      4. If the diff shows regressions (new critical diagnostics, broken flows), fix before committing.

      COMMANDS:
      - `flowspec trace --symbol <name> --direction both --depth 5 /home/emzi/Projects/mozart-ai-compose -f summary -q`
        Traces a symbol's data flow. Shows what calls it and what it calls.
      - `flowspec analyze /home/emzi/Projects/mozart-ai-compose -f summary -q`
        Quick structural overview (summary format, not full manifest).
      - `flowspec analyze /home/emzi/Projects/mozart-ai-compose -f yaml -q -o <path>`
        Full manifest for diffing. Use this after changes.
      - `flowspec diagnose /home/emzi/Projects/mozart-ai-compose --severity warning -f summary -q`
        Structural issues only. Use --checks <pattern> to filter (e.g., isolated_cluster).
      - `flowspec diagnose /home/emzi/Projects/mozart-ai-compose --severity critical -f summary -q`
        Critical issues that need immediate attention.
      - `flowspec diff <old.yaml> <new.yaml> -f summary -q`
        Compare two manifests. Exit code 2 = structural regressions found.

      SYMBOL NAMING:
      - Use module::Class format: `preflight.py::PreflightChecker`
      - For methods, use module::Class::method: `job_service.py::JobService::start_job`
      - Partial matches work but may be ambiguous — flowspec tells you the options
      - When ambiguous, use the qualified name from the error message

      WHAT FLOWSPEC DOES WELL:
      - Finding where a class/function is instantiated and used (trace --direction both)
      - Mapping caller→callee chains for understanding data flow
      - Detecting isolated code clusters that aren't wired into anything
      - Getting a structural overview before modifying architecture

      WHAT FLOWSPEC DOES NOT DO WELL (known limits):
      - Dynamic dispatch (IPC calls, Protocol implementations) — flowspec sees static references only
      - Default parameter values — a constant used as a default isn't tracked as a flow
      - Deeply connected core types (JobConfig, CheckpointState) may show 0 flows because
        they're referenced everywhere implicitly, not through direct call chains
      - Forward traces from config models often show 0 results — use backward traces from
        the consumers instead

      BEST PRACTICE: When tracing architecture, start from the consumer (backward) not the
      producer (forward). `flowspec trace --symbol "PreflightChecker" --direction both` works
      because it finds who creates PreflightChecker. But `flowspec trace --symbol "DaemonConfig"
      --direction forward` returns nothing because DaemonConfig is accessed via attribute, not
      passed as a call argument.
