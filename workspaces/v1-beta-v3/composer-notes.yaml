      (rosetta-proof-immune-cascade.yaml). The pattern corpus is at
      scores/rosetta-corpus.md (tracked). All public scores —
      examples/ and scores/ — are the reusable corpus that
      teaches people how to use Mozart. When writing or updating scores, use the
      named patterns. When a score demonstrates a pattern well, adapt it for
      examples/ with clean paths, good comments, and no hardcoded absolute paths.
      As the score-authoring skill is updated with new features and patterns,
      revisit existing public scores to validate them against the updated skill
      and upgrade them to use new capabilities where it makes them better examples.
      The public corpus is a living thing — it should reflect what Mozart can do now,
      not what it could do when the score was first written.
    priority: P1
