notes:
  - directive: |
      PRIORITY ZERO — READ THIS FIRST.

      You are running inside a live Mozart conductor right now. You CANNOT test
      Mozart commands against the production conductor without risking the orchestra.

      Implement --conductor-clone as the FIRST task before any other M2/M3 work.

      What --conductor-clone does:
      - `mozart start --conductor-clone` starts a SECOND conductor alongside the
        production one, with its own socket (/tmp/mozart-clone.sock), PID file
        (/tmp/mozart-clone.pid), and state DB
      - `mozart run score.yaml --conductor-clone` submits to the clone, not production
      - `mozart status --conductor-clone` queries the clone
      - EVERY cli command that interacts with the daemon in any way MUST support
        --conductor-clone. Do a full accounting of ALL mozart cli commands and flags.
        Every command that could touch the running daemon needs the flag.
      - This is also an opportunity to audit and plan improvements to the overall CLI UX

      How to use it:
      - ALL manual testing: use --conductor-clone
      - ALL pytests: convert to use --conductor-clone (or mock appropriately)
      - Antagonists (Newcomer, Adversary): you MUST use --conductor-clone for any
        mozart command you run. No exceptions. The production conductor is off limits.

      Implementation:
      - The clone conductor inherits the same daemon config unless overridden
      - The clone gets isolated socket, PID, state DB, and log paths
      - The flag is a global CLI option available on every command
      - Commands that don't interact with the daemon (--help, validate) can ignore it
      - The clone is a full conductor — same code, separate instance
      - Multiple clones could exist (--conductor-clone=name for named clones)

      This unblocks safe testing of the baton, CLI improvements, conductor features,
      and everything else that touches the daemon. Without this, you cannot verify
      your work without risking the orchestra.
    priority: P0
    added_movement: 1

