# 05-migration.yaml — Transition from v3 Orchestra
#
# Concert: Composition Compiler Build (Score 5 of 5)
# Patterns: Fan-out + Synthesis, Canary Probe
# Forces: Finite Resources, Information Asymmetry
#
# Problem: All v3 orchestra agents need their memories distilled into
# the new identity format, scores generated, and fleet launched. Each
# agent's memory distillation is independent — natural fan-out. But
# launching the full fleet without testing is risky — canary first.
#
# Structure (7 sheets):
#   Prepare manifest → Distill memories (fan-out) →
#   Generate scores → Generate fleet → Canary launch → Canary verify → Full launch

name: cc-migration
description: "Migrate v3 orchestra agents to independent self-chaining scores"

workspace: /home/emzi/Projects/marianne-ai-compose/workspaces/composition-compiler-build

instrument: claude-code
instrument_fallbacks: [gemini-cli]
instrument_config:
  timeout_seconds: 3600
  skip_permissions: true
  disable_mcp: true

instruments:
  migrator:
    profile: claude-code
    config:
      timeout_seconds: 3600
      model: claude-opus-4-6
      skip_permissions: true
      disable_mcp: true
  launcher:
    profile: claude-code
    config:
      timeout_seconds: 3600
      skip_permissions: true
      disable_mcp: true

movements:
  1:
    name: "Prepare Migration Manifest"
    instrument: migrator
  2:
    name: "Distill Agent Memories"
    instrument: migrator
  3:
    name: "Compress Meditations"
    instrument: migrator
  4:
    name: "Generate Roster Scores"
    instrument: migrator
  5:
    name: "Generate Fleet Config"
    instrument: migrator
  6:
    name: "Canary Launch"
    instrument: launcher
  7:
    name: "Full Fleet Launch"
    instrument: launcher

sheet:
  size: 1
  total_items: 7
  dependencies:
    2: [1]
    3: [1]
    4: [2, 3]
    5: [4]
    6: [5]
    7: [6]

parallel:
  enabled: true
  max_concurrent: 5

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 8000
  lookback_sheets: 4

retry:
  max_retries: 2
  base_delay_seconds: 60

rate_limit:
  wait_minutes: 5
  max_waits: 24

stale_detection:
  enabled: true
  idle_timeout_seconds: 1800

prompt:
  variables:
    project_root: /home/emzi/Projects/marianne-ai-compose
    v3_workspace: /home/emzi/Projects/marianne-ai-compose/workspaces/v1-beta-v3
    v3_memory: /home/emzi/Projects/marianne-ai-compose/workspaces/v1-beta-v3/memory
    v3_meditations: /home/emzi/Projects/marianne-ai-compose/workspaces/v1-beta-v3/meditations
    output_scores: /home/emzi/Projects/marianne-ai-compose/workspaces/composition-compiler-build/agent-fleet
    agents_dir: /home/emzi/.mzt/agents

  template: |
    {% if stage == 1 %}
    # Sheet 1: Prepare Migration Manifest

    Inventory all v3 orchestra agents and prepare the migration plan.

    ## Steps
    1. List all agent memory files in {{ v3_memory }}/
    2. List all meditation files in {{ v3_meditations }}/
    3. Cross-reference to build a complete agent roster
    4. For each agent, assess:
       - Memory file size and content depth
       - Meditation presence and quality
       - Commit history participation (git log --author patterns)
       - Relationships mentioned in memories
       - Focus areas and voice from memory content

    ## Output
    Write {{ workspace }}/migration-manifest.yaml:
    ```yaml
    agents:
      - name: canyon
        memory_path: {{ v3_memory }}/canyon.md
        meditation_path: {{ v3_meditations }}/canyon.md
        focus: [extracted from memory]
        voice: [extracted from memory/meditation]
        relationships: [mentioned agents]
        memory_depth: [word count]
      # ... all agents
    total_agents: N
    ```

    Also write {{ workspace }}/migration-plan.md with:
    - Agent roster with assessment
    - Recommended instrument assignments (vibes-based)
    - Group assignments for fleet config
    - Any agents that need special handling

    {% elif stage == 2 %}
    # Sheet 2: Distill Agent Memories into L1-L4 Identity Seeds

    For EVERY agent in {{ workspace }}/migration-manifest.yaml:

    **Batching guidance:** The roster may have many agents. Process them in
    groups of 5-8. For each batch: read memories, distill, write identity
    files, verify. Then proceed to the next batch. This prevents context
    overload and ensures quality doesn't degrade for later agents.

    For each agent:
    1. Read their v3 memory file
    2. Extract: core lessons, hot/warm/cold tiers, experiential notes
    3. Distill into L1-L4 identity format:
       - identity.md (L1): voice, focus, standing patterns from accumulated experience
       - profile.yaml (L2): relationships from memory mentions, cycle count estimate
       - recent.md (L3): most recent movement's work as hot memory
       - growth.md (L4): autonomous developments, experiential notes

    Use the composition compiler's identity seeder where possible.
    For each agent, write to {{ agents_dir }}/{name}/

    ## Token Budgets
    - L1 < 900 words
    - L2 < 1500 words
    - L3 < 1500 words

    Write distillation report to {{ workspace }}/distillation-report.md

    {% elif stage == 3 %}
    # Sheet 3: Compress Meditations into Stakes

    For EVERY agent in {{ workspace }}/migration-manifest.yaml:

    **Batching guidance:** Process agents in groups of 5-8, same as the
    distillation stage. Quality of compression matters — each meditation
    must preserve voice, core metaphor, and "Down. Forward. Through."

    For each agent:
    1. Read their meditation file from {{ v3_meditations }}/{name}.md
    2. Compress to 50-150 words preserving:
       - Core metaphor
       - Voice/tone
       - The closing: "Down. Forward. Through."
    3. Write as the `meditation` field in a compiler-ready agent definition

    For agents without meditations, generate a seed meditation from their
    memory's voice and focus.

    Write compressed meditations to {{ workspace }}/compressed-meditations.yaml
    (agent_name → compressed meditation text)

    {% elif stage == 4 %}
    # Sheet 4: Generate Full Roster Scores

    Use the composition compiler to generate scores for the entire roster.

    ## Steps
    1. Read {{ workspace }}/migration-manifest.yaml for the full agent list
    2. Read {{ workspace }}/compressed-meditations.yaml for stakes content
    3. Read {{ workspace }}/migration-plan.md for instrument/group assignments
    4. Construct the full compiler config YAML incorporating:
       - All agents with voice, focus, meditation
       - Per-agent instrument overrides from the migration plan
       - Default free-tier instruments (OpenRouter via OpenCode)
       - Techniques: memory-protocol, mateship, coordination, a2a, identity, voice
       - Token-efficient cadenza config (glob listing + active folder)
       - Parallel phases (12-sheet cycle)
       - Self-chaining with configurable pause_before_chain
    5. Run the compiler: `mzt compose --config {{ workspace }}/full-roster-config.yaml --output {{ output_scores }}/`
    6. Validate ALL generated scores

    Write {{ workspace }}/full-roster-config.yaml (the compiler input)
    Write generation report to {{ workspace }}/roster-generation.md

    {% elif stage == 5 %}
    # Sheet 5: Generate Fleet Config

    Generate the fleet configuration to launch and manage all agents.

    ## Steps
    1. Read {{ workspace }}/migration-plan.md for group assignments
    2. Use the compiler's fleet generator:
       `mzt compose --config {{ workspace }}/full-roster-config.yaml --output {{ output_scores }}/ --fleet`
    3. Verify the fleet config:
       - All agents listed
       - Groups have correct dependencies
       - Fleet-level operations will work

    Write fleet config to {{ output_scores }}/fleet.yaml

    {% elif stage == 6 %}
    # Sheet 6: Canary Launch

    Launch a small subset of agents from the full roster to verify
    the migration worked before launching everyone.

    ## Steps
    1. Pick 3-5 agents from different groups
    2. Launch their scores individually:
       `mzt run {{ output_scores }}/{agent_name}.yaml`
    3. Monitor for one complete cycle
    4. Verify:
       - Sheets execute correctly (parallel phases work)
       - Identity files are read and updated
       - Shared workspace coordination works
       - Self-chaining triggers (or pauses as configured)
       - Fallback chains activate when needed

    Write canary results to {{ workspace }}/migration-canary.md

    {% elif stage == 7 %}
    # Sheet 7: Full Fleet Launch

    Launch the complete agent fleet.

    ## Steps
    1. `mzt run {{ output_scores }}/fleet.yaml`
    2. Monitor the launch:
       - Groups start in dependency order
       - Agents within groups start concurrently
       - First recon cycle completes for all agents
    3. Verify fleet-level operations:
       - `mzt status` shows the nested structure
       - `mzt pause {{ output_scores }}/fleet.yaml` pauses all agents

    Write launch report to {{ workspace }}/fleet-launch.md

    ## Congratulations
    The composition compiler is built, tested, and deployed. The orchestra
    has transitioned to independent self-chaining agents with free-tier
    models, deep fallbacks, and self-organization.
    {% endif %}

validations:
  # Manifest
  - type: file_exists
    path: "{workspace}/migration-manifest.yaml"
    condition: "stage == 1"
  - type: file_exists
    path: "{workspace}/migration-plan.md"
    condition: "stage == 1"

  # Distillation
  - type: file_exists
    path: "{workspace}/distillation-report.md"
    condition: "stage == 2"
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/distillation-report.md") -ge 500'
    condition: "stage == 2"
    description: "Distillation report has depth"

  # Meditations
  - type: file_exists
    path: "{workspace}/compressed-meditations.yaml"
    condition: "stage == 3"

  # Roster generation
  - type: file_exists
    path: "{workspace}/full-roster-config.yaml"
    condition: "stage == 4"
  - type: file_exists
    path: "{workspace}/roster-generation.md"
    condition: "stage == 4"
  - type: command_succeeds
    command: 'test $(ls /home/emzi/Projects/marianne-ai-compose/workspaces/composition-compiler-build/agent-fleet/*.yaml 2>/dev/null | wc -l) -ge 10'
    condition: "stage == 4"
    description: "Roster scores generated for agents"

  # Fleet config
  - type: command_succeeds
    command: 'test -f /home/emzi/Projects/marianne-ai-compose/workspaces/composition-compiler-build/agent-fleet/fleet.yaml'
    condition: "stage == 5"
    description: "Fleet config generated"

  # Canary
  - type: file_exists
    path: "{workspace}/migration-canary.md"
    condition: "stage == 6"

  # Launch
  - type: file_exists
    path: "{workspace}/fleet-launch.md"
    condition: "stage == 7"
