# 02-infrastructure.yaml — Build Marianne Runtime Extensions
#
# Concert: Composition Compiler Build (Score 2 of 5)
# Patterns: Shipyard Sequence + Succession Pipeline + Tool Chain + Commissioning Cascade
# Forces: Exponential Defect Cost (dominant), Instrument-Task Fit, Progressive Commitment
#
# Problem: 16 infrastructure components with deep sequential dependencies.
# Wrong config models break everything built on them. Must validate
# foundation before investing in implementations.
#
# Structure (6 phases, 15 sheets):
#
#   Phase A: Config models (Shipyard construct) → Launch gate (Tool Chain)
#   Phase B: Independent builds (fan-out of 3)
#   Phase C: Dependent builds (Succession) → Launch gate
#   Phase D: Protocol layer (Succession) → Launch gate
#   Phase E: Orchestration layer (Succession) → Launch gate
#   Phase F: Full regression (Commissioning Cascade)
#
# Each launch gate uses command_succeeds — real tools, not LLM judgment.

name: cc-infrastructure
description: "Build Marianne runtime extensions — config models through fleet management"

workspace: /home/emzi/Projects/marianne-ai-compose/workspaces/composition-compiler-build

instrument: claude-code
instrument_fallbacks: [gemini-cli]
instrument_config:
  timeout_seconds: 3600
  skip_permissions: true
  disable_mcp: true

instruments:
  architect:
    profile: claude-code
    config:
      timeout_seconds: 3600
      model: claude-opus-4-6
      skip_permissions: true
      disable_mcp: true
  builder:
    profile: claude-code
    config:
      timeout_seconds: 3600
      skip_permissions: true
      disable_mcp: true
  gate:
    profile: claude-code
    config:
      timeout_seconds: 900
      skip_permissions: true
      disable_mcp: true

movements:
  1:
    name: "Phase A: Config Models"
    instrument: architect
  2:
    name: "Phase A: Launch Gate"
    instrument: gate
  3:
    name: "Phase B: Independent Builds"
    instrument: builder
  4:
    name: "Phase C: Dependent Builds"
    instrument: builder
  5:
    name: "Phase C: Launch Gate"
    instrument: gate
  6:
    name: "Phase D: Protocol Layer"
    instrument: architect
  7:
    name: "Phase D: Launch Gate"
    instrument: gate
  8:
    name: "Phase E: Orchestration"
    instrument: builder
  9:
    name: "Phase E: Launch Gate"
    instrument: gate
  10:
    name: "Phase F: Regression"
    instrument: gate

sheet:
  size: 1
  total_items: 10
  fan_out:
    3: 3
  dependencies:
    2: [1]
    3: [2]
    4: [3]
    5: [4]
    6: [5]
    7: [6]
    8: [7]
    9: [8]
    10: [9]
  prelude:
    - file: /home/emzi/Projects/marianne-ai-compose/docs/specs/2026-04-13-composition-compiler-design.md
      as: context

parallel:
  enabled: true
  max_concurrent: 3

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 8000
  lookback_sheets: 4

retry:
  max_retries: 3
  base_delay_seconds: 30

rate_limit:
  wait_minutes: 5
  max_waits: 24

stale_detection:
  enabled: true
  idle_timeout_seconds: 1800

prompt:
  variables:
    project_root: /home/emzi/Projects/marianne-ai-compose
    src: /home/emzi/Projects/marianne-ai-compose/src/marianne
    tests: /home/emzi/Projects/marianne-ai-compose/tests

  template: |
    {% if stage == 1 %}
    # Phase A: Config Models (Foundation)

    You are a Python architect building Pydantic v2 configuration models
    for new Marianne infrastructure. These models are the foundation —
    everything else depends on them being correct.

    ## Read First
    - Design spec (injected as prelude)
    - Existing config models: {{ src }}/core/config/ (especially instruments.py, job.py, orchestration.py)
    - Daemon config: {{ src }}/daemon/config.py
    - Baton events: {{ src }}/daemon/baton/events.py
    - Checkpoint state: {{ src }}/core/checkpoint.py

    ## Convention Requirements
    - Pydantic v2: BaseModel, ConfigDict(extra="forbid"), Field(description=...)
    - @field_validator / @model_validator (v2 style, mode="after")
    - Type hints on everything
    - Follow existing patterns EXACTLY

    ## Models to Create

    ### 1. Technique Config ({{ src }}/core/config/techniques.py)
    ```python
    class TechniqueKind(str, Enum):
        SKILL = "skill"
        MCP = "mcp"
        PROTOCOL = "protocol"

    class TechniqueConfig(BaseModel):
        kind: TechniqueKind
        phases: list[str]
        config: dict[str, Any] = Field(default_factory=dict)
    ```

    ### 2. Keyring Config ({{ src }}/daemon/keyring_config.py)
    ```python
    class KeyEntry(BaseModel):
        path: str = Field(description="Path to key file in $SECRETS_DIR")
        label: str = Field(description="Human-readable label")

    class InstrumentKeyring(BaseModel):
        keys: list[KeyEntry]
        rotation: str = Field(default="least-recently-rate-limited")

    class KeyringConfig(BaseModel):
        instruments: dict[str, InstrumentKeyring] = Field(default_factory=dict)
    ```

    ### 3. MCP Pool Config (add to {{ src }}/daemon/config.py)
    ```python
    class McpServerEntry(BaseModel):
        command: str
        transport: str = "stdio"
        socket: str = Field(description="Unix socket path for proxy")
        restart_policy: str = "on-failure"

    class McpPoolConfig(BaseModel):
        servers: dict[str, McpServerEntry] = Field(default_factory=dict)
    ```
    Add McpPoolConfig as optional field on DaemonConfig.

    ### 4. Fleet Config ({{ src }}/core/config/fleet.py)
    ```python
    class FleetGroupConfig(BaseModel):
        depends_on: list[str] = Field(default_factory=list)

    class FleetConfig(BaseModel):
        name: str
        type: Literal["fleet"] = "fleet"
        scores: list[FleetScoreEntry]
        groups: dict[str, FleetGroupConfig] = Field(default_factory=dict)
    ```

    ### 5. A2A Event Types (add to {{ src }}/daemon/baton/events.py)
    Frozen dataclasses following existing pattern:
    - A2ATaskSubmitted(job_id, sheet_num, target_agent, task_description, context)
    - A2ATaskRouted(job_id, sheet_num, source_agent, target_agent, task_id)
    - A2ATaskCompleted(job_id, sheet_num, task_id, artifacts)
    - A2ATaskFailed(job_id, sheet_num, task_id, reason)

    ### 6. pause_before_chain (modify {{ src }}/core/config/orchestration.py)
    Add `pause_before_chain: bool = False` to PostSuccessHookConfig.

    ### 7. Agent Card ({{ src }}/core/config/a2a.py)
    ```python
    class A2ASkill(BaseModel):
        id: str
        description: str

    class AgentCard(BaseModel):
        name: str
        description: str
        skills: list[A2ASkill] = Field(default_factory=list)
    ```

    ## Write Tests First (TDD)
    Create {{ tests }}/test_infra_config_models.py testing:
    - Each model validates correctly with good input
    - Each model rejects bad input (extra fields, missing required)
    - TechniqueKind enum values
    - KeyringConfig path validation
    - FleetConfig group dependency validation
    - A2A event frozen dataclass immutability

    Then implement the models. Run the tests.

    Print: which models created, which tests pass.

    {% elif stage == 2 %}
    # Phase A: Launch Gate — Config Model Validation

    Run real tools to validate the config models created in Phase A.

    cd {{ project_root }}

    ## Checks
    1. Type check: `python -m mypy {{ src }}/core/config/techniques.py {{ src }}/core/config/fleet.py {{ src }}/core/config/a2a.py {{ src }}/daemon/keyring_config.py --strict`
    2. New tests pass: `python -m pytest {{ tests }}/test_infra_config_models.py -v`
    3. Existing tests still pass: `python -m pytest {{ tests }}/ -x -q --timeout=120`
    4. Lint: `ruff check {{ src }}/core/config/techniques.py {{ src }}/core/config/fleet.py {{ src }}/core/config/a2a.py`

    Run each check. Write results to {{ workspace }}/gate-a-results.md.
    If ANY check fails, diagnose and fix. Re-run until all pass.

    {% elif stage == 3 %}
    {% if instance == 1 %}
    # Phase B, Instance 1: OpenCode Instrument Profile

    Create a YAML instrument profile for OpenCode at:
    {{ src }}/instruments/builtins/opencode.yaml

    ## Read First
    - Existing profiles: {{ src }}/instruments/builtins/ (especially claude-code.yaml, gemini-cli.yaml)
    - InstrumentProfile model: {{ src }}/core/config/instruments.py

    ## OpenCode Details
    - Executable: `opencode`
    - Prompt flag: `-p`
    - Output format flag: `-f` with value `json`
    - Auto-approve: non-interactive mode via `-p` (all permissions auto-approved)
    - Model config: via `.opencode.json` (provider + model)
    - Supports: OpenRouter provider, MCP servers, multiple models
    - Capabilities: tool_use, file_editing, shell_access, mcp, structured_output

    ## Also
    - Update {{ tests }}/test_builtin_instrument_profiles.py to expect the new profile
    - Run the test: `python -m pytest {{ tests }}/test_builtin_instrument_profiles.py -v`

    {% elif instance == 2 %}
    # Phase B, Instance 2: OpenRouter HTTP Backend

    Create {{ src }}/backends/openrouter.py — HTTP backend for OpenRouter API.

    ## Read First
    - Base class: {{ src }}/backends/base.py (Backend ABC, HttpxClientMixin)
    - Reference: {{ src }}/backends/ollama.py (uses HttpxClientMixin)
    - Reference: {{ src }}/backends/anthropic_api.py (override lifecycle)
    - Backend pool: {{ src }}/daemon/baton/backend_pool.py (line 83-92, NotImplementedError for HTTP)

    ## Implementation
    - Extend Backend ABC, use HttpxClientMixin
    - POST to https://openrouter.ai/api/v1/chat/completions (OpenAI-compatible)
    - Model specified per-request via override lifecycle
    - Rate limit detection from response headers (429, Retry-After)
    - Token usage from response.usage
    - Lazy httpx client init via _get_client()
    - Log via get_logger("marianne.backends.openrouter")
    - Never log API keys or prompt content

    ## Wire into BackendPool
    - {{ src }}/daemon/baton/backend_pool.py: replace NotImplementedError with
      elif for HTTP instruments

    ## TDD
    - Create {{ tests }}/test_openrouter_backend.py mirroring test_anthropic_api_backend.py
    - Mock httpx responses
    - Test: successful completion, rate limit detection, error handling, override lifecycle
    - Run tests

    {% elif instance == 3 %}
    # Phase B, Instance 3: bwrap Sandbox Wrapper

    Create {{ src }}/isolation/sandbox.py — bubblewrap process isolation wrapper.

    ## Read First
    - Existing isolation: {{ src }}/isolation/ (if exists, check worktree.py)
    - CLI backend: {{ src }}/execution/instruments/cli_backend.py (how subprocesses are launched)
    - Claude Code's bwrap usage as reference pattern

    ## Implementation
    ```python
    class BwrapSandbox:
        """Wraps subprocess execution in a bubblewrap namespace."""

        def __init__(self, workspace: Path, shared_dirs: list[Path],
                     mcp_sockets: list[Path], resource_limits: ResourceLimits | None):
            ...

        def wrap_command(self, cmd: list[str]) -> list[str]:
            """Prepend bwrap args to a command."""
            # --unshare-pid --unshare-net
            # --ro-bind / /
            # --bind workspace workspace (read-write)
            # --bind shared_dir shared_dir for each
            # --bind socket socket for each MCP socket
            ...

        async def is_available(self) -> bool:
            """Check if bwrap is installed."""
            ...
    ```

    ## TDD
    - Create {{ tests }}/test_sandbox_wrapper.py
    - Test: command wrapping produces correct bwrap args
    - Test: bind-mount configuration for workspace, shared dirs, MCP sockets
    - Test: is_available returns False when bwrap not installed
    - Do NOT test actual process isolation (requires privileges)
    - Run tests

    {% endif %}

    {% elif stage == 4 %}
    # Phase C: Dependent Builds

    Build three components that depend on Phase A config models and Phase B builds.

    ## Read First
    - Config models from Phase A (techniques.py, keyring_config.py, fleet.py, a2a.py)
    - Gate results: {{ workspace }}/gate-a-results.md
    - Backend pool: {{ src }}/daemon/baton/backend_pool.py

    ## Build 1: API Key Keyring ({{ src }}/daemon/keyring.py)
    - Reads KeyringConfig from daemon config
    - Loads keys from disk (path references, never stores values in memory longer than needed)
    - Selects key via rotation policy (least-recently-rate-limited)
    - Tracks per-key cooldown timestamps
    - Thread-safe (asyncio Lock)
    - Integration with existing rate limit infrastructure

    ## Build 2: BackendPool HTTP Wiring
    - Wire OpenRouterBackend into {{ src }}/daemon/baton/backend_pool.py
    - The `_create_backend_for_profile()` needs `elif profile.kind == "http":`
    - Inject keyring for API key selection

    ## Build 3: Shared MCP Pool Manager ({{ src }}/daemon/mcp_pool.py)
    - Reads McpPoolConfig from daemon config
    - Starts MCP server processes (asyncio.create_subprocess_exec)
    - Proxies stdio transport to Unix sockets
    - Health checks (periodic, restart on failure)
    - Lifecycle: start on daemon up, stop on shutdown
    - Follow pattern of existing daemon services in manager.py

    ## TDD for all three
    - {{ tests }}/test_api_keyring.py — rotation logic, cooldown, key selection
    - {{ tests }}/test_mcp_pool_manager.py — process lifecycle, socket bridging (mock subprocess)
    - Update backend pool tests for HTTP wiring
    - Run all tests

    {% elif stage == 5 %}
    # Phase C: Launch Gate

    cd {{ project_root }}

    1. Type check new files: `python -m mypy {{ src }}/daemon/keyring.py {{ src }}/daemon/mcp_pool.py --strict`
    2. New tests: `python -m pytest {{ tests }}/test_api_keyring.py {{ tests }}/test_mcp_pool_manager.py -v`
    3. Backend tests: `python -m pytest {{ tests }}/test_openrouter_backend.py {{ tests }}/test_builtin_instrument_profiles.py -v`
    4. Full suite: `python -m pytest {{ tests }}/ -x -q --timeout=120`
    5. Lint: `ruff check {{ src }}/daemon/keyring.py {{ src }}/daemon/mcp_pool.py {{ src }}/backends/openrouter.py`

    Write results to {{ workspace }}/gate-c-results.md.
    Fix any failures. Re-run until all pass.

    {% elif stage == 6 %}
    # Phase D: Protocol Layer

    Build the communication and routing infrastructure.

    ## Read First
    - A2A event types from Phase A
    - Baton core: {{ src }}/daemon/baton/core.py (event handling pattern)
    - Baton events: {{ src }}/daemon/baton/events.py
    - Daemon manager: {{ src }}/daemon/manager.py
    - Musician: {{ src }}/daemon/baton/musician.py (sheet execution)
    - Design spec sections 7 (A2A) and 8 (Execution Model)

    ## Build 1: A2A Protocol ({{ src }}/daemon/a2a/)
    - __init__.py, registry.py, inbox.py
    - AgentCardRegistry: register/deregister/query agent cards
    - A2AInbox: per-job persistent task queue (save atomically with job state)
    - Event handlers in BatonCore for A2A events
    - Inbox injection: when A2A-enabled sheet starts, pending tasks injected as context

    ## Build 2: Technique Router ({{ src }}/daemon/technique_router.py)
    - Classify agent output: prose, code_block, tool_call, a2a_request
    - For code blocks: extract, route to sandbox execution
    - For tool calls: route to MCP pool
    - For A2A: route through event bus
    - Integration point: after backend.execute() in musician

    ## Build 3: Code Mode Execution
    - Detect code blocks in agent output (markdown fences, structured output)
    - Execute in bwrap sandbox with workspace bind-mount
    - Capture result (stdout, files written)
    - Inject result back into sheet output
    - Handle failures: include error in output for retry

    ## TDD
    - {{ tests }}/test_a2a_protocol.py — registry, inbox, event routing
    - {{ tests }}/test_technique_router.py — classification accuracy
    - {{ tests }}/test_code_mode_execution.py — sandbox routing, error handling
    - Run all tests

    {% elif stage == 7 %}
    # Phase D: Launch Gate

    cd {{ project_root }}

    1. Type check: `python -m mypy {{ src }}/daemon/a2a/ {{ src }}/daemon/technique_router.py --strict`
    2. A2A tests: `python -m pytest {{ tests }}/test_a2a_protocol.py -v`
    3. Router tests: `python -m pytest {{ tests }}/test_technique_router.py -v`
    4. Code mode tests: `python -m pytest {{ tests }}/test_code_mode_execution.py -v`
    5. Full suite: `python -m pytest {{ tests }}/ -x -q --timeout=120`
    6. Lint: `ruff check {{ src }}/daemon/a2a/ {{ src }}/daemon/technique_router.py`

    Write results to {{ workspace }}/gate-d-results.md.
    Fix any failures. Re-run until all pass.

    {% elif stage == 8 %}
    # Phase E: Orchestration Layer

    Build fleet management, TUI updates, and the working directory fix.

    ## Read First
    - Fleet config model from Phase A
    - Daemon manager: {{ src }}/daemon/manager.py
    - TUI: {{ src }}/cli/tui/ (app.py, panels/)
    - CLI run command: {{ src }}/cli/commands/run.py
    - IPC types: {{ src }}/daemon/types.py
    - Orchestration config: {{ src }}/core/config/orchestration.py

    ## Build 1: pause_before_chain
    - PostSuccessHookConfig already has the field (Phase A)
    - Wire into manager.py _execute_hook_run_job():
      if pause_before_chain, transition job to PAUSED_AT_CHAIN instead of submitting
    - Add PAUSED_AT_CHAIN to SheetStatus/JobStatus enum in checkpoint.py
    - Update terminal/satisfied/dispatchable frozensets in baton/state.py
    - Wire mzt resume to trigger the held chain

    ## Build 2: Fleet Config System
    - Fleet detection in manager: when config has type=fleet, launch groups
    - Group dependency resolution (topological sort)
    - Concurrent score launch within groups
    - Fleet-level pause/resume/cancel (acts on all member scores)
    - FleetRecord tracking in manager alongside _job_meta

    ## Build 3: TUI Nesting
    - Fleet → Group → Agent → Sheet display
    - Update JobsPanel for nested rendering
    - Update data reader for fleet-level data

    ## Build 4: Working Directory Fix
    - Add client_cwd field to JobSubmitParams in daemon/types.py
    - CLI commands pass os.getcwd() as client_cwd in IPC requests
    - Conductor resolves relative paths against client_cwd, not daemon cwd

    ## TDD
    - {{ tests }}/test_pause_before_chain.py
    - {{ tests }}/test_fleet_config.py
    - {{ tests }}/test_tui_fleet.py (if Textual testing is set up)
    - Update IPC tests for client_cwd field
    - Run all tests

    {% elif stage == 9 %}
    # Phase E: Launch Gate

    cd {{ project_root }}

    1. Type check new/modified files: `python -m mypy {{ src }}/core/checkpoint.py {{ src }}/core/config/orchestration.py {{ src }}/daemon/types.py --strict`
    2. Pause tests: `python -m pytest {{ tests }}/test_pause_before_chain.py -v`
    3. Fleet tests: `python -m pytest {{ tests }}/test_fleet_config.py -v`
    4. Full suite: `python -m pytest {{ tests }}/ -x -q --timeout=120`
    5. Lint: `ruff check {{ src }}/ --select ALL`

    Write results to {{ workspace }}/gate-e-results.md.
    Fix any failures.

    {% elif stage == 10 %}
    # Phase F: Full Regression (Commissioning Cascade)

    This is the final validation gate. ALL checks must pass before the
    concert chains to Score 3 (Compiler).

    cd {{ project_root }}

    ## Unit Tests
    python -m pytest {{ tests }}/ -x -q --timeout=300

    ## Type Check (full)
    python -m mypy {{ src }}/ --strict

    ## Lint (full)
    ruff check {{ src }}/

    ## Verify New Infrastructure Loads
    python -c "
    from marianne.core.config.techniques import TechniqueConfig, TechniqueKind
    from marianne.core.config.fleet import FleetConfig
    from marianne.core.config.a2a import AgentCard
    from marianne.daemon.keyring import Keyring
    from marianne.daemon.mcp_pool import McpPoolManager
    from marianne.daemon.a2a import AgentCardRegistry
    from marianne.daemon.technique_router import TechniqueRouter
    from marianne.backends.openrouter import OpenRouterBackend
    print('All new infrastructure imports successfully')
    "

    Write comprehensive results to {{ workspace }}/regression-report.md.
    Include: tests passed/failed, type errors, lint issues, import verification.
    {% endif %}

validations:
  # Phase A gate
  - type: file_exists
    path: "{workspace}/gate-a-results.md"
    condition: "stage == 2"
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/marianne-ai-compose && python -m pytest tests/ -x -q --timeout=120 2>&1 | tail -1 | grep -q "passed"'
    condition: "stage == 2"
    description: "All tests pass after config model changes"

  # Phase B: profile, backend, sandbox exist
  - type: command_succeeds
    command: 'test -f /home/emzi/Projects/marianne-ai-compose/src/marianne/instruments/builtins/opencode.yaml'
    condition: "stage == 3 and instance == 1"
    description: "OpenCode instrument profile created"
  - type: command_succeeds
    command: 'test -f /home/emzi/Projects/marianne-ai-compose/src/marianne/backends/openrouter.py'
    condition: "stage == 3 and instance == 2"
    description: "OpenRouter backend created"
  - type: command_succeeds
    command: 'test -f /home/emzi/Projects/marianne-ai-compose/src/marianne/isolation/sandbox.py'
    condition: "stage == 3 and instance == 3"
    description: "Sandbox wrapper created"

  # Phase C gate
  - type: file_exists
    path: "{workspace}/gate-c-results.md"
    condition: "stage == 5"
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/marianne-ai-compose && python -m pytest tests/ -x -q --timeout=120 2>&1 | tail -1 | grep -q "passed"'
    condition: "stage == 5"
    description: "All tests pass after dependent builds"

  # Phase D gate
  - type: file_exists
    path: "{workspace}/gate-d-results.md"
    condition: "stage == 7"
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/marianne-ai-compose && python -m pytest tests/ -x -q --timeout=120 2>&1 | tail -1 | grep -q "passed"'
    condition: "stage == 7"
    description: "All tests pass after protocol layer"

  # Phase E gate
  - type: file_exists
    path: "{workspace}/gate-e-results.md"
    condition: "stage == 9"
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/marianne-ai-compose && python -m pytest tests/ -x -q --timeout=120 2>&1 | tail -1 | grep -q "passed"'
    condition: "stage == 9"
    description: "All tests pass after orchestration layer"

  # Phase F: Full regression
  - type: file_exists
    path: "{workspace}/regression-report.md"
    condition: "stage == 10"
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/marianne-ai-compose && python -m pytest tests/ -x -q --timeout=300 2>&1 | tail -1 | grep -q "passed"'
    condition: "stage == 10"
    description: "Full regression passes"
  - type: command_succeeds
    command: 'cd /home/emzi/Projects/marianne-ai-compose && python -m mypy src/marianne/ --strict 2>&1 | tail -1 | grep -q "Success"'
    condition: "stage == 10"
    description: "Full type check passes"

concert:
  enabled: true
  max_chain_depth: 5

on_success:
  - type: run_job
    job_path: /home/emzi/Projects/marianne-ai-compose/scores-internal/composition-compiler/03-compiler.yaml
    detached: true
    description: "Chain to compiler build phase"
