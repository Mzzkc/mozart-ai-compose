# 01-discovery.yaml — Research Unknowns
#
# Concert: Composition Compiler Build (Score 1 of 5)
# Patterns: Fan-out + Synthesis, Reconnaissance Pull
# Forces: Information Asymmetry, Instrument-Task Fit
#
# Problem: Seven research areas must be explored before infrastructure
# work begins. Each is independent. Synthesis must produce actionable
# findings, not concatenated summaries.
#
# Execution Flow (3 stages, 9 sheets):
#
#   Stage 1: Frame research questions (1 sheet)
#        |
#        +---+---+---+---+---+---+---+
#        v   v   v   v   v   v   v
#   Stage 2: Research streams (7 sheets, parallel)
#        |   |   |   |   |   |   |
#        +---+---+---+---+---+---+
#              v
#   Stage 3: Synthesis — actionable findings (1 sheet)
#        |
#        on_success → 02-infrastructure.yaml

name: cc-discovery
description: "Research unknowns before building composition compiler infrastructure"

workspace: /home/emzi/Projects/marianne-ai-compose/workspaces/composition-compiler-build

instrument: gemini-cli
instrument_fallbacks: [claude-code]
instrument_config:
  timeout_seconds: 3600
  skip_permissions: true
  disable_mcp: true

instruments:
  researcher:
    profile: gemini-cli
    config:
      timeout_seconds: 3600
  synthesizer:
    profile: claude-code
    config:
      timeout_seconds: 3600
      model: claude-opus-4-6

movements:
  1:
    name: "Frame"
    instrument: researcher
  2:
    name: "Research"
    instrument: researcher
  3:
    name: "Synthesis"
    instrument: synthesizer

sheet:
  size: 1
  total_items: 3
  fan_out:
    2: 7
  dependencies:
    2: [1]
    3: [2]

parallel:
  enabled: true
  max_concurrent: 7

cross_sheet:
  auto_capture_stdout: true
  max_output_chars: 8000
  lookback_sheets: 8

retry:
  max_retries: 2
  base_delay_seconds: 30

rate_limit:
  wait_minutes: 5
  max_waits: 12

stale_detection:
  enabled: true
  idle_timeout_seconds: 1800

prompt:
  variables:
    project_root: /home/emzi/Projects/marianne-ai-compose
    spec_path: docs/specs/2026-04-13-composition-compiler-design.md
    research_streams:
      1:
        topic: "A2A Protocol Best Practices"
        focus: "Google A2A spec, lifecycle management patterns (task queueing for offline agents, priority negotiation), agent card schema, bootstrap problem (empty registry on first launch), conductor-managed vs dedicated coordination agent"
        output: "research-a2a.md"
      2:
        topic: "OpenRouter API Behavior"
        focus: "Free tier rate limits per model, concurrent request limits, key rotation behavior, error response formats, OpenAI-compatible API specifics, model availability/deprecation patterns"
        output: "research-openrouter.md"
      3:
        topic: "OpenCode/Crush Stability"
        focus: "OpenCode (opencode.ai) capabilities, model routing via config, OpenRouter provider support, MCP server integration, headless mode (-p flag) reliability, archived repo → Crush transition timeline, community activity"
        output: "research-opencode.md"
      4:
        topic: "bwrap/nsjail on WSL2"
        focus: "bubblewrap on WSL2 (user namespace support, kernel version requirements), nsjail cgroups v2 support (WSL2 kernel >= 2.5.14), resource governance (memory caps, CPU limits per agent), Claude Code's existing bwrap usage as reference"
        output: "research-sandbox.md"
      5:
        topic: "Free Model Code Generation"
        focus: "Which free OpenRouter models (MiniMax 2.5, Gemma 4, Nemotron 3, GLM 4.5 Air, Maverick) reliably generate executable Python against typed interfaces? Prompt patterns for code mode. Failure rates. Context window utilization."
        output: "research-codegen.md"
      6:
        topic: "Programmatic Interface Design"
        focus: "Optimal typed interface shape for token efficiency — how to describe MCP tool surfaces in ~500 tokens vs 3000+ for individual tool definitions. Cloudflare Dynamic Workers pattern. Interface stub generation from capability declarations."
        output: "research-interfaces.md"
      7:
        topic: "Technique Router Classification"
        focus: "Classifying LLM output as prose vs code blocks vs tool calls vs A2A requests. Regex patterns for markdown code fences. Structured output detection. False positive analysis. Handling ambiguous output."
        output: "research-router.md"

  template: |
    {% if stage == 1 %}
    # Stage 1: Frame Research Questions

    You are a research coordinator preparing a parallel investigation into
    seven unknowns that must be resolved before building AI orchestration
    infrastructure.

    ## Context
    Read the design spec at {{ project_root }}/{{ spec_path }} to understand
    the full system being built. Focus on Sections 7 (A2A), 8 (Execution Model),
    5 (Instruments), 6 (Techniques), and 13 (Open Research Items).

    ## Your Task
    For each research stream below, write a focused research brief that defines:
    - The specific questions to answer (not vague exploration)
    - What "actionable" means for this topic (what decisions depend on it)
    - Known starting points (URLs, docs, repos to investigate)
    - Success criteria (how do we know the research is sufficient)

    ## Research Streams

    {% for id, stream in research_streams.items() %}
    ### Stream {{ id }}: {{ stream.topic }}
    {{ stream.focus }}
    {% endfor %}

    Write the research brief to {{ workspace }}/research-brief.md

    Structure it with one section per stream, each containing:
    - Questions (numbered, specific)
    - Decision dependencies (what infrastructure design decisions this informs)
    - Starting points
    - Success criteria

    {% elif stage == 2 %}
    {% set stream = research_streams[instance] %}
    # Stage 2, Instance {{ instance }}: {{ stream.topic }}

    You are a technical researcher investigating a specific unknown for
    an AI orchestration system (Marianne).

    ## Read First
    - Research brief: {{ workspace }}/research-brief.md (your stream is #{{ instance }})
    - Design spec: {{ project_root }}/{{ spec_path }}

    ## Your Research Topic
    **{{ stream.topic }}**

    {{ stream.focus }}

    ## Requirements
    1. Investigate thoroughly — read docs, repos, APIs, community discussions
    2. Test claims where possible (e.g., if investigating CLI flags, try them)
    3. Produce ACTIONABLE findings — specific recommendations, not general observations
    4. Include concrete code examples, config snippets, or API responses where relevant
    5. Flag risks and uncertainties honestly — "I couldn't verify X" is better than guessing

    ## Output Structure
    Write to {{ workspace }}/{{ stream.output }}:

    ```
    # {{ stream.topic }} — Research Findings

    ## Executive Summary
    [3-5 sentence summary of key findings and recommendation]

    ## Key Findings
    [Numbered findings with evidence]

    ## Recommendations
    [Specific, actionable recommendations for the infrastructure build]

    ## Risks and Uncertainties
    [What we don't know, what could go wrong]

    ## References
    [URLs, docs, repos consulted]
    ```

    Minimum depth: 800 words. Surface-level summaries are not useful.

    {% elif stage == 3 %}
    # Stage 3: Research Synthesis

    You are a technical architect synthesizing seven parallel research
    streams into a unified findings document that will inform infrastructure
    design and implementation.

    ## Read All Research Reports
    {% for id, stream in research_streams.items() %}
    - {{ workspace }}/{{ stream.output }}
    {% endfor %}

    Also read the original research brief: {{ workspace }}/research-brief.md
    And the design spec: {{ project_root }}/{{ spec_path }}

    ## Your Task
    Produce a synthesis that goes BEYOND concatenation. Find:

    1. **Convergences** — where do independent findings agree? What's confirmed
       from multiple angles?
    2. **Tensions** — where do findings conflict? (e.g., "OpenCode supports
       OpenRouter" vs "OpenCode is archived and unstable")
    3. **Cross-cutting insights** — what emerges from combining findings that
       wasn't visible in any single report? (e.g., sandbox + code mode + free
       models interact in ways none individually addressed)
    4. **Decision matrix** — for each infrastructure component, what does the
       research recommend? Flag where research is insufficient to decide.
    5. **Revised risk register** — what risks are higher or lower than the
       spec assumed?

    ## Output
    Write to {{ workspace }}/discovery-synthesis.md

    This document will be injected as context into Score 2 (Infrastructure)
    of the build concert. Every infrastructure decision references it.

    Minimum depth: 1500 words. This is the foundation for a major build.
    {% endif %}

validations:
  # Stage 1: Research brief
  - type: file_exists
    path: "{workspace}/research-brief.md"
    condition: "stage == 1"
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/research-brief.md") -ge 400'
    condition: "stage == 1"
    description: "Research brief has substantive content"

  # Stage 2: Individual research reports
  - type: file_exists
    path: "{workspace}/research-a2a.md"
    condition: "stage == 2 and instance == 1"
  - type: file_exists
    path: "{workspace}/research-openrouter.md"
    condition: "stage == 2 and instance == 2"
  - type: file_exists
    path: "{workspace}/research-opencode.md"
    condition: "stage == 2 and instance == 3"
  - type: file_exists
    path: "{workspace}/research-sandbox.md"
    condition: "stage == 2 and instance == 4"
  - type: file_exists
    path: "{workspace}/research-codegen.md"
    condition: "stage == 2 and instance == 5"
  - type: file_exists
    path: "{workspace}/research-interfaces.md"
    condition: "stage == 2 and instance == 6"
  - type: file_exists
    path: "{workspace}/research-router.md"
    condition: "stage == 2 and instance == 7"
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/research-a2a.md") -ge 800'
    condition: "stage == 2 and instance == 1"
    description: "A2A research has depth"
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/research-openrouter.md") -ge 800'
    condition: "stage == 2 and instance == 2"
    description: "OpenRouter research has depth"
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/research-opencode.md") -ge 800'
    condition: "stage == 2 and instance == 3"
    description: "OpenCode research has depth"
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/research-sandbox.md") -ge 800'
    condition: "stage == 2 and instance == 4"
    description: "Sandbox research has depth"
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/research-codegen.md") -ge 800'
    condition: "stage == 2 and instance == 5"
    description: "Code gen research has depth"
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/research-interfaces.md") -ge 800'
    condition: "stage == 2 and instance == 6"
    description: "Interface research has depth"
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/research-router.md") -ge 800'
    condition: "stage == 2 and instance == 7"
    description: "Router research has depth"

  # Stage 3: Synthesis
  - type: file_exists
    path: "{workspace}/discovery-synthesis.md"
    condition: "stage == 3"
  - type: command_succeeds
    command: 'test $(wc -w < "{workspace}/discovery-synthesis.md") -ge 1500'
    condition: "stage == 3"
    description: "Synthesis has substantive depth"
  - type: content_contains
    path: "{workspace}/discovery-synthesis.md"
    pattern: "Decision"
    condition: "stage == 3"
    description: "Synthesis contains decision recommendations"
  - type: content_contains
    path: "{workspace}/discovery-synthesis.md"
    pattern: "Risk"
    condition: "stage == 3"
    description: "Synthesis addresses risks"

# Chain to infrastructure score on success
concert:
  enabled: true
  max_chain_depth: 5

on_success:
  - type: run_job
    job_path: /home/emzi/Projects/marianne-ai-compose/scores-internal/composition-compiler/02-infrastructure.yaml
    detached: true
    description: "Chain to infrastructure build phase"
